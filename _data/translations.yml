    goodman: |-
      The commandments in the fourteenth group are the ones I listed in the Book of Women and in Laws regarding Forbidden Unions. The laws on Crossbreeding of Beasts and the commandment of circumcision belong to this class as well. I have already given my ac- count of the object of this group (III ). So I shall focus now on the particulars.

      I say, we know that friends are indispensable to man lifelong. Aristotle explained this in the Ethics book IX (NE VIII– IX, esp. VIII ). In health and well- being, one enjoys their company. In hardship, one counts on them. In old age and infirmity, one needs their help. All the more with children and relations. Ties of fellowship, affection, and mutual support reach their peak only among kin. So when a group shares an ancestor, even remotely, caring, mutual aid, and affection flourish among them. To foster such fellowship is the Torah’s high aim. That is why prostitution is forbidden (Deuteron- omy : ): It ruins lines of descent. Children are estranged from their people. They do not know their kin, and their kin do not know them. Nothing could be worse for them or their progenitor.

      Another major reason for forbidding prostitution is to curb sexual excess and obses- sion. Ever- changing partners fuel lust. Arousal is not the same in relations with a regular, familiar partner as with ever new prostitutes of varied mien and manner. Another key benefit is curbing social strife. Were prostitution licit, several men might pursue the same woman, making conflict inevitable. They might well kill each other or her. This hap- pens, as we know, all too often— trooping to a whore’s house (Jeremiah : ).

      To curb these grave evils and safeguard the social good of known lineages, prostitu- tion, male and female, was forbidden. No licit avenue of intercourse was left than for a man to find a woman and marry her publicly. If just finding a woman sufficed, most men would simply bring home a whore for a time, on terms agreed, and call her his partner.

      That is why a definite act and commitment are prescribed, signifying the choice of this woman. This is betrothal, and when solemnized before witnesses, it is marriage: Boaz took ten men (Ruth : ).

      A match may fail, leaving a troubled household. So divorce is permitted. But if divorce were valid by word of mouth alone or simply turning a wife out of the house, a woman might just wait for her chance and leave, claiming to be divorced. Or if she had a lover, the two might pretend she was divorced. So the Torah requires a writ attesting to her divorce: He shall write her a bill of divorcement (Deuteronomy : ).

      Jealous fantasies and suspicions about women are all too common. So the Torah gave us rules about a suspect wife (Numbers : – ). These laws of So ah compel every mar- ried woman to be extremely careful with herself to make sure as can be that her husband does not sour toward her, lest she face the awful So ah ordeal. If a wife is chaste and cir- cumspect, most men would give anything to spare her this trial. They would rather die than subject her to the shame of baring her head, loosing her hair, ripping her garment to expose her breast, and being paraded through the Temple before men and women and the High Court. Such fears check dreadful ills and the chaos adultery brings not a few households.

      A virgin may marry any man, but only one who seduces her must marry her. She may prefer him, and their marriage is doubtless a better remedy than her marrying someone else. But if she or her father refuses, the seducer must dower her (Exodus : ). A fur- ther penalty: if he forced her, he may not divorce her as long as he lives (Deuteronomy : ).

      The reason for levirate marriage is stated in the text: This was the ancient practice before the Torah was given (Genesis : ) and preserved there. alitzah (Deuteronomy : ) uses acts then thought degrading to pressure a survivor to marry his brother’s widow rather than face shame, as the Torah’s words show: Thus is it done [to a man who will not shore up his brother’s house.] In Israel shall he be called [“Unshod”]! ( : – ).

      We learn a point of principle and propriety from Judah’s story, when he says, Let her keep it lest we be disgraced— See, I sent this kid (Genesis : ). To explain: Sleeping with a whore before the Torah was given was like sleeping with one’s wife thereafter. It was lawful and not repugnant. To pay a prostitute her agreed fee in those days was like paying a woman’s dowry when divorcing her now. It was the woman’s right. So Judah’s saying lest we be disgraced shows us that all sexual matters, even those that are permitted, should be treated discreetly. We should not speak of such things but keep them private, even to our cost. You can see this in Judah’s saying, ‘Better to suffer a loss and let her keep what she took [his staff, signet, and cord ( : )] than raise a hue and cry looking for her and disgrace oneself.’ That is how the story teaches propriety. Principle is seen in Judah’s spurning any intent to scant the woman or break his promise: Look, I sent this kid— doubtless a fine specimen, hence “this kid.” He showed the justice of the heritage he and his brothers had gotten from Jacob, Isaac, and Abraham: keeping one’s word without quibble and meet- ing one’s obligations fully and handsomely, whether in paying a debt, returning a pledge, or giving others their due for services rendered or anything else. A woman’s dowry is her due, like wages. There is no difference between withholding it and refusing a man his pay, no difference between finding fault with a worker to dismiss him unpaid and doing so to a woman to divorce her without paying her dowry.

       You can see how very fair are these just statutes and laws (Deuteronomy : )— witness their ruling against a man who blackens his wife’s name ( : – ). A villain who slanders his wife just because he has tired of her and finds her unattractive could divorce her like any husband. Nothing stops him. But he would have to give her what is hers by right. So he traduces her instead to free himself for nothing. He defames her absurdly to keep what is rightfully hers: fifty silver shekels, the Torah’s statutory dowry for a virgin. So God sentences him to pay a hundred, on the rule that the one the judges find in the wrong shall pay the other double (Exodus : ) and the law of false witness, as I explained (III ). On this basis, one who defames his wife hoping to cheat her out of her fifty shekels must pay a hundred, the penalty for withholding her due. But the penalty for sullying her honor with scurrilous charges of unchastity is that his own honor is sullied: He is flogged— they shall chastise him (Deuteronomy : , with Onkelos). And for his lust, seeking only plea- sure, his penalty is to remain wedded to her permanently: He may not divorce her for the rest of his life ( : ). For he did all this just because he no longer found her attractive.

      That is how vices are cured when the prescription is God’s command.

      The more you reflect on it, the more you will appreciate how justice shines in the To- rah’s rules: The slanderer who impugns his wife’s virtue, hoping to keep what is hers by law, fares the same as a thief who stole another’s goods; and a false witness who intended harm, even if he failed, faces the same loss he intended: Slanderer, perjurer, or thief— all three fall under the same law and rule (Numbers : ).

      See how wonderfully wise God’s laws are, as wondrously wise as His works. It says, He is the Rock whose work is perfect. All His ways are justice (Deuteronomy : ). Just as His works are consummately perfect, His laws are consummately just. Our minds may not fully grasp the perfection of all His works— or the justice of His every ruling. We see some of the marvels in His creatures— in the organs of animals and the movement of the spheres. And similarly, we see the justice in some of His laws. But the unseen, in both cases, far exceeds what meets the eye.

      Returning now to this chapter’s topic: The bans on sexual trespass all aim to diminish and disparage sexual activity and keep it to a minimum. With homosexuality and bestial- ity (Leviticus : – ), the grounds are obvious. If natural sex is frowned upon and kept within the bounds of necessity, all the more restricted are acts that flout nature’s course and seek only pleasure (cf. .76a).

      Incestuous female partners have this in common: most of them are constantly with the man in question— in his home, easily accessible and readily taken, their presence un- trammeled and unquestioned. If these women were treated the same as any single woman and forbidden to a man only because they were not married to him, most men would be at constant risk of straying and seducing them. But since such relations are strictly for- bidden with the strongest of sanctions— court- ordered execution and excision (III )— these women are out of the question. Barred from such advances, men look elsewhere.

      That ease of access shapes our incest laws is very clear: If a man has a wife, her mother, grandmother, daughter, granddaughter, or sister are typically present much of the time.

      He will see them constantly as he comes and goes. A wife, similarly, is in contact with her husband’s brother, father, and son. Obviously, a man is regularly with his sisters, his aunts, and his uncle’s wife. He grew up with them. These are the women with whom relations are incestuous. So access, you can see, is one factor in the incest prohibition.

      But another, I believe, is to protect intimacy. Linking root and branch— by sex with one’s mother or daughter— is an outrage. So sex with them is forbidden, root with branch or branch with root or both with a third party, exposing themselves to that other. That is why it is forbidden to sleep with a woman and her mother, or with one’s father’s wife, or one’s son’s: In all these cases, the nakedness of root and branch are exposed to one another. But siblings are like root and branch. And since a sister is forbidden, so are a wife’s sister and a brother’s wife: That would sexually link to a third person two others who are like root and branch.

      Given the grave prohibition of sibling incest, treating brother and sister as root and branch, or indeed alike, sex with a maternal aunt is forbidden too, as she is the counter- part of one’s mother, and with a paternal aunt, the counterpart of one’s father. But just as the daughters of a paternal uncle and of a paternal aunt are not forbidden, the daughter of a brother or sister is not forbidden. That a paternal uncle may marry the wife of his brother’s son, although that son may not marry his paternal uncle’s former wife, is ex- plained by our first consideration. For a brother’s son is very much present in his uncle’s home and as familiar with this wife as with his brother’s wife. But an uncle does not so frequent his nephew’s home and is not so close with his nephew’s wife. Obviously, a father has the same access to his son’s wife as the son has to his father’s. So the prohibition is symmetrical: capital offenses in either case.

       The reasons sex is banned with a menstruous or a married woman are too obvious for words. As you know, we may not take sexual pleasure of any sort, even visually, in a woman not permitted to us. I explained this in Laws regarding Forbidden Unions ( . – ). As I spelled out there, our Law allows no erotic daydreaming; nor may we excite ourselves sexually in any way. If one does become aroused unwittingly, he must turn his thoughts elsewhere until it passes. To encourage the virtuous, the Sages say, “Son, if that monster afflicts you, drag him to the study hall. If he is iron, he will melt; if he is stone, he will shatter, as it says: Is not My word like fire, saith the Lord, like a hammer that shatters rock!” (B. Kiddushin 30b, citing Jeremiah : ). The sage counsels his son in self- discipline: ‘If you are aroused and it troubles you, go to the study house and read, think, and ask and answer questions; it will pass.’ Marvelous, his saying “this monster”— and what a monster! This is the norm not just in our religion. The Philosophers say the same thing. I have already taught you the text where Aristotle calls the sense of touch a shame to us, since it leads us to privilege food and sex (II , ; III ). His writings decry those who favor sex and gourmandizing. He derides and disparages them at length, as you will see in his Ethics (NE III , 1118b2– ) and Rhetoric (I , 1370a18).

      In the interest of chaste thinking, a virtue devoutly to be wished, our Sages banned watching beasts or birds mate (B. ʿAvodah Zarah 20b). It is for the same reason, I think, that we are forbidden to crossbreed beasts. For we know that different species are not generally moved to mate unless stimulated manually. This, you can see, is always done by the poor louts who breed mules. The Torah hates the thought of any Israelite’s stooping so low, dealing with things it finds distasteful even to mention, let alone touch without necessity. But there is no necessity for such crossbreeding.

      I think the reason for the ban on teaming different species in work of any sort is just to make crossbreeding less likely. It says, Thou shalt not plow with an ass and an ox together (Deuteronomy : ). If they are teamed, one might mount the other. The rule is general, as the Sages indicate, not just for oxen and asses: “An ox with an ass, or any pair from dif- ferent species: Scripture just names the common case” (M. Bava Kamma . ).

      One reason for circumcision, too, in my view, is to curb sexual activity— to weaken the organ and render sex as pacific as possible— and make it less frequent. Some would have it that circumcision repairs an inborn defect. But then one might object, ‘How could something natural be defective and need repair, especially since we know how useful the foreskin is to this member?’ The mitzvah was given to correct a moral, not a physical, defect. The damage to the organ is just the point. No function needed for personal survival is impaired, nor is procreation checked. What is checked is a frenzied appetite beyond all need. That circumcision blunts arousal and may lessen pleasure is un- questionable. For an organ made to bleed and stripped of its sheath in infancy is doubt- less weakened. The Sages shed light on this when they say, “A woman who has slept with an uncircumcised man finds it hard to leave him” (Genesis Rabbah . ). This, in my opinion, is the main reason for circumcision. Was the practice not inaugurated by Abra- ham, famed for his chastity, as the Sages relate (B. Bava Batra 16a) concerning his saying, Lo, I know thou art a woman lovely to look at (Genesis : )?

      Circumcision has a further vital meaning for us, I think: Those who share our mono- theistic conviction should also share a bodily sign, letting no one who is not one of us feign otherwise. A stranger might do so to gull or exploit our religion’s adherents. But no one would do this to himself or his son without firm conviction. For this is no scratch on the leg or burn on the arm. It is very, very serious.

      We know how powerful love and solidarity can grow when people all share the same sign of their common bond and pact. Circumcision, in this way, is the bond of alle- giance to the covenant our Father Abraham made, marking his belief in God’s unity.

      All who are circumcised join that pact and take on his commitment to that covenant of monotheism— [I will raise up My covenant between Me and thee, and thy seed after thee through the generations to come, a covenant eternal:] to be God to thee and to thy seed after thee (Genesis : ). This, too, is a powerful reason for the commandment, like the first— and perhaps even stronger.

      This law is observed and preserved only if circumcision is performed at an early age, for three wise reasons: ( ) Were a boy let be until grown, he might not do it. ( ) An infant does not suffer as much pain as an adult. For the foreskin is pliant and the imagination undeveloped. An adult would blench and dread circumcision, picturing it in advance.

      ( ) Parents are not so anxious about a newborn. The image that cements parental love is not yet fully formed. It fills in as parents and child interact, growing as the child grows, then beginning to wane and fade— the fantasy image, that is. So a mother and father’s love for their child at birth is not like their love for him at one year; nor do they love him at one as they do at six. Were he left alone for two or three years, circumcision would inevitably fall by the wayside, given a father’s love and tender feelings. But at birth, the mental image is still quite weak, especially in the father, who bears the responsibility to keep this commandment (B. Kiddushin 29a).

      We circumcise on the eighth day (Leviticus : ). For all animals are extremely deli- cate and tender at birth, as if still in the womb, until seven days have passed. Only then are they deemed ready to go out in the air. You will see this with beasts too: Seven days shall it be with its dam (Exodus : ; cf. .102b). Until then, it is all but a fetus. Just so in the human case: circumcision after seven days. That is the standard: Do not let it vary.

      Also in this class comes the ban on mutilating the genitals of any male animal (see Leviticus : ), on the principle of just laws and statutes (Deuteronomy : ). Things are kept in balance: There should be no sexual excess, as I said, but neither should sex be wholly rejected. Did God not give the command, Be fruitful and multiply (Genesis : )? So the organ of generation is weakened by circumcision, but there is no gelding.

      We leave the genitals in their natural state but guard against excess. One whose testes are crushed or whose penis is severed (Deuteronomy : ) may wed no Israelite woman. For sexual relations of this kind are perverse as well as futile, and such a union, quite clearly, would be a stumbling block to her and to her suitor. That is very clear.

      To forestall illicit unions, a mamzer is barred from relations with an Israelite woman (Deuteronomy : ; M. Yevamot . ; MT Laws regarding Illicit Unions . – ), warning would- be fornicators that what they contemplate would stigmatize their issue irrepara- bly. Illegitimate offspring are looked down upon in every nation and culture, and Israel’s seed is too noble to sully with bastards. Given their dignity, Kohanim may wed no whore or divorcée, nor may they wed the offspring of a Kohen’s forbidden union (Leviticus : ; B. Kiddushin 77a). The High Priest, noblest of the Kohanim, may not wed even a widow but only a virgin. The grounds are clear enough. If union with mamzerim is forbidden to all Israel, still more are unions with male or female slaves. The grounds for the prohibi- tion of marriage to a non- Jew are stated biblically: When thou takest of their daughters for thy sons [and those daughters still go whoring after their own gods, they will seduce thy sons to go whoring after them too] (Exodus : ).

      Most of the statutes whose grounds are obscure to us serve just to distance us from paganism. For some of the particulars, the reasons remain unclear to me, and I do not know the benefits. Hearsay is not the same as eyewitness. What I do know of Sabian ways, gleaned from their writings, lacks the specificity of seeing their practices firsthand— especially since these beliefs have crumbled over the past two thousand years and more. If we knew those practices circumstantially and heard the beliefs about them described in detail, the wisdom of our own practices regarding sacrifices and ritual im- purity would be clear to us, as would the wisdom of other practices whose grounds I find less than transparent. All these laws, I am confident, were laid down to efface those unsound beliefs and abolish the vain practices that made welter and waste (Isaiah : ) of people’s lives. The object was to erase the superstitions that distracted mankind from rational inquiry and wholesome pursuits, as our prophets put it vividly: They followed folly (tohu) and chased futility ( Samuel : with Jeremiah : ). As Jeremiah says (speak- ing for the pagans), “Naught but lies was our fathers’ heritage— vain and useless!” ( : ).

      Just think how baneful this was and how vital the struggle to end it. Most of the mitzvot, as I have shown, serve simply to expunge those beliefs and free us of the massive, oppressive toil and trouble of paganism: Every biblical ban and command whose grounds you cannot see is but medicine for an illness now, thank God, unknown! That is what an enlightened mind should believe, who sees the truth of His words: I said not to the seed of Jacob, “Seek Me in a world of waste” (Isaiah : ).

      I have now covered all the mitzvot in our fourteen categories and noted their grounds.

      Only a few and some small details remain to be explained. But even for these, in fact, I have laid the basis of an explanation, if one reflects on it thoughtfully.
