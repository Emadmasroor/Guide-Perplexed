    goodman: |-
      I have already explained to everyone the four ways in which the prophecy of our Teacher Moses differs from that of other prophets. I laid out the evidence clearly in my Com- mentary on the Mishnah and in Mishneh Torah. So there is no need to repeat that, and it is not part of my task here. But I will tell you that all of my discussions of prophecy in the chapters of this work concern only the form it took for every prophet before and after Moses. These chapters will say not a word directly or implicitly about the prophecy of our Teacher Moses. Moses, as I see it, is called a prophet in quite a different sense from all the rest. The same is true of his miracles, in my view. They are not of a kind with those of other prophets.

      The Torah attests that Moses’ prophecy was unlike that of all his predecessors when God says, I appeared to Abraham, [Isaac, and Jacob as El Shaddai.] But by my name yhwh I was not known to them (Exodus : ). This teaches us that Moses’ experience was unlike that of the Patriarchs. It was beyond theirs, let alone any other predecessor’s. The gulf between his prophecy and that of any successor is stated as a point of fact: No prophet will again arise in Israel like Moses, whom God knew face to face (Deuteronomy : ).

      Moses’ experience, it clearly states, was unlike that of anyone yet to come in Israel, a nation of priests and a holy people (Exodus : ), amidst whom is the Lord (Numbers : )— let alone in other nations.

      The difference between his miracles en bloc and those of any other prophet is this: All the miracles performed by or for those prophets were reported by just a handful of people— Elijah’s, say, or Elisha’s. See how the king of Israel inquires, asking Gehazi to inform him: “Tell me, pray, all the great things Elisha did.” And as he was telling [the King how Elisha had revived the boy, who should appear but the woman whose son he had revived. . . .] Gehazi said, “My lord King, here is the woman, and this is the son Elisha re- vived!” ( Kings : – ). Likewise with every prophet’s portents except those of our Teacher Moses.

      That is why Scripture can state for us as a fact that no prophet will come who works wonders publicly, before friend and foe alike, as Moses did: No prophet will yet arise [like Moses, whom God knew face to face,] with all the signs and wonders [God sent him to perform] in the sight of all Israel (Deuteronomy : – ). It links these two thoughts: that no one will arise whose experience is like that of Moses and that no one else will work wonders like his, specifying that these portents were performed before Pharaoh and all his servants, and all his land ( : )— his adversaries— and in the presence of all Israel, his followers: in the sight of all Israel ( : ). It was not so with any prior prophet, and as truthfully predicted ( : ), it will never happen to anyone else.

      Make no mistake about the hours it says that daylight lasted for Joshua. It does say in the sight of Israel (Joshua : )— but not all Israel, as with Moses. Elijah, too, at Mount Carmel, acted before just a few people ( Kings : – ). I say ‘hours,’ for I think when it says, [The sun stood in midheaven and did not haste to set] the like of a full day (Joshua : ), it means it seemed the longest day of the year: Full here means a perfect day. In effect, ‘That day at Gibeon seemed to them the longest day of summer there.’ Now that you can see just how different Moses and his miracles were— his experience as extraordinary as his acts— and can rest assured that he reached a plane beyond our ken, listen to what I have to say in the chapters that follow about prophecy and the ranks of prophets, all of lesser degree. That was the purpose of this chapter.
