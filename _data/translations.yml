  ch27:
    friedlander: 'We have already stated that the belief in the Creation is a fundamental
      principle of our religion; but we do not consider it a principle of our faith
      that the Universe will again be reduced to nothing. It is not contrary to the
      tenets of our religion to assume that the Universe will continue to exist for
      ever. It might be objected that everything produced is subject to destruction,
      as has been shown; consequently the Universe, having had a beginning, must come
      to an end. This axiom cannot be applied according to our views. We do not hold
      that the Universe came into existence, like all things in Nature, as the result
      of the laws of Nature. For whatever owes its existence to the action of physical
      laws is, according to the same laws, subject to destruction: the same law which
      caused the existence of a thing after a period of non-existence, is also the
      cause that the thing is not permanent; since the previous non-existence proves
      that the nature of that thing does not necessitate its permanent existence.
      According to our theory, taught in Scripture, the existence or non-existence
      of things depends solely on the will of God and not on fixed laws, and, therefore,
      it does not follow that God must destroy the Universe after having created it
      from nothing. It depends on His will. He may, according to His desire, or according
      to the decree of His wisdom, either destroy it, or allow it to exist, and it
      is therefore possible that He will preserve the Universe for ever, and let it
      exist permanently as He Himself exists. It is well known that our Sages never
      said that the throne of glory will perish, although they assumed that it has
      been created. No prophet or sage ever maintained that the throne of glory will
      be destroyed or annihilated; but, on the contrary, the Scriptural passages speak
      of its permanent existence. We are of opinion that the souls of the pious have
      been created, and at the same time we believe that they are immortal. Some hold,
      in accordance with the literal meaning of the Midrashim, that the bodies of
      the pious will also enjoy everlasting happiness. Their notion is like the well-known
      belief of certain people, that there are bodily enjoyments in Paradise. In short,
      reasoning leads to the conclusion that the destruction of the Universe is not
      a certain fact. There remains only the question as to what the prophets and
      our Sages say on this point; whether they affirm that the world will certainly
      come to an end, or not. Most people amongst us believe that such statements
      have been made, and that the world will at one time be destroyed. I will show
      you that this is not the case; and that, on the contrary, many passages in the
      Bible speak of the permanent existence of the Universe. Those passages which,
      in the literal sense, would indicate the destruction of the Universe, are undoubtedly
      to be understood in a figurative sense, as will be shown. If, however, those
      who follow the literal sense of the Scriptural texts reject our view, and assume
      that the ultimate certain destruction of the Universe is part of their faith,
      they are at liberty to do so. But we must tell them that the belief in the destruction
      is not necessarily implied in the belief in the Creation; they believe it because
      they trust the writer, who used a figurative expression, which they take literally.
      Their faith, however, does not suffer by it.'
    pines: Placeholder text
    goodman: |-
      As I explained, the belief that the world began is critical to our entire religion. But that the world will perish now that it exists and has reached its present state is by no means a re- ligious doctrine of ours. None of our beliefs would be undermined by belief in the world’s permanence. ‘Is it not proven,’ you might ask, ‘that whatever comes to be must pass away?

      So if the world began, must it not end?’ That does not affect us. We do not claim that the world began like some natural object bound up in the natural order. What arises naturally must decay naturally: Just as a thing’s nature requires it to become what it was not so at first, the same nature requires that it not remain forever as it was. Yes, natural things do not retain their natures permanently. But our biblical view that things arise and perish at His will, not by necessity, does not commit us to the notion that if God creates something He must destroy it. It depends on His will. He may destroy it if He pleases— or as His wisdom ordains— or preserve it forever, to last as long as He.

      The Sages, as you know, although deeming the Throne of Glory created, never say that it will vanish. No Prophet or Sage was ever heard to say that the Throne will pass away or cease to be. Scripture makes it eternal. Likewise the souls of the virtuous: We see them as created but never to perish. And some believe, taking the midrash literally, that their bodies, too, will enjoy perpetual bliss, forever and ay, as in the popular belief about the denizens of Paradise.

      Reason, in a word, tells us that the world need not perish. So we need only consider what the Prophets and Sages relate. Do they affirm that this world must be destroyed, or do they not? Most of our common folk believe they do and that this world will perish.

      But I shall show you that is not so. Many of our texts, in fact, affirm its preservation; and all those that, taken literally, suggest its destruction are quite clearly poetic, as I’ll explain (II ). But if a literalist objects that he has to believe that it will be destroyed, he should not be treated sharply but just informed that the world’s end is not implied by its creation.

      He believes that only because he wants to credit those who use the imagery that he takes literally, and there is no harm at all in that religiously.
