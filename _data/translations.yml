    goodman: |-
      In the name of the Lord, God of the universe.

      — Genesis : My dear student Rabbi Joseph (thy Rock protect thee), son of Rabbi Judah (may he rest in paradise) — When you first introduced yourself, proposing to travel so far to read with me, I admired your zest for inquiry and the hearty appetite for ideas I could see in your poetry. Your essays and artful prose pieces arrived from Alexandria before I could assay your thinking firsthand. ‘Perhaps his reach exceeds his grasp,’ I said. So when we re- viewed some of the astronomy you had done, with the mathematical prerequisites you’d studied, I was all the more delighted with your quality of mind and swift grasp of ideas.

      I could see how keen you were for mathematics. So I let you work with it, confident of the outcome. But once you reviewed for me some of the logic you’d studied, I set my hopes on you, sensing that you were ready for some of the mysteries of Scripture to be opened up to you and to discover what advanced readers should find there. I dropped a few hints and glimmers and saw you asking for more. You wanted me to clarify certain points of theology, to tell you what the Mutakallimūn were after and whether their methods are cogent— or, if not, how to class them.

      I saw you had touched on these subjects with others but were still puzzled and per- plexed, your fine soul seeking the right words (Ecclesiastes : ), but I kept reining you in, urging you to take one step at a time and get a firm grip on the truth, not just stumble into certitude. As long as you were here, whenever some verse came up, or some passage from the Sages that hinted at an out- of- the- way idea, I explained it to you freely. But when God decreed our parting and you moved on, memories of our sessions revived an old plan of mine: Your absence spurred me to set down this work, written for you and others like you, no matter how few. I’ve laid it out in separate chapters, all of which will reach you as I write them. Farewell.

      Introduction Teach me the path to take, for to Thee do I raise my soul.

      — Psalms : To you, people, do I call; my voice, to all mankind.

      — Proverbs : Lend an ear to the words of the wise, take to heart what I have learned.

      —P roverbs : The first aim of this work is to clarify the meanings of certain terms in Scripture. Some of these have multiple senses, but the ignorant take them only in certain of those senses: Although some are figurative, they take them only in the sense underlying the figure.

      Others are ambiguous, to be taken now at face value, now metaphorically.

       It is not my goal to make this work transparent all through to the masses or to intellec- tual tyros. Nor is it my object to instruct those who study the Torah only for its law. The object of this work throughout, like that of any other of its sort, is a sound understanding of the Torah. But the specific purpose here is to arouse intellectually a religious, morally and spiritually mature person who is settled of mind and committed to the Torah’s truth, who has studied and absorbed the philosophical sciences. Human reason draws such a person invitingly to its domain, but he is troubled by the surface sense of certain biblical expressions. Resisting what he still takes (or was taught) is the meaning of its multivalent, metaphorical, or ambiguous words, he hangs back, perplexed and confused. Should he follow his reason, reject what he took those words to say, and presume that he has shed core biblical precepts? Or should he hold fast to what he took those words to mean and fight reason’s sway, dig in his heels and resist, feeling injured by reason, as though it had sullied his faith, retain his fanciful beliefs, yet remain deeply troubled by anxiety and disquiet.

       A second aim of the work is to clarify the thickly veiled imagery of Scripture. Since it is not identified as imagery, dull or naive readers see only the surface sense and no deeper meaning. Even a true scholar who ponders such expressions but takes them at face value will be much perplexed by them. But once I have explained an image to him or noted that the language is figurative, he will get back on track and break free of his confusion. That is why I titled this work Guide to the Perplexed. I do not pretend it will banish every problem for one who understands it. But I can say that it will dispel most, including the gravest. Still, no sensible reader would expect me to treat exhaustively the topics I raise or to analyze in full every image I address. No rational man could do that even orally. So why would one put such things in a book, just to make himself the butt of ignorant barbs from every sophomoric blockhead?

      I have raised these issues broadly in my juridical writings and noted many of the key themes. I said there (CM agigah . ) that the Account of Genesis is Physics; that of the Chariot, Metaphysics. And I explained the Sages’ saying, “The Account of the Char- iot may not be expounded even to one, unless he be wise and can grasp it of his own accord”— and even then, “only the rubrics are shared” (B. agigah 11b, 13a). So do not ask me to go beyond those topic headings here. Even these basics are not set out themati- cally in this work but informally, intertwined with other issues that I hope to clarify. My aim is to reveal but also conceal the truths I disclose so as not to resist God’s irresistible intent: to keep from the vulgar truths critical to knowing Him— as it says, The Lord’s mystery is for those who fear Him (Psalms : ).

      Certain core principles of physics, too, you see, are not to be taught directly. You know their words: “Nor the Account of Creation to two” (B. agigah 11b). Yet laying out all these things in a book teaches thousands in effect. So Scripture itself treats these themes figuratively and poetically, and the Sages fell into step, addressing such matters by imagery and indirection. For these cosmological issues link tightly to metaphysics. They, too, involve theological mysteries.

      Do not presume that any of these depths is plumbed fully and exhaustively by any of us. No. The truth may gleam for a moment, seeming bright as day, only to be obscured by matter and habit, plunging us back into the black of night, almost as dark as ever. It is like lightning flashing repeatedly overhead in the darkest night. For one of us it might flash so steadily that he seems to be in constant, unbroken light, a night like day. That is the level of our greatest prophet, who was told, But thou, stand here by Me (Deuteronomy : ) — and of whom it was said, The skin of his face shone (Exodus : ). For others the lightning flashes but once all through the night. That is the plane of those of whom it says, They prophesied but did not continue (Numbers : ). For still others the flashes may be steadier, or less so. Some never reach a plane where lightning illuminates the darkness for them, but some polished body might, a stone or such, gleaming in the dark. But even so faint a light shining down on us will not be constant. It flashes and vanishes like the glittering spinning sword (Genesis : ). The ranks of the enlightened vary accordingly.

      Some never see this light but grope in the dark. Of them it is said, They know not, neither do they understand. They walk in darkness (Psalms : ). Truth, brilliant as it is, is hidden from them utterly, as it says: Even now they see not the light shining clearly in the heavens (Job : ). These are the general populace. We have no need to speak of them here in this work (but see III ).

      When one who is enlightened seeks to express, orally or in writing, something of what he has gleaned of these mysteries, reflecting the level he has reached, he still cannot make even what he knows as clear and crisp to others as it is for him, as he might have done in teaching any ordinary subject. He will suffer the same effect in teaching as in learning— the same appearing and disappearing, as if by the very nature of the subject, however great or slight what he hoped to impart. So all rabbanite theological sages with such truths to share speak poetically and in riddles, using many images of diverse sorts, or even from diverse domains. Often they situate their point in the beginning, middle, or end of a figure, finding no one image apt from start to finish for the idea they hope to convey. Or the theme to be taught to those unversed in it is parceled out over several discrete images, although it is but one idea. Or, more obliquely, one image might repre- sent several different themes— one at the start, another at the end. Or it might all stand for two related theological themes. Even someone who wants to teach without imag- ery or indirection is drawn into a style where obscurity and compression produce a like effect— as if the wise and learned were hemmed in not just by their natural limitations but by God’s will.

      God— exalted be His very mention— wished to perfect us and enhance our lives in society with His practical laws. But this required our attaining certain intellectual convictions— chiefly, an awareness of Him, so far as we are able. That depends on metaphysics, theological knowledge, which is won only after study of natural science.

      For physics borders on metaphysics and is its prerequisite, as its students clearly see.

      That is why God opens His book with the Account of Creation, which belongs to phys- ics, as I explained ( .3b).

      Given the immensity and sublimity of the idea of creation and our incapacity to grasp such ultimates themselves, the profundities that divine wisdom saw we need were broached to us obliquely and poetically— in words quite baffling. As the Sages say, “It is impossible to convey to flesh and blood the power of the Creative Act, so Scripture baldly tells you, In the beginning God created . . .” (Midrash Sh’nei Ketuvim, Batei Mi- drashot )— putting you on notice that these things are ineffable. You know Solomon’s words: Far off it was, and deep, deep— who can plumb it! (Ecclesiastes : ). Everything about it is couched in multivalent terms. So the masses take it as best their limited under- standing permits; but the astute, if they are learned, take it otherwise.

      In commenting on the Mishnah, I promised to explain certain puzzling ideas in a Book of Prophecy and a Book of Correlation, the latter explaining all the troubling midrashim— all of them poetic, irrational, and much at odds with the truth if taken lit- erally. But when I began these books years ago and had written parts of them, I did not like how the explanations were coming out. If I stayed in the poetic mode, veiling what should stay hidden, I could see I would preserve the intent but just exchange one image for another, as it were. But if I explained what calls for explanation, the end product would ill suit a popular audience. For my hope was just to open up these homilies and the surface sense of Scripture to ordinary people. Besides, I saw that to some numbskull from the rabbanite masses, these midrashim present no trouble at all. To an untutored clown with no grasp of nature, even impossibilities do not seem far- fetched. But an honest and insightful thinker reflecting on these homilies faces a dilemma: Take them at face value, at the expense of his opinion of their author, thinking him an ignoramus, although not undermining any core belief, or give them some hidden meaning, solving the problem and still respecting the author, whether or not one had correctly grasped the inner sense.

      So this work takes a different tack on the idea of prophecy, sorting out the ranks of prophets and clarifying the tropes they used in their books. I have dropped the two book projects I had in hand in that earlier vein and kept to brief statements of cardinal beliefs and digests of basic truths, with hints and intimations about as explicit as in my big ju- ridical work, Mishneh Torah. But here I address a reader who has done some philosophy, as I said, who knows some real science and is committed to the Torah but perplexed as to its meaning and troubled by its imagery and its multivalent terms.

      Certain chapters here cite no ambiguous word but lay a groundwork for other chap- ters or alert you to some sense of such a word that I had rather not spell out just there.

      Such a chapter might resolve an image or note that a certain story is symbolic. Or it might address unusual ideas liable to be misunderstood because of ambiguous language or the mistaking of a symbol for what it represents, or vice versa.

      Having mentioned symbolism, I should say, by way of preface, that the key to under- standing anything the Prophets say and seeing its truth lies in interpreting their language and understanding their imagery. You know God’s words: Through the prophets did I use similitudes (Hosea : ). You also know how it says, Riddle a riddle and frame a figure (Ezekiel : ). The Prophets rely so heavily on imagery, as you know, that one will say, They say of me, “Isn’t he a riddler!” ( : ). You know Solomon’s opening: to understand proverb and figure, and the words and riddles of the wise (Proverbs : ). The Midrash says, “What were the Torah’s words like before Solomon arose? Like a well with waters deep and cool that none could drink from. What did one insightful man do? He spliced cord to cord and rope to rope and drew them up and drank. So did Solomon lay figure upon figure and splice words together until he understood the Torah’s words” (Song of Songs Rabbah . . ).

      I do not think any sensible person imagines that the biblical words said here to need subtle unriddling of their imagery are the rules for building a sukkah, or those about the lulav, or the four kinds of trustees. The point, clearly, is our grasp of profundities. Of this the Rabbis say, “Someone who has lost a silver selaʿ or a pearl at home can find it by lighting a penny candle. Just so, a figure is nothing, but by its light you can make out the Torah’s words” (Song of Songs Rabbah . . ). Notice how they call the deeper meaning of the Torah’s words a pearl but confess the surface sense of any figure is nothing. They compare the unseen sense of an image to a pearl lost in a dark, cluttered house. It is there, but the owner cannot see it or know that it is there. He might just as well not own it. He cannot use it until he kindles the light they mention— grasping a figure’s meaning.

      Golden apples chased with silver is a word well spoken, says the sage (Proverbs : ). To explain: The chasing (maskhiyot) is a filigree tracery with tiny openwork eyelets like the ones that silversmiths make. They are called eyelets because you can see through them.

       For the Targum renders the va- yashqef (Genesis : ) as ve- istekhi, “he looked out.” A poetic figure, it says, is like a golden apple encased in silver filigree with tiny piercings, an expression that works on two levels, internal and external. See how wonderfully this describes well- wrought imagery. When words work on two levels, it says, a surface and a deeper meaning, the outer sense should be fine and fair as silver, but the inner must be more, as gold is more precious than silver. Still, the surface sense should lead those who ponder it toward the inner, as the tiny eyelets do in the silver tracery around this apple.

      At a glance or at a distance, it looks like a silver apple, but a keen observer who studies it closely will see inside and realize that it is gold. Just so the prophets’ poesy holds practical wisdom on the surface, including much that is wholesome socially, as the plain sense of Proverbs and similar sayings clearly do. But the inner sense bears a wisdom salubrious in another way, imparting truths about Reality.

      Now, there are two kinds of prophetic figures: those in which each word intends a spe- cific idea and those in which the figure as a whole makes a broad point but a great many words are used that do not all add meaning but only enrich and elaborate the imagery or keep it consistent, as called for by the poetry. Do bear this in mind.

      An example of the first kind of prophetic symbolism: Lo a ladder stood on the ground . . . (Genesis : – ). When it says a ladder, that means one thing; stood on the ground, another; its top reaching up to the heavens signifies a third idea; lo the angels of God, a fourth; ascending points to a fifth; descending, a sixth; and there was the Lord standing atop it, a seventh. Every expression in this image adds another idea to the import of the figure as a whole.

      The second kind of prophetic symbolism is, for example, At the window of my house I looked out through the lattice and saw such simpletons! Amongst the boys I saw a thought- less youth crossing the street near her corner, walking toward her house at twilight, as dusk was falling. A woman meets him, dressed like a whore, knowing what she wants. Coy, wild, unruly, [she cannot sit still at home!] Now on the street, now in the square, [she lurks at every corner.] She has caught hold of him and kisses him, [saying brazenly,] ‘I had some offerings to make, [and today I’ve paid my vows.] So I came out to meet you. [I hoped I would see you, and I’ve found you!] I’ve spread coverlets on my bed, [dyed fabrics of Egyptian linen.] I’ve sprinkled the bed with myrrh, aloes, and cinnamon. Come, let’s drink our fill of loving [until morning, and frolic with love.] My husband is away. [He’s on a long trip.] He took his purse [and won’t t be home until midmonth.’] With a flood of enticing words she sways him, seduces him with her glib chatter (Proverbs : – ).

       The point is to warn against chasing bodily pleasures and passions. He likens matter, the root of all such passions, to a woman, a married harlot. The whole book is based on this conceit. In a later chapter (III ) I shall explain the wisdom of this likening of matter to a married harlot and why he closes this book of his with praises of a woman who is no harlot but is wholeheartedly devoted to her family’s welfare and her husband’s interests (Proverbs : – ). For whatever impedes our ultimate human fulfillment— all that is unruly or wanting in us— comes strictly from the physical side, as I’ll make clear (III , , ). That is the point of the image: that one should not just follow one’s physi- cal, animal nature. For a man’s proximate matter is like that of any animal.

      Now that I have explained this and opened up this image for you, you will not be hunting for a hidden meaning in I had some offerings to make, and today I’ve paid my vows, or try to divine what is meant by I’ve spread coverlets on my bed, or what is added by My husband is away. Likewise with the rest of the passage. This is only what the imagery calls for— details suggestive of philandering and the things loose people say.

      Mark the point that I’m making here. It’s critical to what I want to clarify. If you find that I’ve shed light on the sense of a certain image in some chapter of this work and alerted you to its broad theme, don’t go probing every piece of it for some special mean- ing, seeking messages in every detail. You’ll either miss the point or start glossing things not meant for glossing and not suited to it. That is the kind of project that breeds the mad ravings and written rants most sects today indulge in. They all hunt for meanings in words spoken with no such intent as they read into them. Your steady aim, with most im- agery, should be for the general sense. Sometimes it may suffice if I just note that a certain narrative is allegorical and not spell things out. Once you know the passage is figurative, its symbolism will be plain to you; my saying so will be like taking off a blindfold.

      Advice about This Work To get the most out of this work and leave nothing behind, review the chapters against one another. Don’t just focus on the main point of each chapter, but pay attention to each term used in the argument, even those not central to that chapter’s theme. For the argument of the work is not laid out randomly but carefully and exactingly so as to omit no issue that needs clearing up. Nothing is out of place unless to shed light elsewhere. So focus, and do not chase after any will- o’- the- wisp. That would only harm me and help you not at all. Just master all that you need and keep on studying the work. It will clear up most of the problems in the Torah that would trouble any thoughtful person.

      I charge whoever reads this work of mine to promise in God’s name not to gloss or comment on a word of it to anyone beyond what recognized Torah scholars before me have taught. Whatever you glean here that was not set forth by some reputable authority must not be expounded to others. Nor should you rush to refute it. What you took me to be saying might be counter to my intent. So you would be requiting with injury the help I offer, repaying ill for good (Psalms : ). Let anyone into whose hands this work falls study it well. If it slakes his thirst as to but one problem, he should thank God and be happy with the insight he has won. But if he finds nothing at all helpful, he should just think of it as if it had never been written. And if any of it looks unsound by his lights, he should tilt the balance charitably, even by stretching a point. We owe that much to anyone — let alone to our scholars and exponents of the Torah, who work creatively to help us toward the truth as best they see it.

      Any beginner who is no thinker at all can profit, I’m sure, from some chapters in this work. An accomplished student of the Torah who is perplexed in the way that I’ve de- scribed will profit from every chapter and should be all the more thrilled and delighted to hear them. But the addleheads whose brains teem with the unsound notions and specious teachings that they take for solid science, the self- styled thinkers who know no science worthy of the name, will shy at many a chapter, alarmed when they fail to grasp its sense, or it begins to dawn on them how worthless is the dross they own, the false coin they’ve hoarded against hard times.

      God knows I’ve had constant grave concerns about setting down the things I mean to set down in this work. They do belong under wraps. What I register here is recorded in no book extant in our nation in our present age of exile. How, then, can I break precedent and commit such things to writing? I rely on two warrants: first, the Sages’ saying, at a like pass, The time has come to act for the Lord (Psalms : , quoted at B. Berakhot 63a), and their words “— and all thy deeds, for the sake of Heaven” (M. Avot . ). These are the grounds I plead to justify my decision to set forth what I have in certain chapters of this work. I am, in a word, a man constrained. I see no way of sharing proven truths unless by meeting the needs of one outstanding person, even if I displease ten thousand know- nothings. I’d rather address a single soul and ignore the censure of that throng.

      My brief is to free that one fine mind from the mire and guide him from perplexity to inner peace and perfection.

      Preliminary Contradictions or inconsistencies seen in any book or piece of writing have one of the following seven causes: . The author has drawn theses from people with conflicting views but failed to cite his sources and ascribe each position to its author. So contrary or contradictory state- ments are found in the text, reflecting one person’s stance and another’s.

       . An author held a view that he later rejected but retained both positions in his text.

       . Not all the sentences are meant literally. Some are, but others are figurative and bear a deeper meaning. Or two sentences incompatible on the surface might both be figurative— contrary or contradictory to one another if taken literally.

       . Some proviso, for some reason, could not be spelled out in context. Or two passages may address different subjects, but the difference was not explained right then, leaving a seeming contradiction where there was none.

       . In teaching or explaining things, some deep or difficult concept may be needed in the analysis of a simpler one that by rights should come first. (For one should always teach simpler ideas first.) So the teacher takes some liberties and oversimplifies, using any notion that comes to mind, leaving it to the hearer’s imagination to get the general idea so as to explicate the deeper concept properly later on.

       . The contradiction is unseen, coming to light only via many added premises. The more that are needed, the more hidden it is. It might elude an author who sees no con- flict between his original theses. But if each is examined in the light of true premises, and the implicit conclusion is drawn, and supplemented with more true premises, and further implications are drawn, the process leads ultimately, after many steps, to contrary or contradictory conclusions. This can happen to learned authors. But if the original theses conflict blatantly and the writer has just forgotten one before recording the other elsewhere, that is quite a serious lapse, and this author’s work does not deserve to be taken seriously.

       . The demands of the argument. Sometimes, with the deepest subjects, certain ideas may have to be suppressed and others revealed. A certain premise may be needed for the sake of the argument in one context; its contradictory, in another. The ordinary reader should not sense the discrepancy at all, and an author might use all sorts of devices to conceal it.

      Contradictions in the Mishnah and baraitot reflect the first cause. You always find them asking, “Is this not inconsistent with the premise?” (e.g., B. Gi in 73a). The answer: The first is Rabbi So- and- So’s view; the other, Rabbi So- and- So’s. Similarly, you find them saying, Rabbi [Judah the Patriarch, in collating the Mishnah,] follows Rabbi So- and- So here, so our text states it without attribution; but there he follows Rabbi So- and- So, so it has this without attribution. Often, you find them saying, Whose ruling is this? Rabbi So- and- So’s. And this? Rabbi So- and- So’s. This occurs countless times.

      The contradictions and disagreements in the Talmud stem from the first or second cause. You constantly find them saying, “Here he holds with Rabbi So- and- So; there, with Rabbi So- and- So.” Or “He concurred with him here but dissented there.” Or they say, “Two Amora’im differ as to Rabbi So- and- So’s view” (cf. B. Ketubot 57a). All such cases reflect the first cause. Of discrepancies of the second type, they say, “Rav dropped this view. Rava abandoned that.” So one must investigate which view came later.

      On the same lines, they say, “We take this to be Rav Ashi’s view in his earlier recension of the Talmud; the other, to be from his later version.”

      The contradictions and discrepancies found all through Scripture when passages are taken literally reflect the third or fourth cause. That was my whole point in this In- troduction. You know how often the Sages say, One verse says this; another says that (cf. B. Pesa im 68b). They point to a seeming contradiction and then note a tacit qualifi- cation or a shift in subject. They say, “Solomon, is it not enough that you contradict your father, must you even contradict yourself!” (B. Shabbat 30a). They often say such things, but mostly about law or morals. My focus here is on convictions and beliefs. Some of the obscurities here will be cleared up as the chapters of this work unfold. For difficulties of this kind are one source of puzzles in the Torah. Whether Scripture contains contradic- tions owing to the seventh cause is a matter for inquiry and investigation. One should not jump to conclusions about it.

      Discrepancies in the works of philosophers— true philosophers, that is — stem from the fifth cause. Those in the works of most authors and commentators besides those al- ready mentioned arise from the sixth cause. In aggadah and midrash, too, deep contradic- tions reflect this cause. That is why they say one must not be too strict with Aggadah. But it also contains contradictions resulting from the seventh cause.

      The discrepancies in the present work reflect the fifth and seventh causes. If you see this and bear it very much in mind, you will not be perplexed by certain of its chapters.

      Having laid out these preliminaries, I shall begin to address the terms whose true intent, in context, should be noted. This will be a key that opens doors, which, when unlocked, lead to places where a soul can find rest, where eyes will find delight, and where bodies will find surcease from toil and troublement.
