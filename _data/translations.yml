    goodman: |-
      Prophecy comes only in a dream or a vision, as I’ve explained several times. I will not keep repeating that. I will say now that when a prophet prophesies, he may see a symbol, as I have explained more than once, or in his prophetic vision, he may see God speaking to him, as Isaiah does: I heard the voice of the Lord, saying, “Whom shall I send, who will go for us?” ( : ). Or he may hear an angel addressing him and see the angel. That is quite frequent. It says, The angel of the Lord spoke to me (Genesis : ); it said to me, “Dost thou not know what these are?” . . . And the angel who spoke to me answered (Zechariah : ); and I heard a holy one speaking to me (Daniel : ). There are countless examples. Or a prophet might see a human being speaking to him, as it says in Ezekiel, Lo there was a man of seeming bronze . . . and this man, said to me, “Son of man . . .” ( : – )— this after he had said, The Lord’s hand was upon me ( : ). Or the prophet might see no form at all but only hear a voice calling him in his prophetic vision, as Daniel said: I heard a man’s voice from the Ulai ( : ). Eliphaz says, Silence— then I heard a voice (Job : ).

      Ezekiel too: I heard him that spoke to me ( : ). For what he beheld in his prophetic vision was not the one who addressed him. First he details the whole stunning and startling experience. Only then does he seek to relate the burden of his epiphany by saying, I heard him that spoke to me.

      Reviewing these types of prophetic experience, as attested in Scripture, I note that the words heard in a prophetic vision may seem quite loud, just as someone might dream he hears a great peal of thunder or sees lightning or an earthquake. Such dreams are common. Or the words heard in a prophetic vision may seem normal and familiar, not strange at all. You can see that in the prophet Samuel’s case. When God called him with his revelation, he thought again and again, three times, that it was Eli the priest calling him. What made him think so, as Scripture explains, was that he did not yet know that God can address a prophet in this way. That was still a mystery to him, as it explains: Samuel did not yet know the Lord; the Lord’s word was not yet revealed to him ( Samuel : )— he did not know, it was not yet disclosed to him, that the Lord’s word may take this form. He did not yet know the Lord means he had not prophesied before. For of one who has done so, it says, In a vision do I make Myself known to him (Numbers : ). So the verse would mean that, not having prophesied, Samuel did not know that prophecy may take this form. This you should understand.
