    goodman: |-
      The commandments in the thirteenth class are the ones I listed in Laws regarding For- bidden Foods, Laws of Ritual Slaughter, and Laws of Vows and the Nazir. In the present work (I ) and in my commentary on Avot, I explained the benefits of these command- ments quite fully and clearly. I shall clarify further by following up on some specific mitzvot in this group.

      Every food forbidden to us in the Torah, I hold, is bad. None of them might even seem harmless except pork and fat. Not so. Pork is waterlogged and loaded with waste. The Torah loathes swine, chiefly because they are so filthy and live on filth. You have already heard how fastidious the Torah is about keeping ordure out of sight, even outside an army camp (III ), let alone a city. Were swine used for food, our markets, and even our homes, would be fouler than a toilet. You can see that in Europe today. You know what our Sages say: “A swine’s mouth is a walking sewer” (B. Berakhot 25a).

      Belly fat, for its part, produces bloating and indigestion. It chills and thickens the blood and is best burnt. Blood, too, (Leviticus : ) and meat from an animal that died (Deuteronomy : ) are ill digested and unwholesome; that of a diseased or injured beast (Exodus : ), as we know, is no more than carrion.

      The signs of a licit animal— a split hoof and rumination for a beast; fins and scales for a fish (Leviticus : , – ; Deuteronomy : – )— are, as you know, not the grounds on which it is permitted; nor is their lack the reason an animal is forbidden. These are just the markers that distinguish licit from impermissible species.

      The reason the sciatic nerve is barred is given in the text (Genesis : ). The reason we do not consume a body part from a living animal (Genesis : ; Deuteronomy : ; B. Sanhedrin 57a; ullin 101b; MT Laws regarding Forbidden Foods ) is that this elicits cruelty. Gentile kings used to do this in those days, and it was also done in pagan worship: A limb was cut from a living beast and eaten.

      As for the ban on milk with meat— besides its being quite gross, of course, and highly surfeiting—I think it hardly unlikely that it was involved in pagan worship or festivals.

      There is evidence for this, I think, in the fact that the first two mentions of the ban come when the Torah lays out our thrice yearly festivals (Exodus : – , : ; cf. Deuter- onomy : and Onkelos ad loc.), telling us, in effect, ‘When you make the pilgrimage and enter the House of the Lord thy God, do not cook as they do.’ To me, this seems the likely basis for the ban. But I have not seen the practice described in any of the Sabian books that I have checked.

      The mitzvah regarding animal slaughter (Deuteronomy : ; B. ullin) is necessary.

      For man’s natural food comes only from the cereals grown in the soil and animal flesh, the meats permitted to us. No physician is unaware of this. Since good nutrition requires killing animals, the intent was an easy death for them. It was forbidden to torment them by cruel slaughter: We may not behead them or sever a limb or organ, as I explained ( .58b).

      We are also forbidden to slaughter a beast and her young on the same day (Leviticus : ), lest we slaughter the young in the sight of its dam. An animal suffers grievously from this, just as a human would. For a mother’s love and tenderness toward her offspring come not from reason but at the call of imagination, active in most animals as it is in hu- mans. The mitzvah specifies cattle and sheep. For of the domestic animals permitted to us, these are the most common in our usual diet— and the mothers do know their young.

      We shoo away the mother bird (Deuteronomy : – ) for the same reason. Eggs brooded and chicks still needing their mother are generally not fit to eat. So if the mother is shooed off or escapes on her own, she will not suffer the pain of seeing her young taken.

      Usually this will lead people to spare the whole nest. For what is left is rarely worth eating.

      If psychic suffering of this sort in beasts and birds concerns the Torah, all the more does grief to any human being. Do not object that the Sages say, “One who says, ‘Thy mercy reaches the bird in its nest,’ [is silenced]” (M. Berakhot . ). Turning their words against my view presumes one of the two positions that I have laid out, that of those who see the Torah’s laws as arbitrary and groundless. But I hold fast to the other view (III , ).

       I have already noted that the Torah itself makes clear why we cover the blood, specifi- cally, of clean animals and birds (III ).

      Besides the laws we were given banning certain foods, we are given laws about self- restraint (Numbers : – ). If one forswears ‘this meat’ or ‘that bread,’ he may not consume it. This is simple self- discipline, to curb one’s cravings and train oneself in temperance in food and drink. “Vows,” the Sages say, are “a safeguard of continence”

      (M. Avot . ).

      Since women are emotional, easily vexed, and not stout hearted, much domestic trouble, stress, and confusion would have resulted had regulation of their oaths been left up to them: A food would be allowed the husband but not the wife; another would be forbidden the daughter but not the mother. So the whole matter and everything re- lated to it was left up to the head of the household. An independent woman, as you know, of course, who needs no man to manage her house, being single, fatherless, or of age— that is, past puberty— has the same status as a man regarding vows (see Numbers : ; B. Nedarim 70ab).

      The reason for Nazirship (Numbers ) is quite clear— to promote abstinence from wine, the ruin of many a man in modern as in ancient times: Many . . . and mighty are those laid low by it (Proverbs : ), They too stagger with wine (Isaiah : ). The well- known ban on anything derived from the vine expands the rules of Nazirship (Numbers : ; Judges : ), encouraging folk to use as little wine as possible. The one who abstains is called holy and ranked in sanctity next to the High Priest. For like a High Priest, a Nazirite may not render himself ritually impure even for his father or mother (Numbers : ). So greatly is he honored for his abstinence.
