  ch7:
    friedlander: 'We have already explained that the term “angel” is a homonym, and
      is used of the intellectual beings, the spheres, and the elements; for all these
      are engaged in performing a divine command. But do not imagine that the Intelligences
      and the spheres are like other forces which reside in bodies and act by the
      laws of nature without being conscious of what they do. The spheres and the
      Intelligences are conscious of their actions, and select by their own free will
      the objects of their influence, although not in the same manner as we exercise
      free will and rule over other things, which only concern temporary beings. I
      have been led to adopt this theory by certain passages in Scripture; e.g., an
      angel says to Lot: “For I cannot do anything,” etc. (Gen. xix. 21); and telling
      him to deliver himself, the angel says: “Behold I have accepted thee concerning
      this thing” (ver. 21). Again: “Take heed before him, and listen to his voice,”
      etc. (Exod. xxiii. 21). These passages show that angels are conscious of what
      they do, and have free will in the sphere of action intrusted to them, just
      as we have free will within our province, and in accordance with the power given
      to us with our very existence. The difference is that what we do is the lowest
      stage of excellence, and that our influence and actions are preceded by non-action;
      whilst the Intelligences and the spheres always perform that which is good,
      they contain nothing except what is good and perfect, as will be shown further
      on, and they have continually been active from the beginning.'
    pines: Placeholder text
    goodman: 'I have explained the senses of ‘angel’ and how it applies to the intellects,
      the spheres, and the elements alike, since they all have tasks to perform. Just
      do not think the spheres or intellects like natural forces in matter that are
      unaware of their action. The spheres and intellects are conscious of their work.
      They use free choice in governing, only not like ours. Our choices regard transient
      events. The Torah alerts us to the contrast clearly: The angel tells Lot, I
      can do nothing [until you reach there] (Genesis : ). But he did say, in helping
      Lot escape, This favor, too, I grant thee ( : ). It also says, [I shall send
      an angel before you to guard you on the way and bring you to the place I have
      prepared for you.] Heed him, hearken to his voice. Do not defy him. He will
      brook no trespass from you. For My name is in him (Exodus : – ). All this shows
      you that they know what they do and use will and choice in exercising the powers
      of governance God gives them by emanation, just as we act voluntarily, using
      what emanation enables us to do. But our actions may be lacking, and our doings
      and decisions reflect that lack. Not so the spheres and intellects: What they
      do is ever good and only good, as I will explain in later chapters (III , ).
      For since they came to be, everything about them has been actual and perfect.'
