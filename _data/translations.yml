    goodman: |-
      Meloʾ— to fill. An equivocal term. It can denote repletion of one body by another: She filled her jug (Genesis : ) and an omer- full each (cf. Exodus : – ). This is frequent.

      The term is also used for completing a span of time: Her term was full (Genesis : ) and His forty days were full ( : ). Or it may mean reaching consummate goodness or perfect virtue: Filled with the Lord’s blessedness (Deuteronomy : ), He filled them with skill (Exodus : ), and He was full of skill, resource, and knowledge [of every kind of work in bronze.] ( Kings : ). It is in this sense that it is said, All the earth is filled with His glory (Isaiah : ), meaning ‘All the earth attests to His perfection’— it gives evidence of Him.

      Likewise, The glory of the Lord filled the Tabernacle (Exodus : ). Every reference you find to God’s filling something has this sense; it does not imply a body in space. But if you prefer to take the glory of the Lord here to be a created light, everywhere called glory, that filled the Tabernacle, there is no harm in that.
