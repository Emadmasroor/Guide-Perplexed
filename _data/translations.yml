      Some modern eternalist philosophers say that God is the world’s Maker, choosing and in- tending it to exist and determining it to be as it is, but that this could not have been at just one time and no other: ‘It always has been and always will be as it is,’ they say. ‘We cannot conceive a maker unless he precedes his work temporally, but that is only because it is so with us. Every maker of whom that is true is lacking in some way, active potentially and realized once in action. But God lacks nothing and is in no way unrealized. So He does not precede His act temporally but acts ceaselessly. Just as He Himself is unlike us’— and how!— ‘so is His relation to His work unlike ours.’ They apply the same reasoning to His will and determinations. For it makes no difference whether you say ‘Maker,’ ‘Intender,’ ‘Chooser,’ or ‘Specifier.’ No change in His will or His work is conceivable, they say, as I explained (II ).

      You can see by now, as you study this work of mine, that these philosophers, perhaps wanting to use nicer language and avoid anything distasteful, have dropped the word ‘necessity’ but held fast to the idea. Aristotle says that this world is made necessary by its cause; it is eternal because God, its cause, is eternal. Yet that is no different from these moderns’ saying that the world is God’s work and exists by His choice, will, determina- tion, and intention but has always been and always will be as it is, just as the sunrise brings daylight but does not precede it. That is not what we mean by purpose. We mean that the world does not issue from Him by necessity like an effect inseparable from its cause and unchangeable without some change in that cause or in some feature of it. Once you understand purpose as we do, you will see why it is absurd to say that the world is neces- sitated by God’s being as an effect is by its cause yet is still His work and is as it is by His determination.

       It all comes down to this: We must investigate the variance in the celestial world. For it is proven that this must have a cause. Does that cause render those differences neces- sary by its very being? Or is it a Maker who determines them specifically, as we followers of our Teacher Moses believe? I shall speak to that once I have given you an explana- tion of what Aristotle means by necessity so that you will have that idea in mind. After that, I shall explain why I favor creation, using rational, philosophical arguments with no chicanery.

      When Aristotle says that the First Intellect issues from God of necessity, and the Second from the First, the Third from the Second, and likewise when he holds that the spheres issue from the Intellects of necessity— the whole famous hierarchy that you have studied in the texts, bits of which I have outlined here (II )— he clearly does not mean that first this existed and then that was necessitated by it. He does not say that any of these things had an origin. What he means by necessity here is causation. In effect, he says, the First Intellect causes the second; the second, the third; and so forth, down to the last. Likewise with the spheres and prime matter. For him, none of these preceded the next or ever existed independently.

      To illustrate: The primary qualities make things rough or smooth, hard or soft, thick or thin. No one doubts that the primary qualities— hot and cold, wet and dry— produce roughness, smoothness, hardness, softness, thickness, thinness, and the like. Such quali- ties reflect the four primary qualities necessarily, even though no body can exist with the primary qualities alone and not the secondary. Likewise in the world, Aristotle says, this comes from that, all the way back to the First Cause— the First Intellect, as he terms it— or whatever you wish to call it. We all intend the same ultimate reality. But he holds that everything else issues by necessity, as I told you, whereas we say that God made all these things on purpose. He willed a world to be that once did not exist but came to be, by His will.

      Now, in the chapters that follow, I will give you my reasons for preferring our doctrine that the world was created.
