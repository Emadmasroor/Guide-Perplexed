  ch43:
    friedlander: |-
      The Hebrew kanaf is a homonym; most of its meanings are metaphorical. Its primary signification is “wing of a flying creature,” e.g., “Any winged (kanaf) fowl that flieth in the air” (Deut. iv. 17).

      The term was next applied figuratively to the wings or corners of garments; comp. “upon the four corners (kanfoth) of thy vesture” (ib. xxii. 12).

      It was also used to denote the ends of the inhabited part of the earth, and the corners that are most distant from our habitation. Comp. “That it might take hold of the ends (kanfoth) of the earth” (Job xxxviii. 13); “From the uttermost part (kenaf) of the earth have we heard songs” (Isa. xxiv. 16).

      Ibn Ganaḥ (in his Book of Hebrew Roots) says that kenaf is used in the sense of “concealing,” in analogy with the Arabic kanaftu alshaian, “I have hidden something,” and accordingly explains, Isaiah xxx. 20, “And thy teacher will no longer be hidden or concealed.” It is a good explanation, and I think that kenaf has the same meaning in Deuteronomy xxiii. 1, “He shall not take away the cover (kenaf) of his father”; also in, “Spread, therefore, thy cover (kenafeka) over thine handmaid” (Ruth iii. 9). In this sense, I think, the word is figuratively applied to God and to angels (for angels are not corporeal, according to my opinion, as I shall explain). Ruth ii. 12 must therefore be translated “Under whose protection (kenafav) thou art come to trust”; and wherever the word occurs in reference to angels, it means concealment. You have surely noticed the words of Isaiah (Isa. vi. 2), “With twain he covered his face, and with twain he covered his feet.” Their meaning is this: The cause of his (the angel’s) existence is hidden and concealed; this is meant by the covering of the face. The things of which he (the angel) is the cause, and which are called “his feet” (as I stated in speaking of the homonym regel), are likewise concealed; for the actions of the intelligences are not seen, and their ways are, except after long study, not understood, on account of two reasons—the one of which is contained in their own properties, the other in ourselves; that is to say, because our perception is imperfect and the ideals are difficult to be fully comprehended. As regards the phrase “and with twain he flieth,” I shall explain in a special chapter (xlix.) why flight has been attributed to angels.
    pines: Placeholder text
    goodman: |-
      Kanaf (wing) has multiple meanings, most of the variance being metaphorical. The origi- nal sense denotes a flying animal’s wing: every winged bird that flieth in the sky (Deuter- onomy : ). Later it was applied figuratively to the flaps or corners of a garment: on the four wings of thy garment ( : ); then to the earth’s extremities, the farthest reaches of settlement: Take the earth by the wings [and shake off the wicked] (Job : ) and From the wings of the earth have we heard singing (Isaiah : ).

      The word, Ibn Janā says, like its Arabic cognate, can also indicate concealment.

      We say kanaftu al-s hayʾ, I hid something. So he reads the verse Thy Guide shall no more be under wraps (yikkanef; Isaiah : ) as “Do not mask or shroud Him who lights thy way.” A fine gloss! Similarly, He shall not breach his father’s skirts (kanaf; Deuteronomy : ) I take to mean ‘Do not violate his privacy.’ So Take thy handmaid under thy wing (Ruth : ), as I read it, means ‘Extend your protection to your servant.’ It is in this sense, as I see it, that wings are ascribed metaphorically to the Creator— and to angels. For we take them, too, to be incorporeal, as I shall explain (I ; II ). Thus it says, [The Lord requite thy deeds . . .] beneath whose wings thou hast sheltered ( : )— under whose protec- tion you have taken refuge.

      Along these lines, whenever ‘wing’ relates to angels, it indicates concealment. Just consider With two did it cover its face, with two did it cover its feet (Isaiah : ): The basis of an angel’s existence is concealed, deeply hidden. That would be its face. Its effects, too— its “feet,” as I explained in treating the senses of foot (I )— are hidden. For the work of these Intellects is unseen. Only with training is their impact seen, for two rea- sons, on their side and on ours: our limited awareness and the elusiveness of the incor- poreal. As for With two did it fly ( : ), I will explain in a separate chapter (I ) what is meant by saying that angels fly.
