    goodman: |-
      When you study these archaic and depraved beliefs, you’ll see that everyone took it for granted that star worship makes the land fertile and the earth habitable. The learned, pious, and devout would preach and teach the people that agriculture, on which human life depends, would succeed and prosper only if they worshipped the sun and stars. If those gods were provoked by neglect, the land would go to waste and ruin. In those books of theirs, they said that Jupiter was angry at the deserts and wastes; that was why they lost their water and trees and became the haunts of ghouls. They made much of farm- ers and tillers of the soil for developing and cultivating the land as the stars pleased and willed. The pagans celebrated oxen because they are so useful in agriculture and even said that they must not be slaughtered, since they lend their strength to help in farming and, powerful as they are, submit to humans to please the gods by working the fields.

       So very widespread were these beliefs that they linked their cult to agriculture, which is critical to human survival and that of most animals. The pagan priests, preaching to the people gathered in the temples, drummed it into their heads that it was by these rites that the rains fell, the trees bore fruit, and the land was fertile and populous. Just consider what they say in the Nabatean Agriculture about vineyards: “All the ancient prophets and sages prescribed playing instruments before the idols on festivals. They said aright that this delights them and that they amply reward those who do so; beyond that, they prom- ised long life for doing this, protection from harm, healing of infirmities, fertile crops, and abundant fruit.” So much for the Sabian text.

      So commonplace were these beliefs that they seemed certain. But God, in His mercy toward us, was pleased to expunge this error from our minds. Freeing our bodies from those pointless and exhausting labors, He gave us our Law at the hand of Moses our Teacher, who told us, in God’s name, that serving those stars and idols would halt the rain and ruin the earth. Nothing would grow. The fruit would drop from the trees.

      Life would be hard— there would be bodily afflictions and shorter lives. That is the point of the language of the covenant God forged with us that you find repeated all through the Torah: that star worship inevitably brings drought, devastates the land, makes life hard, brings disease, and shortens lives, whereas rejecting it and embracing God’s service brings rainfall, fertility to the land, prosperity, bodily health, and long lives— just the op- posite of what the pagans preached to the people on behalf of their idolatry. For it is cen- tral to the Torah to abort that creed and erase all trace of it, as I explained (III ad fin).
