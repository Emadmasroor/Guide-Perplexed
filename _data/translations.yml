    goodman: |-
      Wherever an angel is said to be seen or heard, as I explained, it must have been in a dream or a prophetic vision, whether declared to be such or not, as I said (II , ). But you need to see and understand this very, very well. Whether it says from the start that a prophet saw an angel or that he saw what he took for a man at first but later realized was an angel it makes no difference. Since what he saw and was addressed by proved to be an angel, you can be sure it was a prophetic dream or vision from the start. In a prophetic dream or vision, a prophet might see God speaking to him, as I’ll explain, or hear an angel ad- dressing him, or hear someone speaking to him, although he sees no one. He might see a human being speaking to him and later realize it was an angel. It is in this last sort of prophecy that he might say that he saw a man say or do something but later realized it was an angel.

      This crucial point was made by one of our Sages— one of the greatest, in fact— the great Rabbi iyya, glossing The Lord appeared to him near the oaks of Mamre (Genesis : ). Having stated broadly that God revealed Himself to Abraham, he says, it goes on to detail the form of the epiphany: At first, he saw three men and ran out to meet them.

      They spoke and were spoken to. Rabbi iyya, reading between the lines, says that Abra- ham’s words—H e said, “My lord, if it please thee, pass not by thy servant” ( : )— relate what he said in his prophetic vision: He addressed just one, the chief among them (Gene- sis Rabbah . ). You need to understand this story. It holds a hidden meaning.

       Likewise, in Jacob’s story, when it says a man wrestled with him (Genesis : ), I say this was an oracular experience. For in the end, it was clear that it was an angel. This parallels Abraham’s case: first a general account, the Lord appeared to him ( : ), then the details. With Jacob, too, it says, God’s angels met him ( : ), and then it fills in what had happened before they met him, how he had sent emissaries who did such and such ( : – ), and Jacob was left alone, [and a man wrestled with him until daybreak] ( : ).

      The reference is to the angels already mentioned: God’s angels met him. Both the wres- tling and the angel’s addressing him ( : – ) were in a prophetic vision.

      Likewise, the whole story of Balaam on the road and the she- ass’s speaking to him (Numbers : ). It was all in a prophetic vision. For it was clear in the end that it was the Lord’s angel that addressed him. The same, I say, as to its saying of Joshua, He raised his eyes and saw, lo, a man standing over against him, [his drawn sword in his hand] (Joshua : ). This, too, was in a prophetic vision. For it proved to be the captain the Lord’s host ( : ).

      But consider when it says, An angel of the Lord came up from Gilgal [to Bochim, and said “I brought you up out of Egypt. . . . And I said, ‘I shall never breach My covenant with you. But you must make no covenant with the denizens of this land. . . .’ But ye have not obeyed Me. . . . Therefore, have I resolved not to drive them out before you; they shall be your foes; their gods, a snare to you.”] When the Lord’s angel had said these things to all the Chil- dren of Israel, [the nation burst into tears.] (Judges : – ). The Sages state that the angel of the Lord here was Phinehas: “This was Phinehas. For when the Shekhinah rested upon him he seemed to be an angel of the Lord” (cf. Leviticus Rabbah . ). I have already explained that ‘angel’ has multiple senses and that prophets, too, can be called angels (II ), as it says, He sent an angel who brought us out of Egypt (Numbers : ); then spoke Haggai, the Lord’s angel, performing the Lord’s mission (Haggai : ); and they mocked God’s angels ( Chronicles : ).

       As for Daniel’s words— the man Gabriel, whom I had seen in the earlier vision, was sent forth in flight and reached me at about the time of the evening offering (Daniel : )— all this was in a prophetic vision. Do not even entertain the thought that an angel can be seen or heard to speak unless in a prophetic dream or vision, as the principle is stated: In a vision do I make Myself known to him; in a dream do I speak to him (Numbers : ).

      From the cases I have cited, you can see how to deal with those that I have not.

      Given what I told you about the preparation prophets need and what I said about the varied senses of ‘angel,’ you can see that Hagar the Egyptian (Genesis : ) was no prophet. Nor were Manoa and his wife (Judges ). The words they heard or seemed to hear were more like a portent of the kind the Sages always mention, an experience that can occur to one not qualified for prophecy. Only because ‘angel’ is polysemous could such mistakes occur. Seeing this will settle most biblical problems on this score. Compare its saying of Hagar, The angel of the Lord found her by the spring (Genesis : ), with what it says of Joseph, A man found him wandering in a field ( : ). Every midrash says this was an angel.
