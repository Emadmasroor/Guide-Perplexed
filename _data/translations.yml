    goodman: |-
      The commandments in our second group are all the ones I listed in Laws regarding Pagan Worship. They all clearly aim to free us from the errors of polytheism and the other unsound notions that follow in its train— belief in wizards, witches, diviners, mediums, and such (Deuteronomy : – ). If you read all the books that I have cited, you will see that all the magic you hear of amounts to Sabian, Chasdean, and Chaldean practices, most of them current among the Canaanites and Egyptians, who deluded others or themselves into believing that these rites had strange and marvelous effects in the world, on individuals or whole populations.

      There is no logical or rational basis to think such magical performances have any effect at all— setting out to gather certain herbs at a certain hour, or so many of this object and so many of that. The range is vast, but I can group them all for you under three headings: ( ) the object, animal, vegetable, or mineral; ( ) the precise times an op- eration is performed; and ( ) the human performance, acts like dancing, clapping, shout- ing, laughing, hopping, throwing oneself to the ground, burning something, fumigating something in smoke of a certain kind, or chanting something, intelligible or not— the sort of things magicians do.

      Of their magical operations, some call for all three factors. They will say, for instance, that such and such leaves of a certain plant must be taken when the moon is in the east, in a certain sign of the zodiac, or at some other cardinal point; a certain quantity of horn, dung, hair, or blood from a certain beast must be obtained with the sun at the me- ridian, say, or some other specific point; a certain mineral, or several, must be taken and smelted when a given sign is in the ascendant and the stars are in certain positions; then certain incantations must be uttered as you puff the smoke from these leaves or such over the casting you have forged. Then the magic will work.

      Other magical procedures, as they have it, need just one type of operation. But most, they stipulate, must be done by women. You’ll find them saying, for example, that to find water, ten virgins, bedizened and in red robes, must dance and creep to and fro and point to the sun. They must keep up this tedious rite, they urge, until water gushes forth.

      Similarly, they avow, if four women lie on their backs, raise and spread their legs, and say such and such in that bizarre position, hail will not fall in that spot.

      With much of their idiocy, you’ll find, the only conditions they set are that women must perform the ceremonies and that all the magical procedures must regard the state of the stars. For a given plant, they hold, falls under the dominion of a certain star, as does every animal and mineral. So, by their own account, their magical operations amount to worship of that star, which is pleased with what they say or do, or with that smoke, and grants their wishes.

      Given this background, which you can confirm by reading such of their books as we have, to which I have introduced you, hear my argument: The entire goal of our Torah, the axis on which it turns, is to efface paganism and erase its influence, to make it unimagi- nable that any star can help or harm human individuals at all. For that view invites star worship. It follows, perforce, that every sorcerer must be slain. For a sorcerer is a pagan, of course, although practicing in special, exotic ways unlike those the vulgar use in worship- ping those gods. Since most of these acts must be performed by women, the Torah says, Thou shalt not suffer a sorceress to live (Exodus : ). Given the natural human aversion to killing women, for idolatry specifically, it says man or woman (Deuteronomy : ) and repeats it: the man or the woman ( : ). No such thing is said about profaning the Sabbath or anything else. The reason is the great natural sympathy for women.

      These wizards claimed their magic worked: Their practices kept dangerous animals like lions, snakes, and such out of villages and could rid plants of various blights, just as you see that they claimed to keep hail from falling and that other rites of theirs killed worms and kept them from ruining vineyards. (They go on at length, these Sabians, in the Nabatean Agriculture, about how such “Amorite ways” kill vineyard worms.) They claimed, too, to have rites to keep leaves and fruits from dropping. Since these claims were so widely credited in those days, our Covenant stated that the pagan rites and magic practices supposed to prevent such harms would, in fact, bring them on: I will loose wild beasts against you that will snatch [your children and ravage your cattle. They will deci- mate you, and your roads shall be desolate] (Leviticus : ); The fang of beasts shall I send against them, and the venom of vipers that slither in the dust (Deuteronomy : ); The fruit of the earth, left to the cricket inherit ( : ); Vineyards shalt thou plant and work but not drink or cellar their wine. The worm shall lay them waste ( : ); Ye shall have olives everywhere, but no oil to anoint you; the olives shall drop ( : ). In a word, every trick the pagans used to keep their cult alive, deceiving people with promises of protection from specific ills and provision of specific benefits, was countered by the Covenant’s stipulat- ing that by these rites, those goods are lost and those ills unleashed. You can see clearly, my dear inquirer, why Scripture mentions these blessings and curses specifically in the Covenant— and how great the good is.

      To distance us yet further from all magic practices, the Torah bans all Sabian cus- toms, even those linked to agriculture, animal husbandry, and such— anything suppos- edly helpful but not in fact prescribed by natural science rather than in deference to the supposed occult properties of things: Follow not the practices of the nation [I cast out before you] (Leviticus : ). The Sages call these “Amorite ways,” since they stem from magic rites not called for by science but harking back to magical operations reliant on astrology and leading to veneration and worship of the stars.

      The Sages permit anything therapeutic, if free of Amorite ways (M. Shabbat . ). So whatever natural science prescribes is licit; anything else is forbidden. Thus when it says, “A tree that drops its fruit is loaded down with stones and marked with red chalk,” they object: “Why loaded down with stones?— To lessen the flow of sap. And why marked with red chalk?” (B. Shabbat 67a). This might count as “Amorite ways,” like any such practice with no rational basis. Similarly, “The afterbirth of a consecrated beast must be buried.” They said, “but not at a crossroads, nor hung on a tree— because of Amorite practices” (M. ullin . ). You can see the reasoning.

      Do not be troubled by their allowing things like a fox tooth or a nail from a cross (M. Shabbat . ). In those days these were thought to be known empirically to be therapeutic, like pinning a peony on an epileptic, or using dog droppings for a sore throat, or fumigating with vinegar and marcasite for hard, swollen tendons. Any such empirically confirmed remedy is allowed therapeutically, on the analogy of laxatives, even if not prescribed by reason. Do master and remember the distinctions I lay out here, dear reader— They will be a garland for thy head and beads about thy neck (Proverbs : ).

      I explained in my major work that clipping the corners of one’s hair and beard is for- bidden (Leviticus : ) because this was the insignia of pagan priests. Shaʿa nez is banned ( : ; Deuteronomy : – ) for the same reason: It, too, was the mark of such priests. They would blend animal and vegetable fiber in their clothing, adding a closure of some mineral. You will find this set forth in their books. For the same reason it says, There shall be no men’s gear on a woman, nor shall a man dress as a woman ( : ). You’ll find it in the book of um um that a man must wear a woman’s dyed dress to appear before Venus, and a woman must bear arms and armor before Mars. Another reason, I think, is that such cross- dressing can be arousing and stir up dissolute behavior of various kinds.

      The ban on profiting from idolatry makes good sense: One might seize idols to be broken up, but that could prove a snare to him if they’re kept. Even if broken up, melted down, or sold to a non- Jew, one is not to profit from the sale. The reason: Common folk often believe they see causes in coincidences, just as you’ll find many people saying that since they have lived in this house, or bought that beast or tool, they’ve prospered and done well, so it must have brought a blessing. Someone perhaps did well in business or profited from the proceeds of such a sale and supposed this transaction was the cause: The profit was a blessing from the image sold. So he would believe just the opposite of what all the Torah hopes he will.

      The same reason explains the ban on profiting from the ornaments of an idol or from pagan offerings or implements (B. ʿAvodah Zarah 51b)— all to safeguard us from such notions. For in those days, people took such superstitions very seriously. They thought such objects had powers of life and death; all good or ill came from them— that is, from the stars. So the Torah pressed to eliminate that belief using covenants, asseverations, binding oaths, and the anathemas I cited ( .79b). It warned against taking anything from an idol or benefiting from it in any way. Any proceeds of such sales, God taught us, if commingled with one’s assets, would bankrupt and ruin him. Thus it says, [The idols of their gods shalt thou burn. Thou shalt not covet the silver or gold on them or take it for thyself, lest thou be snared by it. It is an abomination to the Lord thy God.] And bring no abomination into thy house, to become, like it, accursed (Deuteronomy : – )— let alone believe that there is any blessing in it. If you study the individual mitzvot regarding pagan worship, you’ll find them clearly grounded in excising these rotten beliefs and turning folk in quite a different direction.

      It is worth noting that those who framed these lies, useless and pointless as they are, devised means to entrench them by putting it out that harm would befall one who failed to perform the actions enshrining that belief. Something might happen to anyone one day, quite by accident, and he would then start taking the pagan practice seriously and embracing the belief. Most people’s worst fear, naturally, is loss of their property or their children, as we know. So fire worshippers in those days put it about that if anyone did not pass his son or daughter through the fire (Deuteronomy : ), his children would die.

      Based on this outrageous nonsense, everyone, of course, rushed to do so, anxious and protective of his children, seeing how simple and easy it would be— one need only wave the child over the fire — especially since small children were cared for by women, and we know how emotional they are and how weak their understanding generally is.

       So the Torah combats this practice vigorously (Leviticus : ), underscoring its ban in terms unparalleled for any other pagan act: [He hath given his seed to Molech,] defiling My sanctuary and profaning My holy name ( : ). Moses, the truth- teller, told the people at that point, in God’s name, ‘What you do to save your children’s lives will lead God to destroy those who do it and erase their progeny: I will set My face against that man and his family ( : ). Traces of the rite survive to this day, you know. It was that widespread.

      You can see midwives today taking infants in their swaddling clothes, casting some foul- smelling fumigant into the fire, and passing the little one over it through the smoke.

      This, surely, is a way of “passing them through the fire,” as forbidden. Just think how insidious he was who spread that view, to give it so lasting a hold on the imagination that it would be uneffaced for thousands of years.

      Likewise with property: Pagans would dedicate a certain tree to the object of their worship, an asherah. They would make an offering of some of its fruit and eat the rest in their temple, as I explained in the Laws regarding the Asherah (MT Laws regarding Pagan Worship . , . ). This, they ruled, should be done with the first edible fruits of any tree: some given as an offering and some eaten in their temple. Here again, they spread the notion that any tree whose first fruits were not so treated would wither, drop its fruit, bear meagerly, or suffer some other harm— just as they put it out that any child not passed through the fire would perish. Given people’s concern for their property, they hastened to comply. The Torah combats this view, and God ordered that for the first three years, all the yield of a fruit tree must be burnt. For some trees bear fruit after one year, some after two, and some after three. That last is most common when trees are started in one of the three usual ways: planting, sinking, or grafting (see M. Sheviʿit . ).

      Using a seed or fruit stone is ignored, for the Torah tracks the most common methods.

      It sets the delay for first fruits in the Land of Israel at the maximum, three years. God promised that if we destroy and discard its early yield, a tree will be more productive— as it says, to increase its yield to you (Leviticus : ). And He commanded us “to eat the fourth- year fruit before the Lord” (M. Maʿaser Sheni . )— not virgin fruit in a pagan temple, as I explained.

      Another practice of the ancient pagans, mentioned in the Nabatean Agriculture, was to let certain things rot while waiting for the sun to enter a certain sign of the zodiac and performing many magical operations. Everyone should do this, they held, and when planting a fruit tree, they should spread around it or plant with it some of the putrid stuff they had prepared. This would speed the tree’s growth, and it would soon bear fruit.

      They said this was a wonderful technique, comparable to the effects of a talisman— a marvelous, magical way of hastening the production of fruit. I have told you why the Torah shuns all such magical practices and so bans all edible fruit in the first three years after a tree is planted, leaving no need to hasten fruit bearing, as they claimed to do. After three years most fruit trees in Syria bear mature fruit quite naturally, with no need of their much- touted magical operations. Do understand this striking fact as well.

      One belief widespread in those days, preserved by the Sabians, dealt with grafting one species of tree to another. They said that if this was done when a certain star was in the ascendant and the graft was fumigated in a certain way, with certain incantations, the result, so they claimed, would be highly beneficial. Their most telling account comes at the start of the Nabatean Agriculture, about grafting an olive tree to a citron. (Truth be told, I think the Book of Remedies suppressed by Hezekiah must have been of this sort.) The pagans, similarly, said that in grafting one species of tree to another, the scion should be held by a pretty slave girl while a man services her in a foul manner, which they describe. The woman makes the graft while he is in the act. The custom was doubtless popular. Who would want to be left out if it joined sexual pleasure with promises of profit? This is why the Torah forbids grafting one tree species to another, to keep us far from pagan ways and their revolting and unnatural sexual practices. And because of the ban on cross- species grafting, the Torah forbids combining any two species of seeds, or even putting them side by side. If you study this halakhic mitzvah, you’ll find cross- species tree grafts “everywhere punished by stripes, as a biblical commandment.” For this is the core prohibition, whereas “combining seeds of diverse kinds”— placing them near each other— is forbidden only in the Land of Israel (B. Kiddushin 31a, 39a).

      In the Agriculture, they explain that their practice was to sow barley and grapes to- gether, claiming that only so would a vineyard flourish. So the Torah forbids double planting of vineyards and orders all such material burnt (Deuteronomy : ; M. Kilʾaim ). For any gentile custom claimed to be lucky, even those with no whiff of paganism, is forbidden, as I explained (at .80ab) anent their saying “nor hung on a tree” (M. ullin ). All such acts are forbidden— any customs they call “Amorite ways,” since they bring paganism in train.

      If you study their agricultural mores, you will find that in farming of certain kinds, they looked to the stars; in others, to the two luminaries. Often, they timed their sowing at the rise of certain stars. They would fumigate, and the sower or planter would circle five times, some held, for the five twinkling planets; or seven, others said, for the five plus the two luminaries. All this, they claimed, loosed special properties highly benefi- cial to their farming. But the real aim was to bind people to star worship. So all these gentile practices are banned— globally: Follow not the practices of the nation (Leviticus : ). Those practices most common and current, or overtly idolatrous, were banned specifically— such as virgin fruit (orlah), crossing species, and double planting in an or- chard or vineyard.

      I am surprised that Rabbi Josiah held that the (biblical) ban on double planting in a vineyard (B. Berakhot 22a, Kiddushin 39a, ullin 82b, 136b) is not breached unless one sows wheat, barley, and grape seed in the same cast. Surely he knew that such planting was rooted in “Amorite ways.”

      You can see now that the bans on shaʿa nez, ʿorlah, and double planting respond to pagan rites, of course. The customs I cited were banned for drawing people to paganism, as I explained.
