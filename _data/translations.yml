    friedlander: 'It is perhaps clear why the laws concerning Sabbath are so severe,
      that their transgression is visited with death by stoning, and that the greatest
      of the prophets put a person to death for breaking the Sabbath. The commandment
      of the Sabbath is the third from the commandment concerning the existence and
      the unity of God. For the commandment not to worship any other being is merely
      an explanation of the first. You know already from what I have said, that no
      opinions retain their vitality except those which are confirmed, published,
      and by certain actions constantly revived among the people. Therefore we are
      told in the Law to honour this day; in order to confirm thereby the principle
      of Creation which will spread in the world, when all peoples keep Sabbath on
      the same day. For when the question is asked, why this is done, the answer is
      given: “For in six days the Lord hath made,” etc. (Exod. xx. 11). Two different
      reasons are given for this commandment, because of two different objects. In
      the Decalogue in Exodus, the following reason is given for distinguishing the
      Sabbath: “For in six days,” etc. But in Deuteronomy (chap. v. 15) the reason
      is given: “And thou shalt remember that thou hast been a slave in the land of
      Egypt, etc., therefore the Lord thy God commanded thee,” etc. This difference
      can easily be explained. In the former, the cause of the honour and distinction
      of the day is given; comp. “Therefore the Lord hath blessed the day of the Sabbath
      and sanctified it” (Exod. xx. 10), and the cause for this is, “For in six days,”
      etc. But the fact that God has given us the law of the Sabbath and commanded
      us to keep it, is the consequence of our having been slaves; for then our work
      did not depend on our will, nor could we choose the time for it; and we could
      not rest. Thus God commanded us to abstain from work on the Sabbath, and to
      rest, for two purposes; namely, (1) That we might confirm the true theory, that
      of the Creation, which at once and clearly leads to the theory of the existence
      of God. (2) That we might remember how kind God has been in freeing us from
      the burden of the Egyptians.—The Sabbath is therefore a double blessing: it
      gives us correct notions, and also promotes the well-being of our bodies.'
    pines: Placeholder text
    goodman: |-
      You may see already why the Torah is so strict as to make the Sabbath a matter of stoning, why the doyen of all Prophets slew a man over it (Numbers : – ), and why it comes third after God’s existence and rejection of any other deity— for the ban against idolatry just underscores monotheism. You can see from what I have said already that beliefs do not last without actions to make them permanent, prominent, and public. That is why the Torah commands us to honor this day: to institute the idea of the world’s creation and make it known throughout the world. When everyone rests on a given day and it is asked why, the answer will be in six days did the Lord make . . . (Exodus : ).

       The Torah, in fact, gives two different reasons. For the impact is twofold: In the first statement of the Decalogue, the reason given for celebrating the Sabbath is in six days did the Lord make . . . But in Deuteronomy, it says, Remember thou wast a slave in Egypt. . . . Therefore did the Lord thy God command thee to keep the Sabbath day ( : ).

      That is true. The object in the first formulation is to elevate and celebrate this day, as it says, Therefore did the Lord bless the Sabbath day and make it holy (Exodus : ), reflect- ing the first reason, in six days . . . The command is for Israel; and, for us in particular, it regards remembrance of our liberation from bondage in Egypt. We did not serve freely or when we liked. We had no relief. So rest and respite were instituted for us. We combine the two obligations: belief in the truth as to the world’s origin (clear evidence of God’s reality, on the least thought and reflection), alongside commemorating God’s grace in giving us respite from the burdens of Egypt ( : ). The Sabbath is a double gift, in effect, imparting a sound intellectual conviction along with a bodily good.
