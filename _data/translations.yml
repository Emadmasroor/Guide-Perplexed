    goodman: |-
      This fifth body, that of the sphere, either is or is not subject to generation and corrup- tion. Its motion too, then, must be so subject— or not, as our adversary claims. If the sphere is subject to generation and corruption, God must have created it from nothing.

      That is axiomatic. For whatever comes to be that previously did not exist needs a creator to give it being; it cannot create itself. But if the sphere has always been in motion and always will be— ceaselessly, everlastingly— it follows from the premises above that what moves it eternally cannot be a body or a physical force but must be God. You can see, then, that it is demonstrated, decisively and with certainty, that God exists, necessary in Himself, uncaused and in no way contingent, whether or not the world was created from nothing. We have clear proofs, too, as we have seen, of His unity and incorporeality. For the Philosophers’ proofs of God’s unity and incorporeality are sound whether or not the world came to be from nothing, as seen in the Philosophers’ third line of argument and as I showed myself using their methods ( .8b).

      It would be good now, I think, to complete our treatment of the Philosophers’ views by analyzing their case for the reality of the incorporeal intellects and its congruence with our biblical tenets about the reality of angels. Once that is done, I will return, as promised, to argue that the world began. For our best arguments there depend for their soundness and clarity on recognizing that incorporeal intellects are real and seeing how that is shown. But first we need an introduction to shed some light on the obscurities of this work as a whole— both in the earlier chapters and in those yet to come. Here is that introduction.

      Introduction My aim in this work, you see, was not to write about natural science nor to survey the theological ideas of various schools or prove what can be proved about them. Nor was it my goal to review or digest the anatomy of the spheres or to report their number. There are ample books on all those subjects, and if they are lacking on some topic, what I have to say will not be better than all that has been said already. My sole aim in this work, as I told you at the outset, is to clear up problems in the Torah and shed light on its deeper truths that lie beyond vulgar ken.

      So if you find me treating the incorporeal intellects or their number or that of the spheres and the causes of their motion, or analyzing the ideas of matter and form or the meaning of divine emanation and such themes, do not assume— do not even consider— that all I am seeking is the truth about these issues in philosophy. Those ideas are already treated in many books, soundly for the most part. My quarry is just the understanding that might shed light on some biblical problem, where grasping an idea lightly sketched can untie many a knot.

      This work of mine, as you learned from its introduction, pivots on showing what sense we can make of the Account of Creation and the Account of the Chariot and clearing up problems about prophecy and knowing God. So if, in any chapter, you find me explaining some settled point of natural or divine science, or what it is best to believe, or something connected to what is made clear by mathematics, you should realize that this must be a key needed to open up a biblical point, unlocking the Torah’s symbols and secrets. I brought it up to shed light on the Account of the Chariot or the Account of Creation or to clarify the idea of prophecy or some sound biblical belief.

      With that much by way of preface, I return to complete what I began.
