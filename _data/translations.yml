    goodman: |-
      A single case allows inferences regarding any other of the same type. By this I mean that the form of one prophet’s report allows inferences about any other of the same sort.

      So just as someone may dream that he traveled to a certain land, married, lived there for a time, and had a son there that he named So- and- So, who was such and such, so it is with symbols seen or actions done in a prophetic vision, as its symbolism demands: What the prophet did, the intervals between one symbolic action and the next, and the travel from one place to another are all part of the vision, not real actions perceptible in the external, sensory world. Scripture may relate certain of them as matters of objective fact, but since it is understood that it was all part of the prophetic vision, it need not be repeated at the mention of every symbolic detail that it came within a vision, just as a prophet might say ‘God told me’ and not need to explain that it was in a dream. Yet the vulgar take all these actions, changes of place, questions, and answers to have occurred in the purview of the senses and not in a vision. I shall give you an instance that should puzzle no one and follow up with like cases, showing how to deal with passages besides the ones I cite.

      A clear, unproblematic case is Ezekiel’s saying, As I sat in my house, the elders of Judah seated before me . . . a spirit bore me up between heaven and earth and brought me, in divine visions, to Jerusalem ( : – ). When he says, I rose and went out to the valley ( : ), that, too, was only in his divine visions, just as it says of Abraham, He brought him outside [and said, “Look to the sky and count the stars— if thou canst”] (Genesis : ). This, too, was in a vision. And it is in the same way that Ezekiel says, He set me down in the midst of a valley [full of bones] ( : ): It was all in a divine vision.

      Of his vision of being brought to Jerusalem, he says, I looked, and lo there was a hole in the wall. Then He said to me, “Son of man, dig in the wall.” I dug into the wall, and lo there was a portal (Ezekiel : – ). Just as Ezekiel seemed, in his vision, to be ordered to dig into the wall so as to enter and see what was going on there and seemed, in his vision, to dig and to enter that portal and see what he saw, it was all within his vision. Again when he was told, And thou . . . take thee a brick, [and set it before thee, and etch upon it the city of Jerusalem. Then show the city under siege. Build siege works about it. . . . This shall be a sign to the house of Israel.] Then lie on thy left side [and lay upon it the iniquity of the house of Israel for as many days . . . as the years of their sin, three hundred ninety days . . .], and take thee wheat and barley, [beans and lentils, millet and spelt; mix them in a jar and make thee bread to eat for the days thou liest on thy side] ( : – ). Likewise when God said to him, [Son of man, take a sword keen as a barber’s razor,] and shave thy head and beard.

      [Then take scales and weigh the hair. Burn a third of it in the city when the siege is full, beat a third with the sword all about the city, and scatter the third part to the wind] ( : – ). All this was in a prophetic vision, in which he saw himself doing as he was commanded. But God is far above making His prophets a laughingstock and a butt of fools’ ridicule by having them do crackbrained, let alone forbidden, things. Ezekiel was a priest; his every cut to the corners of his head or beard would amount to two sins. But it was all within a prophetic vision.

      Likewise when it says, Just as my servant Isaiah hath gone naked and barefoot [these three years] (Isaiah : ). All that was in divine visions. Only a logical weakling would labor under the delusion that the prophet was describing what he was ordered to do and that he actually did it. Ezekiel, too, saying that while in Babylon, he was ordered to dig into the wall on the Temple Mount, and did: I dug into the wall ( : ). He states clearly that this was in divine visions ( : )— just as it says of Abraham, The word of the Lord came to Abram in a vision, saying . . . (Genesis : ). It is in the same vision that it says, He brought him outside and said, “Look to the sky and count the stars” ( : ). This was clearly in a pro- phetic vision: He seemed to be brought out to see the sky and told to count the stars. The vision is recounted, as you can see.

      I say the same regarding Jeremiah’s being told to bury his sash by the Euphrates, leave it there for a long time and then retrieve it, rotten and ruined ( : – ): All this was sym- bolism, part of his prophetic vision. Jeremiah never left the Land of Israel for Babylon and never saw the Euphrates. Hosea, too, when told, Take thee a whore to wife and get thee children of whoredom ( : )— everything about the birth of those children and their being named So- and- So and Such- and- Such was part of his prophetic vision. Once it is rec- ognized that all this was symbolism, the delusion is dispelled that any such thing really happened except for those of us of whom it is said, To you every vision is like words in a book [under seal, given to one who can read but who, when asked to read it, says, “I cannot!

      It is sealed”] (Isaiah : ).

      The story of Gideon’s putting out the fleece and such (Judges : ), similarly, seems to me to involve just a vision. I would not call it strictly a prophetic vision. For Gideon did not reach the plane of prophecy, let alone miracles ( : ). The highest he rose was to the ranks of the judges of Israel. The Sages count him a lesser light, as I explained. All this was just in a dream, like those of Laban (Genesis : ) and Abimelech ( : – ) that I cited (II ). What Zechariah relates, too— So I tended the sheep marked for slaughter.

      Yea, those poor sheep. And I took me two staffs— down to the end, where he tells of meekly requesting his wages, taking them, counting the coins, and casting them into the treasury at the House of the Lord ( : – ). All this was what he saw in his prophetic vision: It was in a prophetic dream or vision that he was told to do these things and did them. No one who can tell what is possible from what is not would miss that or doubt it.

      The cases I cited show how to deal with those that I have not. All are of the same type and should be treated alike, as prophetic visions. Anything said, done, or heard in such a vision— any coming or going, anything one says or is told, any standing up or sitting down, rising or falling, any travel, anything one asks or is asked— is part of the vision, even if the actions recounted take much time and involve definite persons, times, or places. Once you see that the action is symbolic, you can be sure it was in a prophetic vision.
    munk: Placeholder text
    atay: Placeholder text
    tibbon: Placeholder text
  ch47:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      It is clear by now, surely, that most prophecy is symbolic. For its medium is the imagina- tion. But we should also understand something of metaphor and hyperbole. For they, too, occur in scriptural texts, and if taken literally and not seen as hyperbolic and rhetori- cal, or if metaphors are taken in the base sense of their terms and not seen as figura- tive, gross absurdities arise. The Sages state clearly, “The Torah exaggerates” (B. Tamid 29a)— meaning it uses hyperbole. As evidence they offer great cities, walled up to heaven (Deuteronomy : ). Right. Comparably, [Curse not the king, even in thought, and curse not the rich, even in thy bedchamber.] For a bird in the sky will carry thy voice (Ecclesiastes : ). On the same pattern it says, [Yet I destroyed the Amorites before them,] that were tall as cedars (Amos : ). This is frequent in all the Prophets’ speech: Things are said hyperbolically and rhetorically, not with tight precision.

      Not so what the Torah says of Og: Lo, his bedstead (ʿeres) was a bedstead of iron . . .

      [nine cubits long and four wide, by the cubit of a man] (Deuteronomy : ), an ʿeres being a bed, as in our leafy bed (Song of Songs : ). Now, one’s bed is not the same size as he.

      It is not a garment. It is always bigger than the sleeper. The usual length is a third again the owner’s height. So if this bed was nine cubits long, the sleeper would normally have been six cubits or a bit more. When it says by the cubit of a man, it means a normal person like us, not Og’s cubit. For one’s limbs are generally proportionate to his body. So Og’s height, it says, was twice another man’s, or a bit less — doubtless unusual in our species, but hardly impossible.

       Of the precise ages the Torah gives for certain persons, I would say that only those cited lived that long; others had normal, natural life- spans, the exceptions being due to multiple natural causes based on their diet and habits, unless they were miraculous. There is not much more that one can say.

      Metaphors, too, should be closely studied. Some are obvious and trouble no one, like the hills and heights shall burst forth in song before you. Every tree of the field shall clap hands (Isaiah : ). Clearly poetic language. Likewise, Even the cypresses will rejoice for thee ( : ). Jonathan ben Uzziel translated that as “Even the rulers will rejoice for thee, those with vast wealth”— treating the language as emblematic, like curd of kine and milk of flocks (Deuteronomy : ). Such imagery is very, very frequent in Scripture. Some instances the common folk can see are figurative; with others, they do not think so. So when it says, The Lord will open His stores to thee, [the heavens, to give rain to your land in due season] ( : ), no one doubts the words are figurative. God has no treasury of rain.

      Likewise, when it says, He opened heaven’s doors and rained manna upon them (Psalms : – ), no one assumes that there are doors and portals in the sky. It is an analogy, another type of metaphor— and that is how we should understand the heavens opened up (Ezekiel : ); If not, blot me, pray, from Thy book, that Thou hast written . . . [who sinned against Me] will I blot from My book (Exodus : – ); and may they be blotted from the book of life (Psalms : ). All these are analogies—n ot that God has a book to write in or erase, as the vulgar suppose, missing the imagery.

       All these cases are of the same sort. So you can treat any that I have not mentioned like those cited in this chapter. If you distinguish and discriminate thoughtfully, you will see what is symbolic, figurative, or hyperbolic and where words have their basic, primary sense, and prophetic diction will all be clear to you, leaving your beliefs rational, coher- ent, and pleasing to God. For only truth pleases Him, and only falsehood displeases.

      Do not muddle your thoughts and your thinking with supposedly biblical beliefs that are not true at all. Rightly understood, the Torah is pure truth— as it says, Thy testimonies, ever true! (Psalms : ), and I, the Lord, speak truth (Isaiah : ).

      If you think this way, you will steer clear of imagining things real that God never gave being, and you will avoid unseemly thoughts that can lead to faithlessness or to believing God imperfect or subject to corporeal traits, states, or affects, as I explained (I )— or to disbelieving prophetic statements. All such injuries come from neglecting the caveats I’ve noted. So these, too, matter in assaying the Torah’s mysteries. I’ve addressed them only in general terms, but it’s easy to deal with other cases based on those that I’ve already mentioned.
