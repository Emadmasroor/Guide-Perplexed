    goodman: |-
      The commandments in the twelfth group are the ones I listed in the Book of Purity.

      I have already mentioned their benefits broadly (III ), but I shall have more to say in due course about the grounds for this class, after which I will give the reasons I can see for some individually. The Torah God gave Moses (which is therefore called his) sought nothing if not to lighten the load and ease the burden of ritual. If you picture any of our mitzvot as onerous or irksome, it can only be because you do not know the doctrines and the way of life of those earlier days. Just compare burning a squab with burning one’s child as an act of worship! The Torah says plainly, They even burn their sons and daugh- ters in fire to their gods (Deuteronomy : ). That is how they served those gods. We burn a pigeon or a handful of flour! Hence were we rebuked when backsliding: How have I wronged you, My people? How have I burdened you? Tell Me! (Micah : ). In the same vein, Have I been a wasteland to Israel, a land of darkness? Why do My people say, “We have broken free”? (Jeremiah : )— meaning ‘What great burden did this Law impose, that they have spurned it?’ God pleads with us, What fault did your forefathers find in Me to stray so far from Me? ( : ). All these texts make the same central point, not to be missed.

      This said, I continue: The whole object with the Sanctuary, as we have seen ( .99b), was to inspire reverence and awe in those who came; as it says, Revere My Sanctuary (Le- viticus : ). But constant contact with anything awesome can diminish its emotional impact. Our Sages cautioned us about this, saying that it is not advisable to visit the Sanc- tuary too often. They cited the verse Rarely visit thy neighbor, lest he have enough and grow tired of thee (Proverbs : ). It is with this intention that God barred the impure from the Sanctuary. For there are so many kinds of impurity that scarcely a handful could be found who were ritually pure. Even if spared contact with a corpse (Leviticus : ), one might not avoid touching one of the eight kinds of vermin ( : – ) that often get into the house or onto one’s food or drink— or are readily stumbled over. Or if clear of these, one might not avoid touching a menstruant woman ( : ), a man or woman oozing flux ( : ), a leper, or his bedding ( : , : ). And if spared all those, one might not avoid a nocturnal emission or sleeping with his wife. But once cleansed of such impu- rities, one still could not enter the Sanctuary until nightfall. But it was closed at night, as the Mishnah details in Middot ( . – ) and Tamid ( . ). By then, one has probably slept with his wife or suffered some new impurity and must start over the next day. All these things kept one out of the Sanctuary, preventing casual visits.

      You know the text: “One may not enter the Courtyard to worship, even if ritually pure, before immersing oneself” (M. Yoma . ). Such actions preserve a sense of awe and foster emotions of due humility. The more common the breach of purity, the more pro- tracted and elaborate the purgation. Being under the same roof as a corpse, especially that of a relative or neighbor, is the commonest cause of impurity. So one is not cleansed of it without the ashes of a red heifer (Numbers ), rare as they be— and then only after seven days. Oozing flux or menstrual flow is more common than contact with something impure. So these need seven days. But contact with someone so affected demands only a day (Leviticus : , , ). Purification of a man or a woman with running issue or of a woman after childbirth is completed by a sacrifice, these being less frequent than menstruation.

      All these conditions provoke disgust— menstruation, flux in a man or woman, leprosy, corpses and carcasses, vermin, and seminal issue. So the rules serve multiple ends: One is to distance us from filth. Second, to safeguard the Sanctuary. Third, to preserve decency and decorum. Sabians, as you will soon hear, were laden with oppressive restrictions on pollution. So, fourth, our rules ease those burdens: Matters of purity and impurity do not keep one from any activity. For our rules regard only holy objects and the Sanctuary, nothing more: She shall touch no holy thing nor enter the Sanctuary [until her days of puri- fication are complete] (Leviticus : ). Otherwise, there is nothing wrong with remaining impure as long as you like and eating whatever you please that is not consecrated.

      The well- known practice of Sabian sects in the East down to our own time— the re- maining Zoroastrians— is for a menstruant woman to remain at home alone. Anything she steps on is burnt; anyone she speaks with becomes unclean. If so much as a breeze wafts over her and onto someone clean, he becomes unclean. What a difference between that custom and ours: “Whatever a woman normally does for her husband she may do for him during her period, except [fill his cup, make his bed, and] wash his face, [hands, and feet]” (B. Ketubot 4b, 61a). He just must not have congress with her while she is unclean and impure. Another custom of theirs, well known to this day, is that whatever a body sheds— such as hair, nails, or blood— is polluting. So for them, all barbers are unclean, since they handle blood and hair, and anyone who shaves must bathe in running water. They have a great many such onerous duties. But our concerns with purity and impurity regard only the Sanctuary and things consecrated.

      God’s saying Sanctify yourselves and be holy, for I am holy (Leviticus : ) is not about purity and impurity at all. Sifra explains: “This regards the sanctity of the mitzvot,” the same as God’s saying Ye shall be holy ( : ). This, too, the Sages say: “This concerns the sanctity of the mitzvot.” So breaching the mitzvot is called impurity, as are cardinal sins that violate core precepts: pagan worship, sexual crimes, and bloodshed. Of pagan worship it says he hath given his seed to Molech, defiling My sanctuary ( : ). Of sexual crimes, Defile not yourselves in any such way ( : ). Of bloodshed, Defile not the land (Numbers : ).

      ‘Impurity,’ we see, has three different meanings: It is said ( ) of sinful and rebellious acts and thoughts; ( ) of dirt and filth, as in the stain clingeth to her skirts (Lamentations : ); and ( ) of the ritual defilement notionally conveyed by contact, carrying, or being under the same roof with such. It is in this last sense that we say, “Matters of Torah are not defiled” (B. Berakhot 22a). Holiness has three corresponding senses.

      Corpse impurity is purged only after seven days and only with the ashes of a red heifer.

      But the Kohanim were always needed to enter the Sanctuary to offer sacrifices. So they were forbidden to contract such impurity except in exigent cases, cases naturally hard to avoid: contact with the bodies of parents, offspring, or siblings. The High Priest was barred from any contact with a corpse, even of close kin, given the need for him to be present for service at all times in the Sanctuary— as it says, [The golden frontlet] shall be ever on his brow (Exodus : ). Clearly the ban does not extend to women— it says the sons of Aaron (Leviticus : ). Women are not needed to offer sacrifices.

      Inevitably, someone will enter the Sanctuary or eat something consecrated while in an impure state, in error or deliberately— for malicious people typically commit the most egregious offenses on purpose. So specific sacrifices were ordained to atone for defiling the Sanctuary or consecrated objects inadvertently or intentionally (M. Shevuʿot . – ).

      These are the goats offered on the pilgrimage festivals and at the New Moon and the scapegoat, as I explained— lest the deliberate offender presume he has done nothing se- rious in desecrating the Lord’s Sanctuary. He must know that he needs atonement by offering a goat— as it says, lest they die unclean (Leviticus : ) and Aaron shall bear the guilt regarding holy things (Exodus : ). This is a recurrent theme.

      The impurity of leprosy (tzaraʿat) is of a type that I have discussed before, as did the Sages. Their core doctrine here: It is a penalty for slander (B. Arakhin 16b). The change first appears on the walls of one’s house (Leviticus : – ). If one repents, the point was made. If he persists, it spreads to his bed and furniture. If he still persists, it spreads to his clothing and even his body— a recurrent miracle for us, like the waters of a So ah (Numbers : – ). It is clear why this belief is beneficial— all the more so since the lesion is contagious and naturally revolting to almost everyone. The Midrash gives a reason why the affliction is purged with cedar, hyssop, scarlet thread, and two birds (Leviticus : , ; Leviticus Rabbah . ). But that is not germane here. I have not yet learned the reason for any of this, nor why cedar, hyssop, and scarlet thread are used in preparing the ashes of the red heifer (Numbers : ), nor why a sprig of hyssop is used for sprinkling the blood of the Paschal lamb. I cannot find the basis for using these species.

      The red heifer is called a sin offering because, once done, it completes the purging of corpse impurity, allowing one to enter the Sanctuary. The basic idea is this: Having been rendered impure by contact with a corpse, one might have been barred permanently from entry and from eating consecrated foods had not the heifer “borne off” the sin— just as the frontlet the High Priest wears bars impurity (Exodus : ), or as the goats that are burnt bear off sins symbolically (Leviticus : ; Numbers : ). That is why “one who handles the heifer or the goats that are burnt renders his clothing unclean” (M. Zeva im )— just as the scapegoat, thought to carry off so much sin, renders impure all who handle it (Leviticus : ).

      I have now given all the grounds I can see for this class of mitzvot.
