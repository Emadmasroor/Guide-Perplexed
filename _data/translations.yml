  ch31:
    friedlander: 'There are persons who find it difficult to give a reason for any
      of the commandments, and consider it right to assume that the commandments and
      prohibitions have no rational basis whatever. They are led to adopt this theory
      by a certain disease in their soul, the existence of which they perceive, but
      which they are unable to discuss or to describe. For they imagine that these
      precepts, if they were useful in any respect, and were commanded because of
      their usefulness, would seem to originate in the thought and reason of some
      intelligent being. But as things which are not objects of reason and serve no
      purpose, they would undoubtedly be attributed to God, because no thought of
      man could have produced them. According to the theory of those weak-minded persons,
      man is more perfect than his Creator. For what man says or does has a certain
      object, whilst the actions of God are different; He commands us to do what is
      of no use to us, and forbids us to do what is harmless. Far be this! On the
      contrary, the sole object of the Law is to benefit us. Thus we explained the
      Scriptural passage, “for our good always, that He might preserve us alive, as
      it is this day” (Deut. vi. 24). Again, “which shall hear all those statutes
      (ḥuḳḳim), and say, surely this great nation is a wise and understanding people”
      (ibid. iv. 6). He thus says that even every one of these “statutes” convinces
      all nations of the wisdom and understanding it includes. But if no reason could
      be found for these statutes, if they produced no advantage and removed no evil,
      why then should he who believes in them and follows them be wise, reasonable,
      and so excellent as to raise the admiration of all nations? But the truth is
      undoubtedly as we have said, that every one of the six hundred and thirteen
      precepts serves to inculcate some truth, to remove some erroneous opinion, to
      establish proper relations in society, to diminish evil, to train in good manners,
      or to warn against bad habits. All this depends on three things: opinions, morals,
      and social conduct. We do not count words, because precepts, whether positive
      or negative, if they relate to speech, belong to those precepts which regulate
      our social conduct, or to those which spread truth, or to those which teach
      morals. Thus these three principles suffice for assigning a reason for every
      one of the Divine commandments.'
    pines: Placeholder text
    goodman: |-
      Some think it dreadful to give grounds for any of our laws. They would like it best if none of these prescriptions and proscriptions made any sense. What makes this party feel this way is an inner discomfort they feel, a malaise that they cannot articulate or adequately explain. They think if these laws did us any good in life or were given to us for some reason, they might just as well have been devised by any rational subject; but if something makes no sense and does no good at all, it must have come from God, since it cannot have come from human thinking. In effect, these mental weaklings set man above his Maker: We are the ones who speak and act with purpose, as they presume, and God does not; He just commands us to do things that do us no good and bans our doing things that cause us no harm— exalted be He, and exalted still higher above such notions!

      The truth is just the opposite, as I’ve shown. The whole point is to help us, as I said (III – ) when I cited for our lasting good and to keep us in life, as He has to this day (Deuteronomy : ) and who shall hear all these statutes and say, “What a wise and dis- cerning people is this great nation” ( : ). The Torah includes the statutes ( ukkim) here, all of them, as marks of a wisdom and discernment that will be plain to every nation. If even one of these precepts had no rational ground, brought no benefit, or forestalled no harm, why would those who perform and profess these precepts be called wise and dis- cerning and so admirable that the nations remark on it? No. As I said, every one of the commandments instills a sound view or purges an unsound one, imparts a rule of justice or combats some wrong, fosters a virtue or checks a vice. The mitzvot all regard our three goals: ideas, character, and practices, political and civic. I do not list speech sepa- rately here. For of the words the Torah enjoins or prohibits, some amount to civic actions, some promote ideas, and some inculcate virtues. So I’ve kept to just three categories in grounding all the Torah’s laws.
