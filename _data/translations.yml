    goodman: |-
      The mitzvot in our first category, the tenets I cataloged in Laws of the Foundations of the Torah, all have clear grounds. If you study each one, you’ll find this view sound and a proven fact. Besides, whatever spurs or fosters learning and teaching is clearly benefi- cial. For without knowledge, sound practice and true belief are unattainable. To honor the exponents of the Torah is also clearly beneficial. For unless deep respect for them is ingrained in people’s souls, they will not be heeded when giving sound guidance as to belief or practice. Implicit here, in the commandment rise up before a hoary head (Leviti- cus : ), is the cultivation of modesty.

      In this class, too, come the commandments that our oaths are to be sworn in God’s name (Deuteronomy : , : ) and that we not break our vows or swear in vain (Levit- icus : ; Exodus : ). The grounds for all this are clear as well. For these mitzvot exalt God and instill belief in His greatness.

      Also of this group are the commandment to turn to Him in every strait. Thus [When ye wage war in your land against a foe who presses you,] sound the trumpet, [and ye shall be remembered by the Lord your God and rescued from your foes] (Numbers : ). This practice strengthens the sound belief that God knows our plight and can save us if we are true— or bring us to grief if we are not. We must not believe that this depends on chance or accident. That is what it means when it says, If you treat Me as chance . . . [I shall smite you sevenfold] (Leviticus : ). That is, ‘If you deem the chastisements I mete out against you matters of chance, I shall give you chance all the sharper and harder’— if you treat Me as chance, ‘I’ll give you real chance!’ For the belief that one’s plight is a matter of chance makes people hold fast to their rotten views and vicious practices and not repent— as it says, Thou didst strike them, but they felt nothing! (Jeremiah : ). That is why we are commanded to call upon Him and turn to Him in every crisis.

      Repentance clearly belongs in this group as an idea that religious people need to be- lieve in. For a person will inevitably slip and sin, not knowing the view or trait that is truly better, or because some appetite or animus has gotten the better of him. If one be- lieved the rift irreparable, he might persist in his error or stray further, seeing no alterna- tive. But by believing in repentance, one can reform and even improve. That is why so many practices are prescribed to support this sound and wholesome outlook— fasting, confession (Leviticus : , : ), and sacrifices for unwitting and even some willful sins.

      What all forms of penitence have in common, regardless of the sin, is its renunciation.

      That is the point of this belief. So these practices are clearly beneficial.
