    goodman: |-
      That the spheres are alive, rational, and conscious— not lifeless bodies like fire or earth, as the ignorant assume— is true and certain from the Torah’s standpoint too. The Phi- losophers call them living beings that obey their Lord, praise and glorify Him— and what praise and glory it is! As it says, The heavens recount the glory of God [, the firmament tells of His handiwork] (Psalms : ). How far from the truth are those who read this as poetic personification! In Hebrew, the words recount and tell side by side are never applied to any but a rational being. An objective rather than subjective description of the heavens is intended here, as is clearly shown when it says, There is no speech, there are no words; unheard is their voice ( : ). The psalm states plainly that it is describing the heavens realistically, as praising God and recounting His wonders without a word from lip or tongue. That is true. For words of praise only convey to another or express to oneself what the soul conceives. As the Psalms say, Speak in your heart upon your bed and be still.

       Selah ( : ), as I explained (I , , ). This confirms biblically what only the ignorant or obdurate would deny.

      The Sages’ reading seems to me to need no evidence or explanation. Consider how they ordained the blessing of the moon and the constant liturgical and midrashic refer- ences to passages like the heavenly host bows before Thee (Nehemiah : ) and at the joyous song of the morning stars together, when all the sons of God exulted (Job : ). Such refer- ences are frequent in their discussions. In Genesis Rabbah ( . ), regarding God’s words, The earth was tohu va- vohu (Genesis : ), they say toha u-voha, it wept and wailed over its plight, the earth saying, “They and I were created together” (meaning the earth and the heavens), “but the heavenly heights are alive, and we below are lifeless,” confirming that the heavens are living bodies, not dead like the elements. You can see, then, that what Ar- istotle says of the sphere’s being rational and aware matches the words of the Prophets and the exponents of our Torah, the Sages of blessed memory.

      All the Philosophers agree that governance of this lower world is accomplished by powers emanating from the sphere, as I said (I ), and that the spheres have conscious knowledge of what they govern. The Torah, too, affirms this: [sun, moon, and stars . . .] that the Lord thy God assigned to every nation (Deuteronomy : ). This makes them His proxies in creation’s governance— though not to be worshipped. Spelling this out, it says to rule by day and by night, and to divide light from darkness (Genesis : ). Rule here means delegated authority. Beyond overseeing light and darkness, the heavenly bodies are proxi- mate causes of generation and corruption ( .69b). For light and darkness are already cov- ered by to divide light from darkness. And it is impossible to rule what one does not know, if rule is understood properly here. I shall have much to say about that later on (III ).
