  ch10:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      It is well known that when the Philosophers treat the governance of this world, the world of generation and decay, in all their works, they trace everything to powers stemming from the spheres. I’ve mentioned this several times. Our Sages, similarly, you’ll find, say, “No plant here below lacks a mazal in the firmament that beats down upon it and bids it grow, as it is written, [Dost thou bind the sweet influences of the Pleiades, or loose the draw- strings of Canopus? . . .] Dost thou know the rules of heaven or set its charge over the earth?

      (Job : – )” (Genesis Rabbah . ). For mazal is also what they call a star, as you can see clearly earlier in Genesis Rabbah, when they say, “One mazal completes its course in thirty days, another in thirty years” ( . ). Even particulars, they hold, have their own astral forces. The general influences of the sphere course all through the world, but those of a given star also affect a species, much as a body is affected by its bodily powers.

      For the whole world, as I said (I ), is one being.

      Along these lines, the Philosophers assign the moon a special influence on the element of water, as evidenced in the rise and fall of rivers and seas with the waxing and waning of the moon and the ebb and flow of the tides as the moon advances or retreats— that is, as it rises and sets in the diverse quarters of the sphere, as is plainly observed. That the sun’s rays stir the element of fire is also quite clear. You can see it in the way heat spreads through the world when the sun rises and how cold prevails when the sun is distant or obscured. This is too obvious for much discussion.

      My idea, since I knew this, was that the four orbs with forms, beyond the general ef- fects of their emanations on all that comes to be, influence the four elements. Each orb’s stirring moves its own element: The moon’s moves water; the sun’s, fire; that of the other planets, air. The many and varied progressions, halts, oppositions, and retrogressions of the planets would explain the many forms air takes as it swiftly expands or contracts. The orb of the fixed stars would be what moves the earth. Perhaps the earth is so static, refrac- tory, and resistant to blending and compounding because the fixed stars move so slowly.

      The Sages hint that the fixed stars influence the earth specifically when they say there are as many plant species as stars (Genesis Rabbah . ).

       The system might work so: There are four orbs, and the elements they move are also four. So are the general influences on the world issuing from these orbs, as I explained (I ). The motions of each celestial body, too, would have four causes: its shape (spheri- cal); its soul; the mind by which it thinks, as I explained (II ); and the incorporeal intel- lect it loves. Mark this well.

      To explain: Without the shape it has, the sphere’s constant rotation would be entirely impossible. For only rotation returns continuously to where it began. Rectilinear motion may return to where it started, but not without a break (Premise ); between advancing and retreating, it must come to rest, as is demonstrated in the proper place. A motion that continuously retraces the same course, then, must clearly be rotational. And only a living being can move in that way. So the sphere must have a soul— and a motive to set it in motion. This must be an idea, a longing for what it conceives, as I explained (II ).

      That requires a mind, since here there is no pursuit of what is desired or flight from what is untoward. There must be a being, then, conceived by this mind, that fills it with desire, as I explained.

      Here, then, are the four causes of the sphere’s motion, and the four facets of the gen- eral powers issuing to us from the sphere: the powers that produce minerals, the vegeta- tive soul, the animal soul, and the rational soul, as I explained ( .100b). If you consider these influences, you will find they are of two kinds: producing or preserving what arises— preserving particulars for their time and making their species permanent. That is what ‘nature’ means when nature is said to be wise and providential (see .31a): giving being to animals, artfully, like a craftsman, and preserving them and assuring their survival by imparting the formative influences that give them being and that nourish, preserve, and sustain them through their life- span. The reference is to God’s command, which executes this dual effect by means of the sphere.

      This number four is marvelous and worthy of reflection. In the Midrash of Rabbi Tan uma, they said, “How many rungs had the ladder? Four” (cf. Yalqu Reubeni, Malʾakh ) — alluding to Lo a ladder stood on the ground (Genesis : ). The Mi- drashim always mention four camps of angels (PRE , Numbers Rabbah ). In certain manuscripts I have seen “How many rungs had the ladder? Seven.” But all the manu- scripts and midrashim agree that the angels of God that Jacob saw ascending and de- scending were just four: two ascending, two descending, with all four on the same rung, two going up and two going down (see B. ullin 91b). Hence their inference that the ladder in Jacob’s vision was one- third again the width of the world. For an angel in a prophetic vision is one- third of the world’s girth— as it says, His body was like tarshish (Daniel : ). The four, then, would span a world and a third. The imagery in Zech- ariah describing four chariots issuing from between two mountains, mountains of bronze (Zechariah : ), is explained thus: These are the four heavenly spirits that come forth from attending the Lord of all the earth ( : ). They cause all that comes to be.

      Zechariah mentions bronze here, and Scripture again speaks of burnished bronze (Ezekiel : ). The word has several meanings— you will be hearing my thoughts about that later. The Sages’ saying in Genesis Rabbah ( ) about our text (Genesis : ), that an angel is the third part of the world, is now clear as can be, and I have explained it in my major juridical work (MT Laws of the Foundations of the Torah . ). For there are three kinds of created beings: ( ) incorporeal intellects, sc., the angels; ( ) the bodies of the spheres; and ( ) prime matter and the ever- changing bodies beneath the sphere. That is how one who hopes to unriddle the language of the prophets and rouse himself from mindless slumber can escape the sea of unknowing and rise to a place among the high- est. But one who would rather mystify himself and wallow in his own ignorance can sink lower and lower (cf. Deuteronomy : ). He need not trouble body or spirit but only lie still and sink as deep as nature permits. Put your mind to all that I have said and master it.
