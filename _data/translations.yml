    goodman: 'The mitzvot in our ninth group are the ones I listed in the Book of
      Love. They all have clear warrants: The object of all these rites is constant
      mindfulness of God, in love and fear, holding fast to His commandments and believing
      what every religious person should believe of Him. These duties include prayer
      and reciting the Shemaʿ (Deuteron- omy : – , etc.) and the Grace after Meals
      ( : ) with their companion blessings. They also include the Priestly blessing,
      tefillin, mezuzah, and having a Sefer Torah and reading it at the proper times.
      All these acts teach valuable lessons. This is perfectly clear. Further discussion
      would just be redundant.'
