    atay: Placeholder text
    tibbon: Placeholder text
  ch18:
    friedlander: |-
      The three words karab, “to come near,” nagaʻ, “to touch,” and nagash, “to approach,” sometimes signify “contact” or “nearness in space,” sometimes the approach of man’s knowledge to an object, as if it resembled the physical approach of one body to another. As to the use of karab in the first meaning, viz., to draw near a certain spot, comp. “As he drew near (karab) the camp” (Exod. xxxii. 19); “And Pharaoh drew near (hikrib)” (Exod. xiv. 10). Nagaʻ, in the first sense, viz., expressing the contact of two bodies, occurs in “And she cast it (va-taggaʻ) at his feet” (Exod. iv. 25); “He caused it to touch (va-yaggaʻ) my mouth” (Isa. vi. 7). And nagash in the first sense, viz., to approach or move towards another person, is found, e.g., in “And Judah drew near (va-yiggash) unto him” (Gen. xliv. 1).

      The second meaning of these three words is “approach by means of knowledge,” or “contact by comprehension,” not in reference to space. As to nagaʻ in this second sense, comp. “for her judgment reacheth (nagaʻ) unto heaven” (Jer. li. 9). An instance of karab being used in this meaning is contained in the following passage, “And the cause that is too hard for you, bring (takribun) it unto me” (Deut. i. 17); this is equivalent to saying, “Ye shall make it known unto me.” The verb karab (in the Hiphil) is thus employed in the sense of giving information concerning a thing. The verb nagash is used figuratively in the phrase, “And Abraham drew near (va-yiggash), and said” (Gen. xviii. 23); this took place in a prophetic vision and in a trance, as will be explained (Part I. chap, xxi., and Part II. chap, xli.); also in “Forasmuch as this people draw near (niggash) me with their mouths and with their lips” (Isa. xxix. 13). Wherever a word denoting approach or contact is employed in the prophetic writings to describe a certain relation between the Almighty and any created being, it has to be understood in this latter sense [viz., to approach mentally]. For, as will be proved in this treatise (II. chap, iv.), the Supreme is incorporeal, and consequently He does not approach or draw near a thing, nor can aught approach or touch Him; for when a being is without corporeality, it cannot occupy space, and all idea of approach, contact, distance, conjunction, separation, touch, or proximity is inapplicable to such a being.

      There can be no doubt respecting the verses “The Lord is nigh (karob) unto all them that call upon him” (Ps. cxlv. 18); “They take delight in approaching (kirbat) to God” (Isa. lviii. 2); “The nearness (kirbat) of God is pleasant to me” (Ps. lxxiii. 28); all such phrases intimate a spiritual approach, i.e., the attainment of some knowledge, not, however, approach in space. Thus also “who hath God so nigh (kerobim) unto him” (Deut. iv. 7); “Draw thou near (kerab) and hear” (Deut. v. 27); “And Moses alone shall draw near (ve-niggash) the Lord; but they shall not come nigh (yiggashu)” (Exod. xxiv. 2).

      If, however, you wish to take the words “And Moses shall draw near” to mean that he shall draw near a certain place in the mountain, whereon the Divine Light shone, or, in the words of the Bible, “where the glory of the Lord abode,” you may do so, provided you do not lose sight of the truth that there is no difference whether a person stand at the centre of the earth or at the highest point of the ninth sphere, if this were possible; he is no further away from God in the one case, or nearer to Him in the other; those only approach Him who obtain a knowledge of Him; while those who remain ignorant of Him recede from Him. In this approach towards, or recession from God there are numerous grades one above the other, and I shall further elucidate, in one of the subsequent chapters of the Treatise (I. chap, lx., and II. chap, xxxvi.) what constitutes the difference in our perception of God.

      In the passage, “Touch (gaʻ) the mountains, and they shall smoke” (Ps. cxliv. 5), the verb “touch” is used in a figurative sense, viz., “Let thy word touch them.” So also the words, “Touch thou him himself” (Job ii. 5), have the same meaning as “Bring thy infliction upon him.” In a similar manner must this verb, in whatever form it may be employed, be interpreted in each place, according to the context; for in some cases it denotes contact of two material objects, in others knowledge and comprehension of a thing, as if he who now comprehends anything which he had not comprehended previously had thereby approached a subject which had been distant from him. This point is of considerable importance.
    pines: Placeholder text
    goodman: |-
      Karov, negoʿa, negosh— nearing, touching, drawing nigh. The three terms may denote spatial approach or contact. But they are also used cognitively, by analogy with the physi- cal. ‘Nearing’ has its basic spatial sense in when he neared the camp (Genesis : ) and as Pharaoh drew nigh (Exodus : ). Touching has the basic sense of physical contact in She touched his legs ( : ) and He touched it to my mouth (Isaiah : ). It has the basic sense of approaching or coming closer to someone in Judah drew near him (Genesis : ).

      The derived sense of these three terms involves cognitive or intellectual rather than spatial nearing or contact. Thus Scripture says, Her doom reacheth the heavens (Jeremiah : ). The idea of nearing is used in this way in Any case that is too hard for ye, bring it to me (Deuteronomy : )— inform me of it. So it can have the sense of conveying informa- tion. Drawing nigh is used cognitively in Abraham drew nigh and said . . . (Genesis : ).

      He was in an inspired ecstasy, a prophetic trance, as I’ll explain (I ; II ). Again, since this people hath drawn nigh to Me and honored me with lip and mouth . . . (Isaiah : ).

      Any reference in Scripture to one of God’s creatures nearing or approaching Him has this latter sense, since God is not a body, as will be demonstrated in this work (II ). He does not near or approach anything, and nothing can approach or near Him. Transcend- ing physicality implies transcending space. It voids notions of proximity, approach, and distance, contiguity, separation, adjacency, and contact.

      I do not see you falling into a quandary or confusion over the words The Lord is near to all who call upon Him (Psalms : ), They long for nearness to God (Isaiah : ), or To me the good is to be close to God (Psalms : ). In all these passages, the nearing is intel- lectual; it regards knowing, not location. Likewise when it says so near (Deuteronomy : ), draw nigh and hear ( : ), and Moses alone shall approach the Lord, but they shall not (Exodus : ). You may, if you like, take this to regard Moses’ nearing the place on the mountain invested with the light of God’s glory. But remember, there is no difference between being at the center of the earth or in the ninth sphere (were that possible): One would be no farther from God here and no closer there. One nears God by knowing Him.

      Distance is ignorance of Him. There are many degrees of nearness or distance in this way.

      I will explain how these planes of awareness differ in another chapter of this work (I ).

      When it says, Touch the mountains and make them smoke (Psalms : ), it means “Lay Your command upon them,” as it were, just as the Sa an says to God, Touch his person (Job : )— harm him directly. ‘Contact’ and every inflected form of that word should be dealt with in this way wherever they appear: The sense can be physical, but the contact may also be intellectual— connecting with an idea, as if one had neared and taken hold of something once remote. Do understand this.
