  ch40:
    friedlander: 'It has already been fully explained that man is naturally a social
      being, that by virtue of his nature he seeks to form communities; man is therefore
      different from other living beings that are not compelled to combine into communities.
      He is, as you know, the highest form in the creation, and he therefore includes
      the largest number of constituent elements; this is the reason why the human
      race contains such a great variety of individuals, that we cannot discover two
      persons exactly alike in any moral quality, or in external appearance. The cause
      of this is the variety in man’s temperament, and in accidents dependent on his
      form; for with every physical form there are connected certain special accidents
      different from those which are connected with the substance. Such a variety
      among the individuals of a class does not exist in any other class of living
      beings; for the variety in any other species is limited; only man forms an exception;
      two persons may be so different from each other in every respect that they appear
      to belong to two different classes. Whilst one person is so cruel that he kills
      his youngest child in his anger, another is too delicate and faint-hearted to
      kill even a fly or worm. The same is the case with most of the accidents. This
      great variety and the necessity of social life are essential elements in man’s
      nature. But the well-being of society demands that there should be a leader
      able to regulate the actions of man; he must complete every shortcoming, remove
      every excess, and prescribe for the conduct of all, so that the natural variety
      should be counterbalanced by the uniformity of legislation, and the order of
      society be well established. I therefore maintain that the Law, though not a
      product of Nature, is nevertheless not entirely foreign to Nature. It being
      the will of God that our race should exist and be permanently established, He
      in His wisdom gave it such properties that men can acquire the capacity of ruling
      others. Some persons are therefore inspired with theories of legislation, such
      as prophets and lawgivers; others possess the power of enforcing the dictates
      of the former, and of compelling people to obey them, and to act accordingly.
      Such are kings, who accept the code of lawgivers, and [rulers] who pretend to
      be prophets, and accept, either entirely or partly, the teaching of the prophets.
      They accept one part while rejecting another part, either because this course
      appears to them more convenient, or out of ambition, because it might lead people
      to believe that the rulers themselves had been prophetically inspired with these
      laws, and did not copy them from others. For when we like a certain perfection,
      find pleasure in it, and wish to possess it, we sometimes desire to make others
      believe that we possess that virtue, although we are fully aware that we do
      not possess it. Thus people, e.g., adorn themselves with the poems of others,
      and publish them as their own productions. It also occurs in the works of wise
      men on the various branches of Science, that an ambitious, lazy person sees
      an opinion expressed by another person, appropriates it, and boasts that he
      himself originated it. The same [ambition] occurs also with regard to the faculty
      of prophecy. There were men who, like Zedekiah, the son of Chenaanah (1 Kings
      xxii. 11, 24) boasted that they received a prophecy, and declared things which
      have never been prophesied. Others, like Hananiah, son of Azzur (Jer. xxviii.
      1–5), claim the capacity of prophecy, and proclaim things which, no doubt, have
      been said by God, that is to say, that have been the subject of a divine inspiration,
      but not to them. They nevertheless say that they are prophets, and adorn themselves
      with the prophecies of others. All this can easily be ascertained and recognized.
      I will, however, fully explain this to you, so that no doubt be left to you
      on this question, and that you may have a test by which you may distinguish
      between the guidance of human legislation, of the divine law, and of teachings
      stolen from prophets. As regards those who declare that the laws proclaimed
      by them are their own ideas, no further test is required; the confession of
      the defendant makes the evidence of the witness superfluous. I only wish to
      instruct you about laws which are proclaimed as prophetic. Some of these are
      truly prophetic, originating in divine inspiration, some are of non-prophetic
      character, and some, though prophetic originally, are the result of plagiarism.
      You will find that the sole object of certain laws, in accordance with the intention
      of their author, who well considered their effect, is to establish the good
      order of the state and its affairs, to free it from all mischief and wrong;
      these laws do not deal with philosophic problems, contain no teaching for the
      perfecting of our logical faculties, and are not concerned about the existence
      of sound or unsound opinions. Their sole object is to arrange, under all circumstances,
      the relations of men to each other, and to secure their well-being, in accordance
      with the view of the author of these laws. These laws are political, and their
      author belongs, as has been stated above, to the third class, viz., to those
      who only distinguish themselves by the perfection of their imaginative faculties.
      You will also find laws which, in all their rules, aim, as the law just mentioned,
      at the improvement of the material interests of the people; but, besides, tend
      to improve the state of the faith of man, to create first correct notions of
      God, and of angels, and to lead then the people, by instruction and education,
      to an accurate knowledge of the Universe: this education comes from God; these
      laws are divine. The question which now remains to be settled is this: Is the
      person who proclaimed these laws the same perfect man that received them by
      prophetic inspiration, or a plagiarist, who has stolen these ideas from a true
      prophet? In order to be enabled to answer this question, we must examine the
      merits of the person, obtain an accurate account of his actions, and consider
      his character. The best test is the rejection, abstention, and contempt of bodily
      pleasures; for this is the first condition of men, and a fortiori of prophets;
      they must especially disregard pleasures of the sense of touch, which, according
      to Aristotle, is a disgrace to us; and, above all, restrain from the pollution
      of sensual intercourse. Thus God exposes thereby false prophets to public shame,
      in order that those who really seek the truth may find it, and not err or go
      astray; e.g., Zedekiah, son of Maasiah, and Ahab, son of Kolaiah, boasted that
      they had received a prophecy. They persuaded the people to follow them, by proclaiming
      utterances of other prophets; but all the time they continued to seek the low
      pleasures of sensual intercourse, committing even adultery with the wives of
      their companions and followers. God exposed their falsehood as He has exposed
      that of other false prophets. The king of Babylon burnt them, as Jeremiah distinctly
      states: “And of them shall be taken up a curse by all the captivity of Judah,
      which are in Babylon, saying, The Lord make thee like Zedekiah, and like Ahab,
      whom the king of Babylon roasted in the fire. Because they have committed villainy
      in Israel, and have committed adultery with their neighbours’ wives, and have
      spoken lying words in my name, which I have not commanded them” (Jer. xxix.
      22, 23). Note what is meant by these words.'
    pines: Placeholder text
    goodman: |-
      It has been shown as clearly as can be that man is by nature political, that our nature is to live in a society, unlike other animals that need not live together. Given our complex- ity, as the last species to be compounded, as you know, human diversity is so great that you will no more find two individuals alike in any character trait than two persons who look alike. The reason is diversity of makeup: When the matter of two individuals dif- fers, so do the accidents reflecting the form. For every natural form has certain accidents to it besides those dependent on the matter itself. No such diversity is found in any other species. Two persons, you will find, may be so different in every trait of character as to seem to be of different species, one so cruel that in a rage he might slaughter his smallest child, another so tenderhearted that he proves horrified if a bug or other insect is killed.

      The same is true with most traits.

      Since nature makes us so diverse, we humans naturally need a society, and a society can succeed only when human actions are governed— to correct them where deficient, rein them in where excessive, and ordain actions and foster strains of character for all as a common and consistent ethos, smoothing over our natural differences with a wealth of conventional consonances, to form a well- ordered community. For this reason, I say that although law is not natural, it does impinge on the natural.

      God, in His wisdom, enabling our species to survive (since He so willed), made it part of our nature that some of us are able to govern. Some, like a prophet or lawgiver, are inspired to rule. Others can implement or enforce what a prophet or lawgiver has laid down and instituted. These are rulers who adopt a system of law or who claim prophethood, adopting a revealed law in whole or in part; keeping some and discard- ing the rest, finding this easier; or covetously pretending the inspiration was their own and not derivative. For some people are in awe of achievement, so entranced and enam- ored of it that they want others to think it theirs, although knowing full well they have no such attainment. Many, as you know, lay claim to the poetry of others. Likewise with learned works and many a scientific discovery. A self- indulgent, self- serving person stumbles onto an idea discovered by someone else and claims it as his own. With proph- ecy, too, we find hordes of pretenders proffering words not inspired by God at all. Zede- kiah ben Chenaanah ( Kings : – ) is one example. Many, too, you will find, claim inspiration and say things that were inspired by God, but not to them. An example is ananiah ben Azzur (Jeremiah ). They pretend the inspiration was theirs and preen themselves on it. The difference is readily seen. I will lay it out for you so that you’ll have no trouble distinguishing a divinely revealed system of law from systems that are humanly devised and from those that are derivative of prophetic pronouncements but represented as original.

      With laws that are acknowledged to be products of a lawgiver’s own thinking, there is no need to make the case. The admission suffices. What I want to distinguish for you are laws professed to be prophetic. Some are inspired, some fabricated, and some plagiarized.

      If you find that the whole object of a body of law and the overall aim of its founder in regulating actions is civic order and social standards curbing injustice and wrongdoing but without regard to ideas or the improvement of minds, caring not a whit if people’s views are sick or sound but concerned only with managing relations in whatever way the ruler thinks promotes happiness as he sees it, you can tell that it is a human legal system. The lawgiver is of the third type I cited, adept only in imagination.

       But if you find a law whose norms all look not just to bodily welfare, like the former, but to wholesome beliefs, seeking to impart sound views, first about God and then about the angels— laws aspiring to make man aware, understanding, and wise enough to assay all reality soundly— you can see that its norms come from Him. This law is divine.

      You need only determine whether a claimant reached the requisite plane of perfection or borrowed the words he presents as his own. The test is his character: Trace his ac- tions and study his life. The best marker is renunciation of bodily pleasures. To eschew them and think little of them is the first step taken by seekers of understanding, let alone prophets. Most objectionable are the pleasures of the senses Aristotle deemed most shame- ful to us, especially the taint of sexual pleasure. God marked every claimant to prophecy in this way so as to make plain the truth to those who seek it, lest they err or be misled.

      You can see that in Zedekiah son of Maaseiah and Ahab son of Kolaiah. They claimed to be prophets, and they did have followers, but the inspiration they advanced was not their own. Both were sunk in vile sexual pleasures, even fornicating with their followers and supporters’ wives. So God made them a byword, just as He disgraced others, and the king of Babel burnt them, as Jeremiah relates: They shall be a curse in all the Babylonian exile: “Lord make you like Zedekiah and Ahab, roasted in fire by the King of Babylon.” For they wrought outrages in Israel— adultery with their neighbors’ wives— and spoke falsely in My name, words I did not command them. I witness and know, saith the Lord (Jeremiah : – ). You see the point.
