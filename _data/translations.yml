    friedlander: |-
      The precepts of the sixth class comprise the different ways of punishing the sinner. Their general usefulness is known and has also been mentioned by us. I will here describe them one by one and point out their nature in detail.

      The punishment of him who sins against his neighbour consists in the general rule that there shall be done unto him exactly as he has done: if he injured any one personally, he must suffer personally; if he damaged the property of his neighbour, he shall be punished by loss of property. But the person whose property has been damaged should be ready to resign his claim totally or partly. Only to the murderer we must not be lenient because of the greatness of his crime; and no ransom must be accepted of him. “And the land cannot be cleansed of the blood that is shed therein but by the blood of him that shed it” (Num. xxxi. 33). Hence even if the murdered person continued to live after the attack for an hour or for days, was able to speak and possessed complete consciousness, and if he himself said, “Pardon my murderer, I have pardoned and forgiven him,” he must not be obeyed. We must take life for life, and estimate equally the life of a child and that of a grown-up person, of a slave and of a freeman, of a wise man and of a fool. For there is no greater sin than this. And he who mutilated a limb of his neighbour, must himself lose a limb. “As he hath caused a blemish in a man, so shall it be done to him again” (Lev. xxiv. 20). You must not raise an objection from our practice of imposing a fine in such cases. For we have proposed to ourselves to give here the reason for the precepts mentioned in the Law, and not for that which is stated in the Talmud. I have, however, an explanation for the interpretation given in the Talmud, but it will be communicated vivâ voce. Injuries that cannot be reproduced exactly in another person, are compensated for by payment; “only he shall pay for the loss of his time, and shall cause him to be thoroughly healed” (Exod. xxi. 19). If any one damaged the property of another, he must lose exactly as much of his own property: “whom the judges shall condemn he shall pay double unto his neighbour” (Exod. xxii. 8); namely, he restores that which he has taken, and adds just as much [to it] of his own property. It is right that the more frequent transgressions and sins are, and the greater the probability of their being committed, the more severe must their punishment be, in order to deter people from committing them; but sins which are of rare occurrence require a less severe punishment. For this reason one who stole a sheep had to pay twice as much as for other goods, i.e., four times the value of the stolen object; but this is only the case when he has disposed of it by sale or slaughter (Exod. xxi. 37). As a rule, the sheep remained always in the fields, and could therefore not be watched so carefully as things kept in town. The thief of a sheep used therefore to sell it quickly before the theft became known, or to slaughter it and thereby change its appearance. As such theft happened frequently, the punishment was severe. The compensation for a stolen ox is still greater by one-fourth, because the theft is easily carried out. The sheep keep together when they feed, and can be watched by the shepherd, so that theft when it is committed can only take place by night. But oxen when feeding are very widely scattered, as is also mentioned in the Nabatean Agriculture, and a shepherd cannot watch them properly; theft of oxen is therefore a more frequent occurrence.

      The law concerning false witnesses (Deut. xix. 19) prescribes that they shall suffer exactly the same loss which they intended to inflict upon another. If they intended to bring a sentence of death against a person, they are killed; if they aimed at the punishment of stripes, they receive stripes; and if they desire to make a person pay money, they are sentenced to pay exactly the same sum. The object of all these laws is to make the punishment equal to the crime; and it is also on this account that the judgments are “righteous” (Deut. iv. 8). A robber with violence is not ordered to pay anything as fine (Lev. v. 24); the additional fifth part [of the value of the robbed goods] is only an atonement-offering for his perjury. The reason of this rule is to be found in the rare occurrence of robbery; theft is committed more frequently than robbery, for theft can be committed everywhere; robbery is not possible in towns, except with difficulty; besides, the thief takes things exposed as well as things hidden away; robbery applies only to things exposed; against robbery we can guard and defend ourselves; we cannot do so against theft; again, the robber is known, can be sought, and forced to return that which he has robbed, whilst the thief is not known. On account of all these circumstances the law fines the thief and not the robber.

      Preliminary Remark.—Whether the punishment is great or small, the pain inflicted intense or less intense, depends on the following four conditions.

      1. The greatness of the sin. Actions that cause great harm are punished severely, whilst actions that cause little harm are punished less severely.

      2. The frequency of the crime. A crime that is frequently committed must be put down by severe punishment; crimes of rare occurrence may be suppressed by a lenient punishment considering that they are rarely committed.

      3. The amount of temptation. Only fear of a severe punishment remains us from actions for which there exists a great temptation, either because we have a great desire for these actions, or are accustomed to them, or feel unhappy without them.

      4. The facility of doing the thing secretly, and unseen and unnoticed. From such acts we are deterred only by the fear of a great and terrible punishment.

      After this preliminary remark, I say that the precepts of the Law may be divided into the following four classes with respect to the punishment for their transgression:—(1) Precepts whose transgression is followed by sentence of death pronounced by a court of law. (2) Precepts whose transgression is punished with excision, such transgression being held to be a very great sin. (3) In some cases the transgression is punished by stripes administered with a strap (such transgression not being considered a grievous sin, as it concerns only a simple prohibition); or by “death by Heaven.” (4) Precepts the transgression of which is not punished [even] by stripes. Prohibitions of this kind are all those that involve no act. But there are the following exceptions: [First], Swearing falsely, because it is gross neglect of man’s duty, who ought to bear constantly in mind the greatness of God. [Secondly], Changing an animal devoted to the sanctuary for another (Lev. xxvii. 10), because this change leads to contemning sacrifices devoted to the name of God. [Thirdly], Cursing a person by the name of God (ibid. xix. 14); because many dread the effect of a curse more than bodily harm. The transgression of other negative commandments that involve no act causes little harm, and cannot always be avoided, as it consists in mere words; moreover, man’s back would be inflicted with stripes all the year round if he were to be punished with stripes for each transgression of this kind. Besides, previous warning is impossible in this case. There is also wisdom in the number of stripes; for although the number of their maximum is given, there is no fixed number how many are to be applied to each person; each man receives only as many stripes as he can bear, but not more than forty (Deut. xxv. 3), even if he be strong enough for a hundred.

      The “death by the court of law” is not inflicted for the transgression of any of the dietary laws; because in such a case no great harm is done, and the temptation of man to transgress these laws is not so great as the temptation to the enjoyment of sexual intercourse. In some of the dietary laws the punishment is excision. This is the case with the prohibition of eating blood (Lev. xvii. 26). For in ancient days people were very eager and anxious to eat blood as a kind of idolatrous ceremony, as is explained in the book Tomtom, and therefore the prohibition of eating blood is made very stringent. Excision is also the punishment for eating fat; because people enjoy it, and because it was distinguished and sanctified by its use in the offerings. The eating of leavened bread on Passover (Exod. xii. 15), and breaking the fast on the Day of Atonement (Lev. xxiii. 29), are likewise punished with excision: [first] on account of the great discomfort which the obedience to the law causes in these cases; [secondly] on account of the principles of faith which the laws of Passover and of the Day of Atonement inculcate: they confirm fundamental principles of the Law, viz., the belief in the wonderful departure [of Israel] from Egypt, and in the effect of repentance, according to the words, “For on this day will he forgive you” (Lev. xvi. 31). Just as in the case of eating fat, so is excision also announced as a punishment when a person eats that which is left [of a sacrifice beyond its limited time], or partakes of a sacrifice which has been made abominable; or when an unclean person eats of holy things (ibid. vii. 16–21). The object of this severity is to increase the estimation of the offering in the eyes of the people, as has been shown.

      Death by the court of law is decreed in important cases: when faith is undermined, or a great crime is committed, viz., idolatry, incest, murder, or actions that lead to these crimes. It is further decreed for breaking the Sabbath (Exod. xxxi. 15); because the keeping of Sabbath is a confirmation of our belief in the Creation; a false prophet and a rebellious elder are put to death on account of the mischief which they cause; he who strikes his father or his mother is killed on account of his great audacity, and because he undermines the constitution of the family, which is the foundation of the state. A rebellious and disobedient son is put to death (Deut. xxi. 18 seq.) on account of what he might become, because he will likely be a murderer; he who steals a human being is killed, because he is also prepared to kill him whom he steals (Exod. xxi. 16). Likewise he who is found breaking into a house is prepared for murder (ibid. xxii. 1), as our Sages stated. These three, the rebellious and disobedient son, he who steals and sells a human being, and he who breaks into a house, become murderers in the course of time, as is well known. Capital punishment is only decreed for these serious crimes, and in no other case. Not all forbidden sexual intercourse is visited with the penalty of death, but only in those cases in which the criminal act can easily be done, is of frequent occurrence, is base and disgraceful, and of a tempting character; otherwise excision is the punishment. Likewise not all kinds of idolatry are capital crimes, but only the principal acts of idolatry, such as praying to an idol, prophesying in its name, passing a child through the fire, consulting with familiar spirits, and acting as a wizard or witch.

      As punishments and judgments are evidently indispensable, it was necessary to appoint judges throughout the country in every town; witnesses must be heard; and a king is required whom all fear and respect, who is able to restrain the people by various means, and who can strengthen and support the authority of the judges. Although I have shown the reason of all the laws contained in “the Section of Judges” (Sefer Shofetim), I find it necessary, in accordance with the object of this treatise, to explain a few of these laws, e.g., the laws concerning a rebellious elder.

      God knew that the judgments of the Law will always require an extension in some cases and curtailment in others, according to the variety of places, events, and circumstances. He therefore cautioned against such increase and diminution, and commanded, “Thou shalt not add thereto nor diminish from it” (Deut. xiii. 1); for constant changes would tend to disturb the whole system of the Law, and would lead people to believe that the Law is not of Divine origin. But permission is at the same time given to the wise men, i.e., the great court (Synhedrion) of every generation to make fences round the judgments of the Law for their protection, and to introduce bye-laws (fences) in order to ensure the keeping of the Law. Such fences once erected remain in force for ever. The Mishnah therefore teaches: “And make a fence round the Law” (Abot i. 1). In the same manner they have the power temporarily to dispense with some religious act prescribed in the Law, or to allow that which is forbidden, if exceptional circumstances and events require it; but none of the laws can be abrogated permanently, as has been explained by us in the Introduction to the Commentary on the Mishnah in treating of temporary legislation. By this method the Law will remain perpetually the same, and will yet admit at all times and under all circumstances such temporary modifications as are indispensable. If every scholar had the power to make such modifications, the multitude of disputes and differences of opinion would have produced an injurious effect. Therefore it was commanded that of the Sages only the great Synhedrion, and none else, should have this power; and whoever would oppose their decision should be killed. For if any critic were allowed to dispute the decision of the Synhedrion, the object of this law would not be attained; it would be useless.

      Transgressions may be divided into four classes, viz.—(1) involuntary transgressions, (2) sins committed in ignorance, (3) sins done knowingly, and (4) sins done spitefully. He who sins involuntarily is, according to the distinct declaration of the Law, exempt from punishment, and free from all blame; comp. “Unto the damsel thou shalt do nothing; there is in the damsel no sin worthy of death” (Deut. xxii. 26). If a person sins in ignorance, he is blamable; for if he had been more considerate and careful, he would not have erred. Although he is not punished, his sin must be atoned for, and for this reason he brings a sin-offering. The Law distinguishes in this respect between a private person and a king, a high-priest or Teacher of Halakah. Hence we conclude that a person who acts wrongly, or who teaches wrongly, guided by his own reasoning—except in the case of the great Synhedrion or the high-priest—is treated as mezid (as one who sins knowingly), and does not belong to the category of shogegim (of those who sin by error). A rebellious elder is therefore put to death, although he acted and taught according to his view. But the great Synhedrion must teach according to its opinion, and if the opinion is wrong, the sin is considered as due to error. In reference to such a case the Law says, “And if the whole congregation of Israel err,” etc. (Lev. iv. 13). It is on this principle that our Sages say, “The error in learning amounts to intentional sin” (Abot iv. 13); he who has studied insufficiently, and teaches and acts according to his defective knowledge, is to be considered as if he sinned knowingly. For if a person eats of the fat of the kidneys in the belief that it is the fat of the rump, his error is not so grave as the error of him who, eating of the fat of the kidneys, knows that it is that fat, but is ignorant of the fact that it is prohibited. The latter brings a sin-offering although he is almost an intentional transgressor. But this is only the case as far as he acts according to his knowledge; but if he decides a religious question [wrongly], he is undoubtedly an intentional sinner. The Law admits the plea of error in a religious decision only in the case of the great Synhedrion.

      He who has sinned knowingly must pay the penalty prescribed in the Law; he is put to death or receives stripes, or—for transgression of prohibitions not punishable by stripes—other corporal punishment, or pays a fine. There are some sins for which the punishment is the same, whether they have been committed knowingly or unknowingly; because they are frequent, and are easily done, consisting only in the utterance of words, and involving no action besides; e.g., false swearing by witnesses, or by trustees. Intercourse with a betrothed handmaid is likewise easy and frequent; she is exposed unprotected, being in reality neither handmaid nor a free person, nor a married woman, according to the traditional interpretation of this precept.

      If a person sins presumptuously, so that in sinning he shows impudence and seeks publicity, if he does not sin only to satisfy his appetite, if he does what is prohibited by the Law, not only because of his evil inclinations, but in order to oppose and resist the Law, he “reproacheth the Lord” (Num. xv. 30), and must undoubtedly be put to death. None will act in such a manner but such as have conceived the idea to act contrary to the Law. According to the traditional interpretation, therefore, the above passage speaks of an idolater who opposes the fundamental principles of the Law; for no one worships a star unless he believes [—contrary to the teachings of Scripture—] that the star is eternal, as we have frequently stated in our work. I think that the same punishment [viz., sentence of death] applies to every sin which involves the rejection of the Law, or opposition to it. Even if an Israelite eats meat [boiled] in milk, or wears garments of wool and linen, or rounds the corners of his head, out of spite against the Law, in order to show clearly that he does not believe in its truth, I apply to him the words, “he reproacheth the Lord,” and [I am of opinion] that he must suffer death as an unbeliever, though not for a punishment, but in the same manner as the inhabitants of a “city misled to idolatry” are slain for their unbelief, and not by way of punishment for crime; wherefore their property is destroyed by fire, and is not given to their heirs, as is the case with the property of other criminals condemned to death. According to my opinion, all the members of an Israelitish community which has insolently and presumptuously transgressed any of the divine precepts, must be put to death. This is proved by the history of “the sons of Reuben and the sons of Gad” (Josh. xxii.), against whom the whole congregation of Israel decided to make war. When warning was given to the supposed offenders, it was explained to them that they had relinquished their faith, because by agreeing to transgress one particular law they rejected the truth of the whole Law. For they were addressed as follows: “What trespass is this that ye have committed against the God of Israel, to turn away this day from following the Lord?” (Josh. xxii. 16); and they replied: “The Lord knoweth, etc., if it be in rebellion, or if in transgression against the Lord,” etc. (ibid. 22). Take well notice of these principles in respect to punishments.

      The Section on Judges includes also the commandment to blot out the memory of Amalek (Deut. xxv. 17–19). In the same way as one individual person is punished, so must also a whole family or a whole nation be punished, in order that other families shall hear it and be afraid, and not accustom themselves to practise mischief. For they will say, we may suffer in the same way as those people have suffered; and if there be found among them a wicked, mischievous man, who cares neither for the evil he brings upon himself nor for that which he causes to others, he will not find in his family any one ready to help him in his evil designs. As Amalek was the first to attack Israel with the sword (Exod. xvii. 8–16), it was commanded to blot out his name by means of the sword; whilst Ammon and Moab, who have not been friendly simply from meanness, and have caused them injury by cunning, were only punished by exclusion from intermarriage with the Israelites, and from their friendship. All these things which God has commanded as a punishment are not excessive nor inadequate, but, as is distinctly stated, “according to the fault” (Deut. xxv. 2).

      This section contains also the law concerning preparing “a place without the camp,” and “having a paddle upon the weapon” (Deut. xxiii. 12, 13). As I have told you, it is one of the objects of the Law to train Israel to cleanliness; that they should keep free from dirt and filth, and that men should not be degraded to the condition of cattle. Another object of this law is to confirm by these preparations the belief of the warriors that God dwells in their midst. The reason of the law is therefore stated thus: “For the Lord thy God walketh in the midst of the camp” (ibid. ver. 14). The mention of this reason gave occasion to add another lesson: “That he see no unclean thing in thee and turn away from thee” (ibid.). These words warn and caution us against the usual inclination of soldiers to fornication, when they are away from their homes a long time. God therefore commanded us to do certain things which remind us that He is in our midst; we will thereby be saved from those evil practices; as it is said, “and thy camp shall be holy, that he see no unclean thing in thee” (ibid.). Even those who are unclean by pollution were compelled to stop outside the camp till the evening, and “then he shall come into the camp again.” It will thus be confirmed in the heart of every one of the Israelites that their camp must be like a sanctuary of the Lord, and it must not be like the camps of the heathen, whose sole object is corruption and sin; who only seek to cause injury to others and to take their property; whilst our object is to lead mankind to the service of God, and to a good social order. I have told you already that I only propose to give here such reasons as are apparent from the text of the Law.

      To the same class belongs also the law concerning “the marriage of a captive woman” (Deut. xxi. 10 seq.). There is a well-known saying of our Sages: “This law is only a concession to human weakness.” This law contains, nevertheless, even for the nobler class of people, some moral lessons to which I will call your attention. For although the soldier may be overcome by his desire which he is unable to suppress or to restrain, he must take the object of his lust to a private place, “into the inner of his house” (Deut. xxi. 12), and he is not permitted to force her in the camp. Similarly our Sages say, that he may not cohabit with her a second time before she leaves off her mourning, and is at ease about her troubles. She must not be prevented from mourning and crying, and she must be permitted to abstain from bathing, in accordance with the words, “and she shall weep for her father and for her mother” (ibid.); for mourners find comfort in crying and in excitement till the body has not sufficient strength to bear the inner emotions; in the same manner as happy persons find rest in various kinds of play. Thus the Lord is merciful to her and gives her permission to continue her mourning and weeping till she is worn out. You know certainly that he married her as a heathen, and that during the thirty days she openly keeps her religion and even continues her idolatrous practices; no interference with her faith was allowed during that time; and after all that she could not be sold, nor treated as a handmaid, if she could not be induced to accept the statutes of the Law. Thus the Law does not ignore the cohabitation of the Israelite with the captive woman, although it involved disobedience to God to some extent, having taken place when she was still a heathen. The Law prescribes: “Thou shalt not make merchandise of her, because thou hast humbled her” (ibid. 14). We have thus shown the moral lessons contained in these laws, and we have explained the reason of every precept of this section.
    pines: Placeholder text
    goodman: |-
      The penal laws make up the sixth group. Their general benefit is well known, and I have mentioned it already (III ). Hear some specifics now and the grounds for any that seem odd.

      The general penalty for harming another is to suffer like harm: If the injury is bodily, the assailant should suffer bodily; if material, materially. A property owner can be gener- ous and waive restitution. But a killer, specifically, given the enormity of the crime, is not to be exonerated. There is no question of redress: The land is purged of the blood shed in it only by the blood of him who shed it (Numbers : ). So, even should the victim linger for an hour or for days and prove able to speak and have his wits about him and say that his killer should be let go— ‘I pardon and forgive him’— his pardon is not acceptable. It must be life for life— young or old, free or slave, learned or ignorant alike. For no human crime is weightier.

      One who causes loss of a limb must lose the like member: As he hath maimed another, so shall it be done to him (Leviticus : ). Do not be concerned that we assess damages here.

      My present aim is just the warrants of the biblical laws, not our jurisprudence— although I do have a view about the halakhic point that may be conveyed orally. Damages were as- sessed for injuries in cases where like harms could not be inflicted: He must pay him for his lost time and see to his treatment (Exodus : ).

       One who harms another materially must suffer a proportionate loss: He whom the judges find guilty must repay the other twice over (Exodus : ). The thief must return what he took, plus the equivalent of his own.

      The more frequent and feasible the crime, the stiffer the penalty needed to deter it; the rarer, the lighter the penalty. So the penalty for stealing sheep is fourfold— double that for stealing other moveables (Exodus : ), assuming the sheep are no longer in the thief’s possession, either slaughtered or sold. For sheep are typically stolen from a field where they cannot be guarded as goods would be in town. So thieves make it a point to sell them quickly, lest they be found in possession, or slaughter them, so they cannot be found.

      Hence the penalties are greater in more common cases such as this. The penalty for steal- ing an ox is greater by one (five oxen are due the victim, loc. cit.), oxen being more readily stolen. For sheep graze in a flock where the shepherd can watch them, and they are usu- ally stolen at night. But oxen graze well separated, as the Nabatean Agriculture notes. The herdsman cannot see them all, so they are stolen more frequently.

      False witnesses, too, must suffer the harm they intended for their victim (Deuteron- omy : ). If their object was his death, they must die; if they meant him to be flogged, they are flogged; if they hoped he would be fined, they face a like fine. The punishment must fit the crime. That is what is meant by just laws ( : ).

      A robber repays no more than a thief. The extra fifth paid by the robber is just for his false oath (Leviticus : ). For robbery is rare. Theft takes a heavier toll, since it is possible anywhere, whereas robbery is difficult in the city. Besides, things can be stolen whether in the open or hidden and safeguarded, but only things visible or vulnerable are subject to robbery. And one can take precautions against robbers, but the same safe- guards are not possible with theft. Further, a robber is identifiable and can be sought and made to return what he took, but a thief is unknown. For all these reasons the thief, not the robber, pays double (Exodus : ).

      Hypothesis: Penalties are heavy or light based on four factors: ( ) The gravity of the crime: Greatly harmful acts bear severe punishments; those that cause slight or mini- mal harm bear lesser penalties. ( ) Incidence: A common offense needs stiff punishment as a deterrent. A lesser punishment suffices to check a rare offense. ( ) Temptation: A person moved by great passion, force of habit, or lack of self- control is restrained only by a significant deterrent. ( ) Ease of commission by stealth or in secret, leaving others unaware: Covert crimes are deterred only by sanctions of some severity.

      Based on this premise, you can see how the Torah orders penalties at four levels: (a) those demanding death by a court sentence; (b) cardinal offenses requiring excision (stripes, in practice ); (c) those calling for stripes (or even death at the hands of Heaven), although deemed not cardinal sins but only breaches; (d) those that do not call even for flogging, including all that involve no action— except (i) vain oaths, given the reverence that is God’s due; (ii) substitution (of another beast for one reserved for sacrifice) to avoid trifling with the offerings consecrated to Him; and (iii) cursing someone in God’s name, for a curse is popularly believed to be worse than bodily injury. All other prohibitions involving no action cause little harm and, being verbal, are scarcely avoidable. Were they subject to stripes, backs would be flogged constantly and due warning would be impracti- cal. The count of stripes, too, makes sense: There is no fixed number. No one is stricken more than he can bear. But there is an upper limit: The maximum is forty strokes, even if one could bear a hundred.

      There is no death sentence, you’ll observe, for eating forbidden foods. For this causes no great harm, and folk are not strongly drawn to it as they are to sexual pleasure. Ex- cision is mandated for consuming certain things— blood, for one (Leviticus : – ), which people were eager to consume in those days, given certain pagan practices, as the book of um um shows. That is why the point is so stressed. Consuming forbidden fat also calls for excision, since people relish it, and it was reserved as a choice portion of the beasts sacrificed ( : – ). Eating leaven on Pesa also warrants excision (Exodus : ), as does eating on the Day of Atonement (Leviticus : ). For these restrictions are de- manding, and the beliefs they instill are critical, since these practices cement ideas central to our religion: our miraculous Exodus from Egypt and our belief in repentance— on that day ye shall be cleared ( : ). Excision, similarly, is deserved for eating the remnant of a sacrifice or of a sacrifice profaned, or of consecrated meat while ritually unclean ( : – , : )— and, again, for eating forbidden fats reserved for the sacrifices, as I will explain.

       A court ordered death sentence is mandated, you’ll find, only for the gravest sins— perverting the faith or heinous offenses like idolatry, sexual crimes, shedding blood, or any act contributing to these; likewise for desecrating the Sabbath, since Sab- baths foster belief in the world’s creation. The death penalty is mandated, too, for false claims to prophecy and for the fractious elder (Deuteronomy : , : ; M. Sanhedrin – ), given the great harm that these cause. Likewise for striking or cursing one’s father or mother (Exodus : , ; Leviticus : ), since this is such an outrage and disrupts the life of the family, the prime unit of civil society. The incorrigible son (Deuteronomy : – ) likewise must be executed, given the bad end he will come to. For in the end, he will kill, inevitably. A kidnapper, too, is executed for subjecting his victim to the risk of death. Likewise the burglar caught breaking and entering (Exodus : ). For he is pre- pared to kill, as our Sages explained (M. Sanhedrin . ). All three— the incorrigible son, the kidnapper, and the burglar who breaks in— will ultimately shed blood.

      You will find no capital crime in the Torah beyond these enormities. Not all sexual offenses bear a death sentence by a human court— only the most egregious, the most tempting, or the most readily committed. The rest earn only excision. Nor are all forms of pagan worship punishable by death, only the more radical offenses, such as promoting idolatry, pretending to prophesy for it, passing one’s children through the fire, and per- forming necromancy, sorcery, and witchcraft (B. Sanhedrin 60b).

      Since penalties must be levied, it is clearly necessary that judges be appointed in every city (Deuteronomy : ); evidence must be heard, and there must be a ruler who in- spires fear and awe so as to render deterrents effective and support the authority of judges, which sustains his authority in turn.

      Having spelled out the basis of all the laws I cataloged in the Book of Judges, I should now consider certain of them in the light of the aims of the present work. Among these are the laws regarding the fractious elder. Knowing that some rules of His Law might need supplementation or suspension as times, places, or circumstances change, God for- bade adding or deleting any laws: Thou shalt not add to or diminish it (Deuteronomy : ). For that would undermine the law and give color to the belief that it did not come from God. But God did allow the learned in every age— the High Court— to protect and preserve the Torah’s precepts by introducing regulations to patch any gaps and to make such provisions permanent. As the Sages put it, “Make a hedge about the Torah”

       (M. Avot . ). They were allowed, too, in certain circumstances and in emergencies, to suspend particular biblical mandates and to permit certain biblically forbidden acts.

      Such exceptions are not permanent, as I explained in the introduction to my Commen- tary on the Mishnah, regarding Exigent Measures. Regulated in this way, the Torah remains one and ever in effect, come what may. But had such circumstantial rulings been open to every scholar, our people would have perished in a welter of conflicting views and divergent sects. So God forbade the learned to make such changes, save only the High Court, and He ordered the execution of those who spurned their rulings. For if just any thinker could reject that court’s ruling, the goal intended would have been undermined and its benefit lost.

      Breaches of the Law are of four types: forced, inadvertent, deliberate, and high- handed (Numbers : – ). The coerced are not punished, the text specifies: They incur no guilt. As God says, To the girl shalt thou do nothing; she committed no mortal sin (Deu- teronomy : ).

      The inadvertent sinner does incur guilt. Had he used an abundance of caution and care, he would not have slipped. He is not punished, but he must atone. Hence the sin of- fering. The Torah distinguishes a private party here from a king, High Priest, or jurist.

      Anyone acting on his own or offering legal opinions on his own recognizance rather than those of a High Priest or a member of the High Court is deemed to act deliberately, not inadvertently. So a fractious elder is executed if he acted and made rulings based on his own determination of the law. The High Court may make original rulings; its error is deemed inadvertent. As God says, Should the whole assembly of Israel err [. . . and incur guilt but then see that they have sinned, the congregation shall offer a bullock] (Leviticus : – ). So the Sages say, “An error in teaching amounts to a deliberate transgression”

      (M. Avot . ) — meaning that one who lacks learning and makes a ruling reflecting that lack and acts on it is no better than a deliberate offender. It is not the same to eat kidney fat thinking it is from the rump as it is to eat it without knowing that kidney fat is forbidden. In the latter case, one who eats it must offer a sacrifice, since the act borders on a deliberate sin. But a decisor, if ignorant, does act deliberately. Scripture forgives a decisor’s error only in the case of the High Court.

      A deliberate sinner must suffer the statutory penalty— death by court order, stripes, or flogging for violations not subject to stripes, or a fine. Deliberate offenses are deemed inadvertent when commonplace or readily committed, since they involve words rather than actions, like witnesses’ oaths (protesting ignorance, Leviticus : ; M. Shevuʿot – ; B. Shevuʿot 29b, 31b– 32a) or oaths of deposit (Exodus : ; Leviticus : – ; M.

      Shevuʿot . – , ; MT Laws of Oaths . ). Likewise relations with a betrothed bond- woman: The sin is less grave given its frequency and her being unprotected, neither wholly free nor wholly committed, since she is not yet married, as our Sages relate in glossing the commandment (Leviticus : – ; M. Keritot . ; B. Keritot 9a; MT Laws regarding Illicit Unions . – ).

      A high- handed sinner is one whose sins are deliberate, bald faced, shameless, and notorious. He sins not just to sate his urges, nor because his vices prompt him to take what the Torah denies him, but to flout and fight the Law. That is why it says of him, [The soul that sinneth with a high hand . . .] blasphemeth against the Lord (Numbers : ). He is executed, of course. Such things would not be done unless the miscreant had embraced ideas antithetical to the Torah. So our traditional commentaries say, “Scrip- ture here regards paganism” (Sifre ad loc.; B. Keritot 7a). For star worship breaches the Torah’s fundament: No one would worship a star who did not believe it eternal, as I’ve ex- plained several times in my writings. But the same verdict, I think, applies to any sin op- posed to our Law and at war with it. If an Israelite so much as consumes meat with milk, wears shaʿa nez, or rounds the corners of his beard, aiming to disparage or disrespect the Law, he flaunts his disbelief that the Torah is God given. To me, that amounts to blas- phemy. He should be slain not for the specific sin but as a recusant— just as the folk of an errant city are slain for their misbelief, not their specific sins (Deuteronomy : – ; MT Laws regarding Pagan Worship . ). Their property, therefore, is burnt and does not pass to their heirs, as it would for others sentenced to death by a human court. The same applies, in my view, to an Israelite community that conspires to violate any mitzvah highhandedly: All must be slain. You can see that from the case of the Reubenites and Gadites, of whom it is said that the whole congregation was resolved to make war against them (Joshua : ). They were warned clearly against a faithless conspiracy to transgress and turn renegade, in effect, against our religion altogether: [What is this treason that you commit against the God of Israel,] turning this day from the Lord! ( : ). They answered, [Lord, God Almighty! Lord, God Almighty! He knows, and Israel too must know!] If this be treason or rebellion [against the Lord, spare us not this day!] ( : ). The story shows the basis of the penalty.

      In the same vein, the commandments included in my Book of Judges mandate de- stroying the seed of Amalek (Deuteronomy : – ; SM Positive ; MT Laws of Kings and Wars . – , . ): A tribe or nation must be punished, as an individual is, to deter others from joining in such crimes. They will say, ‘Lest we be done by as were the folk of So- and- So!’ So even if there is a group in which some depraved fiend arises who thinks nothing of the harm he does, or of his own ruination, he will find no ally in his tribe to abet him in the evil he intends. So Amalek, who attacked by the sword, is put to the sword (Exodus : – ). Ammon and Moab, who wreaked their harm with plots and schemes, were punished by a marital ban and shunned as vile (Deuteronomy : – ; SM Negative ; MT Laws regarding Illicit Unions . – ). All this reflects God’s making penalties neither too severe nor too lenient but, as He says, according to the wrong ( : ).

      The Book of Judges in Mishneh Torah also includes the mandate for a latrine and a trowel (Deuteronomy : – ). For cleanliness and the clearing away of bodily wastes are among the aims of our law, as I have taught you (III )— lest people live like animals.

      The same mitzvah strengthens the troops’ trust that God’s Presence is with them. That is plain when the grounds are stated for the commandment: For the Lord thy God moves all through thy camp ( : ).

      The commandment relates to another point as well, when it says that He see nothing foul in thee and spurn thee (Deuteronomy : ), warning against the vice well known among soldiers long camped far from home. He commanded us to act in constant aware- ness that His Shekhinah is present in our midst in order to keep us from such conduct, as it says, so that thy camp be holy, and that He see nothing foul in thee. Even one who has a seminal emission must leave the camp until sunset, returning only then ( : – ). So every soldier will see the camp as God’s sanctuary, not like a gentile camp devoted just to violence, rapine, pillage, and destruction. Our aim, by contrast, is to aid folk toward God’s service and a better life. As I told you, I am warranting the commandments just as biblically stated.

      This book (Judges in MT) also includes the Laws of the Fair Captive. The Sages say, as you know, “The Torah here addresses only our baser impulses” (B. Kiddushin 21b).

      But even here, the commandment seeks a nobler ethos for the virtuous to cultivate. To explain: One’s urges may drive one to feel he cannot wait, but he must take her apart privately, as it says: Bring her into thy home (Judges : ). He may not press her while warfare still rages, as the Sages explain (22a), nor again until her grief is assuaged and her calm restored. She must not be kept from mourning, weeping, and remaining disheveled, as Scripture prescribes: weeping for her father and mother ( : ). For the grief stricken find solace in tears and in venting their sorrow until the bodily powers are spent that bear the soul’s afflictions— just as joy finds release in play of all sorts. So the Torah treats the Fair Captive with compassion, letting her grieve until she wearies of weeping and mourning. Her captor slept with her, you see, while she was yet a gentile. She may openly keep her own religion all through the thirty days, even if it be idolatrous. She may not be taxed about her faith all that while, and if he does not convert her to the Torah’s laws, she may not be sold or treated as a slave. The Law holds her sacrosanct because he slept with her, albeit wrongly, while she was yet a gentile. As it says, Thou mayest not sell her since thou hast humbled her ( : ). So some virtue shines through in this commandment.

      The grounds of all the commandments in the Book of Judges should now be clear.
