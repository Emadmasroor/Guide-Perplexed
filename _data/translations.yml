  ch66:
    friedlander: “And the tables were the work of God” (Exod. xxxii. 16), that is
      to say, they were the product of nature, not of art; for all natural things
      are called “the work of the Lord,” e.g., “These see the works of the Lord” (Ps.
      cvii. 24); and the description of the several things in nature, as plants, animals,
      winds, rain, etc., is followed by the exclamation, “O Lord, how manifold are
      thy works!” (Ps. civ. 24). Still more striking is the relation between God and
      His creatures, as expressed in the phrase, “The cedars of Lebanon, which he
      hath planted” (ib. 16); the cedars being the product of nature, and not of art,
      are described as having been planted by the Lord. Similarly we explain, “And
      the writing was the writing of God” (Exod. xxxii. 16); the relation in which
      the writing stood to God has already been defined in the words “written with
      the finger of God” (ib. xxxi. 18), and the meaning of this phrase is the same
      as that of “the work of thy fingers” (Ps. viii. 4), this being said of the heavens;
      of the latter it has been stated distinctly that they were made by a word; comp.
      “By the word of the Lord were the heavens made” (ib. xxxiii. 6). Hence you learn
      that in the Bible, the creation of a thing is figuratively expressed by terms
      denoting “word” and “speech.” The same thing which according to one passage
      has been made by the word, is represented in another passage as made by the
      “finger of God.” The phrase “written by the finger of God” is therefore identical
      with “written by the word of God”; and if the latter phrase had been used, it
      would have been equal to “written by the will and desire of God.” Onkelos adopted
      in this place a strange explanation, and rendered the words literally “written
      by the finger of the Lord”; he thought that “the finger” was a certain thing
      ascribed to God; so that “the finger of the Lord” is to be interpreted in the
      same way as “the mountain of God” (Exod. iii. 1), “the rod of God” (ib. iv.
      20), that is, as being an instrument created by Him, which by His will engraved
      the writing on the tables. I cannot see why Onkelos preferred this explanation.
      It would have been more reasonable to say “written by the word of the Lord,”
      in imitation of the verse “By the word of the Lord the heavens were made.” Or
      was the creation of the writing on the tables more difficult than the creation
      of the stars in the spheres? As the latter were made by the direct will of God,
      not by means of an instrument, the writing may also have been produced by His
      direct will, not by means of an instrument. You know what the Mishnah says,
      “Ten things were created on Friday in the twilight of the evening,” and “the
      writing” is one of the ten things. This shows how generally it was assumed by
      our forefathers that the writing of the tables was produced in the same manner
      as the rest of the creation, as we have shown in our Commentary on the Mishnah
      (Aboth, v. 6).
    pines: Placeholder text
    goodman: |-
      The tablets were God’s work (Exodus : ) means that they were natural, not artifi- cial. For everything natural is called the Lord’s work: They saw the works of the Lord (Psalms : ). Having cited all things natural— plants and animals, winds and rains, and the like— it says, How manifold are Thy works, O Lord! ( : ). And more poeti- cally, The cedars of Lebanon that He planted (v. ). Since they are natural, not artificial, God is said to have planted them.

      It says the writing of God (Exodus : ), having already intimated that writing can be ascribed to Him, by saying writ by the finger of God ( : ). It says by the finger of God just as it calls the heavens the work of Thy fingers (Psalms : ), having said explicitly that they were made at His command: At the word of the Lord were the heavens made ( : ). So you can see that Scripture metaphorically calls creating ‘speaking’ or ‘saying.’ For the same thing that is called the work of His fingers is said to have been made at His word. Thus, writ by the finger of God means the same as ‘at God’s word,’ which resolves to ‘written at His will and pleasure.’ Onkelos introduces a strange gloss here. He gives “writ with a finger of the Lord’s,”

      as if this finger were something apart from God, treating finger of the Lord like mount of the Lord (Genesis : ) or rod of the Lord (cf. Exodus : , : ), making it a created instrument that etched the tablets at God’s will. I do not know what led him to do this. It would have made more sense to say “written at the Lord’s word,” as in At the word of the Lord were the heavens made (Psalms : ). Do you find it stranger that writing appeared on the tablets than that stars appeared in the heavens? Just as the stars were made at His will and by no tool, the writing was engraved at His will and with no tool. You know the mishnaic text about the ten things created in the twilight (M. Avot . ). They included the script and the writing, reflecting the popular consensus that the writing on the tablets was created by God— as was everything else, as I explained in my Commentary on the Mishnah.
