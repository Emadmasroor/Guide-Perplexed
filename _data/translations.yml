  ch18:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      Karov, negoʿa, negosh— nearing, touching, drawing nigh. The three terms may denote spatial approach or contact. But they are also used cognitively, by analogy with the physi- cal. ‘Nearing’ has its basic spatial sense in when he neared the camp (Genesis : ) and as Pharaoh drew nigh (Exodus : ). Touching has the basic sense of physical contact in She touched his legs ( : ) and He touched it to my mouth (Isaiah : ). It has the basic sense of approaching or coming closer to someone in Judah drew near him (Genesis : ).

      The derived sense of these three terms involves cognitive or intellectual rather than spatial nearing or contact. Thus Scripture says, Her doom reacheth the heavens (Jeremiah : ). The idea of nearing is used in this way in Any case that is too hard for ye, bring it to me (Deuteronomy : )— inform me of it. So it can have the sense of conveying informa- tion. Drawing nigh is used cognitively in Abraham drew nigh and said . . . (Genesis : ).

      He was in an inspired ecstasy, a prophetic trance, as I’ll explain (I ; II ). Again, since this people hath drawn nigh to Me and honored me with lip and mouth . . . (Isaiah : ).

      Any reference in Scripture to one of God’s creatures nearing or approaching Him has this latter sense, since God is not a body, as will be demonstrated in this work (II ). He does not near or approach anything, and nothing can approach or near Him. Transcend- ing physicality implies transcending space. It voids notions of proximity, approach, and distance, contiguity, separation, adjacency, and contact.

      I do not see you falling into a quandary or confusion over the words The Lord is near to all who call upon Him (Psalms : ), They long for nearness to God (Isaiah : ), or To me the good is to be close to God (Psalms : ). In all these passages, the nearing is intel- lectual; it regards knowing, not location. Likewise when it says so near (Deuteronomy : ), draw nigh and hear ( : ), and Moses alone shall approach the Lord, but they shall not (Exodus : ). You may, if you like, take this to regard Moses’ nearing the place on the mountain invested with the light of God’s glory. But remember, there is no difference between being at the center of the earth or in the ninth sphere (were that possible): One would be no farther from God here and no closer there. One nears God by knowing Him.

      Distance is ignorance of Him. There are many degrees of nearness or distance in this way.

      I will explain how these planes of awareness differ in another chapter of this work (I ).

      When it says, Touch the mountains and make them smoke (Psalms : ), it means “Lay Your command upon them,” as it were, just as the Sa an says to God, Touch his person (Job : )— harm him directly. ‘Contact’ and every inflected form of that word should be dealt with in this way wherever they appear: The sense can be physical, but the contact may also be intellectual— connecting with an idea, as if one had neared and taken hold of something once remote. Do understand this.
