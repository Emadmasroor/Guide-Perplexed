    goodman: |-
      You may see already why the Torah is so strict as to make the Sabbath a matter of stoning, why the doyen of all Prophets slew a man over it (Numbers : – ), and why it comes third after God’s existence and rejection of any other deity— for the ban against idolatry just underscores monotheism. You can see from what I have said already that beliefs do not last without actions to make them permanent, prominent, and public. That is why the Torah commands us to honor this day: to institute the idea of the world’s creation and make it known throughout the world. When everyone rests on a given day and it is asked why, the answer will be in six days did the Lord make . . . (Exodus : ).

       The Torah, in fact, gives two different reasons. For the impact is twofold: In the first statement of the Decalogue, the reason given for celebrating the Sabbath is in six days did the Lord make . . . But in Deuteronomy, it says, Remember thou wast a slave in Egypt. . . . Therefore did the Lord thy God command thee to keep the Sabbath day ( : ).

      That is true. The object in the first formulation is to elevate and celebrate this day, as it says, Therefore did the Lord bless the Sabbath day and make it holy (Exodus : ), reflect- ing the first reason, in six days . . . The command is for Israel; and, for us in particular, it regards remembrance of our liberation from bondage in Egypt. We did not serve freely or when we liked. We had no relief. So rest and respite were instituted for us. We combine the two obligations: belief in the truth as to the world’s origin (clear evidence of God’s reality, on the least thought and reflection), alongside commemorating God’s grace in giving us respite from the burdens of Egypt ( : ). The Sabbath is a double gift, in effect, imparting a sound intellectual conviction along with a bodily good.
