  ch38:
    friedlander: The precepts of the third class are identical with those which we
      have enumerated in Hilkot deʻot. Their use is evident; they are rules concerning
      moral conduct by which the social relations of men are regulated. This is sufficiently
      clear, and I need not dwell long on it. Know that some precepts prescribe certain
      acts which are considered as arbitrary decrees without any purpose, but are
      nevertheless the means of acquiring some moral principle. We shall explain every
      one of them in its proper place. But of all those precepts which are mentioned
      in Hilkot deʻot, it is distinctly stated that their object is to inculcate good
      moral principles.
    pines: Placeholder text
    goodman: Commandments of the third type are those that I listed in Ethical Laws.
      The value of them all is clear and evident. For all these traits improve people’s
      lives together. This is too obvious to dwell on. Some mitzvot are meant to improve
      our character even when the actions prescribed seem mere scriptural decrees
      with no end in view. I’ll explain these individually in the proper places. But
      those that I listed in Ethical Laws all expressly pursue the gaining of moral
      virtues.
