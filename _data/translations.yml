  ch44:
    friedlander: The Hebrew ʻayin is a homonym, signifying “fountain”; e.g., “By a
      fountain (ʻen) of water” (Gen. xvi. 7). It next denotes “eye”; comp. (ʻayin)
      “Eye for eye” (Exod. xxi. 24). Another meaning of the word is “providence,”
      as it is said concerning Jeremiah, “Take him and direct thine attention (eneka)
      to him” (Jer. xxxix. 12). In this figurative sense it is to be understood when
      used in reference to God; e.g., “And my providence and my pleasure shall be
      there perpetually” (1 Kings ix. 3), as we have already explained (page 140);
      “The eyes (ʻene), i.e., the Providence of the Lord thy God, are always upon
      it” (Deut. xi. 12); “They are the eyes (ʻene) of the Lord, which run to and
      fro through the whole earth” (Zech. iv. 10), i.e., His providence is extended
      over everything that is on earth, as will be explained in the chapters in which
      we shall treat of Providence. When, however, the word “eye” is connected with
      the verb “to see,” (raah or ḥazah) as in “Open thine eyes, and see” (1 Kings
      xix. 16); “His eyes behold” (Ps. xi. 4), the phrase denotes perception of the
      mind, not that of the senses; for every sensation is a passive state, as is
      well known to you, and God is active, never passive, as will be explained by
      me.
    pines: Placeholder text
    goodman: 'ʿAyin has several meanings. It can mean a water source: a spring in
      the desert (Genesis : ). It is also the word for the eye: an eye for an eye
      (Exodus : ). It can also mean care: Take him and keep your eyes on him (Jeremiah
      : ), said of Jeremiah— meaning ‘look after him.’ Whenever applied to God, it
      has this figurative sense: Mine eyes and My heart shall ever be there ( Kings
      : )— God’s care and concern, as I explained (I ). Like- wise, The eyes of the
      Lord thy God are ever upon it (Deuteronomy : )— His care. The eyes of the Lord
      ranging o’er the earth (Zechariah : ) — God’s providence embracing everything
      on earth, as will be noted in later chapters on providence (III ad fin., – ,
      ). But when sight or vision is predicated of God’s eyes, as in Open Thine eyes
      and see ( Kings : ) or His eyes shall behold (Psalms : ), it is always intellectual
      awareness that is meant, not sense perception. For sensations, as you know,
      are passive, and God is active, never passive, as I will explain (I ).'
