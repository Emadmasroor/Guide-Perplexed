    goodman: |-
      To know ourselves and not misjudge our worth, part of what we should consider is what we know of the measure of the spheres and stars and their distances from us. We gauge such distances in earth radii. Knowing the earth’s circumference, we know its radius and know all these distances in those terms. The distance from the earth’s center to the outer edge of the sphere of Saturn is proven to be some , years’ journey, where a year is days and a day’s journey is halakhic miles, the mile being , builder’s cubits. Consider this vast and amazing distance. As it says, Is not God high above the heavens? And see how high are the highest stars! (Job : ). In effect, does the height of the heavens not show how far we are from a grasp of divinity? If we are so very far from that body, its distance so remote that its substance and most of its effects are unknown to us, how can we apprehend its Maker, who is not a body at all!

      But this vast, demonstrated distance is the least of it. The distance from the earth’s center to the inner surface of the sphere of the fixed stars cannot be less but might be many times more. For only the minimum thickness of the spheres is established, as ex- plained in the essays on distances. Nor, as Thābit Ibn Qurrah states, do we know the exact thickness of the bodies that reason dictates must exist between the spheres. For they contain no stars to reveal it. The sphere of the fixed stars is at least four years’ jour- ney thick, as is known from the size of certain of its stars, which are ninety- some times the size of the earth’s globe. That sphere might, in fact, be thicker. And the ninth, the sphere that causes the diurnal rotation, its size is quite unknown, since it has no stars to give us means to measure it. Just think of all these corporeal beings— how vast and nu- merous! If the whole earth is not the merest fraction of the sphere of the fixed stars, what is mankind beside all these creations? How could anyone imagine that they exist for his use and that they were instruments for him to use! But that is only a matter of compar- ing the size of the bodies— what, then, of minds!

      The Philosophers’ view is sometimes criticized here. The objection: ‘If we claimed the spheres exist to govern one person, say, or just a few, a Philosopher would consider that absurd. But we say they exist to govern the whole human race.’ There’s nothing untow- ard, the objector would have it, in those sublime bodies serving to sustain an entire species— or many, whose members the Philosopher presumes will be without limit. If, say, an artisan used a hundred pounds of iron tools to make a tiny needle that weighs just one grain, and he made only one, that would be bad business from one point of view, although not unqualifiedly. But if he used that heavy equipment to make needle after needle and made hundreds of pounds of them, that would make perfect sense from any standpoint. Just so, the spheres might exist to perpetuate generation and corruption, presumably so that mankind might exist. And we do have texts and traditions to support that picture.

      The Philosopher disarms the quibble by saying, ‘Were it just a matter of size that sets apart the celestial bodies from the members of natural species that arise and decay, this could be said. But the difference here is with beings of a higher order: It would be gro- tesque for a nobler being to serve as a mere instrument to sustain the existence of a lower and lesser being.’ Even so, in broad terms, the objection supports our conviction as to the world’s creation, which was my main point in this chapter.

      I always hear from people who have a smattering of astronomy that our Sages exagger- ate the scale of the cosmos. The Sages make the thickness of each sphere years’ jour- ney; the distance between the spheres, more. They hold that there are seven spheres, so the seventh, at its outer rim, is , years’ journey from the earth’s center. Everyone who hears this imagines it vastly overblown and assumes that the cosmos cannot be that large. But the distance from the center of the earth to the lowest point on the sphere of Saturn, which is the seventh, is demonstrated to be some , years’ journey. The distance I mentioned of , years’ journey reaches the concave surface of the eighth sphere.

      When you find the Sages saying that the distance between spheres is such and such, it means the thickness of the bodies separating them, not that a void exists. Don’t ask me to show that everything the Sages say about astronomy fits the facts. Mathematics was undeveloped in their time, and they were not transmitting prophetic teachings here but speaking as scholars of these disciplines in their day, or because they had heard these things from scholars who were their contemporaries. Still, I would not therefore dis- count as unsound or a product of mere chance whatever they say that fits the facts as we know them. Whenever we can interpret someone’s words as consistent with established facts, that is the best course for one who is fair and open minded.
