    goodman: |-
      Having spoken of the essence of prophecy, informed you of its true nature, and explained how our Teacher Moses’ prophecy differs from any other, I will say now that it was only his unique experience that gave him his mission as a lawgiver. No one known to us from Adam’s time to his did anything like Moses’ giving us the Torah. Nor did any of our later Prophets have such a mission, and it is a core tenet of our religion that no one ever will (Deuteronomy : ). Our view is that there has been and will be but one re- vealed law, the Torah of our Teacher Moses. Our Scriptures and traditions show clearly that no prophet before him— not the Patriarchs, Shem and Ever, Noah, Methuselah, or Enoch— ever told a body of people, ‘God sent me to you and bade me tell you such and such, commanded that you do this and forbade you to do that.’ No biblical text or sound tradition says any such thing. The others were inspired by God only in the way that I explained (I ; II – ).

      When a powerful emanation reached someone like Abraham, he gathered the people and made his appeal to them as a teacher, offering guidance to the truth he had grasped, as Abraham himself did, teaching and explaining, with reasoned arguments, that there is but one God, who created all things else, and that none of these forms or creations should be worshipped. That was his covenant with them. He won them over with fair words and fine treatment but never said, ‘God sent me to you with commands and prohibitions.’ Even when ordered to circumcise himself, his sons, and his household, he did so but did not prophetically ordain it for others. You can see the passage for yourself: I have known him, [that he may charge his children and his house after him to keep the way of the Lord, by doing right and justice] (Genesis : ). Evidently, he led only by way of counsel and persuasion. Isaac, Jacob, Levi, Kohat, and Amram appealed to people in the same way. That is why you find the Sages assigning the prophets before Moses to “the court of Ever,” “the court of Methuselah,” and “the school of Methuselah.” All of them were prophets who only instructed the people, as teachers, preceptors, and guides. They did not say, ‘The Lord spoke to me saying, “Speak to the children of So- and- So.”’ That is how it was before our Teacher Moses.

      With Moses, we know what was said to him, what he said, and what all the throng said to him: This day have we seen God speak [to a man] (Deuteronomy : ). All the Prophets after our Teacher Moses, as you know from their histories, took the role of admonishers, urging the people to keep the Law of Moses. They issued warnings to those who spurn it and promises to those who hold it fast. This, we believe, will ever be so— as it says, It is not in heaven ( : ) and for us and for our children forever ( : ).

      And that is how it must be. For when a thing is perfect of its kind, anything else of the kind must be imperfect— excessive or deficient — just as any deviation from the optimal balance of temper physiologically goes too far or not far enough. Our Torah is perfect by its balance — just laws and statutes ( : ). For ‘just,’ as you know, means bal- anced. Its ways of worship demand nothing onerous or extreme like celibacy or sacred journeys and such; nor are they lax, so as to promote cupidity or depravity that bar perfection of one’s character and thinking, as other laws of ancient nations did. Later in this work, when I turn to the reasons for the commandments, you will see clearly, as one should, how wise and balanced these laws are— and why it says, The Law of the Lord is perfect (Psalms : ).

      Those who find these laws hard, harsh, or irksome are quite mistaken. I will show how easy they really are to a wholesome sensibility ( .64b). That is why it says, What doth the Lord thy God ask of thee? (Deuteronomy : ) and Have I been a desert to Israel? (Jere- miah : ). But all this is for the virtuous. To the unjust, violent, and oppressive, the very existence of a Judge who curbs their abuses is as hard and hurtful as can be. To the base and vile, nothing is worse than to be kept from letting their debauchery run wild and to be punished for indulging it— just as any moral weakling finds it hard to be kept from the ills his vice favors. So the Torah’s ease or difficulty should be judged not from the stand- point of every craven profligate but from that of persons of integrity. For the Torah’s goal is for everyone to become such. It is this law alone, then, that we call a divine law.

      Other schemes of governance, like the laws of the Greeks and the ravings of the Sabians et al., are all of them the work of human rulers, not prophets, as I have explained several times.
