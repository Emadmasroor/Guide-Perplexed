    goodman: |-
      Akhol, to eat. Initially this word signified an animal’s taking food. No illustration is needed. Language then looked to two aspects of eating: the destruction of what is eaten, loss of its original form, and the animal’s growth, sustenance, survival, and health in all the bodily functions that nutriment sustains.

      Based on the first sense, the term is applied metaphorically to any sort of ruining or destruction or general loss of form: The land of your foes shall consume you (Leviticus : ), a land that devours its denizens (Numbers : ), By the sword shall ye be consumed (Isaiah : ), Must the sword consume [forever?] ( Samuel : ), and A fire of the Lord broke out amongst them and consumed the outskirts of the camp (Numbers : ). So He is a devouring fire (Deuteronomy : ) means that God destroys those who resist Him, just as fire destroys what it overwhelms. This sense is frequent.

      The second sense applies metaphorically to knowledge and learning and all intellec- tual mastery by which the human form is best sustained, much as food sustains the body in good health: Come, buy and eat. . . . Hear me, and eat what is good (Isaiah : – ), It is not good to eat too much honey (Proverbs : ), and Eat honey, my son, for it is good, its drops sweet upon thy palate; know that such is wisdom for thy soul ( : – ). The same usage is frequent in the discourse of the Sages too, calling knowledge food: “Come, eat rich meat at Rava’s house” (B. Bava Batra 22a). “Every mention of eating and drinking in this book refers but to wisdom” (Ecclesiastes Rabbah . )— or in some manuscripts, “to Torah.” Similarly, they often call knowledge water: Ho! Let all who thirst come for water (Isaiah : ).

      So frequent and familiar is this usage in Hebrew that it all but becomes the primary sense, with words for hunger and thirst used for want of knowledge and insight: I shall loose a famine on the land, not a famine of bread or thirst for water, but for hearing the words of the Lord (Amos : ) and My soul thirsts for God, the living God (Psalms : ). This, too, is frequent. Jonathan ben Uzziel translates In joy shall ye draw water from the founts of salvation (Isaiah : ) as “You shall receive new teaching from the righteous elect.” He reads water, you see, as the knowledge to be won in that age and takes maʿayanei (founts) as me-ʿ eynei, as in me-ʿ eynei ha- ʿedah, from the elite of the congregation (Numbers : , where Jonathan takes ʿeynei ha- ʿedah to be the eyes of the congregation, thus its leaders)— that is, the learned— hence, “the righteous elect,” since righteousness is true salvation.

      See how he glosses each word in the verse in terms of knowledge and learning. This you must understand.
