  ch47:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      I have said several times that nothing popularly fancied a defect or deemed inconceiv- able in God is ascribed to Him figuratively in Scripture, even if it is equivalent in prin- ciple to something that is figuratively ascribed to Him. What is predicated of Him is what suggests some perfection or imagined perfection. On this basis, we should explain why hearing, sight, and a sense of smell are assigned to Him metaphorically, but touch and taste are not. For He transcends all five senses alike: All five are imperfect modes of apprehension, even in those that have no other. For all five are passive and can be blocked, distorted, or strained, like any organ.

      When we say ‘God sees,’ we mean that He knows what can be seen. ‘God hears’ means that He knows what can be heard. So taste and touch might have been predicated of Him, too, and glossed in terms of His knowing their objects. For all five senses are on a par: What excludes any one of them should exclude the rest, and to affirm any one of them of Him on the grounds that He knows its objects should apply to all five. Yet we find Scripture saying, The Lord saw, The Lord heard, and The Lord smelled but not ‘The Lord tasted’ or ‘The Lord felt.’ The reason: No one imagines that God touches bodies. That is unheard of. These two senses, taste and touch, do not perceive an object without contact, whereas sight, hearing, and smell perceive their objects and their prop- erties at a distance. So popular imagination found these terms acceptable. Besides, the point of the imagery assigning Him these senses was to signify that He knows our actions. But sight and hearing suffice for that, since they can perceive whatever someone else says or does, as the Sages say in cautioning restraint: “Know what is above you: a seeing eye and hearing ear” (M. Avot . ).

      Given that all the senses are on a par, sight, hearing, and smell should be denied of Him the same as touch and taste. For all five are passive, physical, and mutable. But with some, the flaw is obvious, while the others are deemed assets. The weaknesses of imagina- tion, similarly, are obvious, while those of discursive thinking and reflection are not.

      So fancy, that is imagination, is not poetically ascribed to Him; but ma shavah and tevu- nah, thinking and reflecting are: It says, what the Lord hath devised [ ashav] (Jeremiah : ), and with insight [tevunah] unfurled the heavens ( : ). Internal and external apprehensions alike, then, are or are not ascribed to Him figuratively based on the usages of human language: What is deemed a perfection is; what ostensibly signals a defect is not. But truth be told, He has no real attributes proper to Him over and above His Iden- tity, as will be demonstrated (I – ).
