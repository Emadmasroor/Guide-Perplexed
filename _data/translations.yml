      ai is a word for anything that grows and is sentient: all that lives (Genesis : ). It also denotes one recovered from a grave illness: He revived from his illness (Isaiah : ) and [Once all the nation were circumcised, they remained] in the camp until revived (Joshua : ).

      Similarly, quick flesh (Leviticus : ).

      Mavet, similarly, can mean ‘death’ or ‘grave illness’: His heart died within him; he turned to stone ( Samuel : )— he was that ill. So in the case of the son of the woman of Zarephath, it explains, He turned so ill that he had no breath left in him ( Kings : ).

       Had it said he died, it might also have meant he was mortally ill, like Nabal on hearing the news [that his wife Abigail had succored David] ( Samuel : – ). Some Andalu- sians took it to mean that the boy’s breath stopped and was undetectable, as in apoplexy or failure to breathe at birth. Sometimes one cannot tell if a patient is dead or alive and the doubt persists for one or two days.

      But ‘life’ often means intellectual growth: [Do not lose sight of wisdom and discern- ment,] they are life to thy soul (Proverbs : – ); [Doth not wisdom declare . . .] who fin- deth me findeth life? ( : , ); and [Heed my words . . .] they are life to those who find them ( : – ). This is frequent: Sound views are called life; unsound ones, death. So God says, Lo, I have set before thee this day life and good, [death and evil] (Deuteronomy : ), plainly equating life with good and death with evil. It is in this sense that I gloss God’s words, that ye may live ( : ), as in our traditional reading of that it be well with thee, [and thy life be long] ( : ). The imagery is so familiar in our language that they say, “The righteous are called living even in death; and the wicked are called dead even while alive”

      (B. Berakhot 18ab). This you must understand.
