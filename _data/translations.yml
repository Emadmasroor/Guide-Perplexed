    goodman: Aristotle’s views about what causes the motion of the spheres, the basis
      on which he in- ferred the existence of incorporeal minds, are unproven. Yet
      they are, as Alexander says in The Principles of the Universe, the least problematic
      alternatives and the most ame- nable to a coherent system. And they do accord,
      as I shall explain ( .24a), with many bib- lical passages, especially as expounded
      in the well- known midrashim definitely authored by the Sages. So I will present
      Aristotle’s views and arguments, culling what agrees with the Torah and harmonizes
      with the teachings of the Sages, of blessed memory.
