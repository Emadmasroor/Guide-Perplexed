  ch32:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      As you study this work, dear reader, do realize that our intellectual awareness, being linked to matter, is just as vulnerable to disruption as the senses. Your eyes can see what is visible. But if you try to see something too distant, or to read very fine script or engrav- ing, you may strain your eyes and not just fail to make it out but so injure and weaken your vision that you cannot see what you once could. The same is true of thinking, as anyone pursuing a science will find: By fixating on a topic and overtaxing the mind, one can grow muddled and fail to grasp even what he normally would. All bodily powers are alike in this way, and our intellectual apprehension is such as well. If you find yourself stumped by some puzzle and do not deceive yourself and convince yourself that there is proof of what cannot be proved or rush to reject any thesis not disproved— if you do not hope to know what you cannot know, then you have done all that a human being can do, and you will stand alongside Rabbi Akiva, who “entered sound and emerged sound”

      when he pondered these matters of divinity (B. agigah 14b). But if you overreach or rush to discredit things not disproved but possible, even if remotely, you will have gone the way of Elisha A er— you will not just fall short but turn wanting as can be, prey to delusions and prone to every sort of vice and ill, your mind distracted, its light doused, just as all sorts of illusions appear when one’s vision is sapped by illness or by staring too long at bright lights or tiny objects.

      It is about this that it says, Hast thou found honey? Eat just enough, lest thou be glutted and vomit it up (Proverbs : ). The Sages applied that last to Elisha A er. What a marvelous image! Comparing knowledge to eating, as I mentioned (I ), and citing honey, the most delicious foodstuff, but with a nature that makes one retch and vomit if one has too much. This kind of awareness, we are told, in effect— sublime, awesome, and enlightening as it is— by its very nature turns harmful unless one is careful to stop at the right limit: Honey, in due measure, is nourishing and delicious, but all that is lost by overindulgence. It does not say, ‘lest you be glutted and find it cloying’ but “lest you retch and vomit it up.”

      The thought recurs when it says, It is not good to eat too much honey (Proverbs : ), Be not overwise lest thou be confounded (Ecclesiastes : ), and Guard thy step on entering the House of God ( : ). David, too, touches on this theme: Nor do I pursue things too great or wondrous for me (Psalms : ). The Sages voice the same idea: “Do not pursue things too wondrous for you or probe what is veiled from you. Explore what you may, but marvels are not your concern,” meaning ‘Do not dwell on matters beyond human ken.’ Fixation on things beyond the grasp of human nature is highly dangerous, as I explained.

      This is what the Sages meant by saying, “Whoever contemplates four things— [a pity he was born: What is Above, What is Below, What came Before, and What comes After.]”— and summing up, “Whoever slights his Maker’s honor, [better he were never born.]” (M. agigah . )— just the point I have been making: Do not chase a will- o’- the- wisp. Faced with obscurities and unable to prove what you hoped to prove, do not just throw up your hands and careen into denial. Stand fast in deference to your Creator’s honor, check yourself, and stop.

      The point is clear now. Our Prophets and Sages did not mean wholly to block the gateway to inquiry or bar the mind from grasping what we can, as the slack and ignorant presume, who love taking their own failings and density for wisdom and insight and the wisdom and insight of others for folly and irreligion— taking darkness for light and light for darkness (Isaiah : ). The whole point is that human reason has limits. But do not just pick at the language I used regarding reason in this chapter or the rest. My aim here is to advise you about the point at issue, not to analyze the nature of the mind, a sub- ject to be addressed in other chapters (I , ).
