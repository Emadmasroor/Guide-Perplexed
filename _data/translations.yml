    "goodman": |
      People have thought that Tselem in Hebrew refers to the shape and configuration of a thing. This led them to a raw corporealism. They thought that since Scripture says, Let us make man in our image (tselem) and after our likeness (demut), God must have the form of a man—meaning his shape and configuration. Indeed, it was tantamount to atheism to deny that God has a body with hands and a face like their own in anatomy and features, only larger and more glorious, they supposed, and of some other matter, not flesh and blood. That was as far as they felt God’s transcendence should go.

      Form, I say, as popularly understood, meaning the shape or configuration of a thing, is properly called to’ar in Hebrew. So it says of Joseph, Fair of form and fair of visage. But Tselem applies to the specific form, which is the essence of a thing—the reality by which it is what it is. In man, that is the human grasp of ideas. It is because of this intellectual grasp that it says, In the image of God created He him.
