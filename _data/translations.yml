    goodman: 'The senses of adam. This is the name of the first man, derived, as the
      text relates, from adamah, the soil (Genesis : ). It also names the species:
      My spirit will not ever abide in man ( : ), Who knows if the spirit of the sons
      of man [rises] (Ecclesiastes : ), and The preeminence of man over beast is nought
      ( : ). And it can mean the masses, the common folk rather than the elite: men
      and people (Psalms : ). It is in this third sense that we read The sons of the
      notables saw the daughters of men [that they were fair and took for themselves
      all that they chose] (Genesis : ) and So shall ye die, as men (Psalms : ).'
