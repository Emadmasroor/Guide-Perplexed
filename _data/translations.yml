    goodman: |-
      One question to raise is why he ties his vision of the Chariot to a particular day, month, year, and place. This must mean something; it should not be thought insignificant.

      Also worth pondering, the key to it all, is his saying, The heavens opened up (Ezekiel : ).

       This image of opening and of opening doors is frequent in prophetic discourse: Open the gates (Isaiah : ); He opened the portals of heaven (Psalms : ); [raise up your heads, ye gates,] raise them up and remain ever open! ( : ); and Open to me the gates of righteous- ness ( : ). Examples are many.

      One should notice, too, that although, of course, he was reporting a prophetic vision— as he says, the hand of the Lord was upon him there (Ezekiel : )— his language changes notably from one passage to the next. In speaking of the creatures, he says the likeness of four creatures ( : ), not just “four creatures.” Similarly, above the creatures’ heads, the like- ness of a firmament ( : ); and again, appearing like a sapphire, the likeness of a throne ( : ); and the likeness of the image of a man ( : ). In each case he says likeness. But he never says “the likeness of a wheel” or “the likeness of wheels.” He describes the wheels directly, in objective terms. Don’t be confused by his saying, All four had the same like- ness ( : ). The syntax and the sense of ‘likeness’ are quite different here. He confirms and clarifies our point in relating his final epiphany, speaking first of the firmament in objective terms and then giving details: I saw, and lo in the firmament above the heads of the cherubim there appeared the like of a sapphire, the seeming likeness of a throne ( : ). He does not qualify this mention of the firmament by saying “the likeness of a firmament,”

      as he did when he spoke of the heads of the likeness of the creatures ( : , : ). But of the throne, he does say the likeness of a throne, showing that first he saw the firmament and then the likeness of a throne above it. Consider what that means.

      Notice, too, that he described the creatures when he first saw them as having wings and human hands, but the second time, when he made it clear that the creatures were cherubim, he saw only their wings at first; human hands appeared later, as he says: Under their wings he saw the shape of a human hand (Ezekiel : ). He says ‘shape’ in lieu of ‘likeness’— the hands being on a lower plane than the wings. This you must understand.

      Consider, too, how he plainly says, The wheels were by them ( : ), although he assigns them no form.

      He also says, Like the sight of the bow in a cloud on a day of rain, such was the sight of the glow round about. This was the sight of the like of the glory of the Lord ( : ). We know what a rainbow is made of and what it is essentially. This is the strangest comparison pos- sible, doubtless prophetically compelled. Do understand this.

      One thing you must note is how he divides the likeness of the man on the throne— above, like the color of amber; below, of the appearance of fire (Ezekiel : , : ).

      This word amber ( ashmal) the Sages take as a compound of ash and mal, ash mean- ing ‘speed’ and mal, ‘cutting.’ Combining the two suggests the two aspects of that corpo- real image, above and below. Alternatively, they derive the word from the ideas of speech and silence— “sometimes silent ( ashot); sometimes speaking (memallot)” (B. agigah 13b)— taking the sense of ‘silent’ from long have I kept silent (he esheti; Isaiah : ).

      They take ashmal to suggest soundless speech. But what speaks or keeps silence must be something created. See how they tell us directly that this image of an enthroned, divided man does not represent God, who transcends all division. It symbolizes something cre- ated. Hence the prophet says, This was the appearance of the like of the Glory of the Lord ( : ). The Glory of the Lord is not the Lord, as I have explained repeatedly (I , , , , , , , ). So everything symbolized in all of Ezekiel’s epiphanies was but the Lord’s Glory: He beheld the Chariot, not the Rider! God is not to be represented. This you must understand.

      In this chapter, then, I have given you the rubrics to marshal into a good overview of this subject. If you study all that I’ve said in the previous chapters, you should get a clear sense of all or most of Ezekiel’s message, save some minor details and repetitions of unclear intent. On deeper study, even those may grow clear to you, leaving noth- ing obscure. But after this chapter you should not expect to hear another word from me about this, direct or indirect. I have said all that can be said about it and have even gone somewhat overboard. So let us turn to other matters now from the range I hope to ad- dress in this work.
