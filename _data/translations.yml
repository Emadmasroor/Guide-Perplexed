    "goodman": |
      One might suppose that Temunah in Hebrew means only the shape or configuration of a thing. Scripture says, for example: You shall not make for yourself a graven image or any likeness (temunah). But this word actually has three meanings.

      First, it refers to the shape of a thing perceived by the senses. Second, it refers to the imaginary form of a thing in the mind after the object is no longer present. Third, it refers to the true reality of a thing, grasped only by the mind. It is in this third sense that it is said of Moses: The likeness (temunah) of the LORD does he behold. This means he grasped the true reality of God so far as a human being is able.
