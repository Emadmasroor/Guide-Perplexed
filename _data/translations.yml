  ch28:
    friedlander: 'Many of our coreligionists thought that King Solomon believed in
      the Eternity of the Universe. This is very strange. How can we suppose that
      any one that adheres to the Law of Moses, our Teacher, should accept that theory?
      if we were to assume that Solomon has on this point, God forbid, deviated from
      the Law of Moses, the question would be asked, Why did most of the Prophets
      and of the Sages accept it of him? Why have they not opposed him, or blamed
      him for holding that opinion, as he has been blamed for having married strange
      women, and for other things? The reason why this has been imputed to him is
      to be found in the following passage: “They desired to suppress the book Koheleth,
      because its words incline towards scepticism.” It is undoubtedly true that certain
      passages in this book include, when taken literally, opinions different from
      those taught in the Law, and they must therefore be explained figuratively.
      But the theory of the Eternity of the Universe is not among those opinions,
      the book does not even contain any passage that implies this theory; much less
      a passage in which it is clearly set forth. There are, however, in the book,
      some passages which imply the indestructibility of the Universe, a doctrine
      that is true; and from the fact that the indestructibility of the Universe is
      taught in this book, some persons wrongly inferred that the author believed
      in the Eternity of the Universe. The following are the words that refer to the
      indestructibility of the Universe: “And the earth remaineth for ever.” And those
      who do not agree with me as regards the above distinction [between the indestructibility
      and the Eternity of the Universe], are compelled to explain the term le-ʻolam
      (lit., “for ever”), to mean “the time fixed for the existence of the earth.”
      Similarly they explain the words of God, “Yet all the days of the earth” (Gen.
      viii. 22) to signify the days fixed for its existence. But I wonder how they
      would explain the words of David: “He laid the foundations of the earth, that
      it should not be moved for ever” (Ps. civ. 5). If they maintain here also that
      the term le-ʻolam va-ʻed (lit. “for ever”) does not imply perpetuity, they must
      come to the conclusion that God exists only for a fixed period, since the same
      term is employed in describing the perpetuity of God, “The Lord will reign (le-ʻolam)
      for ever” (Exod. xv. 18, or Ps. x. 16). We must, however, bear in mind that
      ʻolam only signifies perpetuity when it is combined with ʻad; it makes no difference
      whether ʻad follows, as in ʻolam va-ʻed, or whether it precedes, as in ʻad ʻolam.
      The words of Solomon which only contain the word le-ʻolam, have therefore less
      force than the words of David, who uses the term ʻolam va-ʻed. David has also
      in other passages clearly spoken of the incorruptibility of the heavens, the
      perpetuity and immutability of their laws, and of all the heavenly beings. He
      says, “Praise ye the Lord from the heavens, etc. For He commanded, and they
      were created. He hath also stablished them for ever and ever; he hath made a
      decree which shall not pass” (Ps. cxlviii. 1–6); that is to say, there will
      never be a change in the decrees which God made, or in the sources of the properties
      of the heavens and the earth, which the Psalmist has mentioned before. But he
      distinctly states that they have been created. For he says, “He hath commanded,
      and they were created.” Jeremiah (xxxi. 35) likewise says, “He giveth the sun
      for a light by day, and the ordinances of the moon and of the stars for a light
      by night,” etc. “If these ordinances depart from before me, saith the Lord,
      then the seed of Israel also shall cease from being a nation before me for ever.”
      He thus declares, that these decrees will never be removed, although they had
      a beginning. We therefore find this idea, when we search for it, expressed not
      only by Solomon but also by others. Solomon himself has stated that these works
      of God, the Universe, and all that is contained in it, remain with their properties
      for ever, although they have been created. For he says, “Whatsoever God doeth,
      it shall be for ever; nothing can be put to it, nor anything taken away from
      it” (Eccles. iii. 14). He declares in these words that the world has been created
      by God and remains for ever. He adds the reason for it by saying, “Nothing can
      be put to it, nor anything taken from it;” for this is the reason for the perpetuity,
      as if he meant to say that things are changed in order to supply that which
      is wanting, or in order to take away what is superfluous. The works of God being
      most perfect, admitting no addition or deduction, must remain the same for ever.
      It is impossible that anything should exist that could cause a change in them.
      In the conclusion of the verse, Solomon, as it were describes the purpose of
      exceptions from the laws of Nature, or an excuse for changes in them, when he
      says, “And God doeth it (viz., He performs miracles) that men should fear before
      him.” The words which follow, “That which hath been is now; and that which is
      to be hath already been, and God seeketh that which is pursued,” contain the
      idea that God desires the perpetuity and continuity of the Universe. The fact
      that the works of God are perfect, admitting of no addition or diminution, has
      already been mentioned by Moses, the wisest of all men, in the words: “The rock,
      His work is perfect” (Deut. xxxii. 14). All His works or creations are most
      perfect, containing no defect whatever, nothing superfluous, nor anything unnecessary.
      Also whatever God decrees for those created things, and whatever He effects
      through them, is perfectly just, and is the result of His wisdom, as will be
      explained in some chapters of this treatise.'
    pines: Placeholder text
    goodman: |-
      Many adherents of our Torah suppose that Solomon believed the world eternal. It is shocking to imagine any follower of the religion of our Teacher Moses believing the world eternal. If anyone suspected that Solomon so betrayed biblical precepts— God help us!— how did all the Prophets and Sages let it pass without protest and not challenge him about it or blame him for it after his death, as they had to do about his foreign wives and on other counts ( Kings )? What gave color to their suspicions was just the Sages’ saying, “They wanted to suppress Ecclesiastes for the heretical drift of its words” (Levit- icus Rabbah . ; Ecclesiastes Rabbah . ). The book does, of course, contain passages antithetical, on the surface, to biblical themes and needing interpretation. But eternalism is not among them. No text in it indicates such a view, and it does not affirm that the world has always existed. There are texts indicating that the world will last forever. And it will. Seeing passages stating that the world will always be, they presumed he believed it uncreated. But he did not.

      Kohelet does speak to the world’s permanence when it says, The earth endureth for- ever (Ecclesiastes : ). Those who missed the point resorted to adding “for the time allotted,” just as they took God’s words while the earth endureth (Genesis : ) to mean ‘while it lasts’— that is, for its allotted life- span. I’d love to know what they would say about David’s words, He set the earth on its footings, never to be moved (le-ʿ olam vaʿed; Psalms : ). If ʿolam vaʿed does not mean forever, God Himself would have a finite life- span. For Scripture plainly affirms that God is eternal by saying, The Lord reigneth le-ʿ olam vaʿed (forever and ever; Exodus : ).

      You see, ʿolam does not mean eternal unless linked with ʿad— either after it, as in ʿolam vaʿed, or before, as in ʿad ʿolam. So Solomon’s saying le-ʿ olam ʿomadet (endureth forever), is quite unlike David’s words moved never. David was clear as could be that the heavens will endure forever, along with all that they contain— their laws unchanged: Praise the Lord from the heavens. . . . For at His command were they created. . . . He made them to endure forever and set a law never to change (Psalms : , , ), meaning that the order God established will never change. For ‘law’ here means the laws of heaven and earth (Jeremiah : ). David says they were created: At His command were they created.

      Jeremiah says, He gave the sun for light by day and the laws of the moon and stars for light by night. . . . Should these laws leave Me, saith the Lord, then will Israel’s seed cease to be a nation ( : – ). Although created, He vows, these laws will never lapse.

      If one traces this theme, one finds it not just in Solomon’s words. He does affirm that these works of God, the world and everything in it, although created, will forever retain its stable nature: All that God maketh shall ever be, not diminished or increased (Ecclesias- tes : ). The world, he says, although made by God, will ever endure. He gives the reason when he says not diminished or increased, arguing, in effect, ‘A thing is altered only to make good a lack or remove some excess. But God’s work is consummately perfect. There is nothing to add or take away. So it will last forever, unaltered.’ There is no call to change it. But he completes the verse by pleading the end served by exceptions, adding, as if to excuse those changes, and God made it such that they shall fear Him ( : ), alluding to miracles. Then when he says, What was hath been already; and what shall be, already hath been. God returneth to what is gone ( : ), he says that God wills continuity and order in the world.

      What he says of the perfection of God’s works and the impossibility of any lack or excess had been avowed already by the master of all who know when he said the Rock whose work is perfect (Deuteronomy : ). He meant that all God’s works, all His cre- ations, are consummately perfect, unmarred by any lack, superfluity, or redundancy. All that is ordained for those creations, or by them, is utterly just by His wisdom’s decree, as will be explained in other chapters of this work (III , , , , , ; cf. CM Berak- hot . ).
