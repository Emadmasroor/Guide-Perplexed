  ch34:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      Five things keep us from making theology the entry point of education, highlighting the issues and broadcasting them to the masses.

      First, the intrinsic difficulty, subtlety, and depth of the subject. As it says, Far off it was, and deep, deep— who can plumb it! (Ecclesiastes : ) and Wisdom, where is it found!

      (Job : ). Teaching should not start with what is most difficult and abstruse. One of our nation’s best- known images likens knowledge to water (e.g., Jeremiah : – ). The Sages develop the figure in several ways. One is that you can bring up pearls from the seabed if you know how to swim— but if not, you’ll drown: Don’t try swimming if you haven’t learned how.

      Second, the weakness of all human minds at first. One does not start out perfect and mature. At the start we are given only the raw potential: Man is born a wild ass (Job : ). Nor are all potentials fulfilled inevitably; some remain unrealized, either because of some blockage or for lack of training to bring them to fulfillment. Clearly, not many are wise ( : ). The Sages say, “I have seen the worthy, and they are but few!”

      (B. Sukkah 45b, Sanhedrin 97b). Many an impediment bars the way, and distractions abound. When does one get the right preparation and the leisure it would take for the training needed to fulfill his potential?

      Third, the preliminaries are extensive. People may have a natural passion to pursue a goal, but often they weary and neglect the groundwork. Yet if goals could be reached with- out the prerequisites, they would not be prerequisites but just busywork and otiose. If you roused someone, however thick, as you might wake up a sleeper, and asked him, “Would you like to know, the number and shape of the heavens and all that they hold, what angels are, how the whole world was made, why its parts are ordered as they are, what the soul is, how it arises in the body, whether a human soul can separate from the body, and if so, how and what becomes of it” and other such questions, “Yes!” he would say. “Of course!”

      Naturally he’d love to know the truth about all these things. But he’d want all the an- swers to sate his curiosity in just a word or two. If you asked him to drop everything for a week to master all this, he wouldn’t do it. He would rest content with his comfortable delusions and resent being told that some subjects demand extensive inquiry and rest on many premises.

      All these issues are intertwined, you see. For nothing exists but God and His creations— everything besides God. And there is no way of knowing Him but through His creations. They are the evidence of His existence and show us what to believe about Him— what to affirm and what to deny. So one must study all that is, all things as they really are, to gather sure and solid premises in every domain, to aid us in our theological inquiries. Many a premise based on the nature of numbers and geometrical figures can help show us what sort of things we must deny of Him; and that, in turn, can show us many things.

      In astronomy and natural science, I don’t think you’ll have much trouble seeing how the knowledge gained is critical to understanding how God’s governance of the world works in fact and not in fantasy. But many intellectual inquiries yield no premises for theology. Yet they train the mind in reasoning, enabling one to reach the truth, to un- derstand things as they really are and purge the confusions (and resultant distortions) that befuddle most inquirers’ minds— taking the incidental for essential, say. Quite apart from theology, it’s worthwhile to conceive of things as they really are. Nor are these stud- ies unhelpful in approaching this one.

      So anyone hoping to perfect himself as a human being must train in logic first, then in mathematics in due sequence, then in the natural sciences in due order, and then in theology. Yet many, I find, stop growing intellectually at a certain point in their studies.

      And even if they do not, death may cut them off while they’re still engaged in the prelimi- naries. So if we did not receive some ideas somehow by faith, and with some guidance from poetry, rather than having to think purely conceptually, using only the definitions that capture the essences of things and affirming only what can be rigorously proved (as is possible only after mastering all these lengthy preliminaries), everyone would die before learning even whether God exists, let alone whether anything should be affirmed of Him or any defect denied. No one would escape that fate— but one in a city or two from a clan (Jeremiah : ). That handful would be the remnant called by the Lord (cf. Joel : ). And even they would reach the end that is our goal only by way of these prerequisites.

      Solomon spoke vividly of the need for these first steps and our inability to gain real wisdom without such training: If the axe be dull, the edge unhoned, more force is needed; but wisdom asks yet more (Ecclesiastes : ), and he says, Take advice, accept instruction to win wisdom in the end (Proverbs : ).

      Something more is needed in mastering these preliminaries. For haste in inquiry breeds many a doubt. Objections crop up swiftly. Refuting a claim is like tearing down a building. But to lay a firm foundation or resolve a difficulty demands many premises anchored in these disciplinary footings. A thinker ill prepared is like someone traveling on foot who falls into a deep well and has no way to get out alive. Better for him had he stayed home. Solomon, in Proverbs, spells out poetically and at some length how the lazy fail, keen for the goal but neglectful of the prerequisites, the sciences. They have the ap- petite but not the effort: The sluggard’s craving slays him since his hands scorn work. All day doth he covet. But the just man giveth without stint (Proverbs : – ). Desire, he says, kills the lazy, since he will not work to satisfy his hunger. Of passion he has plenty, but not much beyond that. He sets his heart on what he has no means to win. Giving up this passion would have been safer.

      Notice how the end of the analogy lights up the beginning: The just man giveth with- out stint. ‘Just’ is not the opposite of ‘lazy,’ unless on my reading: The just man gives all things their due. He devotes himself— that is, his time— wholly to his quest and wastes no time elsewhere. ‘The just man,’ Solomon says, in effect, ‘devotes his life to wisdom and spares not a day.’ This parallels his saying Give not thy strength to women (Proverbs : ).

      Most scholars— vaunted scholars!— have this disease. They want results to talk about but have no idea how to get them. Some are so ignorant, or so avid for primacy, that they disparage the prerequisites they cannot reach or were too lazy to pursue and paint them as useless or harmful. But the truth is all too clear when you think about it.

      Fourth is natural disposition. It has been shown— proven, in fact— that the moral virtues are prerequisites of the intellectual virtues: One cannot win the rational truths that perfect one’s reason unless one is calm, composed, and highly disciplined. Many a human character is unsuited by temperament for such fulfillment. A born hothead will not keep his temper even if he disciplines himself most stringently, and a man with hot, humid testes and vesicles, highly productive of semen, rarely proves chaste, even if he disciplines himself to the utmost. Similarly, you will find that some people are flighty and frivolous, their erratic, disordered movements symptomatic of an unsound constitu- tion that they cannot overcome. They never seem to reach fulfillment. Even to try with them is just misguided. For this science of divinity, as you know, is not medical science or geometry. Not everyone is suited to it in the ways I have cited. The moral foundations are critical in reaching the peak— For the Lord loathes the perverse; His counsel is with the upright (Proverbs : ).

      So it is frowned upon to teach theology to the young. Truth be told, they cannot absorb it. Their hearts are aboil, their minds astir with the flame of adolescence. Once that distracting fire is banked and they have gained calm and composure, their hearts less fractious and their temper quieter, they can advance to thoughts of God, to theology, the “Account of the Chariot,” as we call it. As it says, the Lord is near to the chastened heart (Psalms : ); high and holy do I dwell, with the lowly and the humble of spirit (Isaiah : ). That is why in the Talmud, commenting on the mishnaic dictum “one en- trusts the rubrics to him,” they explain, “One does not entrust even the rubrics to anyone but the Head of the Court— one whose heart within is self- possessed,” having humility, balance, and piety besides learning.

      In the same place (B. agigah 13a) it says, “The Torah’s secrets are not entrusted to anyone but a counselor, a wise craftsman, alert to a whisper (Isaiah : ).” These subjects clearly demand talent. One person, as you know, of course, might have a fine mind but sorely lack judgment. Another has sound beliefs and is politically astute— as they say, a counselor— yet cannot master ideas, even if all but elementary. He might be rather dense, helpless intellectually: What good is the price of wisdom to a fool with no heart for it? (Prov- erbs : ). For another, insight and understanding come naturally. He can articulate the subtlest ideas precisely and succinctly. Such a person is alert to a whisper. But he might fail to apply himself and not master the sciences. One who does master them is the wise crafts- man ( akham arashim)— as they say, “When he speaks, all are like mutes ( ershin)”

      (B. agigah 14a).

      The Sages, then, found textual support for all three criteria: perfect mastery in poli- tics and the rational sciences, along with the natural acuteness, insight, and articulacy in voicing ideas obliquely. Only to one who combines all of these does one confide the Torah’s secrets. As the same passage says, “Rabbi Yo anan said to Rabbi Elazar, ‘Come, I shall teach you the Account of the Chariot.’ He answered, ‘I am not yet old’”— that is, ‘I still find in myself an effervescence of nature and the flightiness of youth.’ As you see, they added maturity to the requisite virtues. So how could one probe this subject with the masses— or women and children!

       Fifth are our bodily needs. These come first, especially if responsibilities to a wife and children are added— let alone pursuit of comforts that one’s predilections and bad habits can render obsessive. Even a paragon, as I said, the more involved he is with his physical needs— let alone luxuries— and the stronger his attachment to them, the weaker his in- tellectual yearnings, and the more are they sapped. His interest flags and loses its edge.

      So he fails to grasp even what he might have, or he absorbs things in a jumble, muddling what he knows with what he does not.

      For all these reasons, these subjects are suited only to a handful of very special indi- viduals, and not to most. That is why they are not introduced to beginners but kept from them, just as infants are not given solid food or heavy loads to lift.
