    goodman: 'Here is a passage from the Torah: Lo, I shall send thee an angel to
      go before thee, [to keep thee in the way and bring thee to the place I have
      prepared] (Exodus : ). The sense of this text is seen in Deuteronomy, when God
      tells Moses at Sinai, A prophet will I raise up for them [from amongst their
      brethren, like unto thee] ( : ). That is shown by His saying of this “angel,”
      heed him; hearken to his voice, [do not defy him. He will brook no trespass
      from you. For My name is in him.] (Exodus : ). The warning is for the common
      folk, of course. But angels are not revealed to them and do not give them commands
      and pro- hibitions that they must be warned not to flout. The sense is that
      God informs them that a prophet will arise among them to whom an angel will
      appear and speak, issuing com- mands and prohibitions. God forbade our disobeying
      the angel whose words the prophet conveys. Deuteronomy shows that when it says,
      Hearken to him ( : ) and It shall come to pass that whoso hearkeneth not to
      the words he speaketh in My name [I shall hold to account] ( : ). That explains
      for My name is in him (Exodus : ). All this was just to give them to know that
      the awesome epiphany they had experienced at Sinai would not always be there
      for them. There would be nothing like it in the future. Nor would the fire or
      the cloud ever remain over the Tabernacle as they were now. ‘But the angel I
      send your prophets will open the land to your advance and smooth your way. He
      will teach you how to live and what to seek and avoid.’ So here again we have
      the point that I consistently spell out: that every prophet but our Teacher
      Moses receives his inspiration through an angel. This you should understand.'
