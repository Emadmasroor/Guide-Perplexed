      In this chapter I’ll lay out for you the kalām arguments for God’s unity. They say, ‘The being that the world reveals as the Maker who gave it being is one.’ They have two main ways of establishing God’s unity: difference and interference.

      Method . Interference: This is the approach that most of them favor. In essence, the Mutakallim says, ‘If there were two gods, a substance that must have one or the other of two opposite accidents might either lack both, which is impossible, or have both at once in the same substrate— also impossible. An atom or a group of atoms, for example, that one god willed to warm now and the other to cool, would be neither, since the effects would block each other— which is absurd. For every body must be either warm or cool.

      Or it would be both warm and cool at once. Similarly, if one god wanted to move this body, the other to keep it still, it would be neither moving nor at rest, or both at once.’ This line of argument assumes their atomism (Premise ), that accidents are created (Premise ), and that privations are real and need a cause (Premise ). But someone might say that matter here below (where generation constantly alternates with corruption on the Philosophers’ account) is demonstrably different from the supernal matter of the spheres. So one of the two gods might govern this lower matter, leaving the spheres unaf- fected, while the other governs the spheres with no effect on ordinary matter— as dual- ists claim. There would be no “interference” on this view. If someone objected that this would imply a defect in both gods, since neither controls what the other affects, he could be told that this would not be a defect in either. For what each could not do would be im- possible for it, and inability to do the impossible is not a defect— just as we monotheists do not think it a defect that the One cannot unite opposites in the same substrate. God has no power to do that or any such impossibility. Sensing the weakness of this approach, attractive as it seemed, they tried a different tack.

      Method . If there were two gods, they argue, they would have to have something in common and something found in one and not the other, to make them different. This is a philosophical approach, apodeictic if its premises are clearly drawn and the argument duly laid out. I will explain it when I discuss the Philosophers’ views about this ( .9b).

      But this approach is not open to anyone who believes in attributes. For it assigns to the Eternal diverse features— His knowledge different from His power, say, and His power different from His will. So it would not be impossible for two gods to have some features in common and others that distinguish them.

      Method . Here is another approach, again dependent on one of their premises: Some Mutakallimūn of the old school believe that God’s will is none other than Himself and subsists in no substrate. Using this assumption, which I explained (under Premise , ) and which they affirm in the sense that you will see, they say that this one will without a substrate cannot belong to two different subjects. ‘For one cause,’ they say, ‘cannot frame judgments in two different subjects.’ This, again, I would say is obscurum per obscuriora. The will they speak of is inconceivable. Some of them do call it impossible.

      But those who appeal to it face countless difficulties yet rely on it to show God’s unity.

       Method . ‘The existence,’ they say, ‘of any act or work argues, necessarily, for a doer or maker but says nothing of the number. It makes no difference whether you say two gods or three, or twenty, or any number at all.’ Obviously. But if you say, ‘This does not prove multiple gods impossible but only that we do not know the number; it might be one or possibly quite a few,’ the Mutakallim completes his proof by saying, ‘There is no contingency in God’s being; it is necessary. So the possibility of plurality is null.’ That is how he framed the argument. But this is a gross error, plainly. God’s existence is what is not contingent. Our knowledge of it is contingent. Contingency in knowl- edge is not the same as contingency in being. Perhaps, as Christians think Him three, although He is not, we wrongly think Him one. This should be clear to anyone trained in the logic of inference.

      Method . One modern Mutakallim claims to have found proof of God’s unity based on dependence: ‘If one god independently can make all that is, another is redundant. But if the world cannot be ordered and complete without two gods’ collaboration, both are powerless, since each needs the other and neither is self- sufficient.’ This is just a variant of the argument from interference.

      The objection to arguments of this sort: Not everyone who does not do what is beyond him is to be called powerless. We do not call someone weak because he cannot lift five hundred tons. Nor do we call God powerless because He cannot give Himself a body, create His like, or make a square whose side equals its diagonal. In the same way, one need not call God powerless because He does not create alone. It might be necessary to the existence of both these gods that they both exist. That would be not dependence but necessity. Any alternative would be impossible. We would not call God powerless because (in their view) He cannot create a body without creating atoms and affixing the accidents He creates in them. We would not call that impotence or dependence if the alternative is impossible. Just so, a dualist can say, ‘It is impossible for either god to act alone; that is not impotence. For the existence of either requires that of both.’ One of them came to find these tricks so tiresome that he said monotheism is simply the received religion. The Mutakallimūn hated this and scorned him for saying it. Yet I think he was sensible and averse to sophistries. Hearing no real proof in all their ar- guments and dissatisfied with what they called proof, he said that monotheism should be accepted as a matter of religious tradition. For these schools had left the world no stable nature on which to ground sound inferences and left the mind no capacity for sound reasoning. All this was intentional, to yield a world that allowed us to prove what cannot be proved but left us powerless to prove what can be. We can only appeal to fair thinkers and to God.
