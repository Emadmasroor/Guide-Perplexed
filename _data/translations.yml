  ch32:
    friedlander: |-
      There are as many different opinions concerning Prophecy as concerning the Eternity or Non-Eternity of the Universe. For we have shown that those who assume the existence of God as proved may be divided into three classes, according to the view they take of the question, whether the Universe is eternal or not. Similarly there are three different opinions on Prophecy. I will not notice the view of the Atheist; he does not believe in the Existence of God, much less in Prophecy; but I will content myself with discussing the various opinions [on Prophecy] held by those who believe in God.

      1. Among those who believe in Prophecy, and even among our coreligionists, there are some ignorant people who think as follows: God selects any person He pleases, inspires him with the spirit of Prophecy, and entrusts him with a mission. It makes no difference whether that person be wise or stupid, old or young; provided he be, to some extent, morally good. For these people have not yet gone so far as to maintain that God might also inspire a wicked person with His spirit. They admit that this is impossible, unless God has previously caused him to improve his ways.

      2. The philosophers hold that prophecy is a certain faculty of man in a state of perfection, which can only be obtained by study. Although the faculty is common to the whole race, yet it is not fully developed in each individual, either on account of the individual’s defective constitution, or on account of some other external cause. This is the case with every faculty common to a class. It is only brought to a state of perfection in some individuals, and not in all; but it is impossible that it should not be perfect in some individual of the class; and if the perfection is of such a nature that it can only be produced by an agent, such an agent must exist. Accordingly, it is impossible that an ignorant person should be a prophet; or that a person being no prophet in the evening, should, unexpectedly on the following morning, find himself a prophet, as if prophecy were a thing that could be found unintentionally. But if a person, perfect in his intellectual and moral faculties, and also perfect, as far as possible, in his imaginative faculty, prepares himself in the manner which will be described, he must become a prophet; for prophecy is a natural faculty of man. It is impossible that a man who has the capacity for prophecy should prepare himself for it without attaining it, just as it is impossible that a person with a healthy constitution should be fed well, and yet not properly assimilate his food; and the like.

      3. The third view is that which is taught in Scripture, and which forms one of the principles of our religion. It coincides with the opinion of the philosophers in all points except one. For we believe that, even if one has the capacity for prophecy, and has duly prepared himself, it may yet happen that he does not actually prophesy. It is in that case the will of God [that withholds from him the use of the faculty]. According to my opinion, this fact is as exceptional as any other miracle, and acts in the same way. For the laws of Nature demand that every one should be a prophet, who has a proper physical constitution, and has been duly prepared as regards education and training. If such a person is not a prophet, he is in the same position as a person who, like Jeroboam (1 Kings xiii. 4), is deprived of the use of his hand, or of his eyes, as was the case with the army of Syria, in the history of Elisha (2 Kings vi. 18). As for the principle which I laid down, that preparation and perfection of moral and rational faculties are the sine quâ non, our Sages say exactly the same: “The spirit of prophecy only rests upon persons who are wise, strong, and rich.” We have explained these words in our Commentary on the Mishnah, and in our large work. We stated there that the Sons of the Prophets were constantly engaged in preparation. That those who have prepared themselves may still be prevented from being prophets, may be inferred from the history of Baruch, the son of Nerijah; for he followed Jeremiah, who prepared and instructed him; and yet he hoped in vain for prophecy; comp., “I am weary with my sighing, and rest have I not found.” He was then told through Jeremiah, “Thus saith the Lord, Thus shalt thou say to him, Thou seekest for thee great things, do not seek” (Jer. xlv. 5). It may perhaps be assumed that prophecy is here described as a thing “too great” for Baruch. So also the fact that “her prophets did not find visions from the Lord” (Lam. ii. 4), may be considered as the result of the exile of her prophets, as will be explained (chap. xxxvi.). There are, however, numerous passages in Scripture as well as in the writings of our Sages, which support the principle that it depends chiefly on the will of God who is to prophesy, and at what time; and that He only selects the best and the wisest. We hold that fools and ignorant people are unfit for this distinction. It is as impossible for any one of these to prophesy as it is for an ass or a frog; for prophecy is impossible without study and training; when these have created the possibility, then it depends on the will of God whether the possibility is to be turned into reality. We must not be misled by the words of Jeremiah (i. 5), “Before I formed thee in the womb I knew thee, and before thou camest forth from the womb I have sanctified thee”; for this is the case with all prophets; there must be a physical preparation from the beginning of their existence, as will be explained. As to the words, “For I am young” (ibid. ver. 6), it is well known that the pious Joseph, when he was thirty years old, is called by the Hebrew “young” (naʻar); also Joshua, when he was nearly sixty years old. For the statement, “and his minister Joshua, the son of Nun, was young,” occurs in the account of the Golden Calf (Exod. xxxiii. 11). Moses was then eighty-one years old, he lived one hundred and twenty years; Joshua, who survived him fourteen years, lived one hundred and ten years and must consequently have been at least fifty-seven years old at the time when the Golden Calf was made, and yet he is called naʻar, “young.” Nor must we be misled by prophecies like the following: “I will pour out my spirit over all flesh, and your sons and your daughters shall prophesy”; since it is distinctly stated what is meant by “prophesy” in this place, viz., “Your old men will dream dreams, your young men shall see visions.” For we call also prophets all those who reveal something unknown by surmises, or conjectures, or correct inferences. Thus “prophets of Baal” and “of Asherah” are mentioned in Scripture. And God says, “If there arise among you a prophet or a dreamer of dreams,” etc. (Deut. xiii. 1). As to the revelation on Mount Sinai, all saw the great fire, and heard the fearful thunderings, that caused such an extraordinary terror; but only those of them who were duly qualified were prophetically inspired, each one according to his capacities. Therefore it is said, “Come up unto the Lord, thou and Aaron, Nadab and Abihu.” Moses rose to the highest degree of prophecy, according to the words, “And Moses alone shall come near the Lord.” Aaron was below him, Nadab and Abihu below Aaron, and the seventy elders below Nadab and Abihu, and the rest below the latter, each one according to his degree of perfection. Similarly our Sages wrote: Moses had his own place and Aaron his own. Since we have touched upon the revelation on Mount Sinai, we will point out in a separate chapter what may be inferred as regards the nature of that event, both from the Scriptural text, in accordance with reasonable interpretation, and from the words of our Sages.
    pines: Placeholder text
    goodman: |-
      People’s views about prophecy match their views about the world’s eternity or genesis: Just as those who affirm God’s existence have three views about eternity versus genesis, as I explained (II ), they have three opinions about prophecy. The view of Epicurus need not detain us, since he does not believe in God, let alone prophecy. We shall consider only the views of theists.

       . The view of the ignorant masses, when they accept prophecy, including some of the common folk in our own religion, is that God chooses anyone He pleases and makes him a prophet with a mission— young or old, learned or ignorant— although they do have some expectation of good character. People have not yet gone so far as to say that God might make a wicked man a prophet without first reforming him.

       . The Philosophers see prophecy as a natural human attainment, a potential realized only through training but fulfilled unless barred by one’s constitution or some exter- nal cause. This potential, like any other, is not fully realized in everyone. But it must be in someone. If something is needed to bring it to fruition, that something must exist in someone.

      An ignoramus, on this view, cannot become a prophet. Nor can one go to bed a nonprophet and wake up a prophet, as if discovering something. Rather, a morally excep- tional, intellectually accomplished person, if his imagination is optimal and he is cul- tivated, as you will hear, becomes a prophet inevitably. For prophecy is a natural human attainment. On this view, one cannot be fit and primed for prophecy and fail to proph- esy any more than someone with a healthy constitution can have a wholesome diet and fail to produce healthy blood and so on.

       . The view of our Torah and a mainstay of our religion is the same as the Philoso- phers’ view, except on one point: We hold that someone fit for prophecy and suitably prepared might fail to prophesy by God’s will. To me, this is like any other miracle and follows the same pattern. The natural outcome would be for anyone to prophesy who is fit by talent, training, upbringing, and instruction. So for someone to be barred is like Jeroboam’s being kept from moving his hand ( Kings : ) or the King of Aram’s army being kept from seeing Elisha when they sought him ( Kings : ).

       That prophecy demands suitable preparation and moral and intellectual excellence is our principle too. As the Sages say, “Prophecy graces only the wise, the rich, and the brave”

      (B. Shabbat 92a, Nedarim 38a). I explained this in my Commentary on the Mishnah and in my major work. I also noted that the “sons of the Prophets” were ever immersed in preparing. But someone so prepared might be kept from prophesying. You know this from the case of Barukh ben Neriah, a disciple of Jeremiah, who trained, taught, and prepared him. He longed to prophesy but could not. He said, I grow weary with groaning and find no rest (Jeremiah : ). But he was informed, through Jeremiah, Thus shalt thou tell him, ‘So saith the Lord: “Dost thou expect great things for thee? Seek them not”’ ( : – ). He was told, evidently, that prophecy was beyond him. Similarly, it says, Nor do her prophets find a vision from the Lord (Lamentations : ), since they were exiled, as I’ll explain (II ).

      We find many texts, in Scripture and from the Sages, all confirming the principle that God grants prophecy when and as He pleases— but only to someone of consummate excellence.

      For a vulgar ignoramus to prophesy is no more possible, in our view, than it is for an ass or a frog. That training and cultivation are indispensable is a core belief for us. Only so is the link with God’s power made possible. Do not be misled by its saying, Before I formed thee in the belly I knew thee. Before thou didst leave the womb did I consecrate thee (Jeremiah : ). That is true of any prophet. His nature must be fit innately, as I’ll explain ( .79a). As for its saying, I am but a lad ( : ), in Hebrew, as you know, righteous Joseph was called a lad at (Genesis : ); Joshua, when near : In the episode of the Golden Calf, the lad who attended him, Joshua son of Nun, stirred not (Exodus : ). Moses our Teacher was and lived to . Joshua lived years longer and died at . So Joshua, clearly, was at least when called a lad.

      Nor should you be misled by its saying, I will shed My spirit upon all flesh, and your sons and daughters shall prophesy (Joel : ). He clarifies by explaining what such prophecy will amount to: Your elders shall dream dreams; your youths shall see visions ( : ). Anyone who tells of the unknown, whether relying on divination, on veridical dreams, or on his own sensibilities, can be called a prophet. That is why the prophets of Baal and the Asherah are called prophets. You know how He says, If there arise amongst you a prophet or dreamer . . . (Deuteronomy : ). Even at Sinai— although, miraculously, all wit- nessed the awesome fire and heard the dread, awful sounds— none attained prophecy unless able, and even they, at varying levels. You can see that when it says, Come up to the Lord, thou, and Aaron, and Nadab and Abihu, and seventy elders of Israel (Exodus : ). Moses was on the highest plane, as it says, Let Moses alone approach the Lord; they shall not approach ( : ). Aaron was lower; Nadab and Abihu, below Aaron; the seventy elders, below Nadab and Abihu; the rest of the people, below them— all according to their degree of perfection. As the Sages say, “Moses was in a class by himself, and Aaron in a class by himself” (Mekhilta to Exodus : ).

       Since I touched on the Assembly at Mount Sinai, I have something to tell you about what that was like, as shown by Scripture when pondered well, and in the Sages’ discus- sions. This I will do in a separate chapter.
