  ch64:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      The word yhvh, you know, sometimes just means His name— thus, Thou shalt not take the name yhvh in vain (Exodus : ), and he that blasphemeth the name yhvh (Leviti- cus : ), and countless other examples. But it can also refer to God Himself, as in They will ask me, ‘What is his name?’ (Exodus : ). Or it may mean His command. So saying “the Lord’s name” says, in effect, the Lord’s word or speech, as in My name is in him ( : )— that is, ‘My word or speech is in him, as an instrument of My will and pleasure.’ I shall explain that when I address the various senses of ‘angel’ ( .76a).

      Similarly, the glory of yhvh may mean the created light that God miraculously lodges in a place to exalt it: Thus, The glory of yhvh settled on Mount Sinai, and the cloud enveloped it . . . (Exodus : ), and The glory of yhvh filled the Tabernacle ( : ). Or it might mean Himself, His Reality, as in Show me, pray, Thy glory ( : ), which was answered, Man shall not see Me and live ( : )— showing that ‘glory’ here meant God Himself, called glory out of deference, as I explained anent They will ask me, ‘What is his name?’ (I ).

      Glory may also mean His exaltation by all mankind and, indeed, by all else. For what truly exalts God is recognition of His greatness and perfection. So whoever apprehends God’s greatness and perfection does exalt him, so far as his apprehension allows. Man, specifically, exalts God in words, expressing what we grasp intellectually and sharing it with others. But beings without consciousness, such as lifeless beings, also exalt Him, as it were, since their natures bespeak the wisdom and power of Him who gave them being. For they inspire those who contemplate them to glorify Him verbally— or wordlessly if they cannot speak. In Hebrew, that too can be called speech. So even beings without awareness are said to praise Him: All my bones say, ‘Lord, who is like Thee!’ (Psalms : ). They prompt this conviction as if they spoke, since it was learned from them.

      It is in this sense of glory that it says, All the earth is filled with His glory (Isaiah : )—p aralleling His praise fills the earth (Habakkuk : ). For praise is called glory, as in Render glory to the Lord your God (Jeremiah : ) and In His Temple all say: Glory!

      (Psalms : ). This is frequent. Understanding the senses of glory and how to read them in context will save you from many a grave confusion.
