  ch2:
    friedlander: |-
      The prophet says that he saw four Ḥayyot; each of them had four faces, four wings, and two hands, but on the whole their form was human. Comp. “They had the likeness of a man” (Ezek. i. 5). The hands are also described as human hands, because these have undoubtedly, as is well known, such a form as enables them to perform all manner of cunning work. Their feet are straight; that is to say, they are without joints. This is the meaning of the phrase “a straight foot,” taken literally. Similarly our Sages say, the words, “And their feet were straight feet” (ibid. i. 7), show that the beings above do not sit. Note this likewise. The soles of the feet of the Ḥayyot, the organs of walking, are described as different from the feet of man, but the hands are like human hands. The feet are round, for the prophet says, “like the sole of a round foot.” The four Ḥayyot are closely joined together, there is no space or vacuum left between them. Comp. “They were joined one to another” (ibid. i. 9). “But although they were thus joined together, their faces and their wings were separated above” (ibid. ver. 11). Consider the expression “above” employed here, although the bodies were closely joined, their faces and their wings were separated, but only above. The prophet then states that they are transparent; they are “like burnished brass” (ibid. ver. 7). He also adds that they are luminous. Comp. “Their appearance was like burning coals of fire” (ibid. ver. 13). This is all that has been said as regards the form, shape, face, figure, wings, hands, and feet of the Ḥayyot. The prophet then begins to describe the motions of these Ḥayyot, namely, that they have a uniform motion, without any curvature, deviation, or deflexion: “They turned not when they went” (ver. 17). Each of the Ḥayyot moves in the direction of its face. Comp. “They went every one in the direction of his face” (ver. 9). Now, it is here clearly stated that each Ḥayyah went in the direction of its face, but since each Ḥayyah has several faces, I ask, in the direction of which face? In short, the four Ḥayyot do not move in the same direction; for, if this were the case, a special motion would not have been ascribed to each of them; it would not have been said, “They went each one towards the side of his face.” The motion of these Ḥayyot is further described as a running, so also their returning is described as a running. Comp. “And the Ḥayyot ran, and returned as the appearance of a flash of lightning” (ver. 14), raẓoh being the infinitive of ruẓ, “to run,” and shob the infinitive instead of shub, “to return.” The ordinary words, haloch and bo, “to go” and “to come,” are not used, but such words as indicate running to and fro; and these are further explained by the phrase, “As the appearance of a flash of lightning” (bazak, used by the prophet, is identical with barak), for the lightning appears to move very quickly; it seems to hasten and to run from a certain place, and then to turn back and to come again to the place from which it had started. This is repeated several times with the same velocity. Jonathan, the son of Uzziel, renders the phrase raẓo vashob thus: They move round the world and return at once, and are as swift as the appearance of lightning. This quick movement and return the Ḥayyah does not perform of its own accord, but through something outside of it, viz., the Divine Will; for “to whichever side it is the Divine Will that the Ḥayyah should move, thither the Ḥayyah moves,” in that quick manner which is expressed by “running and returning.” This is implied in the words, “Whithersoever the spirit was to go they went” (ver. 20); “They turned not when they went” (ver. 17). By “the spirit” (ruaḥ), the prophet does not mean “the wind,” but “the intention,” as we have explained when discussing the homonym ruaḥ (spirit). The meaning of the phrase is, that whithersoever it is the Divine Will that the Ḥayyah shall go, thither it runs. Jonathan, the son of Uzziel, gives a similar explanation: Towards the place whither it is the will to go, they go; they do not turn when they go. The employment of the future tense of the verbs yihyeh and yeleku in this passage seems to imply that sometimes it will be the will of God that the Ḥayyah should move in one direction, in which it will in fact move, and at other times it will be His will that the Ḥayyah should move in the opposite direction, in which it will then move. An explanation is, however, added, which is contrary to this conclusion, and shows that the future form (yihyeh) of the verb has here the meaning of the preterite, as is frequently the case in Hebrew. The direction in which God desires the Ḥayyah to move has already been determined and fixed, and the Ḥayyah moves in that direction which His will has determined long ago, without having ever changed. The prophet, therefore, in explaining, and at the same time concluding [this description of the Ḥayyot], says, “Whithersoever the spirit was to go they go, thither was the spirit to go” (ver. 20). Note this wonderful interpretation. This passage forms likewise part of the account of the motion of the four Ḥayyot which follows the description of their form.

      Next comes the description of another part; for the prophet relates that he saw a body beneath the Ḥayyot, but closely joining them. This body, which is connected with the earth, consists likewise of four bodies, and has also four faces. But no distinct form is ascribed to it; neither that of man nor that of any other living being. The [four bodies] are described as great, tremendous, and terrible; no form is given to them, except that they are covered with eyes. These are the bodies called Ofannim (lit. wheels). The prophet therefore says: “Now, as I beheld the Ḥayyot, behold one wheel upon the earth beside the living creatures, with his four faces” (ver. 15). He thus distinctly states that the Ofannim form a body, of which the one part touches the Ḥayyot, and the other part the earth; and that the Ofan has four faces. But he continues—“The appearance of the Ofannim (wheels) and their work was like unto the colour of a beryl: and they four had one likeness” (ver. 16). By speaking of four Ofannim, after having mentioned only one Ofan, the prophet indicates that the “four faces” and the “four Ofannim” are identical. These four Ofannim have the same form; comp., “And they four had one likeness.” The Ofannim are then described as partly inter-joined; for “their appearance and their work was as it were a wheel in the middle of a wheel” (ver. 16). In the description of the Ḥayyot such a phrase, with the term “in the middle of” (tok) is not employed. The Ḥayyot are partly joined, according to the words, “they were joined one to another” (ver. 11); whilst in reference to the Ofannim it is stated that they are partly intermixed, “as it were a wheel in the middle of a wheel.” The body of the Ofannim is described as being covered with eyes; it is possible that a body covered with real eyes is here meant, or a body with different colours [ʻayin denoting “eye,” also “colour”], as in the phrase “the colour thereof [ʻeno] as the colour (keʻen) of bdellium” (Num. xi. 7); or a body filled with likenesses of things. In this latter sense the term ʻayin is used by our Sages in phrases like the following:—Like that [keʻen] which he has stolen, like that [keʻen] which he has robbed; or different properties and qualities are meant, according to the meaning of the word ʻayin in the passage, “It may be that the Lord will look (beʻenai) on my condition” (2 Sam. xvi. 12). So much for the form of the Ofannim. Their motion is described as being without curvature and deviation; as being straight, without any change. This is expressed in the words, “When they went, they went upon their four sides: and they turned not when they went” (E.; ver. 17). The four Ofannim do not move of their own accord, as the Ḥayyot, and have no motion whatever of their own; they are set in motion by other beings, as is emphatically stated twice. The Ḥayyot are the moving agents of the Ofannim. The relation between the Ofan and the Ḥayyah may be compared to the relation between a lifeless body tied to the hand or the leg of a living animal; whithersoever the latter moves, thither moves also the piece of wood, or the stone, which is tied to the named limb of the animal. This is expressed in the following words:—“And when the Ḥayyot went, the Ofannim went by them; and when the living creatures were lifted up from the earth, the Ofannim were lifted up” (ver. 19); “and the Ofannim were lifted up over against them” (ver. 20). And the cause of this is explained thus:—“The spirit of the Ḥayyah was in the Ofannim” (ibid.). For the sake of emphasis and further explanation the prophet adds, “When those went, these went; and when those stood, these stood; and when those were lifted up from the earth, the Ofannim were lifted up over against them; for the spirit of the Ḥayyah was in the Ofannim” (ver. 21). The order of these movements is therefore as follows:—Whithersoever it is the will of God that the Ḥayyot should move, thither they move of their own accord. When the Ḥayyot move the Ofannim necessarily follow them, because they are tied to them, and not because they move of their own accord in the direction in which the Ḥayyot move. This order is expressed in the words, “Whithersoever the spirit was to go, they went, thither was the spirit to go; and the Ofannim were lifted up over against them; for the spirit of the Ḥayyah was in the Ofannim” (ver. 20). I have told you that Jonathan, the son of Uzziel, translates the verse thus, “to the place whither it was the will that the Ḥayyot should go,” etc.

      After having completed the account of the Ḥayyot, with their form and motion, and of the Ofannim, which are beneath the Ḥayyot, connected with them and forced to move when the Ḥayyot move, the prophet begins to describe a third object which he perceived prophetically, and gives the account of a new thing, viz., of that which is above the Ḥayyot. He says that the firmament is above the four Ḥayyot, above the firmament is the likeness of a throne, and over the throne the likeness of the appearance of man. This is the whole account of what the prophet perceived at first at the river Chebar.
    pines: Placeholder text
    goodman: |-
      He says that he saw four creatures, each with four faces, four wings, two hands, and overall, a human form: the likeness of a man (Ezekiel : ). Their hands, too, he says were human. Human hands, as we know, are doubtless for craftsmanship. He adds that their legs were straight, not jointed. That is the plain sense of a straight leg ( : ). The Sages say, “Their legs were a straight leg— teaches that on high there is no sitting” (Genesis Rabbah ). This, too, you should understand.

      Although their hands were like human hands, he continues, the soles of their feet, the organs of locomotion, unlike human feet, were round, like a calf’s hoof (Ezekiel : ).

       He adds that there was no space between the creatures— no void. They were conjoined: each coupled to the next ( : ). He then says that although the creatures were in contact, their faces and wings were separate at the top: Their faces and wings parted above ( : ).

      Notice this “above”: their bodies conjoined, their faces and wings separate, but only at the top. That is why he says, Their faces and wings parted above. He adds that they shone like burnished bronze ( : )— they were luminous, like burning embers ( : ). That is all he says of the creatures’ form— their shape and substance, appearance, wings, hands, and feet.

      He goes on to describe how they moved, as you will hear. He says there was no turn- ing about or doubling back, no veering in their course, but one continuous motion: They turned not as they went (Ezekiel : ). Each creature, he adds, advanced in the direction it faced: Each went the way it faced ( : )— each moved only in the direction it faced. I would love to know which face, for they had several. Still, all four did not go the same way, or he would not have said each went its own way: Each went the way it faced.

      They advanced at a run, he then says, and returned the same way: the creatures run- ning and returning (ratzoʾ va- shov; Ezekiel : ). For ratzoʾ is the infinitive of ratz, run; shov is the infinitive of shav, return. He does not say ‘coming and going’ but running out and back. He illustrates with a simile: like lightning (bazak; : )— bazak being a word for lightning. It was like lightning, he says— the swiftest visible motion, striking again and again and retreating just as swiftly to where it started. Jonathan ben Uzziel glossed ratzoʾ va- shov as “repeatedly circling the world and returning as one creature, swift as a lightning flash.”

      He adds that the creatures’ advance and retreat were not autonomous but directed from elsewhere— namely, by God’s purpose. For the direction each creature took in its swift movement out and back, he says, was as God’s purpose intended: Whither the spirit (rua ) would have them go, thither did they go, turning not (Ezekiel : ). Rua here means ‘purpose,’ not ‘wind,’ as I explained in distinguishing the word’s senses (I ). The crea- tures, he says, took the course set by God’s intent. Jonathan ben Uzziel glossed accord- ingly: “They went where the Will would have them go, not deviating.” But since the verse says Whither the spirit would have them go, thither did they go—s uggesting, superficially, that God might have them go now as they do, now otherwise— Ezekiel returns to the point, resolving the ambiguity and showing us that would here is in the perfect tense, as it often is in Hebrew: The direction they take is fixed, specified by God’s timeless will, as Ezekiel makes clear when he caps the line Whither the spirit would have them go, thither did they go, as the spirit intended ( : ). You should not miss this striking clarification about the creatures’ motions following his account of their features.

      He now begins another description, saying that he saw one body beneath the crea- tures, held fast to them but touching the earth. It, too, had four masses with four faces, but he does not say it had any form at all— neither human nor that of any other animal.

      He says only that the four masses were vast, dread, and terrifying (cf. Ezekiel : ) but assigns them no shape at all, saying only that their bodies were all “eyes.” He calls them wheels: I saw the creatures, and lo there was one wheel on earth by the creatures with his four faces ( : ). That shows that it was one mass, with one end by the creatures and the other on earth, and that this wheel had four faces: The look and structure of the wheels was like the color of beryl, and all four had the same likeness ( : ).

      Having spoken of one wheel, he shifts to talk of four, declaring that the four faces of the wheel were four wheels, all looking alike: All four had the same likeness. He then speci- fies that the wheels were one within another: Their look and action was of a wheel in a wheel (Ezekiel : ). He does not say that about the creatures: The word ‘in’ is not applied to them. They were conjoined: each coupled to the next ( : ). But the wheels, he says, were set inside each other, a wheel in a wheel.

      By saying that the whole wheeled mass was filled with ʿeynayim (Ezekiel : ), he might mean full of eyes but perhaps multicolored, as in Its color (ʿeyno) was the color (ʿeyn) of amber (Numbers : ). Or he could mean “likenesses,” as our language experts understand: “like what he stole . . . like what he robbed (ke-ʿ eyn . . . ke ʿeyn)” (B. Bava Kamma 65ab, 66a), meaning equivalent to what he stole or took. Or it might mean cer- tain states or conditions, as in Mayhap the Lord will regard my plight (ʿeyni; Samuel : ). Such is his description of the form of the wheels.

       Of their motion, he says they too did not twist, turn, or deviate but went steadily forward: In all four directions they moved unswerving (Ezekiel : ). He adds that the four wheels, unlike the creatures, do not move of their own accord. They have no motion of their own at all but are moved externally. He stresses this, repeating the point several times, treating the creatures as what moves the wheels, like lifeless bodies bound to an animal’s paw or foot or a rock or piece of wood tied to a limb and moving when the animal does: As the creatures went, so did the wheels with them; and when the creatures rose from the earth, so did the wheels ( : ). Likewise, he says, The wheels were lifted with them ( : ), and he names the cause: for the spirit of the creature was in the wheels ( : ). He re- peats the point for emphasis and clarity: When the creatures moved, they moved; when they stood still, they stopped; when the creatures rose from the earth, the wheels rose with them.

      For the spirit of the creature was in the wheels ( : ).

      The pattern of movements, then: The creatures took the course God’s purpose gave them; the wheels, linked to them, moved with them. The wheels do not follow the creatures’ course independently. As he describes the linkage, Whither the spirit would have them go, thither did they go, as the spirit intended, and the wheels rose with them, for the spirit of the creature was in the wheels (Ezekiel : ). I have told you already how Jona- than ben Uzziel rendered this: “Where the will was for them to go . . .” ( .4b).

       Having finished describing the forms and movements of these creatures and having mentioned the wheels below them and how those wheels link to them and move as they do, he turns to a third sight he beheld and describes what lay above the creatures. Above the four, he says, was a firmament; atop it, the likeness of a throne (Ezekiel : ); and on the throne, the likeness of the image of a man ( : ). That completes his account of what he first beheld by the river Chebar.
