  ch21:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      ʿAvor— passing. The base meaning is the same as that of ‘pass’ in Arabic, a change of place, typically said of a living being crossing ground: He passed before them (Genesis : ) or Pass before the people (Exodus : ). This is frequent. Later the sense was enlarged to include the spread of a sound through the air: They passed the call through the camp ( : ) and The report I hear passing amongst the Lord’s people ( Samuel : ). It was ap- plied metaphorically to the spread of light and to the Shekhinah beheld in a prophetic vision: Lo there was a smoking firepot and a flaming torch that passed between those pieces (Genesis : ). This was in a prophetic vision. For it says at the outset, Abram fell into a trance ( : ). It is in this figurative sense that it is said, I passed through the land of Egypt (Exodus : )— and so in all such cases.

      In another sense, one who goes too far is said to pass the mark: A man past his limit with wine (Jeremiah : ). The term is also applied metaphorically to one who bypasses one goal and takes another: He fired an arrow past him ( Samuel : ). It is in this figu- rative sense, as I see it, that it says, The Lord passed his face (Exodus : ). The anteced- ent of his here would be God, as the Sages take it in narratives not relevant here (B. Rosh ha- Shanah 17b) but confirming my view that his face is that of the Holy One, blessed be He.

      The explanation, as I see it, is this: Moses sought to know God in a certain way, called seeing the face, as in My Face shall not be seen (Exodus : ). But he was promised a lesser epiphany, called seeing the back: Thou shalt see My back ( : ). I noted this usage in Mishneh Torah (Laws of the Foundations of the Torah . ). What it says, then, is that God masked His face and passed him on to something else, knowledge of the acts credited to Him, which are ascribed to multiple attributes, as I shall explain (I ). By ‘masked’ I mean that such an experience is barred, impossible by its nature. If any enlight- ened man’s mind grasps all that its nature permits yet longs for more, it is either undone or destroyed, as I shall explain in a later chapter of this work (I )— unless divinely aided, as it says, I shall cover thee with My hand while I pass ( : ).

      The Targum follows its usual practice in rendering this verse: Whenever it finds any- thing ascribed to God suggesting corporeality or any of its appurtenances, it shifts the reference to something else deemed understood. So when it says, There was the Lord, standing atop it (Genesis : ), Onkelos translates it as “The glory of the Lord stood above it.” When it says, The Lord stand between me and thee ( : ), he has “The Lord’s Word abide between me and thee.” He consistently glosses in this way. So when it says, The Lord passed by his face (Exodus : ), Onkelos renders it as “The Lord caused His manifestation to pass before him, and proclaimed . . .” For Onkelos, what passed was surely something created. He took Moses to be the antecedent of his, giving passed by his face the sense of ‘passed before him,’ as in The offering passed before him (Genesis : ). This interpretation, too, is just fine.

      Supporting Onkelos’ approach, Scripture says, As My glory passeth (Exodus : )— the reference explicitly being not to God Himself but to something associated with Him.

      It would be of God’s glory, then, that it is said, until I have passed ( : ) and The Lord passed by his face ( : ). If one must presume an implicit referent, as Onkelos always does, supplying God’s glory, manifestation, or word, as context demands, I would supply ‘voice’ here, giving the sense of “The Lord’s voice passed before him and called out.” I have already explained the figure of a voice passing in They passed the call through the camp ( : ). The voice would be what called out. You should not think it far- fetched that a voice is said to call. For it is in just such words that God’s address to Moses is described: He heard the voice speaking to him (Numbers : ). Speaking is ascribed to a voice the same as calling. Sometimes a voice is directly said to speak or call: A voice saith, “Call out!”

      And I said, “What shall I call out?” (Isaiah : ). Our verse, then, would mean ‘A voice from God passed before him and called, Lord, Lord’ (Exodus : ). Lord is repeated, since this is a call in which God Himself is addressed, as in His calls, Moses, Moses ( : ), or Abraham, Abraham (Genesis : ). This, too, is a fine gloss.

      Do not be troubled that this knotty and challenging issue bears multiple interpre- tations. That does not harm our project. Choose the view you like: ( ) Moses’ great epiphany was, of course, wholly within a prophetic vision. That is, all that he yearned for was intellectual: What he sought, what he was denied, and what he attained were all conceptual, not sensory at all, as I glossed it at first. Or ( ) as Onkelos glossed it, there was something more that was seen visibly, his intellectual understanding complemented by something created— unless that, too, was within his prophetic vision, as with Abra- ham: Lo there was a smoking firepot and a flaming torch that passed . . . (Genesis : ).

      Or ( ) his intellectual understanding was seconded by an auditory apparition. What passed before him, then, would be the voice— created, of course. Choose the view you please. The whole point is that you should not believe that passed here means what it does in pass before the people (Exodus : ). God is not a body, and motion is not predi- cable of Him. So He cannot be said to pass in the term’s original sense.
