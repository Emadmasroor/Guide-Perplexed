  ch3:
    friedlander: 'When Ezekiel recalled to memory the form of the Chariot, which he
      described in the beginning of the book, the same vision presented itself to
      him a second time; in this vision he was borne to Jerusalem. He explains in
      describing it things which have not been made clear at first, e.g., he substitutes
      the term “cherubim” for Ḥayyot, whereby he expresses that the Ḥayyot of the
      first vision are likewise angels like the cherubim. He says, therefore: “Where
      the cherubims went, the Ofannim went by them: and when the cherubims lifted
      up their wings to mount up from the earth, the same Ofannim also turned not
      from beside them” (x. 16). By these words he shows how closely connected the
      two motions are [viz., that of the Ḥayyot and that of the Ofannim]. The prophet
      adds, “This is the Ḥayyah that I saw under the God of Israel by the river of
      Chebar; and I knew that they were cherubims” (ver. 20). He thus describes the
      same forms and the same motions, and states that the Ḥayyot and the cherubim
      are identical. A second point is then made clear in this second description,
      namely, that the Ofannim are spherical; for the prophet says, “As for the Ofannim,
      it was cried unto them in my hearing, O sphere” (ver. 13). A third point concerning
      the Ofannim is illustrated here in the following words: “To the place whither
      the head looked they followed it: they turned not as they went” (ver. 11). The
      motion of the Ofannim is thus described as involuntary, and directed “to the
      place whither the head looketh”; and of this it is stated that it moves “whither
      the spirit is to go” (i. 20). A fourth point is added concerning the Ofannim,
      namely, “And the Ofannim were full of eyes round about, even the Ofannim that
      they four had” (x. 12). This has not been mentioned before. In this second description
      there are further mentioned “their flesh, and their backs, and their hands,
      and their wings” (ibid.), whilst in the first account none of these is mentioned;
      and it is only stated that they are bodies. Though they are endowed in the second
      account with flesh, hands, and wings, no form is given to them. In the second
      account each ofan is attributed to a cherub, “one ofan by one cherub, and another
      ofan by another cherub.” The four Ḥayyot are then described as one Ḥayyah on
      account of their interjoining: “This is the Ḥayyah that I saw under the God
      of Israel by the river of Chebar” (ver. 20). Also the Ofannim, though being
      four in number, as has been mentioned, are called “one ofan upon the earth”
      (ver. 15), because they interjoin, and “they four have one likeness” (ver. 16).
      This is the additional explanation which the second vision gives of the form
      of the Ḥayyot and the Ofannim.'
    pines: Placeholder text
    goodman: |-
      Having described the chariot at the start of the book, Ezekiel has the same experience again, borne now, in his prophetic vision, to Jerusalem. Here he clarifies for us things previously left unclear. He replaces the word ‘creatures’ with ‘cherubim.’ So we know that the creatures mentioned earlier are angels, or cherubim. He says, When the cherubim moved, the wheels did so with them, and when the cherubim raised their wings to rise up from the earth, the wheels parted not from them (Ezekiel : ), he is stressing the linkage that I mentioned. He continues, This was the creature that I saw beneath the God of Israel by the River Chebar, and I knew that they were cherubim ( : ). He repeats his descrip- tion of their forms and motions, clearly identifying the creatures as cherubim— and the cherubim as the creatures. But a new idea in this second account is that the wheels are galgalim— I heard the wheels called galgal ( : ). And a third thought is expressed about the wheels: Where the head faced did they go, turning not as they went ( : ), stressing that the wheels had to take the direction the head faced. That underscores the sense of Whither the spirit would have them go ( : ). He adds a fourth thought about the wheels: The wheels were full of eyes round about, all four wheels ( : ). This he had not said the first time, but he says of the wheels now: all their flesh— backs, hands, wings ( : ). He had not mentioned earlier that the wheels had flesh, hands, or wings— only that they were masses. Now he says that they had hands and wings but still does not say they had any form at all.

       This time he explains that there was a wheel for each cherub: one wheel beside one cherub, one beside another (Ezekiel : ). And he makes clear now that the four crea- tures were really one, being conjoined: This was the creature that I saw beneath the God of Israel by the River Chebar ( : ). The wheels, too, he calls one— one wheel on earth ( : )— although he had said there were four. For they were conjoined, and all four had the same likeness ( : ). This is how he clarifies the form of the creatures and the wheels seen in his second epiphany.
