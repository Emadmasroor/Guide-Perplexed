  ch45:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      Having explained what prophecy is in reality, as reason requires and our Torah makes plain, I should discuss its degrees, as both reason and the Torah make clear. Not everyone who reaches one of these ‘stages,’ as I call them, is in fact a prophet. The first two are step- ping stones. One who goes only that far does not count as a prophet like the rest I’ve been discussing. But he may be called one loosely, being so close.

      You should not be misled by finding in Scripture that a prophet inspired at one level may be so at another. Inspiration can reach a prophet in one form at one time and in an- other at another. For just as a prophet may not prophesy throughout his life but only for a time and then lose his inspiration, so might one prophesy for a time in the form typical of a high level and later at a lower level; he may, indeed, reach that higher plane but once in his life and then be deprived of it and remain at a lower level until his prophecy gives off, for every prophet will lose his prophethood before he dies, whether shortly before or long before his death. This is clear in Jeremiah’s case from the mention of the cessation of the Lord’s speaking to Jeremiah (Ezra : ) and, in David’s case, from its saying, These are David’s last words ( Samuel : ). The same holds true of all prophets.

      Given the foregoing, I shall list the degrees to which I have referred.

       . At the first level of prophecy, a person is seconded by divine help, prompting and spurring him to perform some righteous act of major worth, like delivering the virtuous from the wicked, or rescuing a great and good person, or helping many people. He finds something in him moving and pressing him to act. This is called “the spirit of the Lord,”

      and of the person so favored it is said that the Lord’s spirit gripped him (cf. Judges : , : ; Samuel : , : ), or enveloped him (cf. Judges : ; Chronicles : ), or rested upon him (cf. Numbers : – ; Isaiah : , : ), or the Lord was with him (cf. Judges : ; Samuel : , : ), or some similar expression.

      This is the rank of all the Judges of Israel. Of them in general it is said, When the Lord raised up judges for them, the Lord would be with the judge, and he would deliver them (Judges : ). It is also the rank of every righteous anointed king of Israel, as shown when certain judges and kings are singled out, such as The spirit of the Lord came upon Jephthah ( : ); and of Samson, The spirit of the Lord gripped him ( : ); and of Saul, When he heard these things the spirit of the Lord came upon Saul ( Samuel : ); and of Amasai, when the Holy Spirit moved him to come to David’s aid, The spirit enveloped Amasai, chief of the captains, “We are thine, David! We are with thee, son of Jesse! Hail to thee” ( Chronicles : ).

      Just such a power never left Moses our Teacher from the time he reached manhood. It was this that moved him to slay the Egyptian and to rebuke the wrongdoer when the two Hebrews were fighting (Exodus : – ). So strong was this inner urge that even after he fled in fear and reached Midian as a fugitive, when he saw a wrong, he could not tolerate it or refrain from putting a stop to it, as it says: Moses rose to their defense ( : ). David, too, was attended by such a power from the time he was anointed, as it says: The spirit of the Lord gripped David from that day forward ( Samuel : ). In the same spirit he faced the lion, the bear, and the Philistine ( : – ).

      But such a spirit brought none of these men to speak. It moved them and gave them the strength only to act— not in just any way but to help those wronged, whether one worthy person or a group, or to act to that effect. Not everyone who has a true dream is a prophet, and similarly, not everyone who happens to be succored (financially or in winning some personal goal) can be said to be seconded by the Lord’s spirit, to have the Lord with him, or to act by the Holy Spirit. We say this only of one who did some great good or something resulting in such an end, like Joseph’s success in his Egyptian master’s home, initiating momentous events that later came to light.

       . At the second level, one finds something within him, as it were; something wells up in him and makes him speak words of wisdom, praise, good counsel, political or godly— all while he is awake and in normal possession of his senses. This is called speak- ing by the Holy Spirit. It was in such a spirit that David composed the Psalms and Sol- omon composed Proverbs, Ecclesiastes, and the Song of Songs. Daniel, Job, Chronicles, and the other Scriptures were composed in such a Holy Spirit. That is why they are called Scriptures, writings inspired by the Holy Spirit. The Sages state that the Book of Esther was inspired by the Holy Spirit (B. Megillah 7a). It was of such a spirit that David said, The spirit of the Lord spoke within me, His word upon my tongue ( Samuel : ), mean- ing that the Holy Spirit prompted his words.

      The seventy elders reached this plane, of whom it was said, When the spirit rested upon them, they prophesied, but did not continue (Numbers : ). Likewise Eldad and Medad ( : ) and every High Priest seeking auguries through the Urim and Tumim (Exodus : ; Numbers : ), as the Sages affirm: “The Shekhinah rests upon him, and he speaks by the Holy Spirit” (B. Yoma 73b). Jahaziel ben Zechariah was of the same class.

      Chronicles says of him, The spirit of the Lord came upon him in the midst of the congrega- tion, and he said, “Hear me, all Judah, ye who dwell in Jerusalem, and King Jehoshaphat!

      Thus saith the Lord to you . . .” ( Chronicles : – ). Also Zechariah ben Jehoiada the Priest. For it is said of him, The spirit of God enveloped Zechariah ben Jehoiada the Priest, and he stood before the people and said to them, “Thus saith God . . .” ( : ). Azariah ben Oded, too, of whom it is said, Azariah ben Oded— The spirit of God came upon him, and he went out to meet Asa [and said to him, “Hear me, Asa, and all Judah and Benjamin! The Lord is with you when ye are with Him!”] ( : – ). The same is true of all those of whom the like is said. Balaam, too, was of this type, when he was upright. That is what it means by saying, The Lord put a word into Balaam’s mouth (Numbers : )— he spoke, in effect, by the spirit of the Lord. In the same vein, he called himself one who heareth God’s words ( : ).

      David, Solomon, and Daniel, we must note, are on this plane, not on that of Isaiah, Jeremiah, the prophet Nathan, Ahijah of Shilo, and their like. They— David, Sol- omon, and Daniel— spoke and said what they did only through the Holy Spirit. Even when David says, So saith the God of Israel; the Rock of Israel spoke to me ( Samuel : ), he means that God made him a promise through Nathan or some other prophet. This is like the words the Lord said unto her (Genesis : ) or the Lord said unto Solomon, “Since thou hast done this and hast not kept My covenant . . .” ( Kings : )— a doom doubtless conveyed by Ahijah of Shilo or some other prophet.

      Similarly, when it says of Solomon, At Gibeon did the Lord appear to Solomon in a dream by night, and God said . . . ( Kings : ), this was not strictly prophecy. This is not like The word of the Lord came to Abram in a vision, saying . . . (Genesis : ), or God said unto Israel in visions of the night ( : ), or the prophecies of Isaiah and Jeremiah. For in all those cases, although the revelation came in a dream, it was also revealed to the prophet that it was a prophetic revelation he had received. But in Solomon’s case, the account ends by saying, Solomon awoke, and lo it was a dream! ( Kings : ). And the second time, it says, The Lord appeared to Solomon again, as He had appeared to him at Gibeon ( : ), showing that this too was a dream, a lesser rung than that of which it says, In a dream do I speak to him (Numbers : ). For those who prophesy in a dream do not call it a dream at all once the revelation is received. They call it a revelation categorically, as Jacob, on waking from his prophetic dream, did not call it a dream but spoke decisively: Surely the Lord is in this place (Genesis : ). He also said, God Almighty appeared to me in Luz in the land of Canaan ( : ). He knew with certainty that it was a revelation— whereas of Solomon it says, Solomon awoke, and lo it was a dream!

      Daniel, too, you’ll find, although he saw an angel and heard words spoken in his dreams, does call them dreams even after learning from them. It says, The mystery was revealed to Daniel in a vision of the night ( : ); later he wrote down his dream. . . . In my night vision I saw . . . ( : – ); the visions in my head troubled me ( : ); and I was dismayed by my vision and could not fathom it ( : ). This is clearly a grade below that of those of whom it is said, In a dream do I speak to him (Numbers : ). So our nation agree in class- ing the Book of Daniel with the Hagiographa, not the Prophets.

      I have noted, then, that the sort of prophecy that came to Solomon and Daniel, even when it involved seeing an angel in a dream, was regarded by them not as prophecy strictly but as a dream state in which truths were divined: It was still of the second type, the same as that in which words are inspired by the Holy Spirit. So in ordering the canon, the Sages do not distinguish Proverbs, Ecclesiastes, Daniel, or the Psalms from the Books of Ruth or Esther. All were inspired by the Holy Spirit and are called prophetic in a broad sense.

       . This is the first level of those who say, “The word of the Lord came to me,” or words to that effect. It involves a prophet’s seeing, say, a symbol in a dream, with all the condi- tions of authentic prophecy already stated (II – ). The meaning of the symbol, what it stands for, is explained in the same prophetic dream— as are most of Zechariah’s symbols.

       . The prophet, in his prophetic dream, hears speech clearly and distinctly but does not see the speaker, as in Samuel’s first revelation, as I explained ( .92b).

       . The prophet is addressed by a man in a dream, as Ezekiel says of one of his prophe- cies: The man spoke to me, “Son of man . . .” ( : ).

       . He is addressed by an angel in a dream, as is the case with most prophets. Thus it says, The angel of God said to me in a dream . . . (Genesis : ).

       . In a prophetic dream, the prophet seems to see God speaking to him, as Isaiah says, I saw the Lord ( : ), and He said, Whom shall I send? ( : ), or Micaiah ben Im- lah’s saying, I saw the Lord ( Kings : ; Chronicles : ).

       . Inspiration comes in a prophetic vision in which the prophet sees symbols— like Abraham’s vision between the sections (Genesis : – ). For these symbols appeared in a waking vision, as we have noted ( .87b, 95a).

       . He hears speech in a vision, as it says of Abraham, Lo the word of the Lord came to him, saying, “This one shall not be thine heir” (Genesis : ).

       . He sees a man addressing him in a prophetic vision, as Abraham also did by the oaks of Mamre ( : ) or Joshua at Jericho (Joshua : ).

       . He sees an angel addressing him in a vision, as Abraham did at the binding of Isaac (Genesis : – ). In my view, this is the highest level of prophets attested in Scripture, based on their intellectual perfection, as reason requires— except for our Teacher Moses.

      Whether a prophet can, as it were, see God addressing him in a prophetic vision seems unlikely to me. Imagination does not reach that far, nor do we find such a state in other prophets. That is why the Torah specifies, In a vision do I make Myself known to him; in a dream do I speak to him (Numbers : ). It finds speech only in a dream state and leaves to visions contact with the emanation of the Active Intellect. Hence make Myself known to him, using the reflexive verb. It does not say that God is heard to speak in a vision.

      I have found passages attesting to speech seemingly heard in a vision, but I suspect that speech ill suited to a vision but heard in a dream was what God led the prophet to fancy He had addressed to him in a vision. That would be consistent with the plain sense of the verse. Or one might say that any vision in which you find a prophet hearing himself addressed began as a vision but ended in a swoon and became a dream, as I explained re- garding Abram fell into a trance (Genesis : ; see .87b), which the Sages call a prophetic slumber (Genesis Rabbah . ). So speaking of any sort would be heard in a dream, as our text has it: In a dream do I speak to him. Whereas in a prophetic vision, only symbols are seen, or rational links bearing intellectual insights, like those reached by reason, as I explained (II ). That would be the point of In a vision do I make Myself known to him.

      Based on this reading, there would be eight degrees of prophecy, the highest and most advanced being that in which the inspiration comes in a vision, broadly understood, even if the prophet is addressed by a man, as we have seen.

      You might object, ‘You counted as one level of prophecy a prophet’s hearing speech addressed to him by God, as Isaiah and Micaiah did. How can that be if our principle is that every prophet is addressed only by an angel, except for Moses, of whom it is said, With him do I speak face to face (Numbers : )?’ Quite so. Imagination mediated in such cases. A prophet hears God address him only in a prophetic dream. Our teacher Moses heard Him from above the covering, between the cherubim (Exodus : ), unmediated by the imagination. In Mishneh Torah (Laws of the Foundations of the Torah . ), I ex- plained such prophecy in detail and clarified what is meant by face to face and as one man speaketh to another ( : ) and the like. So you will understand it from that, and there is no need to repeat what I’ve already said.
