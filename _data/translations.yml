  ch3:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      Having described the chariot at the start of the book, Ezekiel has the same experience again, borne now, in his prophetic vision, to Jerusalem. Here he clarifies for us things previously left unclear. He replaces the word ‘creatures’ with ‘cherubim.’ So we know that the creatures mentioned earlier are angels, or cherubim. He says, When the cherubim moved, the wheels did so with them, and when the cherubim raised their wings to rise up from the earth, the wheels parted not from them (Ezekiel : ), he is stressing the linkage that I mentioned. He continues, This was the creature that I saw beneath the God of Israel by the River Chebar, and I knew that they were cherubim ( : ). He repeats his descrip- tion of their forms and motions, clearly identifying the creatures as cherubim— and the cherubim as the creatures. But a new idea in this second account is that the wheels are galgalim— I heard the wheels called galgal ( : ). And a third thought is expressed about the wheels: Where the head faced did they go, turning not as they went ( : ), stressing that the wheels had to take the direction the head faced. That underscores the sense of Whither the spirit would have them go ( : ). He adds a fourth thought about the wheels: The wheels were full of eyes round about, all four wheels ( : ). This he had not said the first time, but he says of the wheels now: all their flesh— backs, hands, wings ( : ). He had not mentioned earlier that the wheels had flesh, hands, or wings— only that they were masses. Now he says that they had hands and wings but still does not say they had any form at all.

       This time he explains that there was a wheel for each cherub: one wheel beside one cherub, one beside another (Ezekiel : ). And he makes clear now that the four crea- tures were really one, being conjoined: This was the creature that I saw beneath the God of Israel by the River Chebar ( : ). The wheels, too, he calls one— one wheel on earth ( : )— although he had said there were four. For they were conjoined, and all four had the same likeness ( : ). This is how he clarifies the form of the creatures and the wheels seen in his second epiphany.
    munk: Placeholder text
    atay: Placeholder text
    tibbon: Placeholder text
  ch4:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      I should tell you about a thought that Jonathan ben Uzziel proposed. Seeing that the text clearly says I heard the wheels called galgal (Ezekiel : ), he was sure the wheels were the heavens. So he consistently translated wheel as galgal (sphere) and wheels as galgalaya.

      This gloss was confirmed for him, no doubt, by Ezekiel’s saying that the wheels were like the color of beryl ( : ), a color commonly assigned to the heavens. But when he found it saying, As I saw the creatures, lo there was one wheel on earth ( : ), showing that the wheels were on earth, he saw the problem in his reading, of course. But he pressed it, taking earth here to mean the surface of the heavens, which is “earth” relative to what lies higher. He translated it as “one wheel on the earth beneath the heavens’ height.”

      You can see how he took it. What led him to read the verse in this way, I suppose, was believing that galgal in its primary sense was a name for the sky. But as I see it, galgal just means rolling: roll thee down (gilgaltikha) from the crags (Jeremiah : ), he rolled away (va- yagel) the stone (Genesis : ); and thus, like a tumbleweed (galgal) in the gale (Isaiah : ), so called because it rolls. That is why a skull is called gulgolet: It can roll. Anything round is called galgal, since it readily rolls: The heavens are called galgalim because they revolve, being round. The Sages say, “It is a cycle (galgal)” (B. Shabbat 151b), and ac- cordingly, they call a winch a galgal. So when Ezekiel says, I heard the wheels called galgal ( : ), Jonathan took that to tell us their shape. For no shape or form was mentioned as theirs beyond calling them galgalim.

      As for like beryl, Jonathan interprets this the same way the second time. When Ezek- iel says the appearance of the wheels was like the color of beryl ( : ), Jonathan translates it as “like the color of a precious stone.” Onkelos, as you know, used the same expression in translating the like of a work clear as sapphire (Exodus : ; see I ): “like a precious stone.” There is no difference between like the color of beryl and the like of a work clear as sapphire. You see my point.

      Don’t be troubled that I cited Jonathan ben Uzziel’s gloss here, although I disagree.

      Many of the Sages and exegetes, too, you’ll find, differ with his glosses of certain biblical themes and terms. Why would they not in matters so arcane? I will not press you to favor my reading. Just understand his reading fully, as I’ve sketched it, and mine as well. God knows which best fits Ezekiel’s intent.
    munk: Placeholder text
    atay: Placeholder text
    tibbon: Placeholder text
  ch5:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      One thing you should note: Ezekiel says visions of God ( : ) in the plural, not the singular.

      For his epiphanies were of different kinds, three in all: beholding the wheels, the creatures, and the man above them. About each, he says ‘I saw’: Of the creatures, I saw, and lo a stormwind . . . ( : ); of the wheels, As I saw the creatures, lo there was one wheel on earth ( : ); and of the man, of higher degree than the creatures, I saw the like of the color of amber . . .

      from what appeared to be his loins ( : ). Apart from these three passages, he never repeats the words I saw in his account of the Chariot. The Sages of the Mishnah enlightened me about this. They alerted me to it by ruling that only the first two epiphanies— his visions of the creatures and the wheels— may be expounded, whereas of the third, the amber, and everything connected with it, “only the rubrics are shared” (M. agigah . ).

      Our holy Rabbi (Judah the Patriarch) believed that all three epiphanies belong to the Account of the Chariot, so only the rubrics may be taught regarding all three. But the Sages ask how far one may go in teaching the Account of the Chariot. Rabbi Meir says, up to the last I saw ( : ). Rabbi Isaac says, up to amber ( : ). From the first I saw ( : ) until amber one may; beyond that, only the rubrics. Some say, from I saw to amber we impart only the rubrics; beyond that, only to one who is wise— otherwise, not (B. agigah 13a).

      So their text clearly distinguishes the three kinds of epiphany, marked by I saw, show- ing that each was on its own level. The third, of which it is said I saw the like of the color of amber (Ezekiel : )— his seeing the divided form of a man, of which it says from the likeness of his loins up . . . and from the likeness of his loins down ( : ), was the last level and his highest. The Sages differ as to whether one may hint anything about it in one’s teaching, by disclosing the rubrics, or whether one may not expound it at all, even by the rubrics, since “one who is wise will understand for himself.” They differ, too, as you see, about his first two epiphanies, of the creatures and the wheels: May one teach their mean- ings openly or only by hints and indirection, using the rubrics?

       We should notice, too, the order of the three epiphanies: First came the creatures, given, inter alia, their causal primacy and rank— for the spirit of the creature was in the wheels (Ezekiel : ). His third epiphany, coming after the wheels, clearly surpasses his seeing the creatures. For the first two presage and lay the groundwork for the third.
    munk: Placeholder text
    atay: Placeholder text
    tibbon: Placeholder text
  ch6:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      The sublime and momentous idea that Ezekiel was moved prophetically to teach us by describing the Chariot is identical to what Isaiah taught more concisely. Not needing so much detail, he said, I saw the Lord seated on a throne, high and exalted, His train filling the Temple, Seraphim attending ( : – ). The Sages explain: What Ezekiel beheld, they say, was identical to what Isaiah saw. They illustrate on the analogy of two men seeing the ruler ride by— one man from the capital, the other from the country. The city dweller, knowing that city folk know in what state the king rides, does not describe the procession but says only ‘I saw the king.’ The other, wanting to describe what he saw to his fellow country folk, who know nothing of the king’s pomp, details it for them, down to the features of his troops and the officers that execute his orders (cf. I ). That ap- praisal is most helpful. In agigah (B. 13b) they say, “All that Ezekiel saw Isaiah saw too.

      But Isaiah was like a city dweller who saw the king; Ezekiel, like a villager who saw the king.” That could be understood along the lines I suggested, that Isaiah’s contemporaries had no need of such detail. To them it was enough to say, I saw the Lord. But the Children of Exile needed the particulars. Or perhaps the Sage thought Isaiah more sophisticated than Ezekiel, so the experience that so stunned and awed Ezekiel was familiar to Isaiah, who did not need exotic language to recount it, since the enlightened are at home here.
