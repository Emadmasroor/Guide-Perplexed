  ch40:
    friedlander: |-
      Ruaḥ is a homonym, signifying “air,” that is, one of the four elements. Comp. “And the air of God moved” (Gen. i. 2).

      It denotes also, “wind.” Comp. “And the east wind (ruaḥ) brought the locusts” (Exod. x. 13); “west wind” (ruaḥ) (ib. 19). In this sense the word occurs frequently.

      Next, it signifies “breath.” Comp. “A breath (ruaḥ) that passeth away, and does not come again” (Ps. lxxviii. 39); “wherein is the breath (ruaḥ) of life” (Gen. vii. 15).

      It signifies also that which remains of man after his death, and is not subject to destruction. Comp. “And the spirit (ruaḥ) shall return unto God who gave it” (Eccles. xii. 7).

      Another signification of this word is “the divine inspiration of the prophets whereby they prophesy”—as we shall explain, when speaking on prophecy, as far as it is opportune to discuss this subject in a treatise like this.—Comp. “And I will take of the spirit (ruaḥ) which is upon thee, and will put it upon them” (Num. xi. 17); “And it came to pass, when the spirit (ruaḥ) rested upon them” (ib. 25); “The spirit (ruaḥ) of the Lord spake by me” (2 Sam. xxiii. 2). The term is frequently used in this sense.

      The meaning of “intention,” “will,” is likewise contained in the word ruaḥ. Comp. “A fool uttereth all his spirit” (ruaḥ) (Prov. xxix. 11), i.e., his intention and will; “And the spirit (ruaḥ) of Egypt shall fail in the midst thereof, and I will destroy the counsel thereof” (Isa. xix. 3), i.e., her intentions will be frustrated, and her plans will be obscured; “Who has comprehended the spirit (ruaḥ) of the Lord, or who is familiar with his counsel that he may tell us?” (Isa. xl. 13), i.e., Who knows the order fixed by His will, or perceives the system of His Providence in the existing world, that he may tell us? as we shall explain in the chapters in which we shall speak on Providence.

      Thus the Hebrew ruaḥ, when used in reference to God, has generally the fifth signification; sometimes, however, as explained above, the last signification, viz., “will.” The meaning of the word in each individual case is therefore to be determined by the context.
    pines: Placeholder text
    goodman: |-
      Ruʾa has multiple meanings. It can mean ‘air,’ one of the four elements: God’s air brood- ing over the waters (Genesis : ). Or it can mean the wind that blows: The east wind brought locusts . . . the west wind [. . . bore them off] (Exodus : , : ). This is frequent.

      It is also a name for the animal spirit: A fleeting wind that returneth not (Psalms : ) and all that have the breath of life (Genesis : ).

      Or it may name what survives uncorrupted after one’s death: The spirit returneth to God who gave it (Ecclesiastes : ).

      It is also a name for the divine intellectual emanation shed upon Prophets, by which they prophesy, as I will explain to you when I say what one may about prophecy in this work (II , , – , ). Thus, I shall share the spirit that is upon you and lay it upon them . . . and lo, when the spirit rested on them [they prophesied] (Numbers : , ) and The spirit of the Lord spoke through me ( Samuel : ). This, too, is frequent.

      Ruʾa is also a word for ‘will’ or ‘purpose’: A fool bares all his spirit (Proverbs : )— his aim or intent. Thus, Egypt shall be drained of spirit; I shall bring her counsels to naught (Isaiah : )— its plans will be foiled; its strategy, undone. Analogously, Who hath plumbed the Lord’s spirit, what man can tell us His plan? ( : ). He says, ‘Who knows what God’s will has in store or grasps what He intends for the world? Let him tell us’— as I will explain in chapters yet to come regarding God’s governance (III – , – , ).

      Whenever spirit is ascribed to God, it is in the fifth sense, or sometimes in this last sense, that of will, depending on context, as I explained.
