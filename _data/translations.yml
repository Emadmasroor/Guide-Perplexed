    goodman: |-
      In the name of the Lord, God of the universe.

      — Genesis : Twenty- five premises are needed to establish that God exists and prove that He is neither a body nor a force in a body and that He is one. All have been proved beyond a doubt by Aristotle and his Peripatetic successors. One further premise, the eternity of the world, I will grant them, since proof of our desiderata depends on it, as I will explain.

       . The existence of an infinite magnitude is absurd.

       . The simultaneous existence of an infinity of finite magnitudes is absurd.

       . An infinite series of causes and effects, even if they have no magnitude (say, this mind’s causing a second, the second a third, the third a fourth, and so ad infini- tum), is clearly absurd as well.

       . Change occurs in four categories: in substance as generation and corruption, in quantity as growth and diminution, in quality as alteration, and in place as trans- location. Change of place is motion more specifically.

       . Every motion is a change, a shift from potency to act.

       . Motion may be essential or accidental, constrained, or partial— the latter being a special case of accidental motion. An instance of essential motion is the shift of a body from one place to another. Accidental motion is, say, the movement of the black of this body from one place to another. Constrained motion would be, say, the upward motion of a rock impelled by some force. Motion of a part is like that of a nail in a ship: When the ship moves, the nail too is said to be in motion. When any complex is in motion as a whole, its parts are said to move.

       . Anything that changes is divisible. So whatever moves is divisible and must be a body. Anything indivisible does not move and is not a body.

       . Whatever moves per accidens must come to rest, since its motion is not essential to it. Its accidental motion cannot last forever.

       . Every body that moves another does so only by being itself in motion.

       . Everything said to be in a body either depends on that body, as accidents do, or that body depends on it, as with natural forms. Both are bodily powers.

       . Some things subsistent in a body are divided per accidens when that body is divided— colors, for instance, and other forces spread through a body. But some things, those that give a body substance, are not divisible at all— the soul, for ex- ample, and the mind.

       . Any force spread through a body is finite, since the body is finite.

       . No type of change can be continuous but translocation, and that of rotary kind (see II ).

       . Translocation is the primary kind of motion and the first by nature. For g eneration and corruption presuppose alteration, and alteration presupposes the approach of a cause to what is altered, there being no growth or diminution without prior gen- eration and corruption.

       . Time is an accident of motion and implies it. Neither exists without the other: Motion occurs only in time, and time is inconceivable without motion. Anything not subject to motion does not exist in time.

       . What is not a body cannot conceivably be numbered, unless it be a force in a body.

      Such forces are enumerable by their different material substrates. Incorporeal things, being neither bodies nor bodily forces, cannot conceivably be numbered, unless as cause and effect.

       . Whatever moves must have a mover, either external, as a stone is moved by a hand, or internal, as with the body of an animal, where what is moved and what moves it are united. So when an animal dies and the mover, its soul, is gone, the body it moved may stay as it was for a time, but it no longer moves as it did. Since the mover within is unseen and imperceptible, animals may seem to have no mover: Anything whose mover is internal is said to be self- moving, meaning that what moves it belongs to the complex.

       . Whatever advances from potency to act needs some external cause to effect the change. For if the cause were internal and unimpeded, it would not have been in potentia but already actual. And if the cause were internal but blocked by some impediment later removed, what removed the blockage would, of course, be the cause of this potential’s being realized. Do take this in.

       . Anything whose existence is caused is contingent in itself: Given its causes, it exists; without them— if they are absent or the causal link is broken—i t does not.

       . Whatever exists necessarily, in and through itself, has no cause of its being or its state.

       . Anything with two components has its composition as a cause of its being. It does not exist of its own necessity. For its existence depends on its components and on their being conjoined.

       . Every body is necessarily a composite of two factors and must bear accidents. The two components are matter and form; the attendant accidents are quantity, shape, and position.

       . Anything potential and in itself contingent might at some time not exist actually.

       . Whatever is such as it is potentially must have matter. For potentiality is always in matter.

       . A composite substance, being composed of matter and form, must have a maker, a mover to activate the substrate and prepare it to receive its form. This is the proxi- mate mover that predisposes the matter of a particular thing. Some inquiry is called for here into motion, mover, and moved. But what needs to be clarified is cleared up fully. In Aristotle’s words, “Matter does not move itself” (Metaphysics Λ , 1071b29). This is the key premise in the search for a Prime Mover.

      Of the twenty- five premises I set out for you, some will be clear on the least reflec- tion; some are axiomatic, or nearly so, as I summarized them. Some require argument and further premises, all rigorously proved in the Physics and its commentaries or in the Metaphysics and its commentary, leaving no room for doubt. But as I told you, it is my aim in this work not to survey the writings of the Philosophers and lay out their ultimate premises but only to cite those most pertinent to our purpose.

       To the above premises, I add one more, affirming the world’s eternity. Aristotle held it to be true and most credible. So we grant it to him for the sake of the argument, to bring out what I mean to show. His premise: . Time and motion are everlasting, ever actual.

      It follows necessarily, on his view, that there must be a body always actually in motion.

      This is the fifth substance. Hence, he says, the heavens are not subject to generation or decay. For motion, he says, neither begins nor ceases. Every motion, he argues, must be preceded by another, of its own kind or some other. The idea that an animal moves after no prior motion is wrong, he holds: An animal starts moving when something motivates it, a shift in its temperament, prompting it to seek something welcome or avoid some- thing unwelcome or something it saw or fancied. What got it moving is one of these three causes, each of which presupposes prior motions. Similarly, he argues, every event was possible earlier. This supports his premise ( ) in several ways.

      Given his added premise, a finite moving object will traverse a finite course infinite times, ever retracing the same path. That is possible only by rotary motion (as per Prem- ise ). So there must be a successive (but not simultaneous) infinity.

       This ( ) is the premise he constantly strives to establish. But so far as I can see, he never states categorically that his arguments for it amount to proof. Rather, it seems to him the best and likeliest view. Yet his followers and the commentators on his works do call it necessary, not just possible, and claim it to be demonstrated. Every Mutakallim hopes to prove it impossible. They say, “An infinite succession of events is inconceivable.” In effect, they take this as axiomatic. To me, Aristotle’s added premise seems possible— neither necessary, as his commentators claim, nor impossible as the Mutakallimūn profess.

      My purpose for now is not to spell out Aristotle’s arguments, nor to critique him or explain my own view about the world’s origin, but just to collect the premises needed for our three desiderata. Given these premises, I will spell out what they imply.
