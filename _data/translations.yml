    goodman: |-
      Back is polysemous. It is a noun denoting the rear: over the back of the Tabernacle (Exodus : ) and The spear came out his back ( Samuel : ). But it can also be a temporal prepo- sition meaning ‘after’: After him there arose none like him ( Kings : ) and after these things (Genesis : ). This is frequent.

      It can also signify emulation, following in someone’s footsteps— After the Lord your God shall ye walk (Deuteronomy : ), After the Lord shall they walk (Hosea : )— faithfully modeling one’s life on His acts and ways, or following after trash ( : ).

      It is in this sense that it says, Thou shalt see My back (Exodus : ): You will grasp what heeds and follows Me and obeys My will— all creation, as I shall explain in other chapters of this work ( .5b).
