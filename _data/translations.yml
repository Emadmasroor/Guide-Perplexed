part3:
  intro:
    friedlander: |-
      INTRODUCTION

      We have stated several times that it is our primary object in this treatise to expound, as far as possible, the Biblical account of the Creation (Maʻaseh bereshit) and the description of the Divine Chariot (Maʻaseh mercabah) in a manner adapted to the training of those for whom this work is written.

      We have also stated that these subjects belong to the mysteries of the Law. You are well aware how our Sages blame those who reveal these mysteries, and praise the merits of those who keep them secret, although they are perfectly clear to the philosopher. In this sense they explain the passage, “Her merchandise shall be for them that dwell before the Lord, to eat sufficiently” (Isa. xxiii. 18), which concludes in the original with the words ve-li-me-kasseh ʻatik, i.e., that these blessings are promised to him who hides things which the Eternal has revealed [to him], viz., the mysteries of the Law (Babyl. Talmud, Pesaḥim 119a). If you have understanding you will comprehend that which our Sages pointed out. They have clearly stated that the Divine Chariot includes matters too deep and too profound for the ordinary intellect. It has been shown that a person favoured by Providence with reason to understand these mysteries is forbidden by the Law to teach them except vivâ voce, and on condition that the pupil possess certain qualifications, and even then only the heads of the sections may be communicated. This has been the cause why the knowledge of this mystery has entirely disappeared from our nation, and nothing has remained of it. This was unavoidable, for the explanation of these mysteries was always communicated vivâ voce, it was never committed to writing. Such being the case, how can I venture to call your attention to such portions of it as may be known, intelligible, and perfectly clear to me? But if, on the other hand, I were to abstain from writing on this subject, according to my knowledge of it, when I die, as I shall inevitably do, that knowledge would die with me, and I would thus inflict great injury on you and all those who are perplexed [by these theological problems], I would then be guilty of withholding the truth from those to whom it ought to be communicated, and of jealously depriving the heir of his inheritance. I should in either case be guilty of gross misconduct.

      To give a full explanation of the mystic passages of the Bible is contrary to the Law and to reason; besides, my knowledge of them is based on reasoning, not on divine inspiration [and is therefore not infallible]. I have not received my belief in this respect from any teacher, but it has been formed by what I learnt from Scripture and the utterances of our Sages, and by the philosophical principles which I have adopted. It is therefore possible that my view is wrong, and that I misunderstood the passages referred to. Correct thought and divine help have suggested to me the proper method, viz., to explain the words of the prophet Ezekiel in such a manner that those who will read my interpretation will believe that I have not added anything to the contents of the text, but only, as it were, translated from one language into another, or given a short exposition of plain things. Those, however, for whom this treatise has been composed, will, on reflecting on it and thoroughly examining each chapter, obtain a perfect and clear insight into all that has been clear and intelligible to me. This is the utmost that can be done in treating this subject so as to be useful to all without fully explaining it.

      After this introductory remark I ask you to study attentively the chapters which follow on this sublime, important, and grand subject, which is the pin upon which everything hangs, and the pillar upon which everything rests.
    pines: Placeholder text
    goodman: |-
      In the name of the Lord, God of the universe.

      — Genesis : Introduction I have explained several times that my main aim in this work was to clarify, so far as pos- sible, the Account of Creation and the Account of the Chariot to meet the needs of the reader for whom I wrote it. These topics, as I explained, are among the Torah’s mysteries, and you know how the Sages decry those who bare such secrets and how they stress the great reward in store for those who keep them, plain as such mysteries are to thinkers. At the end of B. Pesa im, they gloss There is a reward for those who dwell in the presence of the Lord, eating their fill, cloaking the old (Isaiah : ). They say it means “keeping under wraps what the Ancient of Days has revealed— the Torah’s mysteries” (119a).

      You see what they meant. A word to the wise. They had already shown how deep is the Account of the Chariot and how foreign to ordinary minds. Even one who has some understanding of these mysteries is barred halakhically from teaching or expounding them unless one- on- one and to such a person as they describe— and then only the rubrics are shared. That is why knowledge of this kind is extinct in our nation, gone without a trace, understandably. For it was not published but borne from breast to breast and never set down in a book. How, then, could I alert others to the truths I have gleaned, that seem so plain and evident to me? Yet failing to record some of what I see so clearly, letting these insights die when I do, as I must, seems arrant cowardice to me, betraying you and all who are perplexed, as if begrudging them their due and selfishly withholding their legacy. That would be shameful.

       The Law, we know, bans broadcasting these things. So does good sense. Besides, my thoughts here reflect my own intuition and surmise. No divine inspiration has come to teach me what these things mean. Nor have I drawn my beliefs about this from any teacher. I take my lead from the Torah’s text, the Sages’ discussions, and the premises reason tells me must hold. But I could be wrong; the intent might be quite otherwise.

      Serious thinking and God’s help have prompted the tack I will take in glossing Ezek- iel’s words, but in such a way that anyone hearing my account might think I have said no more than the text itself, as if I had just translated the words into another language or sketched their literal sense. But when the reader for whom this work was written studies it closely and follows it carefully, chapter by chapter, he will see clearly all that I have seen, with nothing left hidden. This is the optimal balance between helping everyone and our mandate against blanket disclosure and overexposure.

      So much by way of preamble. Turn your mind now to the chapters that follow and the high, sublime, and momentous goal that is the linchpin, the pillar sustaining everything.
