  ch25:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      Shekhon. It is well known that this verb means ‘to dwell.’ Thus, when he was dwelling by the oaks of Mamre (Genesis : ) or It came to pass while Israel dwelt [in that land] ( : ).

      This is the familiar sense. ‘Dwelling’ means staying somewhere. When an animal has a specific or general habitat, it is said to dwell there, even if it roams about in it, of course.

      Figuratively, this language is applied to inanimate beings and indeed to anything fixed in or attached to something else. So the expression is applied even when what is “dwelt in”

      is not a place and what dwells there is not an animal. Thus it says, Let a cloud dwell on it [the day of Job’s birth, which he consigns to darkness when he rues his fate] (Job : ). A cloud is not alive, obviously; nor, of course, is the day a body at all but a span of time.

       It is in this metaphorical sense that the notion of dwelling is applied to God— referring to His Shekhinah or providence, wherever that Presence or providence may abide. Thus, The Glory of the Lord dwelt [on Mount Sinai] (Exodus : ), I shall dwell amidst the Children of Israel ( : ), and the favor of Him who dwelt in the bush (Deuteronomy : ). Whenever this verb is applied to God, the reference is to His Shekhinah— that is, the light created in a place, or to His providence over something, as context requires.
    munk: Placeholder text
    atay: Placeholder text
    tibbon: Placeholder text
  ch26:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      You know the Sages’ general thesis about any sort of exegesis in this domain: “Torah speaks in human language” (B. Yevamot 71a, Bava Metziʿa 31b). That means that what applies to God is whatever people in general can absorb and conceive of without reflection. So He is described in physical terms to signify that He exists. For to the masses, at first blush, only bodies exist. What is not a body, or of a body, to them is not real. Similarly, any- thing we take to be a perfection is ascribed to Him, so as to indicate His supreme and ab- solute perfection, unmarred by any defect; and nothing popularly thought a lack or defect is ascribed to Him: He is not said to eat, drink, sleep, fall ill, do wrong, or anything of the sort. But whatever the masses consider a perfection is ascribed to Him, even if it is such only in us. For in Him our supposed perfections would be utter defects. Yet if people fancied that He lacked such human perfections, they would think that a flaw in Him!

      Motion, as you know, is a perfection in an animal and critical to its welfare. Just as it must eat and drink to restore what breaks down, it needs to move to pursue what is helpful and avoid what is not. There is no difference between saying that God moves and saying that He eats or drinks. Yet in “human language”— that is, in popular fancy— eating and drinking would be defects in God, but not motion, even though only dependence makes motion necessary.

       It is demonstrated that whatever moves has a size and is, of course, divisible. We shall demonstrate that God does not have a size and so does not move. Nor can He be said to be at rest. For only what can move can be said to be at rest. So all the terms for various animal movements— and life as well — are predicated of Him in the way I’ve explained.

      For motion is an animal trait. Without corporeality, of course, none of these applies: ascending, descending, walking, standing, shifting, sitting, dwelling, coming, going, passing, or any equivalent. It would be otiose to dwell on this but for the way ordinary people are used to thinking. That is why I must spell this out just a bit, as I have, for the sake of those reaching for human perfection and seeking to banish the delusions that have dogged them from childhood.
    munk: Placeholder text
    atay: Placeholder text
    tibbon: Placeholder text
  ch27:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      Onkelos the Proselyte was highly adept in Syriac and Hebrew. He made it his aim to purge corporealism, substituting fit glosses for any biblical predicate suggesting God’s embodiment. Wherever he finds a term for motion of some kind, he takes it to mean an effulgence of created light manifesting God’s Shekhinah or Providence. So he translates The Lord will descend (Exodus : ) as “The Lord will manifest Himself” and The Lord descended ( : ) as “The Lord revealed Himself.” He does not say ‘The Lord came down.’ He translates I will go down and see (Genesis : ) as “I will now manifest Myself and see.” And so on throughout his translation. But I shall go down with thee to Egypt ( : ) he translates as “I shall go down with thee to Egypt.” What a wonderful mark of the man’s mastery and exegetical insight! His treatment, moreover, discloses a major principle about prophecy. For at the start of the episode, it says, God spoke to Israel in visions of the night and said, Jacob, Jacob! . . . I am God . . . I shall go down with thee to Egypt ( : – ). That opening situates God’s promise within visions of the night. So Onkelos was not uncomfortable translating the passage literally. Rightly so. For it relates what Jacob heard, not some event like The Lord descended on Mount Sinai (Exodus : ), which speaks of an objective fact and so is paraphrased in terms of manifestation in order to bar any suggestion of God’s moving. With things imagined— what Jacob was told— Onkelos kept the Torah’s wording. Splendid!

      We see here the great difference between what is said in a sleeper’s dream, or in a waking vision or apparition (Numbers : ), and what is simply said— The word of the Lord came to me, saying . . . (Jeremiah : ; Ezekiel : ; Zechariah : , : ) or The Lord said unto me . . . (Deuteronomy : ; Isaiah : , : ; Jeremiah : ; Ezekiel : ; Hosea : ; Amos : , : ; Zechariah : , : ).

      It is possible too I suppose, that Onkelos took ‘God’ here to mean an angel and so was not averse to translating the phrase as “I shall go down with thee to Egypt.” You need not be troubled that he might take ‘God’ here to mean an angel, even though the speaker says, I am God, the God of thy father (Genesis : ). The same is said by an angel elsewhere in Scripture. You can see it, can you not, when Jacob says, In a dream the angel of God said to me: ‘Jacob!’ And I answered, Here I am ( : )? For at the close of his account of the angel’s address, Jacob reports that the angel said, I am the God of Beth- El, where you anointed a pillar and took a vow to Me ( : ). Jacob made his vow to God, of course, not to the angel. But when prophets report what an angel relayed to them from God, they regularly make God the speaker and elide the intermediary. In effect, the angel said, ‘I am sent by the God of thy father’ or ‘I am sent by the God revealed to you at Beth- El’ and so on. I shall have much more to say later on about prophecy and its degrees, and about angels, in keeping with this work’s aim (I – ; II – ).
    munk: Placeholder text
    atay: Placeholder text
    tibbon: Placeholder text
  ch28:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      Regel has multiple meanings. It is the word for a foot, as in [an eye for an eye . . .] a foot for a foot (Exodus : ). It can also indicate a following: Go thou and all the nation at thy feet ( : )— your followers. It may have a causal sense: The Lord hath blessed thee at my foot (li- ragli; Genesis : )— my account, since that for the sake of which something is done is the basis or footing for it. This idiom occurs often, as in for the sake (li- regel) of the herd before me and for the children’s sake ( : ). So when it says, On that day His feet shall stand on the Mount of Olives (Zechariah : ), it refers to the performance of what God has wrought, the wonders manifested by Him there on that day. So Jonathan ben Uzziel glossed, “On that day will His power be shown on the Mount of Olives.” He translates every reference to a limb used for striking or for locomotion, likewise, in terms of power.

      For in every case these references point to the execution of His will.

      When it says under his feet, the like of a work clear as sapphire (Exodus : ), Onkelos, as you know, took the feet to be those of the throne and renders the phrase “under the throne of His Glory.” You can see and admire how far he kept from corporealism or anything even remotely suggesting it. He does not say ‘under His throne.’ For treating the throne as God’s and taking ‘throne’ in its base sense would imply God’s sitting on it, entailing His corporeality. So he makes it the throne of God’s Glory, the Shekhinah, a created light. Thus, in his Targum, he renders hand on God’s throne ( : ) as “before God, whose Shekhinah rests on the throne of Glory.” You will find that phrase on all our nation’s lips: throne of Glory.

      I have digressed from my purpose in this chapter to mention a point to be developed in later chapters (II ). Returning to the present chapter’s aim, you have seen Onkelos’ gloss. But that is as far as it goes. He excludes anthropomorphism but does not enlighten us about what the elders perceived or what it symbolized. That is what he does consis- tently. He does not explain a passage but simply bars anthropomorphism, since God’s in- corporeality is demonstrable and critical to belief. Sure of this, he translated accordingly.

      But symbols are contentious. They might mean this or that. It can be very obscure, and understanding these symbols is not critical to the faith, nor are they readily grasped by the masses. So he does not broach the subject. But in keeping with this work’s purpose, I do need to offer a gloss. Under his feet, I say, means ‘by His agency,’ or ‘on His account,’ as I explained: What they apprehended was prime matter itself, which depends on Him, He being the Cause of its existence.

      Consider the words the like of a work clear as sapphire. If it meant white in color, it would say ‘like the whiteness of sapphire.’ It adds a work because matter, as you know, is always passive, inherently receptive. It does nothing, except per accidens— just as form is always naturally active. That is why it says the like of a work. But clear as sapphire means transparent, not white in color. Crystal is not white but perfectly transparent. Transpar- ency is not a color, as is proved in the texts of physics. If it had a color, one could not see every color through it, and it would not take on other colors. It is because a transparent body has no color of its own that it takes all colors in turn— like prime matter, which has no form of its own and so can receive all forms in turn. What they beheld, then, was prime matter and its relation to God, as the first object of creation, calling for generation and corruption, which He initiates. On this topic, too, I shall have more to say ( .22b, 66a, .4a).

      Even on Onkelos’ rendering, “under the throne of His Glory,” you need to read it in this way. For prime matter, too, is under the heavens, which are called God’s throne (Isaiah : ), as we saw (I ). What alerted me to this and led me to frame this striking gloss is a remark of Rabbi Eliezer ben Hyrcanus that I saw, which you will hear in a later chapter of this work (II ). But anyone with reason should bend every effort to deny God’s corporeality and take any reference to awareness of Him as intellectual, not sen- sory. Do understand and reflect on this.
