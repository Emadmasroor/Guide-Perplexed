    "goodman": |
      Years ago a man of some learning put a question to me. "It seems from the surface sense of Scripture," he said, "that man’s first state was that of any other animal: He had no reason or thought, nor did he distinguish good from evil. But when he rebelled, that very rebellion brought him the highest perfection, the power of choice, which is unique to us. This is strange: that man's punishment for sin should be his rise to a perfection he lacked before!"

      My answer was this: You’ve looked at the surface but missed the point. For reason, which God gave to man, is his highest perfection. It was in man before his rebellion. It is because of reason that he is said to be in the image and likeness of God. Through it, he distinguishes truth from falsehood.

      But "good and evil" belong to the realm of things generally accepted, not to the realm of the intellectually necessary. We do not say that it is "good" that the sky is round or "evil" that the earth is flat; we say these are true or false. Good and evil apply to social and moral conventions. When man lived in his state of perfection, he knew only truth and falsehood. But when he followed his desires and was drawn toward the physical, he fell from the realm of the intellectual to the realm of the conventional.
