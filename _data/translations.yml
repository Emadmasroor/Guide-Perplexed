    pines: Placeholder text
    goodman: |-
      Halikha— to walk or go. This is another term specific to animal movements: Jacob went his way (Genesis : ). That is frequent. The same verb can be applied metaphorically to the movement of bodies more fluid than those of animals: The waters gradually went down ( : ) or The fire streamed to the ground (Exodus : ). In time it was applied figu- ratively to the appearance and spread of things not physical at all: Her [Egypt’s] sound goeth like a snake (Jeremiah : ). It is in this sense that it says, The voice of the Lord God went through the garden (Genesis : ). The sound is what was said to travel.

      When God is said to walk, it is always in this figurative sense. With nonphysical things, the image is one of diffusion; or with loss of providence, the analog would be an animal’s leaving and going elsewhere.

      Just as the withdrawal of providence is referred to as God’s hiding His face, as in I shall surely hide My face (Deuteronomy : ), it is also called ‘going’ in the sense of leaving, as in I shall go and return to My place (Hosea : ). When it says, The Lord’s wrath was kindled against them [Aaron and Miriam], and He went (Numbers : ), the two images are linked— withdrawal of providence, called a departure, and the spread or showing of the wrath that reached and touched them: Her skin blanched white as snow ( : ).

      Leading a life of virtue is also metaphorically called walking, with no reference to bodily motion. Thus, Walk in His ways (Deuteronomy : ), After the Lord your God shall ye walk ( : ), and Come, let us walk in the light of the Lord (Isaiah : ).
