      In this chapter, I’ll recap for you the arguments the Mutakallimūn use to show that the world began. Do not ask me to do it in their words or at the same length. I will just report how each of them goes about trying to prove that the world had an origin or is not eternal. I will summarize the premises each uses. But if you read their voluminous tomes and celebrated works, you will find not a thought in their would- be proofs on this score beyond what you’ll find in my treatment here— although you will find prolixity, fine phrases, and high- flown style. For they often use rhyme, parallelism, verbal niceties, or obscure jargon meant to impress the hearer and awe the novice. You’ll also find plenty of redundancy, along with objections and their supposed resolutions, and much polemic against adversaries.

      Method . One of them claims it can be shown from a single event that the world began: If you say Zayd was a drop of semen and developed gradually, he could not have done this by himself. Someone must have done it, some external agent that brought him from stage to stage. Clearly, then, he needed a maker to frame his anatomy and advance him from one phase to the next. Likewise, this palm tree and other things. The same rea- soning holds for the world at large. As you can see, he believes that whatever holds true of one body must apply to all.

      Method . The birth of a single person, they say, proves that the world began. To spell it out, Zayd here once did not exist; now he does. That must be because of his father, Omar. But he, too, came to be; and that could not be without Zayd’s grandfather, Khālid. But Khālid, too, did not always exist— and so ad infinitum. Yet such an infin- ity, to them, is impossible, as we’ve seen (Premise ). So when the series ends, say, at a first man, Adam, who had no father, one would still have to ask where he came from.

      The answer might be earth. The question then would be where earth comes from. The answer might be water. And where did this water come from? The series, they say, must either extend infinitely, which is impossible, or end at something that comes from noth- ing. “Just so,” they say: “Here the questions end,” proving, so they say, that the world came from nothing.

      Method . The world’s atoms, they argue, must be either separate or conjoined. But some are now separate and now conjoined. Obviously, they cannot join or separate them- selves. For if their nature required them to be separate, they would never join, and if they were essentially conjoined, they would never separate. There is no more basis, then, for them to be together than apart. So having some conjoined, others separate, and others shifting— now together, now apart— shows that they need someone to join and separate them. This, they say, shows that the world began. The exponent of this approach, you can see, relies on Premise , with all its implications.

      Method . ‘The whole world,’ they say, ‘consists of substances and accidents. Every substance must have some accident or accidents, and all accidents arise in time. So the sub- stance bearing them must arise in time as well. For whatever is inseparable from things that arise in time must itself arise in time. The world, then, did begin.’ If someone ob- jects that substances might not arise in time, although accidents do succeed one another in them ceaselessly, they answer that this would imply an infinite series of events, which they posit is impossible. They see this as their best and sharpest argument. Many of them even take it as proof.

      It rests on three assumptions, as will hardly be obscure to thinkers: First is that an in- finite series is impossible, and second is that every accident arises in time. But our eternal- ist adversary disagrees regarding one accident: cyclical motion. For Aristotle claims that this does not begin or end. So what moves in this way never began and will never end. It does us no good, then, to show that other accidents begin and end. Our adversary does not dispute that. He claims that accidents succeed one another cyclically in something that did not begin. One accident, he holds— the sphere’s rotation— did not begin. It is different in kind from those accidents that have a temporal origin. So only this accident must be investigated and shown to have begun. The third assumption made by the author of this approach is that nothing is perceived but substance and accident— atoms and their accidents, as they would have it. But if bodies are composed of matter and form, as our ad- versary has demonstrated, what needs to be proved is that prime matter and ultimate form arise and perish. Then the proof that the world began would be sound.

      Method . The argument from determination: This approach, much favored by them, rests on Premise as I analyzed it for you. Directing his thoughts to the world at large or any part of it, the Mutakallim says, ‘This might have had the size, shape, and accidents it has; it might have been where it is in time or place; it might have been larger or smaller or had a different shape or other accidents. It might have existed earlier or later or elsewhere.

      Its having the particular size, shape, time, location, or accidents it has, any of which might have been different, shows that Someone chose the alternative. The world’s dependence, in whole or part, on such determinations shows that it began. For there is no difference between ‘Determiner’ and ‘Maker,’ ‘Creator,’ ‘Originator,’ or ‘Universal Intender.’ These all mean the same.’ They apply this approach in many ways— some specific, some general. They say, ‘Earth is no more suited to be beneath the water than above it. Who gave it this position?’ ‘The sun is no more fit to be round than triangular or square. A body might have any shape. Who gave the sun this shape?’ They treat every feature of the world in this way.

      If they see flowers of different colors, they are thrilled and take it to confirm their case: ‘The soil is the same, the water is the same, so why are these blossoms yellow and those red? How could that be, unless someone specified it? God must have! And the world, too, needs someone to make the choices for it in toto and in each part.’ All this springs from assuming Premise . Yet there are eternalists who do not disagree with us about the need for determinations, as I will explain (II ). Overall, I think this method is their best, and I have some thoughts about it, as you will hear (II ).

       Method . One modern Mutakallim claims to have found an exceptionally fine argument, the best yet known, based on the preponderance of being over nonbeing: ‘The world’s existence,’ he argues, ‘is contingent, as everyone admits. If it were necessary, it would be God. But our dispute is only with those who hold that God exists yet think the world eternal. Now, a contingent being is one that might or might not exist. In itself, it is no likelier to exist than not. That this contingent being exists, which might just as well not have existed, shows that someone must have tipped the scale in favor of its being.’ This is quite a plausible argument, a special case of that last determination argument, substituting ‘preponderance’ for ‘determination’ and existence itself for its various states.

      The exponent of this argument, however, is either confused or trying to confuse us about what is meant by ‘The world’s existence is contingent.’ For our eternalist adversary ap- plies the term ‘contingent’ in a sense different from that used by the Mutakallim, as I shall explain (II Introduction). Besides, the claim that the world needs a cause to favor its existence over nonexistence is awfully suspicious. To determine or give preponderance applies only to something that already exists and might equally go this way or that, so one can say, ‘Our finding it to be so rather than otherwise shows that someone must have meant it to be so.’ Thus, you can say, ‘This brass was no more fit for a lamp than it was for a pitcher. Since we find it is a lamp (or a pitcher), we know that someone must have chosen this alternative.’ The brass clearly exists, and no alternative is realized until one is chosen.

      But if it is disputed whether a thing has always been or has come to be from nothing, this approach will not work. It cannot be said, ‘Who favored its existence over nonexistence?’ until it is settled that it did come from nothing. But that is the question at issue.

      Taking existence and nonexistence merely notionally, we come back to Premise , which looks to what is fancied or imagined, not to what is conceivable or real. To our eternalist adversary, our ability to imagine the world’s nonexistence is no different from our ability to imagine any impossibility. My aim here is not to crush these arguments but just to show you that this approach, supposedly unlike the last, is invalid. It stands on the same footing regarding the possibility of what does not exist.

      Method . One creationist claims to settle it that the world began by using the Philos- ophers’ doctrine of immortal souls. ‘Were the world eternal,’ he argues, ‘infinite persons would have died in the infinite past. So infinite souls would coexist. But the simulta- neous existence of infinite beings is, of course, demonstrably false.’ Marvelous! Obscurum per obscuriora— truly worthy of the Aramaic barb, “What seals your bond?” (B. Sukkah 26a, Gi in 28b, Ecclesiastes Rabbah . . )— as though this fellow had in hand proof of the soul’s immortality and knew just what survives and in what form so as to make a premise of it!

      Assuming his aim was just to implicate his adversary in the problems of holding both the eternity of the world and the immortality of the soul, the unwelcome consequences would follow only if that adversary granted his fancied version of immortality. Modern philosophers solve the problem by saying that immortal souls are not bodies that take up space and have positions and so cannot be infinite. Incorporeal beings, as you know, being neither bodies nor physical forces but minds, are not to be conceived as plural at all— unless as cause and effect, differentiated by one’s being the cause of another. But what survives of Zayd is neither the cause nor the effect of what survives of Omar. So they would all be one, as Ibn Bājjah and others explained, who ventured to address such dark topics. But as a rule, it is not from such murky areas, where our minds fall short of clear conceptions, that premises should be drawn.

       As you can see, whoever hopes to prove that the world began or to disprove its eternity by these kalām methods inevitably uses one or both of these assumptions: either Premise , allowing that anything imaginable is possible, to lay the basis for a Determiner, or Premise , ruling out an infinite series.

      They press for the latter premise in several ways. They cite a species whose mem- bers come to be and pass away, then mentally single out a moment in the past: Belief in the world’s eternity implies that there have been infinite members of that species from eternity until then. But the members of that species that have existed from eternity to a moment, say, a thousand years later are infinite as well. Yet the latter group exceeds the first by the number born in that millennium, implying, they say, that one infinity exceeds another.

      They do the same with the rotations of the sphere, claiming here too that one infin- ity of revolutions would exceed another. They also consider the ratio of revolutions of one sphere to those of another, slower sphere— both being infinite. Likewise, with every temporal accident. They count nonexistent accidents, too, and treat them as if they were real, then adding or subtracting items, always relying on fantasy, not fact. Al- Fārābī demolished this approach and exposed its dependence on imagination in every variant, as you will find spelled out clearly if you study the argument dispassionately in his well- known book On Changeable Beings.

      These, then, are the main methods the Mutakallimūn use to show that the world began. Once that is settled, it follows necessarily that there exists an Author who gave it being by His will, choice, and purpose. They go on to show that He is one, using the methods I’ll explain in the next chapter.
