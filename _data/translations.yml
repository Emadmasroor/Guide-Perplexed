  ch45:
    friedlander: |-
      The precepts of the tenth class are those enumerated in the laws on the Temple (Hilkot bet ha-beḥirah), the laws on the vessels of the temple and on the ministers in the temple [Hilkot kele ha-miḳdash veha-ʻobedim bo]. The use of these precepts we have stated in general terms. It is known that idolaters selected the highest possible places on high mountains where to build their temples and to place their images. Therefore Abraham, our father, chose Mount Moriah, being the highest mount in that country, and proclaimed there the Unity of God. He selected the west of the mount as the place toward which he turned during his prayers, because [he thought that] the most holy place was in the West; this is the meaning of the saying of our Sages, “The Shekinah (the Glory of God) is in the West” (B. T. Baba B 25a); and it is distinctly stated in the Talmud Yoma that our father Abraham chose the west side, the place where the Most Holy was built. I believe that he did so because it was then a general rite to worship the sun as a deity. Undoubtedly all people turned then to the East [worshipping the Sun]. Abraham turned therefore on Mount Moriah to the West, that is, the site of the Sanctuary, and turned his back toward the sun; and the Israelites, when they abandoned their God and returned to the early bad principles, stood “with their backs toward the Temple of the Lord and their faces toward the East, and they worshipped the sun toward the East” (Ezek. viii. 16). Note this strange fact. I do not doubt that the spot which Abraham chose in his prophetical spirit, was known to Moses our Teacher, and to others; for Abraham commanded his children that on this place a house of worship should be built. Thus the Targum says distinctly, “And Abraham worshipped and prayed there in that place, and said before God, ‘Here shall coming generations worship the Lord’” (Gen. xxii. 14). For three practical reasons the name of the place is not distinctly stated in the Law, but indicated in the phrase “To the place which the Lord will choose” (Deut. xii. 11, etc.). First, if the nations had learnt that this place was to be the centre of the highest religious truths, they would occupy it, or fight about it most perseveringly. Secondly, those who were then in possession of it might destroy and ruin the place with all their might. Thirdly, and chiefly, every one of the twelve tribes would desire to have this place in its borders and under its control; this would lead to divisions and discord, such as were caused by the desire for the priesthood. Therefore it was commanded that the Temple should not be built before the election of a king who would order its erection, and thus remove the cause of discord. We have explained this in the Section on Judges (ch. xli.).

      It is known that the heathen in those days built temples to stars, and set up in those temples the image which they agreed upon to worship; because it was in some relation to a certain star or to a portion of one of the spheres. We were, therefore, commanded to build a temple to the name of God, and to place therein the ark with two tables of stone, on which there were written the commandments “I am the Lord,” etc., and “Thou shalt have no other God before me,” etc. Naturally the fundamental belief in prophecy precedes the belief in the Law, for without the belief in prophecy there can be no belief in the Law. But a prophet only receives divine inspiration through the agency of an angel. Comp. “The angel of the Lord called” (Gen. xxii. 15); “The angel of the Lord said unto her” (ibid. xvi. 11); and other innumerable instances. Even Moses our Teacher received his first prophecy through an angel. “And an angel of the Lord appeared to him in the flame of fire” (Exod. iii.). It is therefore clear that the belief in the existence of angels precedes the belief in prophecy, and the latter precedes the belief in the Law. The Sabeans, in their ignorance of the existence of God, believed that the spheres with their stars were beings without beginning and without end, that the images and certain trees, the Asherot, derived certain powers from the spheres, that they inspired the prophets, spoke to them in visions, and told them what was good and what bad. I have explained their theory when speaking of the prophets of the Ashera. But when the wise men discovered and proved that there was a Being, neither itself corporeal nor residing as a force in a corporeal body, viz., the true, one God, and that there existed besides other purely incorporeal beings which God endowed with His goodness and His light, namely, the angels, and that these beings are not included in the sphere and its stars, it became evident that it was these angels and not the images or Asherot that charged the prophets. From the preceding remarks it is clear that the belief in the existence of angels is connected with the belief in the Existence of God; and the belief in God and angels leads to the belief in Prophecy and in the truth of the Law. In order to firmly establish this creed, God commanded [the Israelites] to make over the ark the form of two angels. The belief in the existence of angels is thus inculcated into the minds of the people, and this belief is in importance next to the belief in God’s Existence; it leads us to believe in Prophecy and in the Law, and opposes idolatry. If there had only been one figure of a cherub, the people would have been misled and would have mistaken it for God’s image which was to be worshipped, in the fashion of the heathen; or they might have assumed that the angel [represented by the figure] was also a deity, and would thus have adopted a Dualism. By making two cherubim and distinctly declaring “the Lord is our God, the Lord is One,” Moses clearly proclaimed the theory of the existence of a number of angels; he left no room for the error of considering those figures as deities, since [he declared that] God is one, and that He is the Creator of the angels, who are more than one.

      A candlestick was then put in front of the curtain, as a sign of honour and distinction for the Temple. For a chamber in which a continual light burns, hidden behind a curtain, makes a great impression on man, and the Law lays great stress on our holding the Sanctuary in great estimation and regard, and that at the sight of it we should be filled with humility, mercy, and soft-heartedness. This is expressed in the words, “And ye shall reverence my sanctuary” (Lev. xix. 30), and in order to give these words more weight, they are closely joined to the command to keep the Sabbath.

      The use of the altar for incense and the altar for burnt-offering and their vessels is obvious; but I do not know the object of the table with the bread upon it continually, and up to this day I have not been able to assign any reason to this commandment.

      The commandment that the stones of the altar shall not be hewn and that no iron tool shall be lifted up upon them (Deut. xxvii. 5), has been explained by our Sages as follows: It is not right that the tool that shortens man’s life should be lifted up upon that which gives length of life. As an Agadic explanation this is good; but the real reason is this: the heathen used to build their altars with hewn stones; we ought not to imitate them. For this reason we have to make an altar of earth: “Thou shalt make unto me an altar of earth” (Exod. xx. 24); if it should be impossible to dispense altogether with stones, they must not be hewn, but employed in their natural state. Thus the Law also prohibits from worshipping over painted stones (Lev. xxvi. 1), or from planting any tree near the altar of the Lord (Deut. xvi. 21). The object of all these commandments is the same, namely, that we shall not employ in the worship of God anything which the heathen employed in the worship of their idols. In general terms this is repeated in the following passage: “Take heed, that thou inquire not after their gods, saying, How did these nations serve their gods? even so will I do likewise” (Deut. xii. 30); the Israelites shall not do this, because—as is expressly added—“every abomination unto the Lord, which he hateth, have they done unto their gods.”

      The mode of worshipping Peor, then very general among the heathen, consisted in uncovering the nakedness. The priests were therefore commanded to make breeches for themselves to cover their nakedness during the service, and, besides, no steps were to lead up to the altar, “that thy nakedness be not discovered thereon” (Exod. xx. 23).

      The Sanctuary was constantly guarded and surrounded [by Levites] as a mark of respect and honour; and at the same time the layman, the unclean, and mourners, were prevented from entering the Sanctuary, as will be explained. Among other things that tend to display the greatness and the glory of the Temple and to inspire us with awe, is the rule that none shall approach it in a state of drunkenness or uncleanness, or in a disorderly state, i.e., the hair undressed and the garments rent; and that every one who officiated as priest should first wash his hands and his feet.

      In order to raise the estimation of the Temple, those who ministered therein received great honour; and the priests and Levites were therefore distinguished from the rest. It was commanded that the priests should be clothed properly with beautiful and good garments, “holy garments for glory and for beauty” (Exod. xxviii. 2). A priest that had a blemish was not allowed to officiate; and not only those that had a blemish were excluded from the service, but also—according to the Talmudic interpretation of this precept—those that had an abnormal appearance; for the multitude does not estimate man by his true form but by the perfection of his bodily limbs and the beauty of his garments, and the Temple was to be held in great reverence by all.

      The Levites did not sacrifice; they were not considered as being agents in the atonement of sins, for it was only the priest who was commanded “to make atonement for him” (Lev. iv. 26) and “to make atonement for her” (Lev. xii. 8). The duty of the Levites was the performance of vocal music; and a Levite became therefore disabled for service when he lost his voice. The object of the singing is to produce certain emotions; this object can only be attained by pleasing sounds and melodies accompanied by music, as was always the case in the Temple.

      Again, the priests, even when fit for service, and actually officiating in the Temple, were not allowed to sit down, or enter it whenever they liked; the Most Holy was only entered by the high-priest four times on the Day of Atonement, and on no other occasion. The object of all these rules was to raise the estimation of the Sanctuary in the eyes of the people.

      Since many beasts were daily slaughtered in the holy place, the flesh cut in pieces and the entrails and the legs burnt and washed, the smell of the place would undoubtedly have been like the smell of slaughter-houses, if nothing had been done to counteract it. They were therefore commanded to burn incense there twice every day, in the morning and in the evening (Exod. xxx. 7, 8), in order to give the place and the garments of those who officiated there a pleasant odour. There is a well-known saying of our Sages, “In Jericho they could smell the incense” [burnt in the Temple]. This provision likewise tended to support the dignity of the Temple. If there had not been a good smell, let alone if there had been a stench, it would have produced in the minds of the people the reverse of respect; for our heart generally feels elevated in the presence of good odour, and is attracted by it, but it abhors and avoids bad smell.

      The anointing oil (Exod. xxx. 22–33) served a double purpose: to give the anointed object a good odour, and to produce the impression that it was something great, holy, and distinguished, and better than other objects of the same species; it made no difference whether that object was a human being, a garment, or a vessel. All this aimed at producing due respect towards the Sanctuary, and indirectly fear of God. When a person enters the Temple, certain emotions are produced in him; and obstinate hearts are softened and humbled. These plans and indirect means were devised by the Law, to soften and humble man’s heart at entering the holy place, in order that he might entrust himself to the sure guidance of God’s commandments. This is distinctly said in the Law: “And thou shalt eat before the Lord thy God, in the place which he shall choose to place his name there, the tithe of thy corn, of thy wine, and of thine oil, and the firstlings of thy herds and of thy flocks; that thou mayest learn to fear the Lord thy God always” (Deut. xiv. 23). The object of all these ceremonies is now clear. The reason why we are not allowed to prepare [for common use] the anointing oil and the incense (ibid. ver. 32, 38) is obvious; for when the odour [of the oil and incense] is perceived only in the Sanctuary, the desired effect is great; besides [if it were allowed for every one to prepare the anointing oil], people might anoint themselves therewith and imagine themselves distinguished; much disorder and dissension would then follow.

      It is clear that when the ark was carried on the shoulder, and was not put on a waggon, it was done out of respect towards it, and also to prevent its being damaged in its form and shape; even the staves were not moved out of the rings, for this reason. In order that the form of the ephod and the breastplate should not be spoiled, they were never separated. The garments were also entirely woven and not cut, in order not to spoil the work of the weaving.

      Those that ministered in the Temple were strictly prohibited to interfere with each other’s work; for if in public duties and offices, each one would not have assigned to him his particular task, general carelessness and neglect would soon be noticed.

      It is evident that the object of giving different degrees of sanctity to the different places, to the Temple mount, the place between the two walls, to the Hall of women, to the Hall, and so on up to the Most Holy, was to raise the respect and reverence of the Temple in the heart of every one that approached it.

      We have thus described the reason of all precepts of this class.
    pines: Placeholder text
    goodman: |-
      The mitzvot in the tenth group are those that I listed in Laws of God’s Chosen House, Implements of the Sanctuary and Those who Serve There, and Laws of Entry to the Sanctuary. I’ve already related the general benefits of this class of duties (III ). Pagans, we know, typically built their temples and erected their icons in the highest places they could find in the area— on lofty mountains (Deuteronomy : ). So our Father Abraham chose Mount Moriah, the highest peak nearby, to proclaim God’s unity. He speci- fied due west as the direction to face in prayer, the Holy of Holies lying to the west. That is what the Sages mean by saying, “God’s Shekhinah is to the West” (B. Bava Batra 25a).

      They explain in tractate Yoma that in prayer, we face the Holy of Holies, the direction that Father Abraham set (28b, 54b). The reason, I think, is that sun worship was then widespread all through the world. With the sun as god, everyone, of course, faced east in prayer. So Father Abraham on Mount Moriah (in God’s Sanctuary!) faced west, his back to the sun. Remember what Israel did when, backsliding, they reverted to their old, warped views, their backs to the Lord’s Temple, their faces to the East, bowing eastward, toward the sun (Ezekiel : ). You must not miss that striking shift.

      I’m sure the site that Abraham was inspired to choose was known to our Teacher Moses and to many others. For Abraham had advised them that there would be a shrine there, as the translator brings out: “Abraham prayed and worshipped in that place, saying, ‘Here shall generations worship before the Lord.’” I see three good reasons why the place is not expressly named and identified in the Torah but only alluded to as the place that the Lord will choose (Deuteronomy : ; cf. Genesis : ): (a) lest the nations, once they knew it as the Torah’s cynosure on earth, would lay hands on it and fiercely fight for it; (b) lest those who hold it now lay it waste and do all they can to destroy it; and (c) (most likely), lest the tribes of Israel vie for it, each seeking to include it in its allotment, fomenting internecine conflict and civil war, like their battles over the Priest- hood. Hence the command that God’s Chosen House not be built until the monarchy was established and there was a united rule to quell such wrangling, as I explained in the Book of Judges (MT Laws of Kings and Wars . – ).

      We know they used to build temples to the stars and place in them the icon they meant to serve, the image linked to a certain star or sector of the heavens. So we were ordered to build a temple to God and to place in it the ark holding the two tablets bearing the words I am . . . and Thou shalt not have . . . (Exodus : – ).

      Belief in prophecy, as we know, anchors belief in the Torah. For without a prophet, there is no revealed law. But prophets are inspired only through an angel— as it says, The angel of the Lord called (Genesis : ) and The angel of the Lord said to her ( : – ).

      This phrasing occurs countless times. Even the mission of our Teacher Moses began with inspiration from an angel: The angel of the Lord appeared to him in the heart of the fire (Exodus : ). So belief in prophecy evidently depends on belief in angels, just as belief in a revealed law depends on belief in prophecy.

      The Sabians, ignorant of God’s existence and taking the sphere and the stars to be the eternal beings that could not fail to exist, from which powers emanated to their idols and to certain trees— their asherot— supposed that it was these trees and idols that in- spired prophets, uttering oracles to inform them of what was helpful or harmful, as I ex- plained in telling you of their doctrines of the prophets of Baal and the Asherah (III ).

      Once the truth was known to the learned and it was demonstrated that a Being exists that is not a body or a physical force but the one true God and that other incorporeal beings emanate from His Being— the angels, as I explained (I ; II ), all far transcend- ing the sphere and stars— it was certain that real prophetic inspiration comes from the angels, not those idols and asherot.

      So belief in angels was clearly a corollary of belief in God, as I said, confirming proph- ecy and the Torah. To cement this core belief, God ordered two angels’ images to be fashioned above the ark, fixing the reality of angels in the faith of the masses— a true belief, supporting belief in God and vital to prophecy, the revealed Law, and rejection of paganism, as I explained. Having the image of just one cherub might have been mislead- ing. It might have been presumed to be an image of the deity to be worshipped, as in pagan practice. Or a single cherub might have been seen as another god, leading to some sort of dualism. But two angels were made, and it was proclaimed, The Lord is our God, the Lord is one (Deuteronomy : ), underlining the fact that angels are real, but many, and checking any illusion as to their divinity. For one God created all their host.

      Next, a menorah was set before the ark to give the Temple dignity and splendor. For a space ever lit and veiled in curtains has a powerful impact spiritually. The Torah, as you know, sets great store in the sense of the Temple’s dignity and sanctity, which in- spires emotions of humility and awe at the very sight of it. Ye shall revere My Sanctuary (Leviticus : ), it says, and it links that command with Sabbath observance, underscor- ing the reverence the Temple is due.

      It is clear why an altar is needed for incense and an altar for the burnt offerings and their implements. But in the case of the table and the bread always set upon it (Leviti- cus : – ), I do not know the reason, having seen no connection to the aim of inspir- ing awe.

      As for the prohibition of dressing the altar stones (Exodus : ; Deuteronomy : ; SM Negative ), you know the rationale the Sages gave for this: “It is not fit to raise what shortens life against what prolongs it” (M. Middot . ). That is lovely homiletically, as I put it (cf. .97a). But the reasons for the ban are clear enough: Pagans built their altars of hewn stones. So God forbade our doing the same and ordered us to make His altar of earth and not copy them, as it says: An altar of earth shalt thou make Me (Exodus : ).

      Or if it must be of stones, leave them in their natural form, unhewn. Also forbidden: a figured stone (Leviticus : ) and a tree planted by the altar (Deuteronomy : ). These rules all serve the same end: We are not to worship God in the manner of any pagan cult.

      Hence the global ban: [Take care lest thou be ensnared into following them . . . lest thou inquire after their gods, saying,] “How did those nations serve their gods? I shall do likewise”

      ( : ). This means that one must not do the same for God: For every horror hateful to the Lord did they perform for their gods [— even burning their sons and daughters to their gods!] ( : ).

      You know how common worship of Peor was in those days. The practice was to expose oneself. So God commanded our Priests to make breeches, to cover their naked flesh (Exodus : ) in worship— and even so, not to ascend to the altar by stairs, lest thy nakedness be exposed there ( : ).

      The (Levites’) constant rounds of watch at the Sanctuary were to show it honor and reverence and to keep the impure, unkempt, and uncouth from breaching its precincts, as I will explain: A critical mark of the deference and respect due the Sanctuary, to inspire us with reverence for it, was the exclusion of anyone drunk, defiled, or disheveled— with hair unkempt or garments rent (SM Negative, )— and to ensure that every worshipper sanctifies hands and feet (by washing, Exodus : – ; SM Positive ). Again, in rever- ence for the Temple, those who served there were honored and distinguished, the Koha- nim and Levites. The Priests wore the finest, most sumptuous attire, sacred garments . . .

      for honor and for splendor ( : ). No one might serve who was disfigured. Not only the deformed were disqualified (Leviticus : – ) but even the misshapen, as the halakhic treatment of this precept details (M. Bekhorot , MT Entry to the Sanctuary ). For the masses do not respect one’s true form unless his limbs are well knit and he is well attired, and the intent was that the Temple and those who served there be revered by all.

      A Levite did not offer sacrifice and was not envisioned as appealing for the forgiveness of sins like a Kohen: He shall make atonement for him. . . . He shall make atonement for her (Leviticus : , : ). His role is to sing. So he is not qualified if he cannot sing. Song aims to move the spirit with its words, and only lovely melodies can do that, instrumen- tally accompanied, as they always were in the Temple.

      Even Priests eligible to serve in the Sanctuary were not to sit down there. Nor could they enter the Temple at just any time— or the Holy of Holies at all, except the High Priest on Yom Kippur, and then only four times. All this was to enhance the dignity of the Temple.

      In this sanctified site, many beasts were slaughtered each day, their flesh butchered, their entrails washed and burnt. It would surely have smelt like an abattoir if left alone.

      Hence the command to burn incense there twice daily, once in the morning and once before dusk (Exodus : – ; MT Laws regarding Daily Offerings . ; SM Positive ), to improve the odor of the place and that of the clothes of those who served there. You know how they said, “The incense could be smelt as far as Jericho” (cf. M. Tamid . ). This, too, helped preserve reverence for the Temple. Had it not smelled fragrant or, even worse, the contrary, the effect would have been quite the opposite of awe. For one’s spirit is lifted and drawn by fragrant odors but recoils and shrinks at those that are foul.

      The anointing oil (Exodus : – ) served two purposes: It perfumed what was daubed with it, and it gave a sense that what was anointed was special, holier than other things of its kind, whether persons, garments, or utensils. All this enhanced the sense of awe for the Sanctuary— and thus for the Lord. For the impact of visiting the Temple was to gentle and soften an obdurate heart. God, in His grace, devised all this long in advance (cf. Isaiah : ) to make hearts tender and humble on entry, receptive to His wise precepts and counsels, and filled with reverence toward Him, as the Torah spells out: Thou shalt consume the tithe of thy new grain, wine, and oil, and the firstlings of thy herds and flocks before the Lord thy God in the place He chooseth for His name to dwell, that ye may learn ever to revere the Lord thy God (Deuteronomy : ). So you see the point of all these practices.

      The reason one may not duplicate the anointing oil or the incense (Exodus : ; SM Negative ) is very clear: This scent may be smelt only there. That heightened its impact— and no one could presume that just anyone anointed with this oil or one like it was consecrated by it. That would foment dreadful conflicts and anarchy.

      The Ark is borne on men’s shoulders, not by wagon (Numbers : – ), out of respect, clearly— but also lest its contours be disturbed, even by removing the staves from the rings (Exodus : ). The design of the Ephod and Breastplate, too, must not be dis- turbed, even by separating them ( : ). It was also ruled that each priestly garment must be of the whole cloth, uncut ( : ), so as not to mar the weaving. By the same token, those who served in the Sanctuary were not to shift roles. For when a team has tasks but not individual responsibilities, general negligence and disorder result. The graded requirements for entry— to the Temple Mount, the Atrium, the Women’s Pavilion, the Courtyard, and so forth, up to the Holy of Holies (M. Kelim . – )— were clearly also meant to enhance reverence for the place and instill mounting awe in the hearts of all who approached.

      I have now given the grounds for each mitzvah in this group.
