  ch12:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: 'Qimah, rising, has multiple meanings. One is to get up rather than remain
      seated. Thus, [Mordecai] did not rise or even stir for him (Esther : ). But
      it can also indicate steadfastness and constancy: The Lord keep (yaqem) His
      word ( Samuel : ), Ephron’s field was made over (yaqom) [to Abraham] (Genesis
      : – ), A house in a walled city [if unredeemed for a full year] is [permanently]
      conveyed (qam; Leviticus : ), and rule over Israel shall remain (qamah) in thy
      hand ( Samuel : ). It is always in this sense that the term is ap- plied to
      God: Now will I arise, saith the Lord (Psalms : ; Isaiah : )— meaning ‘Now will
      My word, My promise and threat, be fulfilled.’ And again, Thou wilt arise and
      have compassion on Zion (Psalms : )— ‘What You promised, in Your mercy, will
      hold.’ When someone resolves to do something, he rises; and a rebellion is called
      an upris- ing: My own son hath made my servant rise up against me ( Samuel :
      ). This sense is applied metaphorically to the execution of God’s sentence on
      folk deserving destruction: I have risen against the house of Jeroboam (Amos
      : ), or He will rise up against the house of evildoers (Isaiah : ). When it
      says, Now will I arise (Psalms : ; Isaiah : ), the expression has the same sense.
      Likewise in Thou wilt arise and have compassion on Zion (Psalms : )— meaning
      ‘Rise up against her foes!’ Many texts use the expression in this way— not that
      God literally sits or rises. As the Sages say, “On high there is no sitting
      or standing,” using ‘standing’ to signify rising (B. Berakhot 17a).'
