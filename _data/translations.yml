  ch42:
    friedlander: |-
      We have already shown that the appearance or speech of an angel mentioned in Scripture took place in a vision or dream; it makes no difference whether this is expressly stated or not, as we have explained above. This is a point of considerable importance. In some cases the account begins by stating that the prophet saw an angel; in others, the account apparently introduces a human being, who ultimately is shown to be an angel; but it makes no difference, for if the fact that an angel has been heard is only mentioned at the end, you may rest satisfied that the whole account from the beginning describes a prophetic vision. In such visions, a prophet either sees God who speaks to him, as will be explained by us, or he sees an angel who speaks to him, or he hears some one speaking to him without seeing the speaker, or he sees a man who speaks to him, and learns afterwards that the speaker was an angel. In this latter kind of prophecies, the prophet relates that he saw a man who was doing or saying something, and that he learnt afterwards that it was an angel.

      This important principle was adopted by one of our Sages, one of the most distinguished among them, R. Ḥiya the Great (Bereshit Rabba, xlviii.), in the exposition of the Scriptural passage commencing, “And the Lord appeared unto him in the plain of Mamre” (Gen. xviii.). The general statement that the Lord appeared to Abraham is followed by the description in what manner that appearance of the Lord took place; namely, Abraham saw first three men; he ran and spoke to them. R. Ḥiya, the author of the explanation, holds that the words of Abraham, “My Lord, if now I have found grace in thy sight, do not, I pray thee, pass from thy servant,” were spoken by him in a prophetic vision to one of the men; for he says that Abraham addressed these words to the chief of these men. Note this well, for it is one of the great mysteries [of the Law]. The same, I hold, is the case when it is said in reference to Jacob, “And a man wrestled with him” (Gen. xxxii. 25); this took place in a prophetic vision, since it is expressly stated in the end (ver. 31) that it was an angel. The circumstances are here exactly the same as those in the vision of Abraham, where the general statement, “And the Lord appeared to him,” etc., is followed by a detailed description. Similarly the account of the vision of Jacob begins, “And the angels of God met him” (Gen. xxxii. 2); then follows a detailed description how it came to pass that they met him; namely, Jacob sent messengers, and after having prepared and done certain things, “he was left alone,” etc., “and a man wrestled with him” (ibid. ver. 24). By this term “man” [one of] the angels of God is meant, mentioned in the phrase, “And angels of God met him”; the wrestling and speaking was entirely a prophetic vision. That which happened to Balaam on the way, and the speaking of the ass, took place in a prophetic vision, since further on, in the same account, an angel of God is introduced as speaking to Balaam. I also think that what Joshua perceived, when “he lifted up his eyes and saw, and behold a man stood before him” (Josh. v. 13) was a prophetic vision, since it is stated afterwards (ver. 14) that it was “the prince of the host of the Lord.” But in the passages, “And an angel of the Lord came up from Gilgal” (Judges ii. 1); “And it came to pass that the angel of the Lord spake these words to all Israel” (ibid. ver. 2); the “angel” is, according to the explanation of our Sages, Phineas. They say, The angel is Phineas, for, when the Divine Glory rested upon him, he was “like an angel.” We have already shown (chap. vi.) that the term “angel” is homonymous, and denotes also “prophet,” as is the case in the following passages:—“And He sent an angel, and He hath brought us up out of Egypt” (Num. xx. 16); “Then spake Haggai, the angel of the Lord, in the Lord’s message” (Hagg. i. 13); “But they mocked the angels of God” (2 Chron. xxxvi. 16).—Comp. also the words of Daniel, “And the man Gabriel, whom I had seen in the vision at the beginning, being caused to fly swiftly, touched me about the time of the evening oblation” (Dan. ix. 11). All this passed in a prophetic vision. Do not imagine that an angel is seen or his word heard otherwise than in a prophetic vision or prophetic dream, according to the principle laid down:—“I make myself known unto him in a vision, and speak unto him in a dream” (Num. xii. 6). The instances quoted may serve as an illustration of those passages which I do not mention. From the rule laid down by us that prophecy requires preparation, and from our interpretation of the homonym “angel,” you will infer that Hagar, the Egyptian woman, was not a prophetess; also Manoah and his wife were no prophets; for the speech they heard, or imagined they heard, was like the bat-kol (prophetic echo), which is so frequently mentioned by our Sages, and is something that may be experienced by men not prepared for prophecy. The homonymity of the word “angel” misleads in this matter. This is the principal method by which most of the difficult passages in the Bible can be explained. Consider the words, “And an angel of the Lord found her by the well of water” (Gen. xvi. 7), which are similar to the words referring to Joseph—“And a man found him, and behold, he was erring in the field” (ibid. xxxvii. 15). All the Midrashim assume that by man in this passage an angel is meant.
    pines: Placeholder text
    goodman: |-
      Wherever an angel is said to be seen or heard, as I explained, it must have been in a dream or a prophetic vision, whether declared to be such or not, as I said (II , ). But you need to see and understand this very, very well. Whether it says from the start that a prophet saw an angel or that he saw what he took for a man at first but later realized was an angel it makes no difference. Since what he saw and was addressed by proved to be an angel, you can be sure it was a prophetic dream or vision from the start. In a prophetic dream or vision, a prophet might see God speaking to him, as I’ll explain, or hear an angel ad- dressing him, or hear someone speaking to him, although he sees no one. He might see a human being speaking to him and later realize it was an angel. It is in this last sort of prophecy that he might say that he saw a man say or do something but later realized it was an angel.

      This crucial point was made by one of our Sages— one of the greatest, in fact— the great Rabbi iyya, glossing The Lord appeared to him near the oaks of Mamre (Genesis : ). Having stated broadly that God revealed Himself to Abraham, he says, it goes on to detail the form of the epiphany: At first, he saw three men and ran out to meet them.

      They spoke and were spoken to. Rabbi iyya, reading between the lines, says that Abra- ham’s words—H e said, “My lord, if it please thee, pass not by thy servant” ( : )— relate what he said in his prophetic vision: He addressed just one, the chief among them (Gene- sis Rabbah . ). You need to understand this story. It holds a hidden meaning.

       Likewise, in Jacob’s story, when it says a man wrestled with him (Genesis : ), I say this was an oracular experience. For in the end, it was clear that it was an angel. This parallels Abraham’s case: first a general account, the Lord appeared to him ( : ), then the details. With Jacob, too, it says, God’s angels met him ( : ), and then it fills in what had happened before they met him, how he had sent emissaries who did such and such ( : – ), and Jacob was left alone, [and a man wrestled with him until daybreak] ( : ).

      The reference is to the angels already mentioned: God’s angels met him. Both the wres- tling and the angel’s addressing him ( : – ) were in a prophetic vision.

      Likewise, the whole story of Balaam on the road and the she- ass’s speaking to him (Numbers : ). It was all in a prophetic vision. For it was clear in the end that it was the Lord’s angel that addressed him. The same, I say, as to its saying of Joshua, He raised his eyes and saw, lo, a man standing over against him, [his drawn sword in his hand] (Joshua : ). This, too, was in a prophetic vision. For it proved to be the captain the Lord’s host ( : ).

      But consider when it says, An angel of the Lord came up from Gilgal [to Bochim, and said “I brought you up out of Egypt. . . . And I said, ‘I shall never breach My covenant with you. But you must make no covenant with the denizens of this land. . . .’ But ye have not obeyed Me. . . . Therefore, have I resolved not to drive them out before you; they shall be your foes; their gods, a snare to you.”] When the Lord’s angel had said these things to all the Chil- dren of Israel, [the nation burst into tears.] (Judges : – ). The Sages state that the angel of the Lord here was Phinehas: “This was Phinehas. For when the Shekhinah rested upon him he seemed to be an angel of the Lord” (cf. Leviticus Rabbah . ). I have already explained that ‘angel’ has multiple senses and that prophets, too, can be called angels (II ), as it says, He sent an angel who brought us out of Egypt (Numbers : ); then spoke Haggai, the Lord’s angel, performing the Lord’s mission (Haggai : ); and they mocked God’s angels ( Chronicles : ).

       As for Daniel’s words— the man Gabriel, whom I had seen in the earlier vision, was sent forth in flight and reached me at about the time of the evening offering (Daniel : )— all this was in a prophetic vision. Do not even entertain the thought that an angel can be seen or heard to speak unless in a prophetic dream or vision, as the principle is stated: In a vision do I make Myself known to him; in a dream do I speak to him (Numbers : ).

      From the cases I have cited, you can see how to deal with those that I have not.

      Given what I told you about the preparation prophets need and what I said about the varied senses of ‘angel,’ you can see that Hagar the Egyptian (Genesis : ) was no prophet. Nor were Manoa and his wife (Judges ). The words they heard or seemed to hear were more like a portent of the kind the Sages always mention, an experience that can occur to one not qualified for prophecy. Only because ‘angel’ is polysemous could such mistakes occur. Seeing this will settle most biblical problems on this score. Compare its saying of Hagar, The angel of the Lord found her by the spring (Genesis : ), with what it says of Joseph, A man found him wandering in a field ( : ). Every midrash says this was an angel.
