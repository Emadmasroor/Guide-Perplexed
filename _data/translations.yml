    goodman: |-
      Certain Torah mysteries remain to be cleared up, issues where many have stumbled: sto- ries that may seem otiose, like the account of Noah’s line branching into diverse lineages, giving their names and territories (Genesis ), or Seir the Horite’s progeny ( : – ), or the kings who reigned in the land of Edom ( : ), and the like. The Sages tell, as you know, how wicked Manasseh plied his vile court with constant carping about such pas- sages. “He would sit,” they say, “and pick at the narrative: ‘Had Moses nothing better to write,’ he would say, ‘than the sister of Lotan was Timna ( : )’!” (B. Sanhedrin 99b). I shall give you the general theme first and then come back to the specifics, as I did with the grounds for the mitzvot. Every narrative in the Torah, you see, does contribute to it criti- cally as a body of law, whether by anchoring some core biblical principle or by improving our actions to check wrongdoing and aggression. I shall spell this out for you.

      It is a core teaching of the Torah that the world began, that the human race began with the creation of one man, Adam, and that some , years passed from Adam to our Teacher Moses. Given only this account, people would soon have raised questions.

      For mankind now covered the earth in diverse races and widely varied tongues. Such skepticism was allayed with data on the lineage and divergence of all these peoples, naming their notable figures— So- and- So, son of So- and- So— and citing their lands and life- spans, explaining their dispersal to the ends of the earth and the divergence of their tongues, although at first their forebears had all lived in the same place and spoke one language, as they must have done, as descendants of one person.

      Similarly, the stories of the Flood and of Sodom and Gomorrah are told to confirm a sound belief: Yea, there is a meed for the righteous, divine justice on earth! (Psalms : ).

      The Torah recounts the War of the Nine Kings (Genesis ) for the same reason, to inform us of Abraham’s miraculous triumph over four mighty kings, leading just a hand- ful of men, under no monarch. It also teaches us how zealously he defended his kins- man, risking his life in battle to save him, since Lot shared his belief. And it shows us how modest and unselfish he was, scorning greed and devoting himself to virtue— as he said, not a thread or sandal strap . . . ( : ).

      The listing of the tribes of Seir and detailing of their lineages (Genesis : – ) regard one mitzvah, God’s command to destroy the seed of Amalek. Amalek was de- scended from Eliphaz and Timna the sister of Lotan. But God did not command that the rest of Esau’s progeny be slain. Esau was related by marriage to the progeny of Seir, as the text makes clear ( : ). He had progeny and power there, and his line mingled with theirs ( : , , – , – , ). So the land of Seir and that of all those tribes bore the name of the dominant tribe, the house of Esau— and specifically, of Amalek, the most aggressive. Had the Torah not untangled these lineages, all would have been slain indiscriminately. So Scripture distinguished the tribes, saying that those now living in Seir and under Amalekite dominion are not all children of Amalek but of So- and- So and So- and- So. They are called Amalekites only because of his mother (Timna; Gene- sis : ). All this was justice on God’s part, lest tribe be swept away with tribe. For the decree was only against the line of Amalek. I have already given the reason (III ).

      The Torah lists the kings who ruled the land of Edom ( : – ), since one of our com- mandments is Set over thee as king no stranger that is not thy brother (Deuteronomy : ).

      Of these kings named in the Torah, not one was an Edomite. It gives their pedigrees and homelands. You can see it: So- and- So of Such and Such, So- and- So of Such and Such. Most likely, I think, their history and ways were well known— the mores of those kings who ruled Edom, and it was notorious that they abased and abused the Edomites. By naming them, Scripture says, in effect, ‘Take a lesson from the experience of your brethren, Esau’s descen- dants, whose kings were So- and- So and So- and- So, whose deeds were infamous.’ For no nation has been ruled by a foreigner without suffering harm, great or small.

      In a word, just as Sabian doctrines are distant to us now, as I noted (III ), the chron- icles of those ancient ages are lost to us today. If we knew those histories and the events they record, the reasons for much of the detail in the Torah would be clear to us.

      You need to bear in mind that reading history is not like living it. There are telling details in lived experience that are impossible or tedious to relate. A narrative recounting them can seem rambling and repetitious. But an eyewitness would know why all this had to be said. So when you find nonhalakhic biblical narratives otiose, prolix, or repetitious, it is because you did not live through the events that called for all these details to be re- corded as they are.

       A case in point: the enumeration of the stages of Israel’s journey through Sinai. On the surface, the list may seem completely useless. Lest one jump to that conclusion, it says, Moses wrote the stages of their journey at the Lord’s command (Numbers : ). The need for this listing is of moment. For only eyewitnesses are sure of any miracle. To those who hear about it, it’s just a story, and quite possibly untrue. A miracle, as we know, cannot conceivably last through the ages for all to see. One biblical miracle, one of the great- est, was Israel’s survival in the wilderness for forty years, finding manna daily. This was a desert, as Scripture states, of venomous snakes and scorpions, a thirsty, waterless land (Deu- teronomy : ), unwelcoming and far from human habitation— unfit for seed, fig, vine, or pomegranate . . . (Numbers : ), [a land of deserts and ravines, drought and darkness,] a land untraveled (Jeremiah : ), where, as the Torah relates, ye ate no bread and drank no wine or strong drink (Deuteronomy : ).

      All this was miraculous, plain to see. But God knew a time would come when such miracles were doubted, as traditions are. The presumption would be that Israel was in a desert near settled, habitable land, like the deserts where Bedouins live today, or in arable land where crops could be grown or food gotten from the local vegetation, or that manna always fell there naturally, or that there were natural springs there. To rule out any such misgivings, the account of all these miracles was bolstered by listing the stages of Israel’s journey, letting future generations see the details and realize just how great a miracle it was for human beings to survive forty years in such terrain. For the same reason Joshua cursed anyone who ever rebuilt Jericho (Joshua : ), to preserve the miracle. For anyone who saw Jericho’s battlement sunk into the ground would realize this was no ordinary ruin but a wall miraculously sunk.

      Likewise, it says, At the word of the Lord they pitched camp, and at the word of the Lord they departed (Numbers : ). This might seem sufficient, and whatever follows might seem needless verbiage— its saying, for example, when the cloud tarried long ( : ), At times the cloud [lingered over the Tabernacle just a few days] ( : ), or whether it lin- gered two days over the Tabernacle ( : ). I shall tell you the reason for all this detail: to confirm the account and exclude gentiles’ presuming, then and even now, that Israel was lost and could not find their way, as it says: trapped in the land (Exodus : ). The Arabs to this day call that desert the Tih, presuming that Israel was lost (tāhu) there and unable to find their way out. So Scripture details the uneven stages of the journey, the oc- casional backtracking, and the stays of varied length at each stop— one for eighteen years, another for a day, another for just a night— all at God’s direction, not that Israel was lost, but based on the raising of the pillar of cloud. That is the reason for the added detail. The Torah is clear that the distance was short and the route familiar and well traveled, not unknown, from Horeb, which they had reached by design, at God’s command— Ye shall serve God at this mount ( : )— to Kadesh Barnea, at the fringe of civilization, as it says: Lo we are in Kadesh, a town at thy border (Numbers : ). That is eleven days’ march, as it says: It is eleven days’ journey from Horeb by way of Mount Seir to Kadesh Barnea (Deuteronomy : )— not a route to wander for forty years. The causes stated in the Torah are the sole reason.

      The same holds true for any story included in the Torah for reasons obscure to you: There is a good reason for its inclusion. As the Sages say, “It is no empty thing (Deuteron- omy : )— and, if it is, it is you!” (J. Peah . , Sukkah . , Ketubot ; cf. .58a).
