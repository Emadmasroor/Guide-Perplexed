  ch17:
    friedlander: Do not imagine that only Metaphysics should be taught with reserve
      to the common people and to the uninitiated; for the same is also the case with
      the greater part of Natural Science. In this sense we have repeatedly made use
      of the expression of the Sages, “Do not expound the chapter on the Creation
      in the presence of two” [vide Introd. page 2]. This principle was not peculiar
      to our Sages; ancient philosophers and scholars of other nations were likewise
      wont to treat of the principia rerum obscurely, and to use figurative language
      in discussing such subjects. Thus Plato and his predecessors called Substance
      the female, and Form the male. (You are aware that the principia of all existing
      transient things are three, viz., Substance, Form, and Absence of a particular
      form; the last-named principle is always inherent in the substance, for otherwise
      the substance would be incapable of receiving a new form; and it is from this
      point of view that absence [of a particular form] is included among the principia.
      As soon, then, as a substance has received a certain form, the privation of
      that form, namely, of that which has just been received, has ceased, and is
      replaced by the privation of another form, and so on with all possible forms,
      as is explained in treatises on natural philosophy.)—Now, if those philosophers
      who have nothing to fear from a lucid explanation of these metaphysical subjects
      still were in the habit of discussing them in figures and metaphors, how much
      more should we, having the interest of religion at heart, refrain from elucidating
      to the mass any subject that is beyond their comprehension, or that might be
      taken in a sense directly opposite to the one intended. This also deserves attention.
    pines: Placeholder text
    goodman: |-
      Do not assume that only theology is veiled from the masses. So is most of natural science.

      More than once I have cited the words “nor the Account of Creation to two” (B. agigah 11b). Not just exponents of our Torah but the philosophers and religious teachers of an- tiquity also cloaked their talk of ultimates and spoke in code: Plato and his predecessors called matter the female and form the male. As you know, things that arise and decay have three facets: matter, form, and specific privation, always linked to matter. With- out limitation, matter would have no form (see III ). That is why privation counts as an ultimate. When a form is gained, one privation— lack of that form— vanishes, and another takes its place in that matter, and so it goes continually, as physics shows. But if those who would never have been blamed for speaking plainly use metaphors and similes in their teaching, are not we, who hew to the Law, all the more obliged to avoid being overexplicit about things that are beyond the masses, or things they are liable to imagine quite otherwise than we intended? Bear this, too, in mind.
