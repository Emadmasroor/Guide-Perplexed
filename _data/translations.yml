  ch21:
    friedlander: |-
      Some of the recent philosophers who adhere to the theory of the Eternity of the Universe hold that God produces the Universe, that He by His will designs and determines its existence and form; they reject, however, the theory that this act took place at one certain time, and assume that this always has been the case, and will always be so. The circumstance that we cannot imagine an agent otherwise than preceding the result of its action, they explain by the fact that this is invariably the case in all that we produce; because for agents of the same kind as we are, there are some moments in which they are not active, and are only agents in potentia; they become agents when they act. But as regards God there are no moments of non-action, or of potentiality in any respect; He is not before His work, He is always an actual agent. And as there is a great difference between His essence and ours, so is also a great difference between the relation of His work to Him and the relation of our work to us. They apply the same argument to will and determination; for there is no difference in this respect whether we say He acts, wills, designs, or determines. They further assume that change in His action or will is inadmissible. It is therefore clear that these philosophers abandoned the term “necessary result,” but retained the theory of it; they perhaps sought to use a better expression, or to remove an objectionable term. For it is the same thing, whether we say in accordance with the view of Aristotle that the Universe is the result of the Prime Cause, and must be eternal as that Cause is eternal, or in accordance with these philosophers that the Universe is the result of the act, design, will, selection, and determination of God, but it has always been so, and will always be so; in the same manner as the rising of the sun undoubtedly produces the day, and yet it does not precede it. But when we speak of design we do not mean it in this sense; we mean to express by it that the Universe is not the “necessary result” of God’s existence, as the effect is the necessary result of the efficient cause; in the latter case the effect cannot be separated from the cause; it cannot change unless the cause changes entirely, or at least in some respect. If we accept this explanation we easily see how absurd it is to say that the Universe is in the same relation to God as the effect is to the efficient cause, and to assume at the same time that the Universe is the result of the action and determination of God.

      Having fully explained this subject, we come to the question whether the cause, which must be assumed for the variety of properties noticed in the heavenly beings, is merely an efficient cause, that must necessarily produce that variety as its effect, or whether that variety is due to a determining agent, such as we believe, in accordance with the theory of Moses our Teacher. Before I discuss this question I will first explain fully what Aristotle means by “necessary result”; after that I will show by such philosophical arguments as are free from every fallacy why I prefer the theory of Creatio ex nihilo. It is clear that when he says that the first Intelligence is the necessary result of the existence of God, the second Intelligence the result of the existence of the first, the third of the second [and so on], and that the spheres are the necessary result of the existence of the Intelligences, and so forth, in the well-known order which you learnt from passages dealing with it, and of which we have given a résumé in this part (ch. iv.)—he does not mean that the one thing was first in existence, and then the second came as the necessary result of the first; he denies that any one of these beings has had a beginning. By “necessary result” he merely refers to the causal relation; he means to say that the first Intelligence is the cause of the existence of the second; the second of the third, and so on to the last of the Intelligences; and the same is also the case as regards the spheres and the materia prima; none of these preceded another, or has been in existence without the existence of that other. We say, e.g., that the necessary result of the primary qualities are roughness [and] smoothness, hardness [and] softness, porosity and solidity; and no person doubts that heat, cold, moisture, and dryness are the causes of smoothness and roughness, of hardness and softness, porosity and solidity, and similar qualities, and that the latter are the necessary result of those four primary qualities. And yet it is impossible that a body should exist with the primary qualities without the secondary ones; for the relation between the two sets of qualities is that of causality, not that of agent and its product. Just in the same way the term “necessary result” is used by Aristotle in reference to the whole Universe, when he says that one portion is the result of the other, and continues the series up to the First Cause as he calls it, or first Intellect, if you prefer this term. For we all mean the same, only with this difference, that according to Aristotle everything besides that Being is the necessary result of the latter, as I have already mentioned; whilst, according to our opinion, that Being created the whole Universe with design and will, so that the Universe which had not been in existence before, has by His will come into existence. I will now begin in the following chapters my proofs for the superiority of our theory, that of Creatio ex nihilo.
    pines: Placeholder text
    goodman: |-
      Some modern eternalist philosophers say that God is the world’s Maker, choosing and in- tending it to exist and determining it to be as it is, but that this could not have been at just one time and no other: ‘It always has been and always will be as it is,’ they say. ‘We cannot conceive a maker unless he precedes his work temporally, but that is only because it is so with us. Every maker of whom that is true is lacking in some way, active potentially and realized once in action. But God lacks nothing and is in no way unrealized. So He does not precede His act temporally but acts ceaselessly. Just as He Himself is unlike us’— and how!— ‘so is His relation to His work unlike ours.’ They apply the same reasoning to His will and determinations. For it makes no difference whether you say ‘Maker,’ ‘Intender,’ ‘Chooser,’ or ‘Specifier.’ No change in His will or His work is conceivable, they say, as I explained (II ).

      You can see by now, as you study this work of mine, that these philosophers, perhaps wanting to use nicer language and avoid anything distasteful, have dropped the word ‘necessity’ but held fast to the idea. Aristotle says that this world is made necessary by its cause; it is eternal because God, its cause, is eternal. Yet that is no different from these moderns’ saying that the world is God’s work and exists by His choice, will, determina- tion, and intention but has always been and always will be as it is, just as the sunrise brings daylight but does not precede it. That is not what we mean by purpose. We mean that the world does not issue from Him by necessity like an effect inseparable from its cause and unchangeable without some change in that cause or in some feature of it. Once you understand purpose as we do, you will see why it is absurd to say that the world is neces- sitated by God’s being as an effect is by its cause yet is still His work and is as it is by His determination.

       It all comes down to this: We must investigate the variance in the celestial world. For it is proven that this must have a cause. Does that cause render those differences neces- sary by its very being? Or is it a Maker who determines them specifically, as we followers of our Teacher Moses believe? I shall speak to that once I have given you an explana- tion of what Aristotle means by necessity so that you will have that idea in mind. After that, I shall explain why I favor creation, using rational, philosophical arguments with no chicanery.

      When Aristotle says that the First Intellect issues from God of necessity, and the Second from the First, the Third from the Second, and likewise when he holds that the spheres issue from the Intellects of necessity— the whole famous hierarchy that you have studied in the texts, bits of which I have outlined here (II )— he clearly does not mean that first this existed and then that was necessitated by it. He does not say that any of these things had an origin. What he means by necessity here is causation. In effect, he says, the First Intellect causes the second; the second, the third; and so forth, down to the last. Likewise with the spheres and prime matter. For him, none of these preceded the next or ever existed independently.

      To illustrate: The primary qualities make things rough or smooth, hard or soft, thick or thin. No one doubts that the primary qualities— hot and cold, wet and dry— produce roughness, smoothness, hardness, softness, thickness, thinness, and the like. Such quali- ties reflect the four primary qualities necessarily, even though no body can exist with the primary qualities alone and not the secondary. Likewise in the world, Aristotle says, this comes from that, all the way back to the First Cause— the First Intellect, as he terms it— or whatever you wish to call it. We all intend the same ultimate reality. But he holds that everything else issues by necessity, as I told you, whereas we say that God made all these things on purpose. He willed a world to be that once did not exist but came to be, by His will.

      Now, in the chapters that follow, I will give you my reasons for preferring our doctrine that the world was created.
