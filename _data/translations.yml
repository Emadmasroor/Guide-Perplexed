  "ch51":
    "friedlander": |
     There are many things whose existence is manifest and obvious; some of these are innate notions or objects of sensation, others are nearly so: and in fact they would require no proof if man had been left in his primitive state. Such are the existence of motion, of man’s free will, of phases of production and destruction, and of the natural properties perceived by the senses, e.g., the heat of fire, the coldness of water, and many other similar things. False notions, however, may be spread either by a person labouring under error, or by one who has some particular end in view, and who establishes theories contrary to the real nature of things, by denying the existence of things perceived by the senses, or by affirming the existence of what does not exist. Philosophers are thus required to establish by proof things which are self-evident, and to disprove the existence of things which only exist in man’s imagination. Thus Aristotle gives a proof for the existence of motion, because it had been denied: he disproves the reality of atoms, because it had been asserted.  
    "pines": |
      Placeholder text
    "goodman": |
      Many things in the world are clear and evident, including sensations and primary ideas. Others are nearly so and would need no proof, if one were left alone: that motion is real, say, and that human beings can act. Likewise, the phenomena of generation and decay and the plain sensory properties of things, like the heat of fire and coldness of water. There are many more examples. But since various bizarre beliefs have sprung up, through error or because someone with an agenda at odds with the facts denied what we perceive or wished to press a delusion that things are real that are not, scholars have had to defend the plain facts and rebut such delusions. So we find Aristotle proving that motion is real, since it had been denied, and refuting atomism, since it had been affirmed.

      That God has no proper attributes is of this class: It is a prime truth of reason that an attribute is not the thing itself but a feature of it. That makes it an accident. Were it the same as the thing, its predication would be a mere tautology, like ‘Man is man,’ or an analy- sis, like ‘Man is the rational animal.’ For that is what man is, his essence: rational animal. There is no third thing beyond ‘rational’ and ‘animal’ that is ‘man.’ ‘Man’ is the being of whom ‘rational’ and ‘animal’ are predicated. The description just analyzes the noun ‘man,’ as if you said, ‘What is called a man is what combines animal and rational.’
    "munk": |
