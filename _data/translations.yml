  ch8:
    friedlander: It is one of the ancient beliefs, both among the philosophers and
      other people, that the motions of the spheres produced mighty and fearful sounds.
      They observed how little objects produced by rapid motion a loud, shrilling,
      and terrifying noise, and concluded that this must to a far higher degree be
      the case with the bodies of the sun, the moon and the stars, considering their
      greatness and their velocity. The Pythagoreans believed that the sounds were
      pleasant, and, though loud, had the same proportions to each other as the musical
      notes. They also explained why these mighty and tremendous sounds are not heard
      by us. This belief is also widespread in our nation. Thus our Sages describe
      the greatness of the sound produced by the sun in the daily circuit in its orbit.
      The same description could be given of all heavenly bodies. Aristotle, however,
      rejects this, and holds that they produce no sounds. You will find his opinion
      in the book The Heavens and the World (De Cœlo). You must not find it strange
      that Aristotle differs here from the opinion of our Sages. The theory of the
      music of the spheres is connected with the theory of the motion of the stars
      in a fixed sphere, and our Sages have, in this astronomical question, abandoned
      their own theory in favour of the theory of others. Thus, it is distinctly stated,
      “The wise men of other nations have defeated the wise men of Israel.” It is
      quite right that our Sages have abandoned their own theory; for speculative
      matters every one treats according to the results of his own study, and every
      one accepts that which appears to him established by proof.
    pines: Placeholder text
    goodman: |-
      One ancient view, widely held among the Philosophers and the general populace, is that the motion of the spheres produces mighty and awesome sounds. If small bodies close at hand make a great racket and jangle startlingly when set rapidly in motion, they reason, would the bodies of the sun, moon, and stars not do so all the more, being so much greater and swifter? The Pythagorean sect all believe that the heavenly bodies, being so vast, pro- duce lovely concordant sounds like musical harmonies. That leaves them to explain why we do not hear those immense and awesome sounds.

      The same view has been popular in our nation too. You know, of course, how the Sages describe the mighty sound of the sun in its daily course across the sky (B. Yoma 20b, Genesis Rabbah . ). The same would hold true all through the cosmos. But Aristo- tle rejects this view and makes it clear that the spheres produce no sound. You can follow his argument in De Caelo. Do not be troubled that his view contradicts our Sages. Their notion that the spheres make sounds just reflects their belief that the sphere is stationary and the constellations revolve. They themselves, you know, favor gentile scholars’ view to their own in these astronomical matters, as they freely admit: The sages of the nations of the world prevail (cf. B. Pesa im 94b). Quite right. For in intellectual matters, one must follow where the argument leads and believe what is soundly proven.
