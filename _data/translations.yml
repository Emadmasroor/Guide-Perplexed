  ch34:
    friedlander: 'The meaning of the Scriptural passage, “Behold I will send an angel
      before thee,” etc. (Exod. xxiii. 20), is identical with the parallel passage
      in Deuteronomy which God is represented to have addressed to Moses at the revelation
      on Mount Sinai, namely, “I will raise them up a prophet from among their brethren,”
      etc. (Deut. xviii. 18). The words, “Beware of him, and obey his voice,” etc.,
      said in reference to the angel, prove [that this passage speaks of a prophet].
      For there is no doubt that the commandment is given to the ordinary people,
      to whom angels do not appear with commandments and exhortations, and it is therefore
      unnecessary to tell them not to disobey him. The meaning of the passage quoted
      above is this: God informs the Israelites that He will raise up for them a prophet,
      to whom an angel will appear in order to speak to him, to command him, and to
      exhort him; he therefore cautions them not to rebel against this angel, whose
      word the prophet will communicate to them. Therefore it is expressly said in
      Deuteronomy, “Unto him ye shall hearken” (Deut. xviii. 15); “And it shall come
      to pass that whosoever shall not hearken unto my words which he shall speak
      in my name,” etc. (ibid. 19). This is the explanation of the words, “for my
      name is in him” (Exod. xxiv. 21). The object of all this is to say to the Israelites,
      This great sight witnessed by you, the revelation on Mount Sinai, will not continue
      for ever, nor will it ever be repeated. Fire and cloud will not continually
      rest over the tabernacle, as they are resting now on it; but the towns will
      be conquered for you, peace will be secured for you in the land, and you will
      be informed of what you have to do, by an angel whom I will send to your prophets;
      he will thus teach you what to do, and what not to do. Here a principle is laid
      down which I have constantly expounded, viz., that all prophets except Moses
      receive the prophecy through an angel. Note it.'
    pines: Placeholder text
    goodman: 'Here is a passage from the Torah: Lo, I shall send thee an angel to
      go before thee, [to keep thee in the way and bring thee to the place I have
      prepared] (Exodus : ). The sense of this text is seen in Deuteronomy, when God
      tells Moses at Sinai, A prophet will I raise up for them [from amongst their
      brethren, like unto thee] ( : ). That is shown by His saying of this “angel,”
      heed him; hearken to his voice, [do not defy him. He will brook no trespass
      from you. For My name is in him.] (Exodus : ). The warning is for the common
      folk, of course. But angels are not revealed to them and do not give them commands
      and pro- hibitions that they must be warned not to flout. The sense is that
      God informs them that a prophet will arise among them to whom an angel will
      appear and speak, issuing com- mands and prohibitions. God forbade our disobeying
      the angel whose words the prophet conveys. Deuteronomy shows that when it says,
      Hearken to him ( : ) and It shall come to pass that whoso hearkeneth not to
      the words he speaketh in My name [I shall hold to account] ( : ). That explains
      for My name is in him (Exodus : ). All this was just to give them to know that
      the awesome epiphany they had experienced at Sinai would not always be there
      for them. There would be nothing like it in the future. Nor would the fire or
      the cloud ever remain over the Tabernacle as they were now. ‘But the angel I
      send your prophets will open the land to your advance and smooth your way. He
      will teach you how to live and what to seek and avoid.’ So here again we have
      the point that I consistently spell out: that every prophet but our Teacher
      Moses receives his inspiration through an angel. This you should understand.'
