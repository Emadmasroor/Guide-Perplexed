    goodman: |-
      Prophecies, as I have explained in my writings, may come in the form of symbols. A prophet may see a symbol that is explained to him within his vision, just as one may dream of waking and telling his dream to someone who explains it to him, although it was all a dream. This they call “a dream interpreted in a dream” (B. Berakhot 55b)— although some dreams are understood upon waking. Prophetic symbols, too, may be explained within the prophet’s vision. That is clear in Zechariah’s case: After telling of the symbols he saw, he says, The angel who spoke to me returned and woke me, as one is roused from slumber, and asked me, “What do you see?” [I answered, “I see a golden candelabrum. . . .”

      and I asked the angel . . . “What are these, my lord?” The angel . . . said, “Do you not know what these are?” I answered, “No, my lord.”] ( : – ). He then explained the symbols to him.

       Likewise in Daniel, when it says, Daniel dreamed, visions in his head as he lay abed ( : ). It then recounts all the symbols he saw and tells how troubled he was at not know- ing what they meant until he asked the angel, who taught him their meaning in the same vision, as he said: I approached one standing by and asked what all this meant. He an- swered by explaining it to me ( : ). It calls it all a vision, having said it was in a dream.

      The angel explained it, just as it says an angel explained the prophetic dream mentioned later: I, Daniel, had a vision after the one I had had before ( : ). This makes sense. For ‘vision’ ( azon) derives from azah, to behold; marʾeh, from raʾah, ‘to see,’ is used in the same sense. There is no difference between saying be- marʾeh, be- ma azeh, or be- azon. So there is no third alternative to the two the Torah cites: in a vision do I make Myself known to him; in a dream do I speak to him (Numbers : ). But they do have varying degrees, as I’ll explain (II ). Many prophetic symbols are not explained within the prophetic vision, and the prophet learns their meaning only after waking. The staffs Zechariah took up in his prophetic vision, for instance (Zechariah : – ).

      Just as prophets see things symbolizing something— Zechariah’s lights, horses, and hills ( : , : – ); Ezekiel’s scroll ( : ); the wall Amos saw, trued with a plumb line ( : ); the beasts Daniel beheld ( : – ); Jeremiah’s seething pot ( : ); and other such symbols representing various ideas— they also see things whose name suggests an idea, by its root meaning or a play on words. The prophet’s imagination, in effect, shows him something pointing to something else— another form of symbolism. Jeremiah, for instance, speaks of a bough of almond [shaked] ( : ), the intent being, shoked Ani, I am watchful ( : ), playing on the word shaked without regard to any stick or almond. Amos, similarly, sees a fruit basket of summer [kayitz] ( : ), a portent that time has run out— as God says, The end [ketz] is come ( : ).

      More strikingly, one word may suggest another by shifting its letters with no pun or etymological link, as when Zechariah ( : ), in his prophetic vision, symbolically takes two shepherd’s staffs and calls one grace (noʿam) and the other oppressors ( ovlim). The intent: The people at the start were in the Lord’s grace. He guided and led them. They were pleased and delighted to follow, and God was pleased with them and loved them, as it says: This day hast thou affirmed the Lord . . . and this day hath the Lord affirmed thee (Deuteronomy : – ). They were governed and led by Moses then and by later prophets. But all that changed: Deference to God grew hateful to them, and they grew hateful to Him. So He set oppressors ( ovlim) over them like Jeroboam and Manasseh.

      There is wordplay in the epithet: Hovlim means spoilers, as in [the little foxes] that spoil (me ablim) the vineyards (Song of Songs : ). But Zechariah also suggests their loathing for the Law and God’s loathing for them, a sense taken not from ovlim but by transpos- ing the letters -b- l to give the sense of loathing and disgust— I lost patience with them, and their soul abhorred Me (ba alah bi; : )— shifting the consonants of aval to form ba al.

      Some remarkable things come to light as to the mystery of the Chariot if you apply this approach to Ezekiel’s use of the words bronze, burnished, foot, calf, amber ( : , , ), and more, now that you have been alerted to it.
