    goodman: 'I have explained the senses of ‘angel’ and how it applies to the intellects,
      the spheres, and the elements alike, since they all have tasks to perform. Just
      do not think the spheres or intellects like natural forces in matter that are
      unaware of their action. The spheres and intellects are conscious of their work.
      They use free choice in governing, only not like ours. Our choices regard transient
      events. The Torah alerts us to the contrast clearly: The angel tells Lot, I
      can do nothing [until you reach there] (Genesis : ). But he did say, in helping
      Lot escape, This favor, too, I grant thee ( : ). It also says, [I shall send
      an angel before you to guard you on the way and bring you to the place I have
      prepared for you.] Heed him, hearken to his voice. Do not defy him. He will
      brook no trespass from you. For My name is in him (Exodus : – ). All this shows
      you that they know what they do and use will and choice in exercising the powers
      of governance God gives them by emanation, just as we act voluntarily, using
      what emanation enables us to do. But our actions may be lacking, and our doings
      and decisions reflect that lack. Not so the spheres and intellects: What they
      do is ever good and only good, as I will explain in later chapters (III , ).
      For since they came to be, everything about them has been actual and perfect.'
