    goodman: |-
      The mitzvot in the seventh group are property laws, those that I listed in part of the Book of Judgments and part of the Book of Acquisition. The warrant of them all is evident: They frame the rules of justice in the transactions people must conduct so as to keep them fair and beneficial to both parties and not let one take advantage of the other.

      First, there must be no cheating in trade; margins must be those that are custom- ary and familiar (Leviticus : – ). There must be clear terms for contractual valid- ity, and even verbal deceit is barred, as we know (Exodus : ; M. Bava Metziʿa . ).

      Next come the laws of the four trustees (Exodus : – ). Fairness and equity are the obvious principle here: One who looks after something without fee and reaps no benefit from doing so but does it just as a favor is free of liability; the costs of any mishap come out of the owner’s pocket. One who borrows something and reaps all the benefit, since the owner is just helping him out, is solely responsible for any costs of a mishap. If one is paid to keep something or has hired it, both he and the owner benefit, so they share the costs of an accident. Costs resulting from negligent care are borne by the keeper. These include costs due to theft or loss. For theft or loss results from failure to use special care in safe- guarding another’s goods. But the costs of unpreventable events, like rustling or a beast’s going lame or dying— losses beyond a keeper’s control— are borne by the owner.

       Then comes the special concern for a hired worker, since he is poor. He must be paid promptly (Leviticus : ; Deuteronomy : – ) and scanted none of his due but paid what his work is worth. It is a matter of compassion that a worker (or even a beast!) is not to be deprived of some of the fruits of his labors, as the Torah requires ( : with : – ; B. Bava Metziʿa 87b).

      Property laws also regard inheritance. This, too, is a moral matter. For no one should be deprived of any good due him (cf. Proverbs : ). When facing death, one must not turn mean toward his heir and squander one’s wealth but should leave it to him who best deserves it, his next of kin, the kinsman closest in his family (Numbers : ). Clearly, as we know, that is his son, then his brother, then his paternal uncle ( : – ). The eldest comes first, not the favorite. For the eldest was first loved: He may not treat as a firstborn his favored wife’s son (Deuteronomy : ).

      Our very fair and just Torah strictly upholds and protects our natural penchant here, care and concern for our kin. You know what our prophet says: The cruel man torments his own flesh (Proverbs : ). The Torah directs charity to thy brother in need (Deuter- onomy : ), and our Sages laud the character of one “who loves his kin and marries his sister’s daughter” (B. Yevamot 62b). The Torah teaches this virtue most eloquently— one must care for one’s kin and favor blood relations, even if they have wronged or crossed us.

      Even if they are rotten as can be, one must regard them protectively. As God says, Scorn not the Edomite. He is thy brother (Deuteronomy : ). By the same token, whoever you have relied on, whose help you have sought and gotten in your time of need, even though he later aggrieved you, still deserves credit for past favors: Scorn not the Egyptian, for thou wast a stranger in his land (Deuteronomy : ). Everyone knows how badly the Egyp- tians later treated us.

       Just see how many virtues we learn from these mitzvot! The last two do not belong to our seventh group. But discussing the need to look after our kin in our bequests led me to speak of the Edomites and Egyptians.
