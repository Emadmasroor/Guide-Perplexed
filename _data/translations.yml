  ch13:
    friedlander: The term ʻamad (he stood) is a homonym signifying in the first instance
      “to stand upright,” as “When he stood (be-ʻomdo) before Pharaoh” (Gen. xli.
      46); “Though Moses and Samuel stood (yaʻamod)” (Jer. xv. 1); “He stood by them”
      (Gen. xviii. 8). It further denotes “cessation and interruption,” as “but they
      stood still (ʻamedu) and answered no more” (Job xxxii. 16); “and she ceased
      (va-taʻamod) to bear” (Gen. xxix. 35). Next it signifies “to be enduring and
      lasting,” as, “that they may continue (yo-ʻamedu) many days” (Jer. xxxii. 14);
      “Then shalt thou be able to endure (ʻamod)” (Exod. xviii. 23); “His taste remained
      (ʻamad) in him” (Jer. xlviii. 11), i.e., it has continued and remained in existence
      without any change; “His righteousness standeth for ever” (Ps. cxi. 3), i.e.,
      it is permanent and everlasting. The verb applied to God must be understood
      in this latter sense, as in Zechariah xiv. 4, “And his feet shall stand (ve-ʻamedu)
      in that day upon the Mount of Olives” (Zech. xiv. 4), “His causes, i.e., the
      events of which He is the cause, will remain efficient,” etc. This will be further
      elucidated when we speak of the meaning of regel (foot). (Vide infra, chap,
      xxviii.) In the same sense is this verb employed in Deuteronomy v. 28, “But
      as for thee, stand thou here by me,” and Deuteronomy v. 5, “I stood between
      the Lord and you.”
    pines: Placeholder text
    goodman: |-
      ʿAmidah is another word with multiple senses. It may mean ‘standing’ or ‘rising.’ Thus, when he stood before Pharaoh (Genesis : ), though Moses and Samuel stood before Me (Jeremiah : ), and he standing by them (Genesis : ). Sometimes it means to give off and cease: They came to a stand and spoke no more (Job : ), or She gave off childbearing (Genesis : ). But it can also signify stability or permanence: that they may long stand (Jeremiah : ), You will be able to stand (Exodus : ), His savor still stands in him (Jer- emiah : ). It is unaltered, and His justice stands eternal (Psalms : )— abiding, ev- erlasting. Whenever related to God, standing has this last sense. So On that day His feet shall stand on the Mount of Olives . . . (Zechariah : ) means that His acts— their impact— will endure. This will be explained when we treat the senses of ‘foot’ (I ).

      It is in this sense that God tells Moses, But thou, stand here by Me (Deuteronomy : ), and I stood between the Lord and you ( : ).
