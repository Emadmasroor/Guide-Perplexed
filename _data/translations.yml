  ch41:
    friedlander: 'The Hebrew nefesh (soul) is a homonymous noun, signifying the vitality
      which is common to all living, sentient beings. E.g. “wherein there is a living
      soul” (nefesh) (Gen. i. 30). It denotes also blood, as in “Thou shalt not eat
      the blood (nefesh) with the meat” (Deut. xii. 23). Another signification of
      the term is “reason,” that is, the distinguishing characteristic of man, as
      in “As the Lord liveth that made us this soul” (Jer. xxxviii. 16). It denotes
      also the part of man that remains after his death (nefesh, soul); comp. “But
      the soul (nefesh) of my lord shall be bound in the bundle of life” (1 Sam. xxv.
      29). Lastly, it denotes “will”; comp. “To bind his princes at his will” (be-nafsho)
      (Ps. cv. 22); “Thou wilt not deliver me unto the will (be-nefesh) of my enemies”
      (Ps. xli. 3); and according to my opinion, it has this meaning also in the following
      passages, “If it be your will (nafshekem) that I should bury my dead” (Gen.
      xxiii. 8); “Though Moses and Samuel stood before me, yet my will (nafshi) could
      not be toward this people” (Jer. xv. 1), that is, I had no pleasure in them,
      I did not wish to preserve them. When nefesh is used in reference to God, it
      has the meaning “will,” as we have already explained with reference to the passage,
      “That shall do according to that which is in my will (bi-lebabi) and in mine
      intention (be-nafshi)” (1 Sam. ii. 35). Similarly we explain the phrase, “And
      his will (nafsho) to trouble Israel ceased” (Judg. x. 16). Jonathan, the son
      of Uzziel [in the Targum of the Prophets], did not translate this passage, because
      he understood nafshi to have the first signification, and finding, therefore,
      in these words sensation ascribed to God, he omitted them from his translation.
      If, however, nefesh be here taken in the last signification, the sentence can
      well be explained. For in the passage which precedes, it is stated that Providence
      abandoned the Israelites, and left them on the brink of death; then they cried
      and prayed for help, but in vain. When, however, they had thoroughly repented,
      when their misery had increased, and their enemy had had power over them, He
      showed mercy to them, and His will to continue their trouble and misery ceased.
      Note it well, for it is remarkable. The preposition ba in this passage has the
      force of the preposition min (“from” or “of”); and baʻamal is identical with
      meʻamal. Grammarians give many instances of this use of the preposition ba:
      “And that which remaineth of (ba) the flesh and of (ba) the bread” (Lev. viii.
      32); “If there remains but few of (ba) the years” (ib. xxv. 52); “Of (ba) the
      strangers and of (ba) those born in the land” (Exod. xii. 19).'
    pines: Placeholder text
    goodman: |-
      Nefesh (soul) has multiple meanings. It is a name for the animal soul common to all sen- tient beings: in which there is a living soul (Genesis : ). It also denotes the blood: Thou shalt not eat the soul with the flesh, [for the blood is the soul] (Deuteronomy : ). And it may mean the rational soul, the human form: as the Lord liveth, who made this soul of ours (Jeremiah : ). This word, too, names what survives of a man after death: My lord’s soul shall be bound up in the bond of life ( Samuel : ).

      Soul is also a name for the will: to bind his princes to his soul (Psalms : )— to his will. Similarly, deliver him not to the soul of his foes ( : )— don’t surrender him to their will. This is analogous, as I see it, to if it be to your soul that I bury my dead out of my sight (Genesis : )— meaning if such be your desire and intent. Similarly, Though Moses and Samuel stood before Me, My soul would not incline toward this nation (Jeremiah : )— My will does not favor them, I do not wish them to endure.

      Whenever applied to God, nefesh has the sense of will, as we saw (I ) in the phrase who shall act after My heart and soul ( Samuel : )— ‘in keeping with My purpose and intent.’ It is in this sense that one should gloss, His soul was to put to an end Israel’s travail (Judges : )— ‘He meant to end Israel’s suffering.’ This verse was not translated by Jonathan ben Uzziel at all, for he took nefesh in its basic sense, as if to suggest passions on God’s part. That kept him from rendering it. But if ‘soul’ is taken in our last sense, it’s quite clear how to gloss it. For it was already said that God’s providence had left them, and they were perishing. They begged for succor, and He did not aid them ( : – ). But when they were greatly humbled and oppressed by foes and had well and truly repented, He had mercy on them and suspended His intent to prolong their agony and abasement.

      Notice the preposition, since it is unusual: The to in put an end to stands for of— in effect, to make an end of Israel’s suffering. Linguists count numerous cases of that shift: what remains to the bread and meat (ba- basar u-va- le em; Leviticus : ), meaning of the bread and meat; [if few] in years remain (ve- im meʿa nishʾar ba- shanim; Leviticus : ), mean- ing of years; and by stranger or by homeborn (ba- ger uve- ezra ; Exodus : ), meaning of foreign or homeborn stock. This is frequent.
