    goodman: |-
      The commandments in the eighth group are those that I listed in the Book of Sea- sons. The reasons for all but a few are spelled out in Scripture. The grounds for Sabbath observance are too familiar to explain. We know the worth of the rest it affords. One- seventh of everyone’s life becomes a delight, a respite from the moil and toil that no one, young or old, can avoid. Beyond that, Sabbaths keep green through the ages the vitally important idea that the world began.

      The warrant for the command to fast on the Day of Atonement is clear as well: It gives us the idea of repentance. This was the day that the master of all prophets brought down the second set of tablets and gave the people the joyous news that their grievous sin was forgiven (Exodus ; B. Taʿanit 30b). So it was made a permanent day of penitence, wholly devoted to worship and penance, forsaking all bodily pleasures and service of our bodily needs— abstaining from work and devoting ourselves entirely to confessing and renounc- ing our sins (MT Laws of Repentance).

      All the Festivals are for rejoicing and happy gatherings that few can do without.

      Beyond that, they cement the bonds of fellowship critical to civil society (see .84b)— and each festival has its own special reasons.

      The story of Pesa is well known. It lasts seven days, a span between a natural day and a lunar month. A seven- day period, as you know, is vital in nature but also in Scripture.

      The Torah always echoes nature and, in a way, betters it. For nature is not conscious or reflective, but Scripture sets the rules and measures of God, who gives reason to all who have it. But that is not my point in this chapter. So I shall return to my theme.

       Shavuʿot is the day the Torah was given. To celebrate and elevate that day, we count the days leading up to it from our first holiday, just as one eagerly awaiting his beloved counts the days and the hours. That is why we count the Omer, from the day we left Egypt to the day the Torah was given, the object and goal of our departure: [I bore you on eagles’ wings] and brought you to Me. [Now, if indeed ye hear My voice and keep My covenant, ye shall be My treasure amongst all nations. For Mine is all the earth.] (Exodus : – ). This great epiphany lasted but a day. So its annual commemoration lasts just one day— whereas if we ate matzot for just a day, we would barely notice it, and its meaning would not sink in. For often one eats one sort of food for two or three days. But the point of eating matzah is made vivid, and the story behind it is made known to all by our eating it all through the festival.

      Rosh ha- Shanah, too, lasts only a day. It is a day for penitence, awakening folk from their heedlessness. Hence the blasts of the shofar, as I explained in Mishneh Torah (Laws of Repentance . ), preparing us, in effect, for the Day of Atonement, as you can see from the nation’s embrace of penitential observances during the ten days from Rosh ha- Shanah to Yom Kippur.

      Sukkot, meant for gladness and joy, lasts seven days to publish its meaning to all. Why in this season, the Torah makes clear: when thou hast gathered in thy produce from the field (Exodus : )— when you have leisure and can rest from necessary labor. As Aristotle states in the Ethics IX, the practice was ubiquitous in ancient nations: “Ancient sacrifices and gatherings took place once the fruits of the harvest were gathered, offered as if in thanks for the respite.” Besides, dwelling in the sukkah is manageable in this season, when it is not oppressively hot or stormy.

      Both festivals, Sukkot and Pesa , convey an idea and instill a virtue. The idea behind Pesa is to commemorate the miracles wrought in Egypt and preserve that memory through the ages; that of Sukkot, to preserve through the ages the miracles we experi- enced in the wilderness. The virtue: ever to remember our days of hardship in better times, making us all the more grateful to God and all the humbler and accepting.

      We eat matzah and bitter herbs on Pesa to recall our experience. On Sukkot, simi- larly, we leave our homes and live in shanties like people who have no home but live in desert or desolate places, recalling how we lived long ago: I made the Children of Israel live in sheds (Leviticus : ). From these we moved into elegantly appointed homes in the finest, most fertile place on earth— by God’s grace, true to His promises to our forefa- thers, Abraham, Isaac, and Jacob, men perfect in mind and character. This, too, is pivotal in our Torah— that every blessing we enjoy or ever will comes just by the merit of our Patriarchs. For they kept the Lord’s way, doing justice and right (Genesis : ). The shift from Sukkot to another festival, Shemini ʿAtzeret, caps our rejoicing in ways not feasible in booths but only in spacious, well- built homes.

      The four species in a Lulav [palm frond, willow withe, myrtle, and citron, used on Sukkot,] are glossed by our Sages midrashically, a manner known by those who under- stand their idiom to be poetic, not meant to explicate the text. Readers of midrash are of two sorts: those who fancy that the Sages offered these homilies as exegeses and those who belittle and ridicule such glosses, since they plainly leave Scripture’s sense untouched.

      The former group battle mightily to validate and vindicate the homilies, presuming they bear the text’s true meaning, sure and solid as halakhah. Neither party sees that these are poetic tropes, as no sensitive reader could fail to realize.

      The style was customary then. Everyone used it, as poets use their imagery. Our Sages say, “Bar Kappara taught, ‘Thou shalt have a trowel in thy gear (Deuteronomy : ). Read not azeineikha, thy gear, but oznekhah, thine ear’— teaching that on hearing something improper one should plug his ear” (B. Ketubot 5a). I wish I knew if these dunces thought the tanna believed that is what the verse means— that the trowel in the mitzvah was a finger and one’s gear was his ear! I do not suppose that any sane person would think that.

      It was a witty play on words that he used to point to a moral: that it is as wrong to hear indecencies as to utter them. He pegs his point, poetically, to a biblical verse. And in gen- eral, when a midrash says, ‘Read not so but so,’ that is the intent. Well, I have digressed, but this was a useful point that every sound rabbanite exegete should know.

      Returning now to our theme: The four species in a lulav seem to me to express the joy and delight of leaving the desert, a place without seed or fig, vine or pomegranate— nor water to drink (Numbers : ), and reaching sites where fruit trees grow and rivers flow.

      To keep alive the memory of that moment, we take the fairest of those fruits— the loveli- est, most verdant leaves, and the finest foliage of the streamside willow. Our four species combine three features: First, they were plentiful then in the Land of Israel, so anyone could get them. Second, they were fresh and lovely to look at. The citron and myrtle were fragrant too; the palm frond and willow neither fragrant nor rank. Third, the four of them stay fresh for seven days, unlike peaches, pomegranates, asparagus, pears, and such.
