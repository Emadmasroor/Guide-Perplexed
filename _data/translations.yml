    goodman: |-
      Lev is a noun that has multiple senses. It can mean the heart, the organ basic to the life of every animal with a heart: and plunged them into Absalom’s heart ( Samuel : ). Since this organ is central in the body, the term is used metaphorically for the core of anything: to the heart of heaven (Deuteronomy : ) and the heart of the fire (Exodus : ).

      Heart can also mean thought: Did not my heart go with thee? ( Kings : )— meaning I was with you in thought when this occurred. It is in this sense that it says, that ye stray not after your own hearts (Numbers : )— following your own whims. Or whose heart turneth away today (Deuteronomy : )— whose thoughts are inconstant.

      It can also mean outlook: All the rest of Israel were of one heart, to make David king ( Chronicles : ), being of one mind. Similarly, Fools die for want of heart (Proverbs : ), being thoughtless; My heart shall not turn (ye eraf) all my days (Job : ), my outlook will remain unshaken, I shall not falter. For the verse begins I shall hold fast to my integrity and not let it go, then my heart shall not turn all my days. I take the sense of ye eraf (cognate to the Arabic mun arafah) from a handmaid ne erefet to a man (Levit- icus : ), turned from a chattel to a spouse.

      Heart is also a word for will: I shall give you shepherds after My own heart (Jeremiah : ) and Is thy heart as right as my heart? ( Kings : ), meaning, ‘Do you mean to stand fast, as I do?’ Metaphorically, this sense may be applied to God: [a priest] who will do what is in My heart and soul ( Samuel : ), meaning one who will do as I desire. Again, Mine eyes and heart shall be ever there ( Kings : )—M y providence and will.

      Heart is also a word for ‘mind’: The witless shall get him a heart (Job : )— gain un- derstanding. Similarly, The wise man’s heart turneth aright (Ecclesiastes : )— his mind turns toward higher things. This is frequent. This sense, too, is applied metaphorically to God, passim, meaning His mind, except in a few rare cases where it may mean His will, as context requires. That is the sense in Lay it to heart (Deuteronomy : ) and None takes it to heart (Isaiah : ), and all such cases where ‘heart’ means ‘mind,’ as in The Lord hath not given you a heart to know, [eyes to see, or ears to hear, until this day] (Deuteron- omy : ), just as it says, Thou hast been given to see ( : ). But when it says, Thou shalt love the Lord thy God with all thy heart ( : ), I take it to mean ‘with every power of your heart’— all your bodily powers. For they all stem from the heart. The sense, then: Devote all that you do to knowing Him, as I explained in my Commentary on the Mishnah and in the Mishneh Torah.
