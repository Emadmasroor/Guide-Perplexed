  ch29:
    friedlander: |-
      The term ʻeẓeb is homonymous, denoting, in the first place, pain and trembling; comp. “In sorrow (be-ʻeẓeb) thou shalt bring forth children” (Gen. iii. 16). Next it denotes anger; comp. “And his father had not made him angry (ʻaẓabo) at any time” (1 Kings i. 6); “for he was angry (neʻeẓab) for the sake of David” (1 Sam. xx. 34). The term signifies also provocation; comp. “They rebelled, and vexed (ʻiẓẓebu) his holy spirit” (Isa. lxiii. 10); “and provoked (yaʻaẓibahu) him in the desert” (Ps. lxxviii. 40); “If there be any way of provocation (ʻoẓeb) in me” (ib. cxxxix. 24); “Every day they rebel (yeʻaẓẓebu) against my words” (ib. lvi. 6).

      In Genesis vi. 6 the word has either the second or the third signification. In the first case, the sense of the Hebrew va-yitʻaẓẓeb el libbo is “God was angry with them on account of the wickedness of their deeds”; as to the words “to his heart” used here, and also in the history of Noah (ib. viii. 21) I will here explain what they mean. With regard to man, we use the expression “he said to himself,” or “he said in his heart,” in reference to a subject which he did not utter or communicate to any other person. Similarly the phrase “And God said in his heart,” is used in reference to an act which God decreed without mentioning it to any prophet at the time the event took place according to the will of God. And a figure of this kind is admissible, since “the Torah speaketh in accordance with the language of man” (supra c. xxvi.). This is plain and clear. In the Pentateuch no distinct mention is made of a message sent to the wicked generation of the flood, cautioning or threatening them with death; therefore, it is said concerning them, that God was angry with them in His heart; likewise when He decreed that no flood should happen again, He did not tell a prophet to communicate it to others, and for that reason the words “in his heart” are added.

      Taking the verb in the third signification, we explain the passage thus: “And man rebelled against God’s will concerning him”; for leb (heart) also signifies “will,” as we shall explain when treating of the homonymity of leb (heart).
    pines: Placeholder text
    goodman: |-
      ʿEtzev has multiple meanings. It is a word for pain or hurt: In travail (be-ʿ etzev) shalt thou bear children (Genesis : ). It can also mean vexation: All his life his father did not vex him ( Kings : ), meaning he never criticized him. Again, [Jonathan . . . ate no food,] vexed for David ( Samuel : )— aggrieved on his account.

      The term can also signify recalcitrance and resistance: They rebelled and opposed (ʿitzvu) His holy spirit (Isaiah : ), [How often did they defy Him in the wilderness] and grieve him in the waste (Psalms : ), if I have any untoward ways (im derekh ʿotzev bi) ( : ), and All the day do they torture (yeʿatzevu) My words ( : ).

      It is in the second or third sense that it is said. [The Lord regretted that He had cre- ated man on earth;] it grieved Him at heart (Genesis : ). Taken in the second sense, this would mean that God was troubled with them for their misdeeds. At heart is used the same way in Noah’s story: The Lord said in His heart . . . ( : ). To explain: When Scripture says that someone said something in his heart, or to his heart, it means he did not say it aloud or to someone else. Similarly, when God means to do some- thing but does not foretell it to a prophet just then, it is said of Him, He said in His heart— anthropomorphically, as per the maxim “Torah speaks in human language.”

      This is clear on the face of it. For the Torah relates not that any prophet was sent just then to forewarn or caution the rebellious generation of the Flood of their destruction but only that God was aggrieved with them at heart. Likewise with His intent that there should be no further Flood. No prophet was told then, “Go tell them this.” So it says, in His heart ( : , : ).

      Taken in the third sense, It grieved Him at heart would mean that man had countered what God intended for him. For ‘heart’ can mean intent, as I shall explain in treating the senses of lev (I ).
