    goodman: |-
      The commandments in the eleventh group are the ones I listed in the rest of the Book of Worship and in the Book of Sacrifices. I have already mentioned their general ben- efit (III ). I shall take up the grounds for particular mitzvot now, so far as I have un- derstood them. The Torah, I say, as Onkelos reads it, tells us clearly that the ancient Egyptians worshipped the sign of Aries. So they banned slaughtering sheep and abhorred shepherds, as it says: If we sacrifice what is odious to the Egyptians [before their very eyes, will they not stone us?] (Exodus : ), and Egyptians abominate all shepherds (Genesis : ). Some Sabian sects, moreover, worshipped jinn and believed they took the form of goats. So they called the jinn fauns. That doctrine was quite prominent in the days of our Teacher Moses: No more shall they offer sacrifices to fauns (Leviticus : ). These sects banned eating goat meat. And bovine slaughter was abhorrent to nearly all pagans. They all venerated these beasts. Even today, you find that Hindus never slaughter cows, even in lands where other beasts are slaughtered. To expunge the trace of such unsound beliefs, our law specifies these three kinds of cattle for sacrifice: Bring your offering of the herd and flock ( : ). Acts deemed extremely impious by pagans for us became a way of nearing God and seeking forgiveness of our sins: Unsound beliefs are psychic illnesses, treated by opposites.

      For just this reason, we were commanded to slaughter the Paschal lamb and sprinkle its blood on the outside of our doors in Egypt, to advertise our disbelief in such a notion and proclaim the opposite, showing our confidence that an act thought fatal by the Egyp- tians would, in fact, protect us: The Lord will pass by that doorway and not let the de- stroyer enter your homes to smite you (Exodus : ), rewarding our loyalty in spurning those pagan phobias. That is why these three species were chosen for sacrifice— besides the fact that they are common domestic animals, unlike the offerings of pagans, who used to sacrifice lions, bears, and other wild beasts, as stated in um um.

      Most people cannot afford to offer beasts, so God provided that birds, too, may be sacrificed, the best and commonest in Syria and the most easily caught: turtledoves and young pigeons. One who could not afford even birds could offer cakes baked in any of the ways then common— oven, pan, or griddle (M. Mena ot . ). Or if baking was hard, one could bring flour. All this was for those who wished to make an offering. But there is no fault, it goes on to explain, if one does not worship in this way, with sacrifices: If you make no vow, you bear no sin (Deuteronomy : ).

      Pagans offered only leavened cakes, typically sweet and laced with honey, as the books I cited relate, and there was no salt in any of their offerings. So God forbade our offer- ing any leaven or honey (Leviticus : ) and commanded us always to use salt: With all thine offerings shalt thou offer salt ( : ).

      Whatever we offer, God commanded, must be perfect and in the finest condition so as not to demean what is offered in His name or cheapen the act: [You bring a blind beast to sacrifice— Fine! You bring one lame or sick— Fine!] Give it to your governor. Will he be pleased and favor you? (Malachi : ). For like reasons, one may not offer a beast not yet seven days old: It is immature, squalid, like a stillbirth. The ban against offering the hire of a whore or the price of a dog (Deuteronomy : ) has the same reason. These are vile.

      We offer mature turtledoves and young squabs (B. ullin 22a), since these are the best.

      An old pigeon is tasteless. And we mingle oil with fine flour in the meal offerings to make them the best and pleasantest. Hence, too, the choice of frankincense, for its fra- grant smoke in places redolent of burning flesh.

      For due dignity, lest our sacrificing seem a foul and sordid business, we were com- manded to flay the beast and wash it inside and out, even when it will be burnt entirely.

      This, you’ll find, was always closely seen to: [“From where the sun rises to where it sets, My name is honored amongst the nations, and everywhere incense and pure offerings are brought Me. For My name is great amongst the nations,” saith the Lord of hosts. “But ye profane it,] saying, ‘The Lord’s table is revolting. Its meat, disgusting!’” (Malachi : – ).

      For the same reason, no one unclean or uncircumcised may eat sacrificial meat (Exodus : with M. Yevamot . , Shabbat . ; Leviticus : ; SM Negative , ).

      Nor may it be eaten if tainted ( : ; SM Negative ), or past the proper day ( : – ), or with improper intent ( : , : , with M. Zeva im . ). It must be eaten in a specific place: The burnt offering, wholly consecrated to God, is not eaten at all. An offering made because of wrongdoing— a sin or guilt offering— is eaten in the Courtyard the day the beast is slaughtered or that night (M. Berakhot . ). Offerings of well- being, lesser and less holy, may be eaten anywhere in Jerusalem, but only there. They may be eaten the day after slaughter, but no later. After that, the meat is spoiled.

       Due deference demands that anyone who benefits from what is consecrated to God’s name in the Sanctuary is guilty and must bring a sin offering to make good, one- fifth again, even if the inroads were inadvertent (Leviticus : – ; SM Positive ; MT Laws of Meʿilah . ). Consecrated beasts, likewise, may not be worked or sheared (Deuteron- omy : ). The rule against exchanging sacrificial beasts is a precaution: If one could substitute a good victim for a bad, one might switch bad for good and call it the better. So the law treats both the original and the substitute as consecrated ( : , ). We can see why someone wishing to redeem what he has consecrated must add one- fifth ( : , , , , ): People are self- serving (B. Sanhedrin 10a), naturally tightfisted and not open- handed or precise in their appraisals. The surcharge was to compensate, letting the beast be sold for its true value. All these rules restrict depreciating what is dedicated and of- fered in God’s name.

      A Priest’s meal offering is burnt ( : ). For any Priest may make such offerings: If he brings the offering and then eats it himself, in effect, he has given nothing: A private meal offering is just a handful of flour and some incense— little enough! If he eats it, too, he seems to have performed no act of worship at all. So it is burnt.

      The specific rules for the Paschal lamb— to be eaten roasted, in one house, breaking no bone of it (Exodus : – , )— all have clear grounds: Like the unleavened bread, the roasting reflects haste. There was no time to organize a meal and prepare varied dishes or even wait to break the bones and extract the marrow. The basic idea: Ye shall eat it in haste ( : ). That would not leave time to crack bones, send meat from house to house, and wait for the messengers to return. That would be too slow and leisurely. Speed and dispatch were the point, lest anyone delay, miss departing with the main body of the people, and be exposed to ambush and attack. These measures were preserved to keep alive the memory of the Exodus— as it says, Preserve this statute at the appointed time each year ( : ).

      The Paschal lamb is eaten only by those invited (Exodus : ; M. Zeva im . )— to ensure that one gets a lamb of one’s own and does not rely on friends and relatives, or chance encounters, but takes the initiative to make the necessary preparations. Our Sages explain why this lamb is not for the uncircumcised ( : ; Exodus Rabbah at Exodus : ): The covenant of circumcision fell into disuse during our long sojourn in Egypt, when the people were copying the Egyptians. So when this sacrifice was instituted, it was conditioned on the circumcision of the one who made it and that of his sons and every male in the household, who only then could take part, when all were circumcised ( : ).

      So many were circumcised at once, as the Sages relate, that the blood of their circumci- sion ran together with that of the sacrifice. Scripture reflects this when it says weltering in thy blood (Ezekiel : )— the blood of circumcision and that of the Paschal lamb.

      The Sabians, you know, considered blood highly polluting. Yet they consumed it, deeming it demon food: By consuming it, one consorted with the jinn, who would come and tell the future, as the vulgar imagine that spirits do. For some, consuming blood was overmuch. For it is naturally revolting. So they slaughtered a beast, collected the blood in a vessel or trough, and ate the meat while gathered around the blood, fancying that the jinn got their blood repast while the people had the meat. This made them commensal with the spirits, which, they claimed, would then appear to them in dreams to aid them and inform them of things unknown.

      All these beliefs were widely followed and favored in those days. The common folk never doubted them. So the Torah, whose perfection is recognized by those who know it well, aimed to end this chronic illness. It banned consuming blood as strictly as paganism itself: God said, I shall turn My face against one who consumeth blood (Leviticus : ), just as He says of one who gives of his seed to Molech, I shall set My face against that man ( : ). No other commandment is treated just as these two are: pagan worship and con- suming blood. For consuming blood was a pagan practice, spirit worship.

      In the Torah, blood is considered pure and is made a means of purifying those who come in contact with it: Sprinkle it on Aaron and on his garments. . . . He and his garments shall be sanctified (Exodus : ). It orders blood to be dashed on the altar and makes spilling it, not collecting it, an act of worship: I gave you the blood on the altar to make atonement for you (Leviticus : ). Blood was poured out on the altar: All the blood shall he pour out ( : ) and The blood of thy sacrifices shall be poured out on the altar of the Lord thy God (Deuteronomy : ). The Torah commands spilling out the blood of any beast slaughtered, even if not as a sacrifice: Pour it on the ground like water ( : , ). And it forbids gathering around the blood to eat: Ye shall not eat by the blood— [or cast spells or practice divination!] (Leviticus : ).

      When rebellious Israelites kept up the custom they’d been raised with, seeking to consort with jinn by gathering around the blood for a meal, God commanded that in the desert, we were not to eat meat just as we liked but only in our offerings of well- being. The reason, clearly, was to ensure that the blood would be spilled at the altar and people not gather around it, as it says: So that the Children of Israel may bring [the sacrifices they have been making in the open fields . . . to the entrance of the Tent of Meet- ing, to the Priest, and offer them as sacrifices of well- being to the Lord, that the Priest may dash the blood against the Lord’s altar . . .] and they no longer sacrifice to fauns [seʾirim] (Leviticus : – ).

      That leaves fowl and wild beasts. There are no sacrifices of wild beasts, nor may fowl be sacrificed as an offering of well- being. The blood of any beast or bird whose flesh is licit, God commanded, must be covered over with earth (Leviticus : ), lest folk gather around it to eat. This thwarts fraternizing with jinn by their spirit- mad devotees.

      Around the time of Moses our Teacher, you see, such beliefs had a great following among the beguiled. You can see that from the song of Moses: They sacrificed to demons, no- gods, gods that they knew not (Deuteronomy : ). By no- gods, the Sages explain, Moses means that they adhered to the worship not only of real but even of fanciful things. As it says in Sifre, “Not content with worshipping the sun, moon, stars, and constellations, they wor- ship even their babuʾah!”— babuʾah being a word for a phantom.

      Returning to our argument: Eating meat as desired was forbidden only in the desert, you see. For the vulgar notion was that the jinn haunt wild places, where they appear and accost people, but do not appear in cities or settled places. So any townsman wishing to share in the idiocy had only to leave town and take to the desert or some isolated place.

      Once Israel entered the Land, then, they could eat meat when they liked. The mania, by then, must have abated, leaving fewer followers of such beliefs. It was difficult, if not impossible, for anyone wishing to eat meat to come to Jerusalem, so meat other than that of a sacrifice was barred only in the desert era.

      Notice that the greater the transgression, the lesser the sacrificial victim: Only a nanny goat for an inadvertent pagan act (Numbers : ); other sins of a private party require a nanny goat or a ewe lamb (Leviticus : , ), the female of the species being the lesser. For no sin is greater than pagan worship, and no beast lesser than a nanny goat.

      Given his rank, a king’s offering for an inadvertent sin is a he- goat. When a High Priest or the public (sc., the Sanhedrin) sins inadvertently, that act alone is not the only sin.

      There is also the precedent set. So this sacrifice is special: They must offer bullocks; or, for pagan worship, he- goats (Leviticus : , ; Numbers : ; B. Horayot 13a).

      Offenses requiring a guilt offering differ from those that call for a sin offering.

      For a guilt offering, the victim is a ram or a male lamb, the species and sex specified: a sheep and male. You can see that a burnt offering, wholly dedicated to God, must be male. But the sacrifices of a sinner or a So ah (she being suspected of sin) are not as fine. They may not be enhanced with oil and incense. For the deeds of the sinner who brought them were not fine. Penitent now, he is told, in effect, ‘Your actions were foul, so your offering is less.’ As for the So ah, whose offense is worse than an unwit- ting sin, hers must be the humblest offering: barley meal. All the specifics fall into order— marvelous how telling!

      A calf, a young bullock, was offered on the eighth day of the consecration of the Tab- ernacle as a sin offering (Leviticus : ), the Sages state, to atone for the sin of the Golden Calf (Tan uma Shemini § ). On Yom Kippur, likewise, the sin offering was a bullock (Leviticus : )— again in atonement for the sin of the Golden Calf. On the same princi- ple, in my opinion, the reason that all our sin offerings, public and private, are goats— on the Festivals, the New Moon, and Yom Kippur or in atonement for pagan acts— is that ancient Israel’s gravest sins lay in sacrificing to goat- demons, as Scripture makes clear: No more shall they offer sacrifices to fauns, after which they go awhoring ( : ).

      The reason we always offer a goat as atonement for communal sins, the Sages hold, harks back to the sale of righteous Joseph, whose story says, They slaughtered a kid from the flock [and dipped his coat in its blood] (Genesis : ). Do not presume that this is a weak explanation. The whole point of these rites is to impress upon the conscience of every wrongdoer that he must reflect on and be ever mindful of his sin— as it says, My sin is ever before me (Psalms : ). One must realize that he and his progeny, and their progeny too, must seek forgiveness for his sin by some corresponding meritorious act: If the misdeed was monetary, one must spend on some worthy cause. If it involved bodily pleasure, one must mortify and afflict his flesh— by fasting or vigils. If the affront was moral, one must press in the opposite direction, as I explained in Ethical Laws (MT – ) and elsewhere (Eight Chapters, ). If it was intellectual— holding an unsound view from incapacity, laxity, or aversion to inquiry— one must counter by curbing his musings, checking all worldly distractions, and focusing on what is rational, with careful study of the beliefs one ought to hold. As it says, My heart was inly swayed, but I put my hand to my mouth (Job : )— an image of hushing and self- restraint in the face of specious notions, as I explained at the start of this work (I ).

      Thus when Aaron stumbled in the episode of the Golden Calf, his offering, and that of all his successors, was a bullock or a calf (Leviticus : , : , : ). When the offense involved a goat, the fit sacrifice was also a goat. Entrenched in one’s soul, these ideas are sure to make one take sin seriously and shun it, lest he slip and need a painful and pro- tracted penance that may or may not be fully achieved. He will shun sin and eschew it to start with. So here, too, the benefit is very clear. Do take this in.

      I should like now to point out quite a striking fact not obviously relevant in this work: The goat sacrificed as a sin offering on the New Moon specifically is called a sin offering to the Lord (Numbers : ). This is not said of any goat offered on a Festival or of any other sin offering. The reason seems quite clear to me: The sacrifices, offered by the public on those festal days, the Musaf offerings, are all burnt offerings. On each Festival day, we also offer a goat of the flock as a sin offering ( : ). This is eaten. A burnt offering was wholly consumed by fire, so it was plainly called a fire offering to the Lord ( : , ). It was never called “a sin offering to the Lord” or “offerings of well- being to the Lord.” For these were eaten. One would not call even sin offerings that are burnt “fire offerings to the Lord,” as I’ll explain in this chapter. But calling the former goats sin offerings to the Lord would make no sense, since they are eaten, not burnt up. But the goat sacrificed on the New Moon might have been fancied an offer- ing to the moon, such as the Egyptians offered at each New Moon. So the Torah speci- fies that this offering belongs to God, not the moon. No such confusion would touch the sacrifices offered on our pilgrimage festivals or other occasions. For those days are not New Moons and not marked in nature but set by the Torah. But New Moons are fixed not by law but by nature, and different religions made offerings to the moon at that time, just as they did to the sun when it rose or set or reached a certain point seasonally, as those books of theirs declare. So this goat, the Torah stresses, is offered to the Lord, dispelling any delusions still lodged in those moonstruck hearts. You should not miss this nice nuance.

       Every sin offering, you know, is believed to be made to seek forgiveness for grave sins or for one such sin, such as that of (a High Priest’s or a Sanhedrin’s) ignorance (Leviticus : – ; B. Yoma 44ab; SM Positive ) and the like. The offering is wholly burnt out- side the Camp, not on the altar. Only a burnt offering or the equivalent is burnt on the altar— the reason it is called the Altar of Burnt Offerings (Exodus : ). The scent of a burnt offering is a sweet savor (Leviticus : ). So is any “token portion” of it ( : ). Of course. For the aim is to abolish pagan notions, as I explained (III ). But sin offerings are burnt to symbolize the effacing of a sin, erasing and obliterating all traces of it, just as the carcass of the sacrificial victim vanishes. No trace is to remain of that act, just as none is left of the offering burnt. Here the scent is not a sweet savor to the Lord— quite the opposite; it has foul, revolting fumes. So it is wholly burnt outside the Camp. You can see for yourself what it says about the meal offering of the So ah: [an offering of jealousy,] an offering of memory, a reminder of wrong done (Numbers : )— nothing pleasant.

      The scapegoat is offered in quest of forgiveness of sins too weighty for a communal sin offering, to seek atonement as this one does— bearing away all those sins, as it were. So the goat is not slaughtered, burnt, or ritually sacrificed but banished, cast into the wilder- ness, a desolate place far from human habitation (Leviticus : ). Sins, we all know, are not physical objects to be shifted from one back to another. These rites are all symbolic, meant to elicit a new form in the soul, a passion for penitence, saying, in effect, ‘We have purged all our past acts, cast them behind us, and banished them utterly.’ Regarding the wine offering, I have been perplexed about it until now: How could God command this, when pagans, too, offered wine? The reason eluded me. But another person explained it: ‘Dearest to the appetites seated in the liver is meat; dearest to the animal spirits, seated in the heart, is wine; and the powers in the brain, being spiritual, most delight in instrumental music. So every faculty offers God what it most prizes: meat, wine, and melody— that is, song.’ The good that pilgrimages do is well known: These gatherings revitalize devotion to the Torah by the emotions they arouse and the fellowship they engender among the people— not least from gathering as commanded to hear [and learn to revere the Lord thy God and keep all the words of this Law.] (Deuteronomy : ). The money of the Second Tithe (Deuteronomy : – ) was to be used there, as I explained (III ); so was the fruit of trees in their fourth year (III ) and the Tithe of Cattle. It was all to be consumed there in Jerusalem: the meat of that tithe, the wine of the fourth- year fruit, and the funds of the Second Tithe. The result was food in abundance. For none was to be sold, nor could consumption be delayed. Everything had to be used, as He said, year by year (Deuteronomy : ). So it had to be given as charity, underscoring the theme of beneficence in the Festivals, as it says: Rejoice on thy Festival, thou, and thy son, thy daughter . . . and the stranger, orphan, and widow ( : ).

      So I have given grounds for each mitzvah in this group and for many of their particulars.
