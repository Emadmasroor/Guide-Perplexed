    goodman: |-
      Since speaking is the metaphor for His willing all that He brought to be in the six days of creation— as it says and He said . . . and He said (Genesis : , : , etc.)— God is said to cease on the Sabbath day. For on that day, there was no creating: He ceased on the seventh day ( : ). To stop speaking is one way of ceasing, as in So these three men ceased to answer Job (Job : ). To cease speaking can also be called ‘to rest,’ as in They said all this to Nabal in David’s name and rested ( Samuel : ), meaning, as I see it, they stopped to hear his answer. It does not say that they were tired, and even if they were, that would be beside the point. It only describes how they delivered their message, as civilly as possible, and then that they waited, saying or doing nothing to provoke the kind of response Nabal made— the point being to show how very at fault he was.

      It is in this sense that it is said, He rested on the seventh day (Exodus : ). The Sages and other exegetes took rested here transitively. The Sages say, “He rested His world on the seventh day” (Genesis Rabbah . )— creation was complete on that day. The verb va- yana may have a weak first or third radical, giving it the sense of “He settled the world,”

      or gave it stability on the seventh day. On each of the six days of creation, things came to be beyond what is now the settled natural order everywhere. On the seventh day, the natural order was set, as it is today.

      Our gloss is not refuted by the fact that this verb is inflected differently from others with a weak first or third radical. Verbs can be irregular and have patterns of their own, especially weak verbs. Dispelling a delusion is not to be stymied by a rule of grammar.

      Our knowledge of Hebrew grammar today is hardly comprehensive, and rules in any language hold true only for the most part. Besides, we find that this same root, with a weak middle radical, can mean ‘to fix or settle,’ as in There shall it be set (Zechariah : ), She did not let the birds of the sky settle on them ( Samuel : ), and also, I think, in I stand fast against the day of trouble (Habakkuk : ).

      When it says va- yinnafash (was refreshed; Exodus : ), this is a passive verb based on nefesh. I have already discussed the senses of nefesh and explained that it can mean ‘will’ or ‘intent’ (I ). Here it would indicate the fulfillment of God’s purpose: His will was done.
