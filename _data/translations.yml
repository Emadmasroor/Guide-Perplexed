    pines: Placeholder text
    goodman: |-
      Yetziʾah— leaving, like coming, is used to signify an animate or inanimate body’s depart- ing one place for another: They had left the city (Genesis : ) or when a fire goes forth (Exodus : ). It is applied figuratively to things entirely nonphysical: No sooner had the command left the king’s mouth (Esther : ) or when the queen’s conduct gets out ( : ), meaning when word spreads. From Zion shall the Law go forth (Isaiah : ). Similarly, The sun went out over the land (Genesis : )— dawn came. It is in this figurative sense that we should take every reference to ‘going’ applied to God: Lo, the Lord goeth forth from His place (Isaiah : )— that is, His decree, until now hidden from us, has become manifest. This might apply to anything new. For whatever He brings to be is ascribed to His word: At the word of the Lord the heavens were made, all their host at the breath of His mouth (Psalms : ). The analogy is with the acts of kings, whose speech is their instru- ment in executing their will. But God needs no instrumentality by which to act. He acts by His will alone without speaking, as we shall see (I ).

      Since the manifesting of God’s act is metaphorically called its issuance, as I explained in glossing Lo, the Lord goeth forth from His place, suspension of that act, at His will, is called ‘return.’ Thus, I shall go and return to My place (Hosea : ), meaning that God’s Shekhinah would no longer be with us. Providence over us would then be suspended.

      Thus, the warning I shall hide My face from them, and they shall be consumed (Deuter- onomy : ). For loss of providence leaves one exposed to circumstance, one’s weal and woe left to hazard. What an awful threat conveyed in I shall go and return to My place!
