    goodman: |-
      The Kalām denial of corporeality. The methods the Mutakallimūn use in arguing against God’s corporeality are weak indeed, weaker than their arguments for His unity.

      For they make incorporeality a corollary of unity. Body, they maintain, is not one.

      If someone based incorporeality on the fact that a body must be composed of matter and form and is thus composite, as the Deity clearly cannot be, I would not call him a mutakallim. For this argument is not built on kalām premises. It is a sound proof based on belief in matter and form as rationally conceived. That is the Philosophers’ approach, which I shall discuss and explain in treating their proofs of this thesis. But my aim in this chapter is to discuss only the case for incorporeality that the Mutakallimūn make based on their arguments and assumptions.

      Method . They say, ‘If God were a body, His divinity would have to subsist either in its every atom or in just one. If in one, what good are the rest? There would be no need for that whole body. But if divinity were in all of them, each atom would be divine, and there would be not one god but many. Yet we have seen that God is one.’ You will find, on reflection, that this argument rests on Premises and . But sup- pose they are told, ‘God’s body is not composed of atoms; it is not made up of substances like those you say He creates. He is a continuous body, divisible only in fancy, and fanta- sies count for nothing. You might just as well imagine the vault of the heavens being split and sundered.’ That is pure fantasy, the Philosophers say, like applying our experience of the world here below to make inferences about bodies unknown.

      Method , which they think most impressive, is based on God’s transcendence: ‘He is unlike any of His creatures. But if He were a body, He would be like other bodies.’ They go on at some length about this: ‘If you say “a body unlike other bodies,” you contradict yourself. For every body is like any other, in being a body. Bodies differ only otherwise’— that is, in their accidents. It would also follow, so they say, that God could create His like.

       There are two ways of rebutting this argument: Someone might say, ‘I do not agree that nothing is like God. What proof have you that God cannot resemble a creature in some way, unless— good Lord!— you tie His uniqueness to a scriptural text? But then incorporeality would no longer be a matter of reason but of revelation.’ And if you say, ‘If He is like a creature, then He created His like,’ the critic will answer, ‘It is not like Him in every way, and I do not deny that God has diverse aspects and attributes.’ A corporealist would hardly stick at that.

      The second way is harder. It is well established among those who do philosophy and have probed the Philosophers’ doctrines deeply that the spheres are called bodies in quite a different sense than bodies of ordinary matter. The matter is different, and so are the forms. The terms matter and form have different senses as applied here below and to the spheres. The sphere does have volume, of course, but that is not what makes it a body; a body is a composite of matter and form. But if that can be said of the spheres, all the more readily can a corporealist say, ‘God is a body with a shape, but essentially and sub- stantially unlike any created being. The two are called bodies in quite different senses’— just as we theists hold that ‘being’ is said of Him and of the world in different senses.

      A corporealist need not agree that all bodies are made up of identical particles. God, he says, created all bodies, and they differ in substance and essence. He would no more compare God’s body to that of the created light of the Shekhinah or the Pillar of Cloud than compare the Shekhinah to the stars and celestial spheres— or the sphere of the sun to dung. ‘God’s body,’ he says, ‘is sublimely perfect, utterly incomposite, unchanging and unchangeable. That is why His body is eternal, exists necessarily, and creates all else at His will and pleasure.’ I wish I knew how the sick corporealist view could be refuted by the marvelous arguments I taught you.

      Method . They say, ‘If God were a body, it would be finite.’ True. ‘If finite, it would have a definite size and shape.’ Also a sound inference. ‘And for any given size and shape,’ they add, ‘God, if a body, might have been larger or smaller or shaped otherwise. His having this particular size and shape would require some determining cause.’ This argument, too, I have heard them vaunting. But this one is flimsier than all the rest, since it depends on Premise . I have shown you how problematic that is for the world, let alone for God. For it undercuts the idea of nature. This method is no dif- ferent from their argument that since the world exists rather than not, there must be a cause to determine that outcome, both alternatives being possible. If someone asks them why the same reasoning cannot be applied to God? Does His existence, too, not require a cause to favor it over nonexistence? The answer, of course, would be ‘That leads to a series that must end at a necessary being, free of contingency and needing nothing to give it being.’ But the same reply could be given regarding God’s supposed size and shape. For of any size or shape that once did not exist and later did, it could be said that it might have been larger or smaller or shaped otherwise and so needs a determiner. But the corporeal- ist could say of God’s presumed shape and size (exalted be He above all defect and all likeness to His creatures!), ‘It was never nonexistent, and then real, and thus in need of a determiner. He Himself is necessary, and so are His size and shape. He needs no one to determine or favor His existence over nonexistence. And just as there is no possibility of His nonexistence, His size and shape need no specifier: They too are necessary.’ Think it over now, dear inquirer. Would you not rather seek the truth and drop the dogma, wishful thinking, and awestruck deference to habit and cant? Do not fool your- self about these thinkers or the fruits of their labors. They got out of the frying pan and into the fire— abolished nature and denatured heaven and earth just to make creation demonstrable by these posits of theirs. Yet they did not prove that the world was created but only undermined our arguments for God’s existence, unity, and incorporeality. For all our proofs depend on the settled nature of the world of our experience, as known to reason and the senses.

      Now that we have seen the upshot of their arguments, we should turn to the proofs and premises of the Philosophers for God’s existence and unity and the impossibility of His being a body. But we shall grant them one premise that we do not ourselves accept: the world’s eternity. After that, I’ll show you my own approach, so far as sound reasoning has allowed me to frame proofs of these three theses. Having done that, I’ll return, with God’s help, to engage with the Philosophers’ eternalism.
