  ch4:
    friedlander: 'It is necessary to call your attention to an idea expressed by Jonathan,
      the son of Uzziel. When he saw that the prophet says in reference to the Ofannim,
      “It was cried unto them in my hearing, O gilgal” (“sphere”) (x. 13), he assumed
      that by Ofannim the heavens are meant, and rendered ofan by gilgal, “sphere,”
      and ofannim by gilgelaya, “spheres.” I have no doubt that he found a confirmation
      of his opinion in the words of the prophet that the Ofannim were like unto the
      colour of tarshish (ver. 16), a colour ascribed to the heavens, as is well known.
      When he, therefore, noticed the passage, “Now as I beheld the Ḥayyot, behold
      one Ofan upon the earth” (i. 15), which clearly shows that the Ofannim were
      upon the earth, he had a difficulty in explaining it in accordance with his
      opinion. Following, however, his interpretation, he explains the terms ereẓ,
      employed here as denoting the inner surface of the heavenly sphere, which may
      be considered as ereẓ (“earth” or “below”), in relation to all that is above
      that surface. He therefore translates the words ofan eḥad ba-areẓ as follows:
      “One ofan was below the height of the heavens.” Consider what his explanation
      of the passage must be. I think that he gave this explanation because he thought
      that gilgal denotes in its original meaning “heaven.” My opinion is that gilgal
      means originally “anything rolling”; comp. “And I will roll thee (ve-gilgaltika)
      down from the rocks” (Jer. li. 25); “and rolled (va-yagel) the stone” (Gen.
      xxix. 10); the same meaning the word has in the phrase: “Like a rolling thing
      (gilgal) before the whirlwind” (Isa. xvii. 13). The poll of the head, being
      round, is therefore called gulgolet; and because everything round rolls easily,
      every spherical thing is called gilgal; also the heavens are called gilgallim
      on account of their spherical form. Thus our Sages use the phrase, “It is a
      wheel (gilgal) that moves round the world”; and a wooden ball, whether small
      or large, is called gilgal. If so, the prophet merely intended by the words,
      “As for the Ofannim, it is cried to them in my hearing, O sphere” (gilgal),
      to indicate the shape of the Ofannim, as nothing has been mentioned before respecting
      their form and shape; but he did not mean to say that the Ofannim are the same
      as the heavens. The term “like tarshish” is explained in the second account,
      in which it is said of the Ofannim: “And the appearance of the ofannim was like
      the colour of tarshish.” This latter passage is translated by Jonathan, the
      son of Uzziel, “like the colour of a precious stone,” exactly in the same manner
      as Onkelos translates the phrase ke-maʻase libnat ha-sappir, “like the work
      of the whiteness of sapphire” (Exod. xxix. 10). Note this. You will not find
      it strange that I mention the explanation of Jonathan, son of Uzziel, whilst
      I gave a different explanation myself; for you will find many of the wise men
      and the commentators differ sometimes from him in the interpretation of words
      and in many things respecting the prophets. Why should it be otherwise in these
      profound matters? Besides, I do not decide in favour of my interpretation. It
      is for you to learn both—the whole of his explanation, from what I have pointed
      out to you, and also my own opinion. God knoweth which of the two explanations
      is in accordance with that which the prophet intended to say.'
    pines: Placeholder text
    goodman: |-
      I should tell you about a thought that Jonathan ben Uzziel proposed. Seeing that the text clearly says I heard the wheels called galgal (Ezekiel : ), he was sure the wheels were the heavens. So he consistently translated wheel as galgal (sphere) and wheels as galgalaya.

      This gloss was confirmed for him, no doubt, by Ezekiel’s saying that the wheels were like the color of beryl ( : ), a color commonly assigned to the heavens. But when he found it saying, As I saw the creatures, lo there was one wheel on earth ( : ), showing that the wheels were on earth, he saw the problem in his reading, of course. But he pressed it, taking earth here to mean the surface of the heavens, which is “earth” relative to what lies higher. He translated it as “one wheel on the earth beneath the heavens’ height.”

      You can see how he took it. What led him to read the verse in this way, I suppose, was believing that galgal in its primary sense was a name for the sky. But as I see it, galgal just means rolling: roll thee down (gilgaltikha) from the crags (Jeremiah : ), he rolled away (va- yagel) the stone (Genesis : ); and thus, like a tumbleweed (galgal) in the gale (Isaiah : ), so called because it rolls. That is why a skull is called gulgolet: It can roll. Anything round is called galgal, since it readily rolls: The heavens are called galgalim because they revolve, being round. The Sages say, “It is a cycle (galgal)” (B. Shabbat 151b), and ac- cordingly, they call a winch a galgal. So when Ezekiel says, I heard the wheels called galgal ( : ), Jonathan took that to tell us their shape. For no shape or form was mentioned as theirs beyond calling them galgalim.

      As for like beryl, Jonathan interprets this the same way the second time. When Ezek- iel says the appearance of the wheels was like the color of beryl ( : ), Jonathan translates it as “like the color of a precious stone.” Onkelos, as you know, used the same expression in translating the like of a work clear as sapphire (Exodus : ; see I ): “like a precious stone.” There is no difference between like the color of beryl and the like of a work clear as sapphire. You see my point.

      Don’t be troubled that I cited Jonathan ben Uzziel’s gloss here, although I disagree.

      Many of the Sages and exegetes, too, you’ll find, differ with his glosses of certain biblical themes and terms. Why would they not in matters so arcane? I will not press you to favor my reading. Just understand his reading fully, as I’ve sketched it, and mine as well. God knows which best fits Ezekiel’s intent.
