  ch33:
    friedlander: 'It is clear to me that what Moses experienced at the revelation
      on Mount Sinai was different from that which was experienced by all the other
      Israelites, for Moses alone was addressed by God, and for this reason the second
      person singular is used in the Ten Commandments; Moses then went down to the
      foot of the mount and told his fellow-men what he had heard. Comp., “I stood
      between the Lord and you at that time to tell you the word of the Lord” (Deut.
      v. 5). Again, “Moses spake, and God answered him with a loud voice” (Exod. xix.
      19). In the Mechilta our Sages say distinctly that he brought to them every
      word as he had heard it. Furthermore, the words, “In order that the people hear
      when I speak with thee” (Exod. xix. 9), show that God spoke to Moses, and the
      people only heard the mighty sound, not distinct words. It is to the perception
      of this mighty sound that Scripture refers in the passage, “When ye hear the
      sound” (Deut. v. 20); again it is stated, “You heard a sound of words” (ibid.
      iv. 12), and it is not said “You heard words”; and even where the hearing of
      the words is mentioned, only the perception of the sound is meant. It was only
      Moses that heard the words, and he reported them to the people. This is apparent
      from Scripture, and from the utterances of our Sages in general. There is, however,
      an opinion of our Sages frequently expressed in the Midrashim, and found also
      in the Talmud, to this effect: The Israelites heard the first and the second
      commandments from God, i.e., they learnt the truth of the principles contained
      in these two commandments in the same manner as Moses, and not through Moses.
      For these two principles, the existence of God and His Unity, can be arrived
      at by means of reasoning, and whatever can be established by proof is known
      by the prophet in the same way as by any other person; he has no advantage in
      this respect. These two principles were not known through prophecy alone. Comp.,
      “Thou hast been shown to know that,” etc. (Deut. iv. 34). But the rest of the
      commandments are of an ethical and authoritative character, and do not contain
      [truths] perceived by the intellect. Notwithstanding all that has been said
      by our Sages on this subject, we infer from Scripture as well as from the words
      of our Sages, that the Israelites heard on that occasion a certain sound which
      Moses understood to proclaim the first two commandments, and through Moses all
      other Israelites learnt them when he in intelligible sounds repeated them to
      the people. Our Sages mention this view, and support it by the verse, “God hath
      spoken once; twice have I heard this” (Ps. lxii. 11). They state distinctly,
      in the beginning of Midrash Ḥazita, that the Israelites did not hear any other
      command directly from God; comp. “A loud voice, and it was not heard again”
      (Deut. v. 19). It was after this first sound was heard that the people were
      seized with the fear and terror described in Scripture, and that they said,
      “Behold the Lord our God has shown us, etc., and now why shall we die, etc.
      Come thou near,” etc. Then Moses, the most distinguished of all mankind, came
      the second time, received successively the other commandments, and came down
      to the foot of the mountain to proclaim them to the people, whilst the mighty
      phenomena continued; they saw the fire, they heard the sounds, which were those
      of thunder and lightning during a storm, and the loud sound of the shofar; and
      all that is said of the many sounds heard at that time, e.g., in the verse,
      “and all the people perceived the sounds,” etc., refers to the sound of the
      shofar, thunder, and similar sounds. But the voice of the Lord, that is, the
      voice created for that purpose, which was understood to include the diverse
      commandments, was only heard once, as is declared in the Law, and has been clearly
      stated by our Sages in the places which I have indicated to you. When the people
      heard this voice their soul left them; and in this voice they perceived the
      first two commandments. It must, however, be noticed that the people did not
      understand the voice in the same degree as Moses did. I will point out to you
      this important fact, and show you that it was a matter of tradition with the
      nation, and well known by our Sages. For, as a rule, Onkelos renders the word
      va-yedabber by u-mallel (“and God spake”); this is also the case with this word
      in the beginning of the twentieth chapter of Exodus, but the words ve-al yedabber
      immanu elohim, “let not God speak to us” (Exod. xx. 19), addressed by the people
      to Moses, is rendered vela yitmallel immanu min kodam adonai (“Let not aught
      be spoken to us by the Lord”). Onkelos makes thus the same distinction which
      we made. You know that according to the Talmud Onkelos received all these excellent
      interpretations directly from R. Eliezer and R. Joshua, the wisest men in Israel.
      Note it, and remember it, for it is impossible for any person to expound the
      revelation on Mount Sinai more fully than our Sages have done, since it is one
      of the secrets of the Law. It is very difficult to have a true conception of
      the events, for there has never been before, nor will there ever be again, anything
      like it. Note it.'
    pines: Placeholder text
    goodman: |-
      It is clear to me that when Israel stood before Mount Sinai, not everything that reached Moses reached all Israel. Only he was addressed. Hence the whole Decalogue uses the second person singular. Moses came down to the foot of the mountain and told the people what he had heard. The Torah says, I stood then between you and the Lord to tell you the Lord’s word (Deuteronomy : ); Moses spoke, and God answered him aloud (ba- kol; Exodus : ). As the Mekhilta explains (at Exodus : ), he repeated each command for them as he had heard it. The Torah says so the people may hear what I tell you ( : ), show- ing that Moses was addressed. The people heard a great sound, not articulate speech.

      Of the great sound they heard, it says, when you heard the sound (Deuteronomy : ) and The sound of words did ye hear, but no image did you see, only the sound ( : ). It does not say that they heard words. Whenever it speaks of their hearing speech it means only the sound. It was Moses who heard words and relayed them. That is the Torah’s plain sense and what most of the Sages say. In many Midrashic and Talmudic passages, too, they say, I am . . . and Thou shalt not have . . . (Exodus : , ) were heard straight from the Almighty (B. Makkot 23b– 24a, Horayot 8a, Song of Songs Rabbah . . ), meaning that they reached the people the same as Moses our Teacher: These he did not relay to them. For these two principles, God’s reality and uniqueness, are grasped by human reason alone. With anything known by proof positive, a prophet is on the same footing as anyone who knows it and no better. So these two principles are not known by prophecy alone. As the Torah states plainly, Thou hast been clearly shown, [that the Lord is God and there is no other] (Deuteronomy : ). The other commandments in the Decalogue are traditional or conventional, not truths of reason.

      Given what the Sages say about this, what Scripture and their discussions convey is that what all Israel heard at Sinai was just one sound, heard but once. This was the sound Moses took in, and all Israel through him: I am and Thou shalt not have. Moses voiced it for them as articulate speech in discrete words. So say the Sages, citing in support, Once did God speak, twice did I hear it (Psalms : ). As they explain at the start of Midrash azit (Song of Songs Rabbah . . ), Israel heard no further sound from Him. Thus the Torah’s text: A great sound, nothing more (Deuteronomy : ). On hearing that first sound came their panic and terror, as the text reports: Ye said, “The Lord [hath shown us His glory and greatness, we have heard His voice out of the fire . . .] Now let us not die . . .

       Do thou approach and hear . . .” ( : – )? The greatest man ever born advanced again then and received the remaining commandments one by one. He came down to the foot of the mount and proclaimed them to that vast assembly, as they watched the flames and heard the sounds— the sounds and lightning (like peals of thunder) and the mighty sound of the shofar (Exodus : ). All the many sounds mentioned here, as when it says the whole people seeing the sounds ( : ), are just the sound of the shofar, the thunder, and such. The voice of the Lord— that is, the created sound from which God’s word was understood— was heard only once, as the Torah affirms and the Sages explain in the pas- sage I cited for you. It was at this sound that their souls took flight as they heard it and took in the first two commandments (Song of Songs Rabbah . . ).

      Even in hearing that sound, you see, they were not on a par with our Teacher Moses. I note that here. It is a profundity familiar to our Sages and conveyed in an unbroken tradi- tion in our nation. So wherever you find The Lord spoke to Moses, saying . . . , Onkelos translates ‘spoke’ as malel, “related”: God spoke all these things (Exodus : ) becomes “The Lord related all these commandments.” But when Israel said to Moses, Let God not speak to us ( : ), he translated it as “Let it not be said to us on God’s part,” illustrat- ing the point I’m making. In these sublime and wonderful themes, Onkelos followed the authority of Rabbi Eliezer and Rabbi Joshua, peerless Sages of Israel (B. Megillah 3a), who glossed the verses so. This is something to understand and remember. For the As- sembly at Mount Sinai cannot be better explained than they explained it. It is one of the Torah’s mysteries. The true character of that epiphany, what the experience was really like, is utterly beyond us. There had never been anything like it, and nothing like it will ever occur again. You need to see this.
