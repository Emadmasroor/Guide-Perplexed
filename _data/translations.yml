  ch19:
    friedlander: The term male is a homonym which denotes that one substance enters
      another, and fills it, as “And she filled (va-temalle) her pitcher” (Gen. xxiv.
      16); “An omer-full (melo) for each” (Exod. xvi. 32), and many other instances.
      Next, it signifies the expiration or completion of a fixed period of time, as
      “And when her days to be delivered were fulfilled (va-yimleü)” (Gen. xxv. 24);
      “And forty days were completed (va-yimleü) for him” (Gen. l. 3). It further
      denotes attainment of the highest degree of excellency, as “Full (male) with
      the blessing of the Lord” (Deut. xxxiii. 23); “Them hath he filled (mille) with
      wisdom of heart” (Exod. xxxv. 35); “He was filled (va-yimmale) with wisdom,
      and understanding, and cunning” (1 Kings vii. 14). In this sense it is said
      “The whole earth is full (melo) of his glory” (Isa. vi. 4), “All the earth gives
      evidence of his perfection,” i.e. leads to a knowledge of it. Thus also “The
      glory of the Lord filled (male) the tabernacle” (Exod. xl. 34); and, in fact,
      every application of the word to God must be interpreted in this manner; and
      not that He has a body occupying space. If, on the other hand, you prefer to
      think that in this passage by “the glory of the Lord,” a certain light created
      for the purpose is to be understood, that such light is always termed “glory,”
      and that such light “filled the tabernacle,” we have no objection.
    pines: Placeholder text
    goodman: |-
      Meloʾ— to fill. An equivocal term. It can denote repletion of one body by another: She filled her jug (Genesis : ) and an omer- full each (cf. Exodus : – ). This is frequent.

      The term is also used for completing a span of time: Her term was full (Genesis : ) and His forty days were full ( : ). Or it may mean reaching consummate goodness or perfect virtue: Filled with the Lord’s blessedness (Deuteronomy : ), He filled them with skill (Exodus : ), and He was full of skill, resource, and knowledge [of every kind of work in bronze.] ( Kings : ). It is in this sense that it is said, All the earth is filled with His glory (Isaiah : ), meaning ‘All the earth attests to His perfection’— it gives evidence of Him.

      Likewise, The glory of the Lord filled the Tabernacle (Exodus : ). Every reference you find to God’s filling something has this sense; it does not imply a body in space. But if you prefer to take the glory of the Lord here to be a created light, everywhere called glory, that filled the Tabernacle, there is no harm in that.
    munk: Placeholder text
    atay: Placeholder text
    tibbon: Placeholder text
  ch20:
    friedlander: |-
      The word ram (high) is a homonym, denoting elevation in space, and elevation in dignity, i.e., greatness, honour, and power. It has the first meaning in “And the ark was lifted up (va-tarom) above the earth” (Gen. vii. 17); and the latter meaning in “I have exalted (harimoti) one chosen out of the people” (Ps. lxxxix. 20); “Forasmuch as I have exalted (harimoti) thee from amongst the dust” (1 Kings xvi. 2); “Forasmuch as I exalted (harimoti) thee from among the people” (1 Kings xiv. 7).

      Whenever this term is employed in reference to God, it must be taken in the second sense: “Be thou exalted (rumah), O God, above the heavens” (Ps. lvii. 12). In the same manner does the root nasa (to lift up) denote both elevation in space and elevation in rank and dignity. In the former sense it occurs in “And they lifted up (va-yisseü) their corn upon their asses” (Gen. xlii. 26); and there are many instances like this in which this verb has the meaning “to carry,” “to move” from place to place; for this implies elevation in space. In the second sense we have “And his kingdom shall be exalted” (ve-tinnase) (Num. xxiv. 7); “And he bare them, and carried them” (va-yenasseëm) (Isa. lxiii. 9); “Wherefore do ye exalt yourselves” (titnasseü) (Num. xvi. 3).

      Every form of this verb when applied to God has this latter sense—e.g., “Lift up thyself (hinnase), thou judge of the earth” (Ps. xciv. 2); “Thus saith the High (ram) and Exalted (nissa) One” (Isa. lvii. 15)—denoting elevation in rank, quality, and power, and not elevation in space.

      You may be surprised that I employ the expression, “elevation in rank, quality, and power,” and you may say, “How can you assert that several distinct expressions denote the same thing?” It will be explained later on (chap. l. seqq.) that those who possess a true knowledge of God do not consider that He possesses many attributes, but believe that these various attributes which describe His Might, Greatness, Power, Perfection, Goodness, etc., are identical, denoting His Essence, and not anything extraneous to His Essence. I shall devote special chapters to the Names and Attributes of God; our intention here is solely to show that “high and exalted” in the passage quoted denote elevation in rank, not in space.
    pines: Placeholder text
    goodman: |-
      Ram— high. This may mean elevated in space or in rank, majesty, dignity, or honor. It says, The ark was lifted high above land (Genesis : ). Here the term is used in its original sense. It also says, I raised up one chosen from the people (Psalms : ), since I raised thee from the dust ( Kings : ), and since I raised thee from the midst of the nation ( : )— all these are in the second sense. With God it is always the latter sense that is used: Exalted be Thou, God, high above the heavens (Psalms : ).

      The term nasoʾ (to lift) likewise can have the sense of elevation in place, rank, or for- tune: They lifted their grain onto their asses (Genesis : ) in the first sense. The term often has that sense, since moving goods involves lifting them. In the second sense we have His kingdom exalted (Numbers : ), He took them and raised them up (Isaiah : ), and Why bear ye yourselves so high! (Numbers : ). Whenever God is said to be upraised, this is the sense. Thus, Rise up, Judge of the earth (Psalms : ), and So saith the High and Exalted (Isaiah : )— exalted in majesty, dignity, and honor, not location.

      You might see a problem in my saying majesty, dignity, and honor: “How can you draw multiple senses from one idea?” But the enlightened understand, as you will soon see, that God is not to be described by multiple predicates; all the many terms pointing to exaltation, majesty, might, perfect being, and so on regard His Identity and nothing else.

      Chapters about the names and epithets applied to God (I – , – ) will reach you soon. But my point in this chapter is just that high and exalted regard rank, not location.
