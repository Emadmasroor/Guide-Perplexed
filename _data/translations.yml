    goodman: 'Ish and ishah are nouns originally meaning ‘man’ and ‘woman,’ later
      applied to any male or female animal: Of every clean beast shalt thou take seven
      pairs: ish ve- ishto (Gen- esis : )— a male and a female. In time, the noun
      ishah was applied figuratively to any- thing considered paired, as in Five curtains
      shall be joined each to the next (ishah el a otah, literally ‘woman to sister’;
      Exodus : ). Brother and sister, too, are clearly polysemous and used figuratively
      in the same way as woman and man.'
