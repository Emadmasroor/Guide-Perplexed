    goodman: |-
      The mitzvot in the tenth group are those that I listed in Laws of God’s Chosen House, Implements of the Sanctuary and Those who Serve There, and Laws of Entry to the Sanctuary. I’ve already related the general benefits of this class of duties (III ). Pagans, we know, typically built their temples and erected their icons in the highest places they could find in the area— on lofty mountains (Deuteronomy : ). So our Father Abraham chose Mount Moriah, the highest peak nearby, to proclaim God’s unity. He speci- fied due west as the direction to face in prayer, the Holy of Holies lying to the west. That is what the Sages mean by saying, “God’s Shekhinah is to the West” (B. Bava Batra 25a).

      They explain in tractate Yoma that in prayer, we face the Holy of Holies, the direction that Father Abraham set (28b, 54b). The reason, I think, is that sun worship was then widespread all through the world. With the sun as god, everyone, of course, faced east in prayer. So Father Abraham on Mount Moriah (in God’s Sanctuary!) faced west, his back to the sun. Remember what Israel did when, backsliding, they reverted to their old, warped views, their backs to the Lord’s Temple, their faces to the East, bowing eastward, toward the sun (Ezekiel : ). You must not miss that striking shift.

      I’m sure the site that Abraham was inspired to choose was known to our Teacher Moses and to many others. For Abraham had advised them that there would be a shrine there, as the translator brings out: “Abraham prayed and worshipped in that place, saying, ‘Here shall generations worship before the Lord.’” I see three good reasons why the place is not expressly named and identified in the Torah but only alluded to as the place that the Lord will choose (Deuteronomy : ; cf. Genesis : ): (a) lest the nations, once they knew it as the Torah’s cynosure on earth, would lay hands on it and fiercely fight for it; (b) lest those who hold it now lay it waste and do all they can to destroy it; and (c) (most likely), lest the tribes of Israel vie for it, each seeking to include it in its allotment, fomenting internecine conflict and civil war, like their battles over the Priest- hood. Hence the command that God’s Chosen House not be built until the monarchy was established and there was a united rule to quell such wrangling, as I explained in the Book of Judges (MT Laws of Kings and Wars . – ).

      We know they used to build temples to the stars and place in them the icon they meant to serve, the image linked to a certain star or sector of the heavens. So we were ordered to build a temple to God and to place in it the ark holding the two tablets bearing the words I am . . . and Thou shalt not have . . . (Exodus : – ).

      Belief in prophecy, as we know, anchors belief in the Torah. For without a prophet, there is no revealed law. But prophets are inspired only through an angel— as it says, The angel of the Lord called (Genesis : ) and The angel of the Lord said to her ( : – ).

      This phrasing occurs countless times. Even the mission of our Teacher Moses began with inspiration from an angel: The angel of the Lord appeared to him in the heart of the fire (Exodus : ). So belief in prophecy evidently depends on belief in angels, just as belief in a revealed law depends on belief in prophecy.

      The Sabians, ignorant of God’s existence and taking the sphere and the stars to be the eternal beings that could not fail to exist, from which powers emanated to their idols and to certain trees— their asherot— supposed that it was these trees and idols that in- spired prophets, uttering oracles to inform them of what was helpful or harmful, as I ex- plained in telling you of their doctrines of the prophets of Baal and the Asherah (III ).

      Once the truth was known to the learned and it was demonstrated that a Being exists that is not a body or a physical force but the one true God and that other incorporeal beings emanate from His Being— the angels, as I explained (I ; II ), all far transcend- ing the sphere and stars— it was certain that real prophetic inspiration comes from the angels, not those idols and asherot.

      So belief in angels was clearly a corollary of belief in God, as I said, confirming proph- ecy and the Torah. To cement this core belief, God ordered two angels’ images to be fashioned above the ark, fixing the reality of angels in the faith of the masses— a true belief, supporting belief in God and vital to prophecy, the revealed Law, and rejection of paganism, as I explained. Having the image of just one cherub might have been mislead- ing. It might have been presumed to be an image of the deity to be worshipped, as in pagan practice. Or a single cherub might have been seen as another god, leading to some sort of dualism. But two angels were made, and it was proclaimed, The Lord is our God, the Lord is one (Deuteronomy : ), underlining the fact that angels are real, but many, and checking any illusion as to their divinity. For one God created all their host.

      Next, a menorah was set before the ark to give the Temple dignity and splendor. For a space ever lit and veiled in curtains has a powerful impact spiritually. The Torah, as you know, sets great store in the sense of the Temple’s dignity and sanctity, which in- spires emotions of humility and awe at the very sight of it. Ye shall revere My Sanctuary (Leviticus : ), it says, and it links that command with Sabbath observance, underscor- ing the reverence the Temple is due.

      It is clear why an altar is needed for incense and an altar for the burnt offerings and their implements. But in the case of the table and the bread always set upon it (Leviti- cus : – ), I do not know the reason, having seen no connection to the aim of inspir- ing awe.

      As for the prohibition of dressing the altar stones (Exodus : ; Deuteronomy : ; SM Negative ), you know the rationale the Sages gave for this: “It is not fit to raise what shortens life against what prolongs it” (M. Middot . ). That is lovely homiletically, as I put it (cf. .97a). But the reasons for the ban are clear enough: Pagans built their altars of hewn stones. So God forbade our doing the same and ordered us to make His altar of earth and not copy them, as it says: An altar of earth shalt thou make Me (Exodus : ).

      Or if it must be of stones, leave them in their natural form, unhewn. Also forbidden: a figured stone (Leviticus : ) and a tree planted by the altar (Deuteronomy : ). These rules all serve the same end: We are not to worship God in the manner of any pagan cult.

      Hence the global ban: [Take care lest thou be ensnared into following them . . . lest thou inquire after their gods, saying,] “How did those nations serve their gods? I shall do likewise”

      ( : ). This means that one must not do the same for God: For every horror hateful to the Lord did they perform for their gods [— even burning their sons and daughters to their gods!] ( : ).

      You know how common worship of Peor was in those days. The practice was to expose oneself. So God commanded our Priests to make breeches, to cover their naked flesh (Exodus : ) in worship— and even so, not to ascend to the altar by stairs, lest thy nakedness be exposed there ( : ).

      The (Levites’) constant rounds of watch at the Sanctuary were to show it honor and reverence and to keep the impure, unkempt, and uncouth from breaching its precincts, as I will explain: A critical mark of the deference and respect due the Sanctuary, to inspire us with reverence for it, was the exclusion of anyone drunk, defiled, or disheveled— with hair unkempt or garments rent (SM Negative, )— and to ensure that every worshipper sanctifies hands and feet (by washing, Exodus : – ; SM Positive ). Again, in rever- ence for the Temple, those who served there were honored and distinguished, the Koha- nim and Levites. The Priests wore the finest, most sumptuous attire, sacred garments . . .

      for honor and for splendor ( : ). No one might serve who was disfigured. Not only the deformed were disqualified (Leviticus : – ) but even the misshapen, as the halakhic treatment of this precept details (M. Bekhorot , MT Entry to the Sanctuary ). For the masses do not respect one’s true form unless his limbs are well knit and he is well attired, and the intent was that the Temple and those who served there be revered by all.

      A Levite did not offer sacrifice and was not envisioned as appealing for the forgiveness of sins like a Kohen: He shall make atonement for him. . . . He shall make atonement for her (Leviticus : , : ). His role is to sing. So he is not qualified if he cannot sing. Song aims to move the spirit with its words, and only lovely melodies can do that, instrumen- tally accompanied, as they always were in the Temple.

      Even Priests eligible to serve in the Sanctuary were not to sit down there. Nor could they enter the Temple at just any time— or the Holy of Holies at all, except the High Priest on Yom Kippur, and then only four times. All this was to enhance the dignity of the Temple.

      In this sanctified site, many beasts were slaughtered each day, their flesh butchered, their entrails washed and burnt. It would surely have smelt like an abattoir if left alone.

      Hence the command to burn incense there twice daily, once in the morning and once before dusk (Exodus : – ; MT Laws regarding Daily Offerings . ; SM Positive ), to improve the odor of the place and that of the clothes of those who served there. You know how they said, “The incense could be smelt as far as Jericho” (cf. M. Tamid . ). This, too, helped preserve reverence for the Temple. Had it not smelled fragrant or, even worse, the contrary, the effect would have been quite the opposite of awe. For one’s spirit is lifted and drawn by fragrant odors but recoils and shrinks at those that are foul.

      The anointing oil (Exodus : – ) served two purposes: It perfumed what was daubed with it, and it gave a sense that what was anointed was special, holier than other things of its kind, whether persons, garments, or utensils. All this enhanced the sense of awe for the Sanctuary— and thus for the Lord. For the impact of visiting the Temple was to gentle and soften an obdurate heart. God, in His grace, devised all this long in advance (cf. Isaiah : ) to make hearts tender and humble on entry, receptive to His wise precepts and counsels, and filled with reverence toward Him, as the Torah spells out: Thou shalt consume the tithe of thy new grain, wine, and oil, and the firstlings of thy herds and flocks before the Lord thy God in the place He chooseth for His name to dwell, that ye may learn ever to revere the Lord thy God (Deuteronomy : ). So you see the point of all these practices.

      The reason one may not duplicate the anointing oil or the incense (Exodus : ; SM Negative ) is very clear: This scent may be smelt only there. That heightened its impact— and no one could presume that just anyone anointed with this oil or one like it was consecrated by it. That would foment dreadful conflicts and anarchy.

      The Ark is borne on men’s shoulders, not by wagon (Numbers : – ), out of respect, clearly— but also lest its contours be disturbed, even by removing the staves from the rings (Exodus : ). The design of the Ephod and Breastplate, too, must not be dis- turbed, even by separating them ( : ). It was also ruled that each priestly garment must be of the whole cloth, uncut ( : ), so as not to mar the weaving. By the same token, those who served in the Sanctuary were not to shift roles. For when a team has tasks but not individual responsibilities, general negligence and disorder result. The graded requirements for entry— to the Temple Mount, the Atrium, the Women’s Pavilion, the Courtyard, and so forth, up to the Holy of Holies (M. Kelim . – )— were clearly also meant to enhance reverence for the place and instill mounting awe in the hearts of all who approached.

      I have now given the grounds for each mitzvah in this group.
