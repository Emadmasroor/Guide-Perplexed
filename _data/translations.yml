    goodman: |-
      When these things happened, or are supposed to have happened, all five— Job and his companions— agreed that all his misfortunes were known to God and were His doing.

      They agreed, too, that God is not to be said to do wrong: Injustice may not be ascribed to Him. You will find these thoughts recurrent in the speeches in the Book of Job.

      Studying what the five of them say in their exchanges, you might almost conclude that whatever one of them says is said by all. The themes recur and run together, in- terspersed with Job’s accounts of his tragic losses and his awful suffering, despite his exemplary life— his honesty, generosity, and good deeds. Also breaking up the dia- logue are his friends’ counsels of patience, expressions of sympathy, and exhortations to resignation— he should keep silent and not give rein to his tongue, like someone arguing a case, but bow to God’s judgment and keep still. Yet his agony, he says, bars forbear- ance and composure; it will not let him speak with propriety.

      All his friends agree, moreover, that all good men are rewarded and all wrongdoers punished. When you see a sinner living well, his fortunes will reverse; he will be ruined in the end. Disaster will overtake him and his children and posterity, and if you see a faith- ful person in distress, the rift is sure to be mended. You will find that point repeated in Eliphaz, Bildad, and Zophar’s speeches. All three agree on this. But there is more to the story. It aims to introduce each man’s distinctive appraisal of the situation, the most dire and dreadful disasters befalling the finest, most decent person.

      Job’s view was that his case shows that the righteous and the wicked are the same to God. He scorns mankind and has set us adrift. As he says in all his speeches, It is all one, I say— innocent and wicked doth He destroy when a flood bringeth sudden death, mocking the plight of the guiltless (Job : – ). A torrent, he says, slays and sweeps away all in its path, deriding the travail of the innocent. Underscoring this view, he says, One dieth full of vigor, all at ease and safe, his pails full of milk. . . . Another dieth bitter of soul, never tast- ing aught of good. Together they lie in the dust, and the worm covereth them over ( : – ).

      He expatiates on the prosperity and success of the wicked: Just thinking of it shakes me, he says, trembling seizeth my flesh: Why do the wicked endure, growing old and stately, their seed settled round them . . . ? ( : – ).

       Having described the crowning success of the wicked, Job presses his interlocu- tors: ‘Even if you are right that the children of this prosperous miscreant perish once he is departed, and all trace of them is lost, how does his family’s fate hurt him when he is gone?’— What careth he for the house left behind when the tally of his months is done?

      (Job : ). Job then tries to show that there is no hope of an afterlife: The same neglect persists ( : – ). He marvels that God troubled to make a man but did not care for him: Didst Thou not pour me out like milk and curdle me like cheese? ( : ). This is one view about providence (III ).

      You know the Sages’ verdict: This view of Job’s is sick as can be. “Fill Job’s mouth with dust!” they said. “Job tried to upset the plate,” “Job denies resurrection,” “He began to blaspheme and curse!” (B. Bava Batra 16a). Of God’s telling Eliphaz, Thou didst not speak of Me aright, as did My servant Job (Job : ), the Sages are apologetic: “In the throes of torment one is not responsible” (16b)— Job’s intense suffering excuses him.

      But that does not fit the story. Rather, as I shall now explain, it was because Job recanted and refuted his grave error. It was, of course, the first thought one would have, especially if stricken with tribulations and conscious of his own innocence, as no one denies. That is why this view is ascribed to Job. But he said all this while still unenlightened, knowing God only by faith, as the pious masses do. Once he knew God with certainty, he realized that true happiness, which is knowledge of God, is assured to all who know Him. They are untroubled when they undergo all such disasters.

      As long as Job knew God secondhand and not rationally, he pictured presumed fe- licities like health, wealth, and offspring as the ultimate goal. That is why he fell into perplexity and said what he did. This is what he meant in saying, By my ears had I heard tell of Thee, but now my eyes see Thee. Therefore do I loathe and repent of dust and ashes (Job : – ), meaning ‘Therefore do I despise all that I once cherished and regret a life built on dust and ashes’— for such his life had been, as the story posits: He dwelt amidst ashes ( : ). It is because of this last statement of his, voicing a sound understanding, that it is said, immediately afterward to Eliphaz, thou didst not speak aright of Me, as did My servant Job ( : ).

      Eliphaz’s view about Job’s misfortunes is another position people take regarding prov- idence. He claims that for his sins Job deserved every blow that struck him; as he says to Job, Is not thy wickedness great, are not thy sins without end? (Job : ). He goes on to tell him, ‘Your upright actions and the virtuous life you relied on do not make you perfect in God’s eyes and exempt from punishment’: Lo, He trusteth not His servants; His angels doth He charge with folly. How, then, dwellers in houses of clay with floors of dust? ( : – ).

      Eliphaz presses this point: He believes that all our sufferings are deserved, although the faults that merit punishment are unseen by us, so we do not know how we deserve it.

      The view of Bildad the Shuhite on this question is belief in recompense. He tells Job, ‘If you are guiltless and free of sin, these dreadful disasters serve only to enhance your reward. You will be well repaid. It is all good. You shall be better off in the end!’— as he says, If thou art pure and upright, surely will He wake to thee now and requite the abode of thy goodness. Though thy start was strait, thine end shall be much enlarged (Job : – ). You know how common this view of providence is, and I have explained it already ( .35ab).

      Zophar the Naamathite holds that all depends on God’s will alone, and no grounds are to be sought for His acts (cf. III ): One may not ask why He did this and not that.

      No color of justice, then, or call of wisdom may be sought in anything He does. His sheer Majesty and ultimacy require that He do as He pleases, and it is not for us to probe the hidden wisdom that demands that He do as He will with no more reason than that it is His will. As he says to Job, Would that God spoke and opened His lips to thee and disclosed the secret of His wisdom. It is more than thou deservest. . . . Canst thou plumb God’s depths or fathom the ends of the Almighty? ( : – ).

      You can see now, on reflection, how the story is put together that has so perplexed people and prompted the views that I laid out regarding providence. The possible ap- proaches are stated, each ascribed to a figure renowned in his day for virtue or learning, if the tale is allegorical— or to its exponent, if the narrative is historical. The view ascribed to Job corresponds to Aristotle’s; Eliphaz’s, to that of our Torah; Bildad’s, to that of the Muʿtazilite school; Zophar’s, to that of the Ashʿarites. These were the ancient views re- garding providence.

      Now a fresh view is introduced, ascribed to Elihu. Job’s companions are impressed.

      He is said to be the youngest but the most knowing (Job : – ). He berates Job, calling him benighted and presumptuous for failing to see how misfortunes could befall him despite his goodness— for Job had dwelt on his good deeds. He also confutes the view of providence held by all three friends and says a number of quite puzzling things. As one studies his speech, it might seem that he adds nothing to what Eliphaz, Bildad, and Zophar had said but only repeats their thoughts in different words and at greater length.

      For he confines himself to castigating Job, ascribing justice to God, describing His won- ders in the world, and saying that it does not matter to God if one is dutiful or not— all points already broached by Job’s friends.

      But on closer study, you will see the new thought that was the point of his speech, a theme not found in the others. Alongside this idea, he restates everything the others said, just as Job and his three friends had all repeated each other’s thoughts, as I told you— to mask what was distinctive in each one’s ideas and let people presume that they all think alike, although they do not. The idea that Elihu adds, mentioned by none of the others, is symbolized by an interceding angel. Experience shows, he says, that when someone is ill, is facing death, and has given up, if an angel, any angel, intercedes for him, that interces- sion is accepted, and he is restored: He recovers and regains the best of health— although not indefinitely. Intercession is not permanent or continuous. Twice or three times, as he says, If there be an angel to intervene for him (Job : ). After describing the stages of recovery and the convalescent’s joy at his restored health, he says, Lo, all this God doeth twice or thrice with a man ( : ).

      This theme is found in Elihu’s account alone. He prefaces it by describing prophecy: Once will God speak, or twice, though unperceived— in a dream, a night vision, when deep sleep falleth upon folk (Job : – ). He underscores the thought, describing the experi- ence in terms of multiple natural phenomena, like thunder and lightning, wind and rain.

      He mixes in talk of many conditions affecting animals; the outbreak of plague when he says, They die of a sudden at midnight ( : ); the eruption of great wars when he says, Countless stalwarts doth He shatter and set others in their place ( : ); and many such phenomena.

       Job’s epiphany, too, you’ll find, showing him the error in all his fancies, does not go beyond descriptions of natural phenomena— the elements, meteorological effects, the natures of various animal species— nothing else. The heavens and the firmament, Orion and the Pleiades (Job : , ), are cited only for their effects on the atmosphere: Job’s awakening is spurred wholly by sublunary things. Elihu, similarly, takes his lesson from animal species— as he says, He teacheth us by the beasts of the earth, and by the birds of the heavens maketh us wise ( : ). The longest passage in God’s speech describes the Leviathan, which combines features found separately in animals that walk, swim, or fly.

      The point of raising all this is that our minds fail to grasp how these natural things in the world of generation and corruption arose. We cannot conceive how the natural forces found in them brought them to be. They are utterly unlike things man- made. So how can we expect His care and governance to be like ours? We must call a halt and simply believe that nothing is hidden from Him, as Elihu says: His eyes are upon a man’s ways; He seeth his every step. There is no dark or gloom where wrongdoers can hide (Job : – ). God’s providence does not mean what providence means in us; nor does His governance of His creatures mean what governance means to us. The two have no common definition, as all who are perplexed about this presume; only the name is shared— just as there is no resemblance between our works and His, and they have no common definition. There is a gulf between natural and artificial things and a corresponding abyss between God’s governance, providence, and purpose for natural things here below and human gover- nance, purpose, and care for what we manage, intend, or look after.

      This was the overall aim of the Book of Job: to impart this precept and awaken us to it from the evidence of nature itself, lest one falsely fancy that God’s knowledge, purpose, providence, or governance are like ours. Once one sees this, one can bear any hardship with equanimity: Misfortunes will not foment doubts about God and whether or not He knows and cares for His creation or neglects it. Hardships will only deepen his love— as Job says at the close of his epiphany: Therefore do I loathe and repent of dust and ashes (Job : ) — the Sages speak just so of those “who act out of love and rejoice in sufferings” (B. Shabbat 88b).

       If you study all that I have said as this work should be studied and review the Book of Job, you will see its theme clearly and find that I have captured its sense in full, omitting only what holds the story together and preserves the continuity of the imagery, as I have explained more than once in this work (see .47a).
