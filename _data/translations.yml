  ch48:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      Whenever hearing is ascribed to God, you will find that Onkelos avoids saying that and glosses in terms of apprehension or awareness— or, in the case of prayer, His accept- ing it or not. When it says, The Lord heard, he always glosses “In the Lord’s presence was it heard”; with a prayer, he translates I shall surely hear their cry (Exodus : ) as “I shall surely grant it.” This is his consistent practice without exception. But when vision is ascribed to Him, he shifts strikingly, with an object and intent unclear to me. Some- times he glosses The Lord saw as “The Lord beheld”; sometimes as “It was plain to the Lord.” Apparently, ‘beheld’ in Aramaic is polysemous, denoting either intellectual or sensory apprehension. But if Onkelos thought so, I wish I knew why he sometimes avoids the term and glosses “It was plain to the Lord.”

      Reviewing the manuscripts I could find of his Targum and what I had heard as a stu- dent, I noted that when he found what God “saw” was connected with harm, hostilities, or wrongdoing, he glossed “It was plain to the Lord.” ‘Beheld’ in Aramaic, of course, means awareness, discerning what is the case. So when he found that what God “saw”

      involved wrongdoing, he said not ‘beheld’ but “It was plain to the Lord.” So when seeing is ascribed to God anywhere in the Torah, I found he gives ‘beheld,’ except in the pas- sages I’ll list for you: The Lord hath seen my affliction (Genesis : ) he renders “My suffering is plain to the Lord.” With I have seen all that Laban doeth to thee ( : ), he uses “plain to Me . . .” Even though the speaker was an angel, Onkelos does not speak of his seeing, showing how consistent he was in this. For the issue was wrongdoing. God saw the Israelites (Exodus : ) he renders “The bondage of the Israelites was plain to God.” I have surely seen the suffering of My people ( : ) he renders as “The bondage of my people is plain to Me”; I have also seen their oppression ( : ) as “Their oppression too is plain to Me”; that He had seen their plight ( : ) as “that their bondage was plain to Him.” I have seen this people, [and lo they are stiff necked] ( : ) he renders “plain to Me is this people,”

      since the reference is to their fractiousness— just as God saw the Israelites ( : ) means their suffering. With The Lord saw and was incensed (Deuteronomy : ), he uses “It was plain to the Lord.” When He seeth that their might is fled ( : ), he again uses ‘plain to Him.’ For this too involves a wrong—I srael’s subjection by their foes. In keeping with the verse Thou canst not look on evil (Habakkuk : ), he consistently renders every refer- ence to enslavement or wrongdoing as “It was plain to Him” or “to Me.”

      Yet this fine, far- ranging, and sensible reading is undercut for me by three passages that should have been glossed accordingly as “It was plain to the Lord,” whereas in the manuscripts we find “The Lord beheld.” They are as follows: The Lord saw how wicked man had become on earth (Genesis : ); The Lord saw the earth, and lo it was corrupt ( : ); and The Lord saw that Leah was unloved ( : ). Most likely, I suspect, these are errors that have crept into the manuscripts. For we do not have Onkelos’ holograph here.

      When he glosses God will see to the sheep ( : ) as “The lamb will be plain to the Lord,”

       it may be to avoid suggesting that God had to look for a sheep or create one— or perhaps because it was unseemly in Aramaic to make a dumb animal the object of His atten- tion. The manuscripts should be checked carefully for this in case they need correcting.

      But if the passages prove to be as I quoted them, I just do not know what Onkelos had in mind.
