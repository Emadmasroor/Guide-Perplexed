  ch62:
    friedlander: Placeholder text
    pines: Placeholder text
    goodman: |-
      In the Priestly Blessing (Numbers : – ), we were commanded to use the Name as written, the explicit name. Not everyone knew how to pronounce it— how to vocalize the consonants and whether any are doubled. The learned passed this down to a worthy disciple “once in seven years.” In my opinion, when it says, “The Sages passed down the Tetragrammaton to their sons and disciples once in seven years” (B. Kiddushin 71a), it means not just the pronunciation but the meaning this name was devised to convey. So this too was a divine secret.

      They did have a twelve- letter name of lesser sanctity. Most likely, I think, it was not one word but a compound of two or three, with letters totaling twelve, substituted for the Tetragrammaton in recitation, just as today we substitute Adonai. The twelve- letter name doubtless had a more specific sense than Lord, and this was not restricted or con- cealed from any learned person but taught to anyone who sought to learn it. Not so the Tetragrammaton. One who knew it would teach it only to a son or disciple and only once in seven years.

      But when slackers learned the twelve- letter name, they were soon corrupting people’s beliefs by the use they made of it— as any unreliable person might on finding that things are not as he had fancied — the Sages hid this name, too, and taught it only to the “dis- creet among the priesthood,” to use in blessing the people in the Temple. For they had al- ready stopped uttering the explicit name there, given the declining probity of the people.

      As they say, “After the death of Simon the Just his fellow priests no longer blessed the people with the Tetragrammaton” (B. Yoma 39b, Mena ot 109b). They used the twelve- letter name. “At first,” they say, “they entrusted the twelve- letter name to all. But when reprobates grew more numerous, they entrusted it only to the discreet among the priest- hood, who muffled it in the chanting of their fellow priests. Rabbi arfon said, ‘Once I mounted the dais behind my mother’s father and pricked up my ears to hear the priest.

      But I only heard him muffling his words in the chanting of his fellow priests’” (B. Kid- dushin 71a).

      They also had a forty- two- letter name. But anyone with any sense would know that a single word cannot have forty- two letters. It must have been a compound of several words, with forty- two letters in all. These words doubtless had senses meant to bring one closer to a true idea of Him, as I indicated (I , ).

      These multiletter words were called names only because, like any coinage, they were devised to signify an idea by combining words to make that idea intelligible. For multiple words can convey a single idea. What you need to see is that what was taught was not just how to pronounce the bare syllables but the meaning of the words themselves. The twelve- letter and forty- two- letter names were never called the explicit name, the name that is His alone, as I explained. But they, too, must have conveyed some knowledge of divinity, as shown by the Sages’ saying, “The forty- two- letter name is holy and should be treated as such. It is entrusted only to one who is discreet, in mid- life, even- tempered, sober, unassuming, and fair spoken to all. He who knows it, uses it judiciously, and keeps it pure is beloved on high and esteemed here below, revered by all. His learning lives within him, and he wins this world and the next” (B. Kiddushin 71a). Thus, the talmudic text. What a gulf between this understanding and the notion that so many presume, that just uttering these sounds with no thought of their meaning raises one to great heights, at which splendid goods are to be had. The preparation called for was instruction in the mysteries of the Torah that I have been expounding, knowledge of divinity, as set out in the literature on theology. Such knowledge clearly cannot be forgotten. For it links one to the Active Intellect. That is why it says, “His learning lives within him.” But wicked and ignorant people, finding that those texts left ample room for fraud and forgery, pa- raded any combination of letters they pleased, calling it a name that could do things and produce effects if written or spoken just so. Once recorded, the lies invented by the first ignorant charlatan were passed on in books to people good and pious but simple, who had no test to distinguish true coin from false. So they hid away these works. But when found among their belongings, the spurious books were presumed sound. In short, A simple soul will believe anything (Proverbs : ).

       I have digressed from my higher aim and subtler theme, to debunk some nonsense that any novice thinker would see through. But that was called for by the need to speak of divine names and their meanings and the vulgar notions attached to them. I return now to my purpose. Having noted that every way of naming God uses derivative terms, except the explicit name, we should speak now of that name in a chapter of its own: I am that I am (Exodus : ). For this relates to the subtle idea we’ve been addressing— the exclusion of attributes.
