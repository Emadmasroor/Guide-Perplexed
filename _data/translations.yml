  ch5:
    friedlander: 'It is necessary to notice that the plural marot elohim, “visions
      of God,” is here used, and not the singular mareh, “vision,” for there were
      several things, of different kinds, that were perceived by the prophet. The
      following three things were perceived by him: the Ofannim, the Ḥayyot, and the
      man above the Ḥayyot. The description of each of these visions is introduced
      by the word va-ereh, “and I beheld.” For the account of the Ḥayyot, begins,
      “And I looked (va-ereh), and behold a whirlwind,” etc. (Ezek. i. 4). The account
      of the Ofannim begins: “Now as I beheld (va-ereh) the Ḥayyot, behold one Ofan
      upon the earth” (ver. 15). The vision of that which is above the Ḥayyot in order
      and rank begins: “And I saw (va-ereh) as the colour of the amber, etc., from
      the appearance of his loins even upward” (ver. 27). The word va-ereh, “and I
      beheld,” only occurs these three times in the description of the Mercabah. The
      doctors of the Mishnah have already explained this fact, and my attention was
      called to it by their remarks. For they said that only the two first visions,
      namely, that of the Ḥayyot and the Ofannim, might be interpreted to others;
      but of the third vision, viz., that of the ḥashmal and all that is connected
      with it, only the heads of the sections may be taught. Rabbi [Jehudah], the
      Holy, is of opinion that all the three visions are called maʻaseh mercabah,
      and nothing but the heads of the sections could be communicated to others. The
      exact words of the discussion are as follows:—Where does maʻaseh mercabhah end?
      Rabbi says, with the last va-ereh; Rabbi Yiẓḥak says it ends at the word ḥashmal
      (ver. 27). The portion from va-ereh to ḥashmal may be fully taught; of that
      which follows, only the heads of the sections; according to some it is the passage
      from va-ereh to ḥashmal, of which the heads of the sections may be taught, but
      that which follows may only be studied by those who possess the capacity, whilst
      those that cannot study it by themselves must leave it.—It is clear from the
      words of our Sages that different visions are described, as may also be inferred
      from the repetition of the word va-ereh, and that these visions are different
      from each other in degree; the last and highest of them is the vision commencing,
      “And I saw as the colour of ḥashmal”; that is to say, the divided figure of
      the man, described as “the appearance of fire, etc., from the appearance of
      his loins even upward, and from the appearance of his loins even downward,”
      etc. There is a difference of opinion among our Sages whether it is permitted
      to give by way of hints an exposition of any part of this third vision, or whether
      it is prohibited even to teach of it the heads of the sections, so that only
      the wise can arrive at understanding it by their own studies. You will also
      notice a difference of opinion among our Sages in reference to the two first
      visions, viz., that of the Ḥayyot and that of the Ofannim whether these may
      be taught explicitly or only by way of hints, dark sayings, and heads of sections.
      You must also notice the order of these three visions. First comes the vision
      of the Ḥayyot, because they are first in rank and in the causal relation, as
      it is said, “For the spirit of the Ḥayyah was in the Ofannim” and also for other
      reasons. The vision of the Ofannim [comes next, and] is followed by one which
      is higher than the Ḥayyot, as has been shown. The cause of this arrangement
      is, that in study the first two must necessarily precede the third, and in fact
      they lead to it.'
    pines: Placeholder text
    goodman: |-
      One thing you should note: Ezekiel says visions of God ( : ) in the plural, not the singular.

      For his epiphanies were of different kinds, three in all: beholding the wheels, the creatures, and the man above them. About each, he says ‘I saw’: Of the creatures, I saw, and lo a stormwind . . . ( : ); of the wheels, As I saw the creatures, lo there was one wheel on earth ( : ); and of the man, of higher degree than the creatures, I saw the like of the color of amber . . .

      from what appeared to be his loins ( : ). Apart from these three passages, he never repeats the words I saw in his account of the Chariot. The Sages of the Mishnah enlightened me about this. They alerted me to it by ruling that only the first two epiphanies— his visions of the creatures and the wheels— may be expounded, whereas of the third, the amber, and everything connected with it, “only the rubrics are shared” (M. agigah . ).

      Our holy Rabbi (Judah the Patriarch) believed that all three epiphanies belong to the Account of the Chariot, so only the rubrics may be taught regarding all three. But the Sages ask how far one may go in teaching the Account of the Chariot. Rabbi Meir says, up to the last I saw ( : ). Rabbi Isaac says, up to amber ( : ). From the first I saw ( : ) until amber one may; beyond that, only the rubrics. Some say, from I saw to amber we impart only the rubrics; beyond that, only to one who is wise— otherwise, not (B. agigah 13a).

      So their text clearly distinguishes the three kinds of epiphany, marked by I saw, show- ing that each was on its own level. The third, of which it is said I saw the like of the color of amber (Ezekiel : )— his seeing the divided form of a man, of which it says from the likeness of his loins up . . . and from the likeness of his loins down ( : ), was the last level and his highest. The Sages differ as to whether one may hint anything about it in one’s teaching, by disclosing the rubrics, or whether one may not expound it at all, even by the rubrics, since “one who is wise will understand for himself.” They differ, too, as you see, about his first two epiphanies, of the creatures and the wheels: May one teach their mean- ings openly or only by hints and indirection, using the rubrics?

       We should notice, too, the order of the three epiphanies: First came the creatures, given, inter alia, their causal primacy and rank— for the spirit of the creature was in the wheels (Ezekiel : ). His third epiphany, coming after the wheels, clearly surpasses his seeing the creatures. For the first two presage and lay the groundwork for the third.
