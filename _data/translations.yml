  ch39:
    friedlander: 'We have given the definition of prophecy, stated its true characteristics,
      and shown that the prophecy of Moses our Teacher was distinguished from that
      of other prophets; we will now explain that this distinction alone qualified
      him for the office of proclaiming the Law, a mission without a parallel in the
      history from Adam to Moses, or among the prophets who came after him; it is
      a principle in our faith that there will never be revealed another Law. Consequently
      we hold that there has never been, nor will there ever be, any other divine
      Law but that of Moses our Teacher. According to what is written in Scripture
      and handed down by tradition, the fact may be explained in the following way:
      There were prophets before Moses, as the patriarchs Shem, Eber, Noah, Methushelah,
      and Enoch, but of these none said to any portion of mankind that God sent him
      to them and commanded him to convey to them a certain message or to prohibit
      or to command a certain thing. Such a thing is not related in Scripture, or
      in authentic tradition. Divine prophecy reached them as we have explained. Men
      like Abraham, who received a large measure of prophetic inspiration, called
      their fellow-men together and led them by training and instruction to the truth
      which they had perceived. Thus Abraham taught, and showed by philosophical arguments
      that there is one God, that He has created everything that exists beside Him,
      and that neither the constellations nor anything in the air ought to be worshipped;
      he trained his fellow-men in this belief, and won their attention by pleasant
      words as well as by acts of kindness. Abraham did not tell the people that God
      had sent him to them with the command concerning certain things which should
      or should not be done. Even when it was commanded that he, his sons, and his
      servants should be circumcised, he fulfilled that commandment, but he did not
      address his fellow-men prophetically on this subject. That Abraham induced his
      fellow-men to do what is right, telling them only his own will [and not that
      of God], may be learnt from the following passage of Scripture: “For I know
      him, because he commands his sons and his house after him, to practise righteousness
      and judgment” (Gen. xix. 19). Also Isaac, Jacob, Levi, Kohath, and Amram influenced
      their fellow-men in the same way. Our Sages, when speaking of prophets before
      Moses, used expressions like the following: The bet-din (court of justice) of
      Eber, the bet-din of Methushelah, and in the college of Methushelah; although
      all these were prophets, yet they taught their fellow-men in the manner of preachers,
      teachers, and pedagogues, but did not use such phrases as the following: “And
      God said to me, Speak to certain people so and so.” This was the state of prophecy
      before Moses. But as regards Moses, you know what [God] said to him, what he
      said [to the people], and the words addressed to him by the whole nation: “This
      day we have seen that God doth talk with man, and that he liveth” (Deut. v.
      21). The history of all our prophets that lived after Moses is well known to
      you; they performed, as it were, the function of warning the people and exhorting
      them to keep the Law of Moses, threatening evil to those who would neglect it,
      and announcing blessings to those who would submit to its guidance. This we
      believe will always be the case. Comp. “It is not in the heavens that one might
      say,” etc. (ibid. xxx. 12); “For us and for our children for ever” (ibid. xxix.
      28). It is but natural that it should be so. For if one individual of a class
      has reached the highest perfection possible in that class, every other individual
      must necessarily be less perfect, and deviate from the perfect measure either
      by surplus or deficiency. Take, e.g., the normal constitution of a being, it
      is the most proper composition possible in that class; any constitution that
      deviates from that norm contains something too much or too little. The same
      is the case with the Law. It is clear that the Law is normal in this sense;
      for it contains “Just statutes and judgments” (Deut. iv. 8); but “just” is here
      identical with “equibalanced.” The statutes of the Law do not impose burdens
      or excesses as are implied in the service of a hermit or pilgrim, and the like;
      but, on the other hand, they are not so deficient as to lead to gluttony or
      lewdness, or to prevent, as the religious laws of the heathen nations do, the
      development of man’s moral and intellectual faculties. We intend to discuss
      in this treatise the reasons of the commandments, and we shall then show, as
      far as necessary, the justice and wisdom of the Law, on account of which it
      is said: “The Law of God is perfect, refreshing the heart” (Ps. xix. 8). There
      are persons who believe that the Law commands much exertion and great pain,
      but due consideration will show them their error. Later on I will show how easy
      it is for the perfect to obey the Law. Comp. “What does the Lord thy God ask
      of thee?” etc. (Deut. x. 12); “Have I been a wilderness to Israel?” (Jer. ii.
      31). But this applies only to the noble ones; whilst wicked, violent, and pugnacious
      persons find it most injurious and hard that there should be any divine authority
      tending to subdue their passion. To low-minded, wanton, and passionate persons
      it appears most cruel that there should be an obstacle in their way to satisfy
      their carnal appetite, or that a punishment should be inflicted for their doings.
      Similarly every godless person imagines that it is too hard to abstain from
      the evil he has chosen in accordance with his inclination. We must not consider
      the Law easy or hard according as it appears to any wicked, low-minded, and
      immoral person, but as it appears to the judgment of the most perfect, who,
      according to the Law, are fit to be the example for all mankind. This Law alone
      is called divine; other laws, such as the political legislations among the Greeks,
      or the follies of the Sabeans, are the works of human leaders, but not of prophets,
      as I have explained several times.'
    pines: Placeholder text
    goodman: |-
      Having spoken of the essence of prophecy, informed you of its true nature, and explained how our Teacher Moses’ prophecy differs from any other, I will say now that it was only his unique experience that gave him his mission as a lawgiver. No one known to us from Adam’s time to his did anything like Moses’ giving us the Torah. Nor did any of our later Prophets have such a mission, and it is a core tenet of our religion that no one ever will (Deuteronomy : ). Our view is that there has been and will be but one re- vealed law, the Torah of our Teacher Moses. Our Scriptures and traditions show clearly that no prophet before him— not the Patriarchs, Shem and Ever, Noah, Methuselah, or Enoch— ever told a body of people, ‘God sent me to you and bade me tell you such and such, commanded that you do this and forbade you to do that.’ No biblical text or sound tradition says any such thing. The others were inspired by God only in the way that I explained (I ; II – ).

      When a powerful emanation reached someone like Abraham, he gathered the people and made his appeal to them as a teacher, offering guidance to the truth he had grasped, as Abraham himself did, teaching and explaining, with reasoned arguments, that there is but one God, who created all things else, and that none of these forms or creations should be worshipped. That was his covenant with them. He won them over with fair words and fine treatment but never said, ‘God sent me to you with commands and prohibitions.’ Even when ordered to circumcise himself, his sons, and his household, he did so but did not prophetically ordain it for others. You can see the passage for yourself: I have known him, [that he may charge his children and his house after him to keep the way of the Lord, by doing right and justice] (Genesis : ). Evidently, he led only by way of counsel and persuasion. Isaac, Jacob, Levi, Kohat, and Amram appealed to people in the same way. That is why you find the Sages assigning the prophets before Moses to “the court of Ever,” “the court of Methuselah,” and “the school of Methuselah.” All of them were prophets who only instructed the people, as teachers, preceptors, and guides. They did not say, ‘The Lord spoke to me saying, “Speak to the children of So- and- So.”’ That is how it was before our Teacher Moses.

      With Moses, we know what was said to him, what he said, and what all the throng said to him: This day have we seen God speak [to a man] (Deuteronomy : ). All the Prophets after our Teacher Moses, as you know from their histories, took the role of admonishers, urging the people to keep the Law of Moses. They issued warnings to those who spurn it and promises to those who hold it fast. This, we believe, will ever be so— as it says, It is not in heaven ( : ) and for us and for our children forever ( : ).

      And that is how it must be. For when a thing is perfect of its kind, anything else of the kind must be imperfect— excessive or deficient — just as any deviation from the optimal balance of temper physiologically goes too far or not far enough. Our Torah is perfect by its balance — just laws and statutes ( : ). For ‘just,’ as you know, means bal- anced. Its ways of worship demand nothing onerous or extreme like celibacy or sacred journeys and such; nor are they lax, so as to promote cupidity or depravity that bar perfection of one’s character and thinking, as other laws of ancient nations did. Later in this work, when I turn to the reasons for the commandments, you will see clearly, as one should, how wise and balanced these laws are— and why it says, The Law of the Lord is perfect (Psalms : ).

      Those who find these laws hard, harsh, or irksome are quite mistaken. I will show how easy they really are to a wholesome sensibility ( .64b). That is why it says, What doth the Lord thy God ask of thee? (Deuteronomy : ) and Have I been a desert to Israel? (Jere- miah : ). But all this is for the virtuous. To the unjust, violent, and oppressive, the very existence of a Judge who curbs their abuses is as hard and hurtful as can be. To the base and vile, nothing is worse than to be kept from letting their debauchery run wild and to be punished for indulging it— just as any moral weakling finds it hard to be kept from the ills his vice favors. So the Torah’s ease or difficulty should be judged not from the stand- point of every craven profligate but from that of persons of integrity. For the Torah’s goal is for everyone to become such. It is this law alone, then, that we call a divine law.

      Other schemes of governance, like the laws of the Greeks and the ravings of the Sabians et al., are all of them the work of human rulers, not prophets, as I have explained several times.
