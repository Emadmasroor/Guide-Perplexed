<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">

<style>
  /* The Container for the whole translation section */
  .translations-section {
    background-color: #fcfaf7; /* A soft, paper-like off-white */
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 20px;
    margin: 25px 0;
  }

  .translations-heading {
    margin-top: 0;
    margin-bottom: 15px;
    font-size: 1.2rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    /* No font-family specified here so it uses your site default */
  }

  /* The Tab Navigation Bar */
  .tab-nav { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 5px; 
    border-bottom: 2px solid #e0dbd1; 
    margin-bottom: 20px; 
  }

  .tab-button { 
    padding: 8px 16px; 
    font-size: 14px;
    border: none; 
    background: transparent; 
    cursor: pointer; 
    border-bottom: 2px solid transparent; 
    transition: 0.2s;
    /* No font-family specified here so it uses your site default */
  }

  .tab-button.active { 
    border-bottom: 2px solid #2a7ae2; 
    color: #2a7ae2; 
    font-weight: bold; 
  }

  /* The Content Area - Keeping EB Garamond only here */
  .tab-panel { 
    display: none; 
    font-family: "EB Garamond", serif;
    font-size: 1.2rem;
    line-height: 1.6;
    color: #333;
  }

  .tab-panel p {
    font-family: "EB Garamond", serif !important;
    margin-bottom: 1.2em;
  }

  .tab-panel.active { 
    display: block; 
  }

/* RTL Support */
[id*="atay"], 
[id*="tibbon"], 
[id*="munk"]:not([id*="_fr"]), /* Targets Munk, but excludes Munk_fr */
[id*="arabic"], 
[id*="hebrew"] {
  direction: rtl;
  text-align: right;
  font-size: 1.4rem;
  font-family: "SBL Hebrew", "Times New Roman", serif; /* Recommended for readability */
}

</style>

<script>
  function openTab(evt, tabId) {
    const container = evt.currentTarget.parentElement.parentElement;
    const panels = container.querySelectorAll('.tab-panel');
    const buttons = container.querySelectorAll('.tab-button');
    
    panels.forEach(p => p.classList.remove('active'));
    buttons.forEach(b => b.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    evt.currentTarget.classList.add('active');
  }
</script>
