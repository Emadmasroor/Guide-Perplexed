---
layout: default
---
<style>
  /* Basic Tab Styling */
  .tab-nav { border-bottom: 2px solid #eee; margin-bottom: 15px; display: flex; gap: 5px; }
  .tab-button { 
    padding: 10px 15px; border: none; background: none; cursor: pointer; 
    font-size: 16px; border-bottom: 2px solid transparent; transition: 0.3s;
  }
  .tab-button:hover { background: #f5f5f5; }
  .tab-button.active { border-bottom: 2px solid #007bff; color: #007bff; font-weight: bold; }
  
  /* Hide panels by default, show 'active' ones */
  .tab-panel { display: none; padding: 15px 0; }
  .tab-panel.active { display: block; }
</style>

<script>
  function openTab(evt, tabId) {
    // Hide all panels
    const panels = document.querySelectorAll('.tab-panel');
    panels.forEach(p => p.classList.remove('active'));

    // Deactivate all buttons
    const buttons = document.querySelectorAll('.tab-button');
    buttons.forEach(b => b.classList.remove('active'));

    // Show current panel and activate button
    document.getElementById(tabId).classList.add('active');
    evt.currentTarget.classList.add('active');
  }
</script>
<article class="post">

  <header class="post-header">
    <h1 class="post-title">Part {{ page.part}}, {{ page.title | escape }}</h1>
    <h2 class="post-tagline"> {{ page.highlights}} </h2>
    <h3 class="post-tagline"> <a href="{{site.baseurl}}/summaries#part-{{page.part}}-chapter-{{page.chapter}}"> :arrow_left: </a> </h3>
  </header>

  <p style="text-align:right; font-size:11px">
    <a target="_blank" rel="noopener noreferrer" href="https://archive.org/details/DelalatolHaerin_201804/page/n{{ page.pnum }}">Arabic (Huseyin Attai, 1962)</a> | 
    <a target="_blank" rel="noopener noreferrer" href="https://www.sefaria.org/Guide_for_the_Perplexed%2C_Part_{{ page.part }}.{{ page.chapter }}?lang=en">English (Michael Friedländer, 1885)</a> |
    <a target="_blank" rel="noopener noreferrer" href="https://www.sefaria.org/Guide_for_the_Perplexed%2C_Part_{{ page.part }}.{{ page.chapter }}?lang=bi">Hebrew (Ibn Tibbon, 1204)</a> | 
    <a target="_blank" rel="noopener noreferrer" href="https://www.sefaria.org/Guide_for_the_Perplexed%2C_Part_{{ page.part }}.{{ page.chapter }}?vhe=Judeo_Arabic,_Paris,_1856_(ar)&lang=bi">Arabic (Munk, 1856)</a>
  </p>

  <div class="post-content">
    {{ content }}
  </div>

  <footer>
    <p style="font-size: 10px;text-align:right">
    © Emad Masroor
      <a href="https://github.com/Emadmasroor/Guide-Perplexed/blob/main/{{ page.path }}">Edit this page on GitHub</a>
    </p>
  </footer>

</article>
