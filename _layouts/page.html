---
layout: default
---
<style>
  /* Basic Tab Styling */
  .tab-nav { border-bottom: 2px solid #eee; margin-bottom: 15px; display: flex; gap: 5px; }
  .tab-button {
    padding: 10px 15px; border: none; background: none; cursor: pointer;
    font-size: 16px; border-bottom: 2px solid transparent; transition: 0.3s;
  }
  .tab-button:hover { background: #f5f5f5; }
  .tab-button.active { border-bottom: 2px solid #007bff; color: #007bff; font-weight: bold; }

  /* Hide panels by default, show 'active' ones */
  .tab-panel { display: none; padding: 15px 0; }
  .tab-panel.active { display: block; }
</style>

<script>
  function openTab(evt, tabId) {
    // Hide all panels
    const panels = document.querySelectorAll('.tab-panel');
    panels.forEach(p => p.classList.remove('active'));

    // Deactivate all buttons
    const buttons = document.querySelectorAll('.tab-button');
    buttons.forEach(b => b.classList.remove('active'));

    // Show current panel and activate button
    document.getElementById(tabId).classList.add('active');
    evt.currentTarget.classList.add('active');
  }
</script>

<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

<div class="post-content">
    {% capture post_content %}{% include anchor_headings.html html=content generateId=true %}{% endcapture %}

    <!-- Make sure to feed content **with** heading ids to correctly generate the TOC -->
    {% include toc.html html=post_content sanitize=true %}

    <!-- Render the content since you are just capturing it up above -->
    {{ post_content }}    
</div>

  <!--
  <div class="post-content">
    {{ content }}
  </div>
  -->
<footer>
    <p style="font-size: 10px;text-align:right">
      <a href="https://github.com/Emadmasroor/Guide-Perplexed/blob/main/{{ page.path }}">Edit this page on GitHub
      </a>
    </p>
  </footer>
</article>
